services:
  postgres:
    image: postgres:16
    container_name: genealogy-postgres
    restart: always
    environment:
      POSTGRES_DB: genealogy
      POSTGRES_USER: genealogy
      POSTGRES_PASSWORD: genealogy
    volumes:
      - genealogy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genealogy -d genealogy"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./genealogy-backend
      dockerfile: Dockerfile
    container_name: genealogy-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/genealogy
      SPRING_DATASOURCE_USERNAME: genealogy
      SPRING_DATASOURCE_PASSWORD: genealogy
    ports:
      - "8080:8080"

volumes:
  genealogy-postgres-data:
