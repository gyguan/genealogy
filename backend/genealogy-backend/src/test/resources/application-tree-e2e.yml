spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/genealogy}
    username: ${SPRING_DATASOURCE_USERNAME:genealogy}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

genealogy:
  auth:
    expose-bearer-token: true
    public-registration-enabled: false
    demo-mode-enabled: false
    cookie-secure: false
    cookie-same-site: Lax

logging:
  level:
    com.genealogy: info
    org.hibernate.SQL: warn
