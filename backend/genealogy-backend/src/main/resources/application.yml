server:
  port: 8080

spring:
  application:
    name: genealogy-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/genealogy
    username: genealogy
    password: genealogy
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.genealogy: debug
