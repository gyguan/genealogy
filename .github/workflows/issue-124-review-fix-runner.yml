name: Issue 124 Review Fix Runner

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-124-review-fix-runner.yml

permissions:
  contents: write

jobs:
  rebuild-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-124-stable-trace-id
          fetch-depth: 0
          path: target

      - name: Rebuild as one clean commit on latest main
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Feature branch does not contain latest main; refusing lossy rebuild"
            exit 1
          fi
          git diff --binary origin/main HEAD > ../issue124-final.patch
          test -s ../issue124-final.patch
          git checkout -B issue-124-clean origin/main
          git apply --index ../issue124-final.patch
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "Final feature diff unexpectedly contains workflow changes"
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: target/backend/genealogy-backend/pom.xml

      - name: Run focused backend tests
        working-directory: target/backend/genealogy-backend
        run: >-
          mvn -B
          -Dtest=SourceBindingReviewApplicationServiceTest,CultureAwareSourceBindingReviewApplicationServiceTest,TrackingTraceApplicationServiceTest,ApprovalTraceLifecycleTest,RevisionTraceIdTest
          test

      - name: Package backend
        working-directory: target/backend/genealogy-backend
        run: mvn -B -DskipTests package

      - name: Commit and force-push clean feature history
        working-directory: target
        run: |
          git commit -m "feat: add stable trace ids across revision lifecycle"
          git push --force origin HEAD:agent/issue-124-stable-trace-id
