name: Issue 102 Contract Generation

on:
  push:
    branches:
      - agent/issue-102-member-permission-p1

permissions:
  contents: write

jobs:
  generate-contract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-102-member-permission-p1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate OpenAPI overlays
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/api/openapi.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/api/openapi.member-permission.json', 'utf8'))"
      - name: Generate frontend API contract
        run: node scripts/api/generate-frontend-client.mjs
      - name: Commit generated contract
        run: |
          if git diff --quiet -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts; then
            echo "Generated contract already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/shared/api/generated/api-contract.ts
          git commit -m "chore(api): regenerate issue 102 contract [skip ci]"
          git push origin HEAD:agent/issue-102-member-permission-p1
