name: Issue 123 Apply

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/issue-123-apply.yml'
      - '.github/scripts/issue-123-apply.py'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply page integration patch
        run: python3 .github/scripts/issue-123-apply.py
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Run tracking and deep-link tests
        working-directory: frontend/genealogy-web
        run: npm run test:logs
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Commit verified changes and remove temporary assets
        run: |
          rm .github/scripts/issue-123-apply.py .github/workflows/issue-123-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: connect core pages to tracking deep links"
          git push origin HEAD:${{ github.head_ref }}
