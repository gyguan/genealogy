name: Issue 708 final validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-708-finalize.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-708-approved-dependencies
          fetch-depth: 0
      - name: Apply changes
        run: |
          python scripts/issue-708-apply.py
          python - <<'PY'
          from pathlib import Path

          command_test = Path('backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceBindingCommandApplicationServiceTest.java')
          text = command_test.read_text(encoding='utf-8')
          text = text.replace(
              '''        InOrder order = inOrder(sourceApplicationService, targetValidationService);
                  order.verify(sourceApplicationService).bind(1L, request, 2L);
                  order.verify(targetValidationService).validate(1L, "generation_word", 100L);''',
              '''        InOrder order = inOrder(targetValidationService, sourceApplicationService);
                  order.verify(targetValidationService).validate(1L, "generation_word", 100L);
                  order.verify(sourceApplicationService).bind(1L, request, 2L);''',
              1,
          )
          text = text.replace(
              '''        InOrder order = inOrder(sourceBindingReviewApplicationService, targetValidationService);
                  order.verify(sourceBindingReviewApplicationService).approve(9L, request, 3L, "req-3", "127.0.0.1");
                  order.verify(targetValidationService).validate(1L, "generation_word", 100L);''',
              '''        InOrder order = inOrder(targetValidationService, sourceBindingReviewApplicationService);
                  order.verify(targetValidationService).validate(1L, "generation_word", 100L);
                  order.verify(sourceBindingReviewApplicationService).approve(9L, request, 3L, "req-3", "127.0.0.1");''',
              1,
          )
          command_test.write_text(text, encoding='utf-8')

          site_test = Path('backend/genealogy-backend/src/test/java/com/genealogy/culture/application/CultureSiteApplicationServiceTest.java')
          text = site_test.read_text(encoding='utf-8')
          text = text.replace(
              '        targetBranch.setClanId(1L);',
              '        targetBranch.setClanId(1L);\n        targetBranch.setStatus("official");',
              1,
          )
          site_test.write_text(text, encoding='utf-8')
          PY
          git diff --check
      - name: Backend tests
        working-directory: backend/genealogy-backend
        run: |
          set -o pipefail
          mvn -q test 2>&1 | tee ../../issue-708-backend.log
      - name: Frontend checks
        working-directory: frontend/genealogy-web
        run: |
          set -o pipefail
          npm install 2>&1 | tee ../../issue-708-frontend.log
          npm run typecheck 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:wizard 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:wizard-dependencies 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:source-stage 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:person-edit 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:imports 2>&1 | tee -a ../../issue-708-frontend.log
          npm run test:culture-shell 2>&1 | tee -a ../../issue-708-frontend.log
          npm run build 2>&1 | tee -a ../../issue-708-frontend.log
      - name: Package changes
        if: always()
        run: |
          git diff --binary > issue-708.patch
          git diff --name-only > issue-708-files.txt
          tar -czf issue-708-files.tar.gz -T issue-708-files.txt
      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-708-validation-output
          path: |
            issue-708.patch
            issue-708-files.txt
            issue-708-files.tar.gz
            issue-708-backend.log
            issue-708-frontend.log
          if-no-files-found: ignore
          retention-days: 1
