name: Issue 121 Frontend Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/issue-121-frontend-patch.py
      - scripts/issue-121-frontend-fix.py
      - .github/workflows/issue-121-frontend-integration.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Apply frontend patches
        run: |
          python scripts/issue-121-frontend-patch.py
          python scripts/issue-121-frontend-fix.py
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Check generated contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Upload validated page
        uses: actions/upload-artifact@v4
        with:
          name: issue-121-validated-log-page
          path: frontend/genealogy-web/src/features/logs/LogPage.tsx
          if-no-files-found: error
