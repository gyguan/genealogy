name: Issue 121 Frontend Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/issue-121-frontend-patch.py
      - .github/workflows/issue-121-frontend-integration.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Apply frontend patch
        run: python scripts/issue-121-frontend-patch.py
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Typecheck frontend
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run typecheck > /tmp/issue-121-typecheck.log 2>&1
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-121-frontend-diagnostics
          path: |
            /tmp/issue-121-typecheck.log
            frontend/genealogy-web/src/features/logs/LogPage.tsx
          if-no-files-found: error
