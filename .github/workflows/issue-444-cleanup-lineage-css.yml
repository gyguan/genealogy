name: Issue 444 Cleanup Toolbar CSS

on:
  push:
    branches:
      - agent/issue-444-expand-lineage-filters

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message, '[skip issue-444-cleanup]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-444-expand-lineage-filters
          fetch-depth: 0
      - name: Remove stale toolbar rules
        shell: python
        run: |
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/features/tree/lineage-workbench-issue376.css')
          css = path.read_text()
          css = css.replace('''.lineage-scope-summary {
            margin-bottom: 16px;
          }
          ''', '''.lineage-scope-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
          }
          ''', 1)
          stale_start = css.index('.lineage-canvas-view-bar {\n  display: flex;', css.index('.lineage-query-action .ant-btn'))
          stale_end = css.index('.lineage-canvas-view-bar {\n  padding:', stale_start)
          css = css[:stale_start] + css[stale_end:]
          css = css.replace('''.lineage-canvas-view-bar {
            padding: 12px 0;
          ''', '''.lineage-canvas-view-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 0;
          ''', 1)
          path.write_text(css)
      - name: Commit cleanup
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/lineage-workbench-issue376.css
          git commit -m "fix(tree): remove stale lineage toolbar css [skip issue-444-cleanup] [skip issue-444-refactor]"
          git push
