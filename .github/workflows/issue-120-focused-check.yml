name: Issue 120 Focused Check

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/issue-120-focused-check.yml"
      - "backend/genealogy-backend/**"
      - "frontend/genealogy-web/**"
      - "docs/api/**"
      - "scripts/api/**"

jobs:
  backend-focused:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_POSTGRES_URL: jdbc:postgresql://localhost:5432/genealogy
      TEST_POSTGRES_USERNAME: genealogy
      TEST_POSTGRES_PASSWORD: genealogy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests compile
      - name: Run issue 120 focused tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=TrackingObjectSearchApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingObjectQueryRepositoryPostgresTest,TrackingControllerTest,OpLogControllerTest,OperationLogApplicationServiceTest,OperationLogBusinessViewApplicationServiceTest test

  frontend-focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify contract and frontend
        working-directory: frontend/genealogy-web
        run: |
          npm run api:check
          npm run test:logs
          npm run typecheck
          npm run build
