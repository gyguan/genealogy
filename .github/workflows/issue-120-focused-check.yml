name: Issue 120 Focused Check

on:
  push:
    branches:
      - "agent/issue-120-business-object-search"
    paths:
      - ".github/workflows/issue-120-focused-check.yml"
      - "backend/genealogy-backend/**"
      - "frontend/genealogy-web/**"
      - "docs/api/**"
      - "scripts/api/**"

jobs:
  backend-focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests compile
      - name: Run issue 120 focused tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=TrackingObjectSearchApplicationServiceTest,TrackingControllerTest,OpLogControllerTest,OperationLogApplicationServiceTest test

  frontend-focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify contract and frontend
        working-directory: frontend/genealogy-web
        run: |
          npm run api:check
          npm run test:logs
          npm run typecheck
          npm run build
