name: Issue 117 Contract Generation

on:
  push:
    branches:
      - agent/issue-117-operation-log-access
    paths:
      - 'docs/api/**'
      - 'scripts/api/generate-frontend-client.mjs'
      - '.github/workflows/issue-117-contract-generation.yml'

permissions:
  contents: write

jobs:
  generate-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-117-operation-log-access
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate OpenAPI JSON files
        run: |
          node -e "const fs=require('fs'); for (const f of fs.readdirSync('docs/api').filter(x=>x.endsWith('.json'))) JSON.parse(fs.readFileSync('docs/api/'+f,'utf8'));"

      - name: Generate frontend API operation contract
        run: node scripts/api/generate-frontend-client.mjs

      - name: Commit generated contract when changed
        run: |
          if git diff --quiet -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts; then
            echo 'Generated contract is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/genealogy-web/src/shared/api/generated/api-contract.ts
          git commit -m 'chore(api): regenerate issue 117 contract'
          git push origin HEAD:agent/issue-117-operation-log-access
