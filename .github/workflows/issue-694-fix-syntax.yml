name: Issue 694 Apply Syntax Cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/issue-694-wizard-strict-two-layer-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply syntax cleanup
        run: python scripts/issue-694-fix-syntax.py
      - name: Persist cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/genealogy-web/src/features/mvp1/steps
          if git diff --cached --quiet; then
            echo unchanged
          else
            git commit -m 'fix(issue-694): clean migrated wizard result markup'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi