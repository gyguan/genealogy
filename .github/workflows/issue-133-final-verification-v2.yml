name: Issue 133 Final Verification V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Verify frontend and contract
        working-directory: frontend/genealogy-web
        run: |
          npm ci --no-audit --no-fund
          npm run test:auth
          npm run test:members
          npm run typecheck
          npm run api:check
          npm run build
      - name: Scan production build
        run: |
          ! grep -R -E "Admin@123456|Demo@123456|Viewer@123456|Mvp1@123456" frontend/genealogy-web/src frontend/genealogy-web/dist
          ! grep -R -E "demo_admin|demo_editor|demo_viewer" frontend/genealogy-web/src/features/auth frontend/genealogy-web/dist
          ! grep -R "localStorage.setItem('genealogy.token'" frontend/genealogy-web/src frontend/genealogy-web/dist

  backend-authentication:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile application and tests
        working-directory: backend/genealogy-backend
        run: mvn -B -DskipTests test
      - name: Run focused authentication and permission tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -B
          -Dtest=AuthApplicationServiceCommercialTest,AuthSecurityServiceTest,PasswordResetApplicationServiceTest,AuthInvitationApplicationServiceTest,MemberGrantPolicyServiceTest,MemberPermissionApplicationServiceTest
          test

  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
          POSTGRES_DB: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply idempotent migration
        env:
          PGPASSWORD: genealogy
        run: |
          psql -h localhost -U genealogy -d genealogy <<'SQL'
          create table app_user (
            id bigserial primary key,
            username varchar(80) not null,
            password_hash varchar(255) not null,
            display_name varchar(120) not null,
            status varchar(32) not null,
            created_at timestamp not null,
            updated_at timestamp not null
          );
          create table clan (
            id bigserial primary key,
            clan_name varchar(200) not null
          );
          create table app_auth_session (
            id bigserial primary key,
            user_id bigint not null references app_user(id),
            token_hash varchar(255) not null,
            issued_at timestamp not null,
            expires_at timestamp not null,
            revoked_at timestamp,
            client_ip varchar(64),
            user_agent varchar(500)
          );
          SQL
          psql -h localhost -U genealogy -d genealogy -v ON_ERROR_STOP=1 -f backend/genealogy-backend/src/main/resources/db/migration/V20260713203000__add_auth_commercialization.sql
          psql -h localhost -U genealogy -d genealogy -v ON_ERROR_STOP=1 -f backend/genealogy-backend/src/main/resources/db/migration/V20260713203000__add_auth_commercialization.sql
          test "$(psql -h localhost -U genealogy -d genealogy -Atc "select count(*) from information_schema.tables where table_name in ('app_account_invite','app_password_reset_token','app_login_attempt','app_auth_security_event');")" = "4"
