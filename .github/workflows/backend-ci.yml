name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        working-directory: backend/genealogy-backend
        run: mvn -B clean test

  startup-check:
    name: Startup Check with PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start PostgreSQL quietly
        run: |
          set -euo pipefail
          docker pull postgres:16 >/dev/null
          docker run -d \
            --name genealogy-postgres \
            -e POSTGRES_DB=genealogy \
            -e POSTGRES_USER=genealogy \
            -e POSTGRES_PASSWORD=genealogy \
            -p 5432:5432 \
            postgres:16 >/dev/null

          for i in $(seq 1 30); do
            if docker exec genealogy-postgres pg_isready -U genealogy -d genealogy >/dev/null 2>&1; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            sleep 2
          done

          echo "PostgreSQL did not become ready. Container logs:"
          docker logs genealogy-postgres | tail -n 80
          exit 1

      - name: Package backend
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package

      - name: Start backend and check health
        working-directory: backend/genealogy-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
        run: |
          set -euo pipefail
          JAR_FILE=$(ls target/genealogy-backend-*.jar | head -n 1)
          echo "Starting ${JAR_FILE}"
          java -jar "${JAR_FILE}" > /tmp/genealogy-backend-startup.log 2>&1 &
          echo $! > /tmp/genealogy-backend.pid

          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/api/v1/health; then
              echo "Backend startup health check passed."
              kill $(cat /tmp/genealogy-backend.pid) || true
              docker rm -f genealogy-postgres >/dev/null 2>&1 || true
              exit 0
            fi

            if ! kill -0 $(cat /tmp/genealogy-backend.pid) 2>/dev/null; then
              echo "Backend process exited before health check passed. Startup log tail:"
              tail -n 200 /tmp/genealogy-backend-startup.log
              docker rm -f genealogy-postgres >/dev/null 2>&1 || true
              exit 1
            fi

            echo "Waiting for backend startup... attempt ${i}/40"
            sleep 5
          done

          echo "Backend health check timeout. Startup log tail:"
          tail -n 200 /tmp/genealogy-backend-startup.log
          kill $(cat /tmp/genealogy-backend.pid) || true
          docker rm -f genealogy-postgres >/dev/null 2>&1 || true
          exit 1
