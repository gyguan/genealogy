name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-verify:
    name: Backend Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test and package backend
        working-directory: backend/genealogy-backend
        run: mvn -B verify
