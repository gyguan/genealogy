name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Compile backend with minimal logs
        run: |
          set -e
          java -version
          mvn -version
          curl -L "https://github.com/gyguan/genealogy/archive/${GITHUB_HEAD_REF:-main}.tar.gz" -o repo.tgz
          mkdir repo
          tar -xzf repo.tgz -C repo --strip-components=1
          cd repo/backend/genealogy-backend
          set +e
          mvn -q -DskipTests compile > /tmp/backend-build.log 2>&1
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo "Backend compile failed. Maven output tail:"
            tail -n 120 /tmp/backend-build.log
            exit "$code"
          fi
          echo "Backend compile passed."
