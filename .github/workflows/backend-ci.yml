name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - "frontend/mvp/**"
      - "frontend/genealogy-web/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/backend-startup-check.sh"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - "frontend/mvp/**"
      - "frontend/genealogy-web/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/backend-startup-check.sh"
  workflow_dispatch:

jobs:
  build:
    name: Build Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        working-directory: backend/genealogy-backend
        run: mvn -B clean test

  frontend-check:
    name: MVP1 Static Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript syntax check
        working-directory: frontend/mvp
        run: node --check app.js

      - name: Frontend contract check
        working-directory: frontend/mvp
        run: node check-frontend.js

  commercial-frontend-build:
    name: Commercial Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Build commercial frontend
        working-directory: frontend/genealogy-web
        run: npm run build

  startup-check:
    name: Startup Check with PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: Startup check with focused diagnostics
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_HEAD_REF:-main}"
          echo "Running startup check script from ref: ${REF_NAME}"
          curl -fsSL "https://raw.githubusercontent.com/gyguan/genealogy/${REF_NAME}/.github/scripts/backend-startup-check.sh" | bash
