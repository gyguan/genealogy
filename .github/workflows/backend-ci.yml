name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/backend-startup-check.sh"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/scripts/backend-startup-check.sh"
  workflow_dispatch:

jobs:
  build:
    name: Build Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        working-directory: backend/genealogy-backend
        run: mvn -B clean test

  startup-check:
    name: Startup Check with PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: Startup check with focused diagnostics
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_HEAD_REF:-main}"
          echo "Running startup check script from ref: ${REF_NAME}"
          curl -fsSL "https://raw.githubusercontent.com/gyguan/genealogy/${REF_NAME}/.github/scripts/backend-startup-check.sh" | bash
