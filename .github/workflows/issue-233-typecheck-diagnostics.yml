name: Issue 233 Typecheck Diagnostics

on:
  push:
    branches:
      - agent/issue-233-lineage-workbench
    paths:
      - .github/workflows/issue-233-typecheck-diagnostics.yml

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture typecheck
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee issue-233-typecheck.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
        id: typecheck
      - uses: actions/upload-artifact@v4
        with:
          name: issue-233-typecheck-diagnostics
          path: frontend/genealogy-web/issue-233-typecheck.log
          retention-days: 1
      - name: Preserve failing conclusion
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
