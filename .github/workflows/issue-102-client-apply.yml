name: Issue 102 Client Apply

on:
  push:
    branches:
      - agent/issue-102-member-permission-p1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-102-member-permission-p1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - run: python3 scripts/issue102/apply_client_slice.py
      - working-directory: frontend/genealogy-web
        run: npm ci
      - working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit client slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/shared/api/client.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat(api): preserve business error code and unify patch [skip ci]"
          git push origin HEAD:agent/issue-102-member-permission-p1
