name: Issue 233 Divider Fix

on:
  push:
    branches:
      - agent/issue-233-lineage-workbench
    paths:
      - .github/workflows/issue-233-divider-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove unsupported divider orientation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx')
          text = path.read_text().replace('<Divider orientation="start">相关关系</Divider>', '<Divider>相关关系</Divider>')
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx
          git commit -m "fix(tree): remove unsupported divider orientation"
          git push origin HEAD:agent/issue-233-lineage-workbench
