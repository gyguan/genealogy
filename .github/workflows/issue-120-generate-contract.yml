name: Issue 120 Generate Contract

on:
  push:
    branches:
      - "agent/issue-120-business-object-search"
    paths:
      - "docs/api/openapi.tracking-search.json"
      - "scripts/api/generate-frontend-client.mjs"
      - ".github/workflows/issue-120-generate-contract.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout issue branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-120-business-object-search
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Generate API contract artifacts
        working-directory: frontend/genealogy-web
        run: npm run api:generate

      - name: Commit generated files
        run: |
          if git diff --quiet -- frontend/genealogy-web/src/shared/api/generated; then
            echo "Generated files are already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/shared/api/generated
          git commit -m "chore(api): generate issue 120 contract artifacts"
          git push origin HEAD:agent/issue-120-business-object-search
