name: Issue 696 Remove Result Sort Controls

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event.pull_request.head.ref == 'agent/issue-696-remove-result-sort-controls' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply result sort control removal
        run: python scripts/issue-696-remove-result-sort-controls.py

      - name: Persist implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/genealogy-web/src frontend/genealogy-web/package.json tasks/issue-696-execution.md
          if git diff --cached --quiet; then
            echo 'Implementation already applied'
          else
            git commit -m 'fix(issue-696): remove result sort controls'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Run result sort removal tests
        working-directory: frontend/genealogy-web
        run: npm run test:person-edit

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build
