name: Issue 103 Merge Verification

on:
  pull_request:
    types: [synchronize, reopened]
    branches: [main]
    paths:
      - '.github/workflows/issue-103-merge-verification.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Validate current main ancestry
        run: |
          git fetch origin main:refs/remotes/origin/main --force
          git merge-base --is-ancestor origin/main HEAD

      - name: Validate Flyway governance
        run: python3 .github/scripts/validate-flyway-migrations.py --base-ref origin/main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile backend and tests
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package

      - name: Test relationship import and review
        working-directory: backend/genealogy-backend
        run: >-
          mvn -q
          -Dtest=RelationshipImportTemplateApplicationServiceTest,RelationshipImportFilePolicyServiceTest,RelationshipImportApplicationServiceTest,RelationshipImportJobRowApplicationServiceTest,RelationshipImportJobReviewApplicationServiceTest,ImportJobReviewApplicationServiceTest,RevisionApplyRelationshipImportJobTest,RevisionApplyImportJobTest,ImportApplicationServiceRowStateTest,ImportJobRowApplicationServiceTest
          test

      - name: Verify generic draft target migration
        run: |
          psql -h localhost -U postgres -d genealogy_test <<'SQL'
          create table import_job_row (
            id bigserial primary key,
            draft_person_id bigint
          );
          insert into import_job_row(draft_person_id) values (1001), (null);
          SQL
          psql -h localhost -U postgres -d genealogy_test -f backend/genealogy-backend/src/main/resources/db/migration/V20260714010000__add_import_row_generic_draft_target.sql
          psql -h localhost -U postgres -d genealogy_test -Atc "select draft_target_type || ':' || draft_target_id from import_job_row where draft_person_id = 1001" | grep -qx 'person:1001'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check

      - name: Check import module TypeScript errors
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          STATUS=$?
          set -e
          grep -E 'src/features/imports/(ImportJobManagementPanel|ImportPage|RelationshipImportWorkspace|import-type-registry)\.tsx?' /tmp/typecheck.log > /tmp/import-errors.log || true
          if [[ -s /tmp/import-errors.log ]]; then
            cat /tmp/import-errors.log
            exit 1
          fi
          if [[ $STATUS -ne 0 ]]; then
            echo 'Full-project typecheck has unrelated existing errors; import module is clean.'
          fi

      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Remove verification workflow after success
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/workflows/issue-103-merge-verification.yml
          git add -A
          git commit -m 'chore(issue-103): remove one-time merge verification'
          git push origin HEAD:${{ github.head_ref }}
