name: Issue 102 Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          (
            cd backend/genealogy-backend
            mvn -B clean test
          ) > diagnostics/backend-full.log 2>&1
          backend_full_status=$?
          (
            cd backend/genealogy-backend
            mvn -Dtest=GlobalExceptionHandlerTest,MemberGrantVisibilityPolicyTest,MemberPermissionAuditControllerTest,MemberPermissionAuditApplicationServiceTest,MemberGrantPolicyServiceTest,MemberPermissionApplicationServiceTest,ClanMembershipRepositoryQueryContractTest test
          ) > diagnostics/backend-focused.log 2>&1
          backend_focused_status=$?
          (
            cd frontend/genealogy-web
            npm install --no-audit --no-fund && npm run test:members && npm run api:check && npm run typecheck && npm run build
          ) > diagnostics/frontend.log 2>&1
          frontend_status=$?
          printf 'backend_full_status=%s\nbackend_focused_status=%s\nfrontend_status=%s\n' \
            "$backend_full_status" "$backend_focused_status" "$frontend_status" > diagnostics/status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue-102-diagnostics
          path: diagnostics
          if-no-files-found: error
