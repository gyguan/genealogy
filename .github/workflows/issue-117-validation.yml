name: Issue 117 Validation

on:
  push:
    branches:
      - agent/issue-117-operation-log-access
    paths:
      - 'backend/genealogy-backend/**'
      - 'database/rollback/issue-117-operation-log-permissions.sql'
      - 'docs/api/openapi.operation-log-security.json'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'scripts/api/generate-frontend-client.mjs'
      - '.github/scripts/validate-flyway-migrations.py'
      - '.github/workflows/issue-117-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/genealogy-backend/**'
      - 'database/rollback/issue-117-operation-log-permissions.sql'
      - 'docs/api/openapi.operation-log-security.json'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'scripts/api/generate-frontend-client.mjs'
      - '.github/scripts/validate-flyway-migrations.py'
      - '.github/workflows/issue-117-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Flyway migration history
        run: python3 .github/scripts/validate-flyway-migrations.py --base-ref origin/main

      - name: Validate effective OpenAPI and generated operation contract
        run: |
          node -e "const fs=require('fs'); for (const f of fs.readdirSync('docs/api').filter(x=>x.endsWith('.json'))) JSON.parse(fs.readFileSync('docs/api/'+f,'utf8'));"
          node scripts/api/generate-frontend-client.mjs
          git diff --exit-code -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts

      - name: Run focused Issue 117 tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -B
          -Dtest=AuthorizationApplicationServiceTest,OperationLogApplicationServiceTest,OperationLogExportApplicationServiceTest,OpLogControllerTest
          test

      - name: Run backend test suite
        working-directory: backend/genealogy-backend
        run: mvn -B test

      - name: Upload Maven test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-117-surefire-reports
          path: backend/genealogy-backend/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 3

  permission-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGPASSWORD: genealogy
      MIGRATION: backend/genealogy-backend/src/main/resources/db/migration/V20260713184500__add_operation_log_permissions.sql
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Verify migration against compact and extended permission schemas
        run: |
          cat > /tmp/issue117-permission-schema.sql <<'SQL'
          create schema compact;
          set search_path to compact;
          create table app_role (id bigserial primary key, role_code varchar(100) not null unique);
          create table app_permission (
              id bigserial primary key,
              permission_code varchar(100) not null unique,
              permission_name varchar(100) not null,
              permission_type varchar(50),
              resource_type varchar(100),
              action_type varchar(100),
              description text,
              system_permission boolean not null default true,
              created_at timestamp not null default now(),
              updated_at timestamp not null default now()
          );
          create table app_role_permission (
              id bigserial primary key,
              role_id bigint not null references app_role(id),
              permission_id bigint not null references app_permission(id),
              created_at timestamp not null default now(),
              unique (role_id, permission_id)
          );
          insert into app_role (role_code) values ('clan_admin'), ('cross_clan_admin'), ('auditor'), ('reviewer'), ('viewer');

          create schema extended;
          set search_path to extended;
          create table app_role (id bigserial primary key, role_code varchar(100) not null unique);
          create table app_permission (
              id bigserial primary key,
              permission_code varchar(100) not null unique,
              permission_name varchar(100) not null,
              module_code varchar(100) not null,
              module_name varchar(100) not null,
              resource_code varchar(100) not null,
              action_code varchar(100) not null,
              description text,
              system_permission boolean,
              status varchar(32),
              created_by bigint,
              created_at timestamp,
              updated_by bigint,
              updated_at timestamp
          );
          create table app_role_permission (
              id bigserial primary key,
              role_id bigint not null references app_role(id),
              permission_id bigint not null references app_permission(id),
              effect varchar(32) not null,
              status varchar(32),
              created_by bigint,
              created_at timestamp,
              updated_by bigint,
              updated_at timestamp,
              unique (role_id, permission_id)
          );
          insert into app_role (role_code) values ('clan_admin'), ('cross_clan_admin'), ('auditor'), ('reviewer'), ('viewer');
          SQL
          psql -h localhost -U genealogy -d genealogy -v ON_ERROR_STOP=1 -f /tmp/issue117-permission-schema.sql

          for schema_name in compact extended; do
            psql -h localhost -U genealogy -d genealogy -v ON_ERROR_STOP=1 <<SQL
          set search_path to ${schema_name};
          \i ${MIGRATION}
          \i ${MIGRATION}
          do \$\$
          declare
              permission_count integer;
              clan_admin_grants integer;
              auditor_grants integer;
              reviewer_grants integer;
              viewer_grants integer;
          begin
              select count(*) into permission_count
              from app_permission
              where permission_code in ('operation_log.view', 'operation_log.export');
              if permission_count <> 2 then
                  raise exception 'Expected two operation log permissions in %, got %', current_schema(), permission_count;
              end if;

              select count(*) into clan_admin_grants
              from app_role_permission rp
              join app_role r on r.id = rp.role_id
              join app_permission p on p.id = rp.permission_id
              where r.role_code = 'clan_admin'
                and p.permission_code in ('operation_log.view', 'operation_log.export');
              if clan_admin_grants <> 2 then
                  raise exception 'clan_admin grants mismatch in %: %', current_schema(), clan_admin_grants;
              end if;

              select count(*) into auditor_grants
              from app_role_permission rp
              join app_role r on r.id = rp.role_id
              join app_permission p on p.id = rp.permission_id
              where r.role_code = 'auditor'
                and p.permission_code in ('operation_log.view', 'operation_log.export');
              if auditor_grants <> 2 then
                  raise exception 'auditor grants mismatch in %: %', current_schema(), auditor_grants;
              end if;

              select count(*) into reviewer_grants
              from app_role_permission rp
              join app_role r on r.id = rp.role_id
              join app_permission p on p.id = rp.permission_id
              where r.role_code = 'reviewer'
                and p.permission_code = 'operation_log.view';
              if reviewer_grants <> 1 then
                  raise exception 'reviewer grants mismatch in %: %', current_schema(), reviewer_grants;
              end if;

              select count(*) into viewer_grants
              from app_role_permission rp
              join app_role r on r.id = rp.role_id
              join app_permission p on p.id = rp.permission_id
              where r.role_code = 'viewer'
                and p.permission_code in ('operation_log.view', 'operation_log.export');
              if viewer_grants <> 0 then
                  raise exception 'viewer must not receive operation log grants in %', current_schema();
              end if;
          end \$\$;
          SQL
          done

  startup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run PostgreSQL startup check
        id: startup_check
        continue-on-error: true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
        run: bash .github/scripts/backend-startup-check.sh

      - name: Upload startup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-117-startup-diagnostics
          path: |
            /tmp/genealogy-backend-startup.log
            /tmp/genealogy-maven-package.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Fail when startup check failed
        if: steps.startup_check.outcome == 'failure'
        run: exit 1
