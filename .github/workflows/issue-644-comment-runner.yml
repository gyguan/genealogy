name: Issue 644 Comment Runner

on:
  pull_request_target:
    branches: ["main"]
    types: [ready_for_review, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  implement:
    if: github.event.pull_request.number == 648
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-644-review-page-size-10
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply pagination change and regression test
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('frontend/genealogy-web')
          page = root / 'src/features/reviews/ReviewCenterPage.tsx'
          source = page.read_text(encoding='utf-8')
          old = 'const DEFAULT_PAGE_SIZE = 20;'
          new = 'const DEFAULT_PAGE_SIZE = 10;'
          if source.count(old) != 1:
              raise RuntimeError('ReviewCenterPage default page size declaration changed')
          page.write_text(source.replace(old, new), encoding='utf-8')

          test = root / 'src/features/reviews/ReviewCenterPagination.test.mjs'
          test.write_text("""import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';
import test from 'node:test';

const source = readFileSync(new URL('./ReviewCenterPage.tsx', import.meta.url), 'utf8');

test('review center defaults all tabs to 10 rows per page', () => {
  assert.match(source, /const DEFAULT_PAGE_SIZE = 10;/);
  assert.match(source, /const PAGE_SIZE_OPTIONS = \\[10, 20, 50, 100\\];/);
  assert.match(source, /pageSize: PAGE_SIZE_OPTIONS\\.includes\\(requestedPageSize\\) \\? requestedPageSize : DEFAULT_PAGE_SIZE/);
  assert.match(source, /pageSize: String\\(nextPageSize\\)/);
});

test('review center keeps explicit page size choices and omits the default from URL', () => {
  assert.match(source, /if \\(pageSize !== DEFAULT_PAGE_SIZE\\) params\\.set\\('pageSize', String\\(pageSize\\)\\); else params\\.delete\\('pageSize'\\);/);
  assert.match(source, /pageSizeOptions=\\{PAGE_SIZE_OPTIONS\\}/);
  assert.match(source, /setPageSize\\(nextPageSize\\)/);
});
""", encoding='utf-8')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['scripts']['test:reviews'] = 'node --test src/features/reviews/ReviewCenterPagination.test.mjs'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          workflow_path = Path('.github/workflows/frontend-ci.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          anchor = '''      - name: Test person archive query and create entry state
'''
          step = '''      - name: Test review center pagination
        working-directory: frontend/genealogy-web
        run: npm run test:reviews
'''
          if step not in workflow:
              if workflow.count(anchor) != 1:
                  raise RuntimeError('Frontend CI insertion point changed')
              workflow_path.write_text(workflow.replace(anchor, step + anchor), encoding='utf-8')
          PY
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-package-lock
      - name: Run regression test
        working-directory: frontend/genealogy-web
        run: npm run test:reviews
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit implementation
        shell: bash
        run: |
          rm -f frontend/genealogy-web/package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/package.json \
                  frontend/genealogy-web/src/features/reviews/ReviewCenterPage.tsx \
                  frontend/genealogy-web/src/features/reviews/ReviewCenterPagination.test.mjs \
                  .github/workflows/frontend-ci.yml
          git commit -m "fix(review): default pagination to 10 rows"
          git push origin HEAD:agent/issue-644-review-page-size-10
