name: Issue 641 Prompt Copy Cleanup

on:
  push:
    branches: ["agent/issue-641-prompt-copy-cleanup"]
    paths:
      - ".github/workflows/issue-641-copy-cleanup.yml"

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply focused copy cleanup
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          root = Path('frontend/genealogy-web')
          src = root / 'src'

          def file_by_name(name: str) -> Path:
              matches = list(src.rglob(name))
              if len(matches) != 1:
                  raise RuntimeError(f'{name}: expected one file, found {matches}')
              return matches[0]

          def replace(path: Path, old: str, new: str, expected: int = 1):
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f'{path}: expected {expected} occurrences, found {count}: {old[:100]}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          def sub(path: Path, pattern: str, replacement: str, expected: int = 1, flags: int = 0):
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, flags=flags)
              if count != expected:
                  raise RuntimeError(f'{path}: expected {expected} regex replacements, found {count}: {pattern[:100]}')
              path.write_text(updated, encoding='utf-8')

          home = file_by_name('UnifiedStatisticsHomePage.tsx')
          replace(home, '            <Tag color="blue">宗族公共主页</Tag>\n', '')
          replace(home, '            <Text type="secondary">公开汇总数据，不包含审核、风险或内部作业状态。</Text>\n', '')
          replace(home, '                  <Text type="secondary">{metric.hint}</Text>\n', '')

          culture_header = file_by_name('CultureSearchHeader.tsx')
          replace(culture_header, '  description: string;\n', '  description?: string;\n')
          replace(culture_header, '      <Paragraph type="secondary" className="culture-search-description">{description}</Paragraph>\n', '      {description ? <Paragraph type="secondary" className="culture-search-description">{description}</Paragraph> : null}\n')

          culture_descriptions = {
              'CultureItemStandardTab.tsx': ' description="管理族规家训、人物传记、堂号郡望、祭祀礼仪等文化资料。"',
              'MigrationEventStandardTab.tsx': ' description="按时间、地点和支派梳理宗族迁徙事件，不拼接或推测缺失路线。"',
              'CultureSiteStandardTab.tsx': ' description="管理祠堂、祖居、墓园、纪念设施等宗族文化空间。"'
          }
          for filename, phrase in culture_descriptions.items():
              replace(file_by_name(filename), phrase, '')

          person_detail = file_by_name('PersonDetailPage.tsx')
          replace(person_detail,
                  '      subtitle={`人物档案详情与证据追踪 · ${branchText(person)} · ${generationText(person)}`}\n',
                  '      subtitle={`${branchText(person)} · ${generationText(person)}`}\n')

          person_edit = file_by_name('PersonEditPage.tsx')
          replace(person_edit, '      <Alert type="info" showIcon message="档案状态由领域动作管理" description="普通资料保存不会修改档案状态。提交审核、撤回、归档和恢复仅在当前状态与权限允许时执行。" />\n', '')
          replace(person_edit,
                  '      {saved ? <Alert type="success" showIcon message="人物资料已保存" description="档案状态未发生变化，可以继续修改或执行合法状态动作。" action={<Button size="small" onClick={leavePage}>返回人物档案</Button>} /> : null}\n',
                  '      {saved ? <Alert type="success" showIcon message="人物资料已保存" action={<Button size="small" onClick={leavePage}>返回人物档案</Button>} /> : null}\n')

          person_archive = file_by_name('PersonArchivePage.tsx')
          replace(person_archive,
                  '    <Card className="person-archive-result-card" title="查询结果" extra={resultActions}>',
                  '    <Card className="person-archive-result-card" title={hasQueried ? `查询结果（${total}）` : \'查询结果\'} extra={resultActions}>')
          sub(person_archive,
              r'(<div className="person-archive-result-toolbar">\s*)<Typography\.Text type="secondary">\{hasQueried \?.*?</Typography\.Text>\s*',
              r'\1', flags=re.S)

          source_page = file_by_name('SourceLibraryPage.tsx')
          replace(source_page, '                    <Text type="secondary">来源资料库 / 来源详情</Text>\n', '')
          replace(source_page,
                  '        <Card className="source-library-result-card" title="查询结果" extra={resultActions}>',
                  '        <Card className="source-library-result-card" title={`查询结果（${sourceTotal}）`} extra={resultActions}>')
          sub(source_page,
              r'(<div className="source-library-result-meta">\s*)<Space wrap size=\{12\}>.*?</Space>\s*(<Select aria-label="排序方式")',
              r'\1<span />\n            \2', flags=re.S)

          import_page = file_by_name('ImportPage.tsx')
          replace(import_page, '        <Typography.Paragraph type="secondary" className="import-query-description">按导入对象、状态、文件或时间筛选导入任务。</Typography.Paragraph>\n', '')
          replace(import_page,
                  '        title={<div><Typography.Title level={4}>查询结果</Typography.Title><Typography.Text type="secondary">共 {taskTotal} 条</Typography.Text></div>}',
                  '        title={`查询结果（${taskTotal}）`}')

          workbench = file_by_name('EditingWorkspacePage.tsx')
          replace(workbench, '    <Card title="查询结果" extra={resultActions}>', '    <Card title={`查询结果（${total}）`} extra={resultActions}>')
          replace(workbench, '      <Typography.Text type="secondary" style={{ display: \'block\', marginBottom: 12 }}>共找到 {total} 条修谱任务</Typography.Text>\n', '')

          review = file_by_name('ReviewCenterPage.tsx')
          sub(review,
              r'<Card title="审核中心" extra=\{<Typography\.Text type="secondary">分页查看待审任务、我提交的审核进展和本人已处理记录；筛选与权限范围均由服务端执行。</Typography\.Text>\}>',
              '<Card title="审核中心">')
          replace(review,
                  '<Space direction="vertical" size={12} style={{ width: \'100%\' }}>{currentFilterCopy.description ? <Typography.Text type="secondary">{currentFilterCopy.description}</Typography.Text> : null}<Form form={form} layout="vertical" initialValues={filtersForTab(initialState.filters, initialState.activeTab)}>',
                  '<Space direction="vertical" size={12} style={{ width: \'100%\' }}><Form form={form} layout="vertical" initialValues={filtersForTab(initialState.filters, initialState.activeTab)}>')

          member = file_by_name('MemberPage.tsx')
          sub(member,
              r'<Card title="成员与权限" extra=\{<Space wrap><Typography\.Text type="secondary">按角色与数据范围查看成员授权，权限变更由后端执行越级、范围和最后管理员校验。</Typography\.Text><Button onClick=\{openCreateGrant\} disabled=\{!selectedClanId \|\| !roles\.length\}>新增成员授权</Button></Space>\}>',
              '<Card title="成员与权限" extra={<Button onClick={openCreateGrant} disabled={!selectedClanId || !roles.length}>新增成员授权</Button>}>')

          log_page = file_by_name('LogPage.tsx')
          sub(log_page,
              r'\n\s*<Card\n\s*className="tracking-result-card"\n\s*title=\{<div className="tracking-result-title"><Title level=\{4\}>查询结果</Title><Text type="secondary">共 \{resultTotal\} 条</Text></div>\}\n\s*extra=\{activeTab === TRACKING_TABS\.AUDIT && canExportAudit \? <Button loading=\{auditExporting\} onClick=\{\(\) => void exportAuditCsv\(\)\}>导出 CSV</Button> : null\}\n\s*>\n\s*\{workspace\.clanId \? activeResult : <Empty image=\{Empty\.PRESENTED_IMAGE_SIMPLE\} description="选择宗族后查看审计结果" />\}\n\s*</Card>',
              '''\n      {workspace.clanId ? (\n        <Card\n          className="tracking-result-card"\n          title={<div className="tracking-result-title"><Title level={4}>查询结果</Title><Text type="secondary">共 {resultTotal} 条</Text></div>}\n          extra={activeTab === TRACKING_TABS.AUDIT && canExportAudit ? <Button loading={auditExporting} onClick={() => void exportAuditCsv()}>导出 CSV</Button> : null}\n        >\n          {activeResult}\n        </Card>\n      ) : null}''', flags=re.S)

          test_path = src / 'shared/ui/promptCopyCleanup.test.mjs'
          test_path.write_text(r'''import assert from 'node:assert/strict';
          import { readFileSync, readdirSync, statSync } from 'node:fs';
          import { join } from 'node:path';
          import test from 'node:test';

          const root = new URL('../../', import.meta.url);

          function files(dir) {
            return readdirSync(dir).flatMap(name => {
              const path = join(dir, name);
              return statSync(path).isDirectory() ? files(path) : [path];
            });
          }

          const source = files(root.pathname)
            .filter(path => /\.(tsx?|mjs)$/.test(path) && !path.endsWith('promptCopyCleanup.test.mjs'))
            .map(path => readFileSync(path, 'utf8'))
            .join('\n');

          test('removes duplicated persistent page guidance', () => {
            [
              '宗族公共主页',
              '公开汇总数据，不包含审核、风险或内部作业状态。',
              '人物档案详情与证据追踪',
              '档案状态由领域动作管理',
              '档案状态未发生变化，可以继续修改或执行合法状态动作。',
              '来源资料库 / 来源详情',
              '管理族规家训、人物传记、堂号郡望、祭祀礼仪等文化资料。',
              '按时间、地点和支派梳理宗族迁徙事件，不拼接或推测缺失路线。',
              '管理祠堂、祖居、墓园、纪念设施等宗族文化空间。',
              '按导入对象、状态、文件或时间筛选导入任务。',
              '共找到 {total} 条修谱任务',
              '分页查看待审任务、我提交的审核进展和本人已处理记录；筛选与权限范围均由服务端执行。',
              '按角色与数据范围查看成员授权，权限变更由后端执行越级、范围和最后管理员校验。',
              '选择宗族后查看审计结果'
            ].forEach(text => assert.equal(source.includes(text), false, text));
          });

          test('keeps risk, permission and workflow guidance', () => {
            [
              '当前修改尚未保存，返回后将无法恢复。',
              '新增引用提交后需审核通过才会正式生效。',
              '选择范围仅限当前页；批量操作完成后保留当前筛选和分页。',
              '刷新失败，当前仍展示上一次成功结果',
              '成员与权限按角色与数据范围共同生效'
            ].forEach(text => assert.equal(source.includes(text), true, text));
          });
          ''', encoding='utf-8')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          person_edit_script = package['scripts']['test:person-edit']
          old = 'node --test src/features/persons/personEditModel.test.mjs src/features/persons/personDetailModel.test.mjs'
          new = 'node --test src/features/persons/personEditModel.test.mjs src/features/persons/personDetailModel.test.mjs src/shared/ui/promptCopyCleanup.test.mjs'
          if old not in person_edit_script:
              raise RuntimeError('test:person-edit script shape changed')
          package['scripts']['test:person-edit'] = person_edit_script.replace(old, new)
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Run focused regression test
        working-directory: frontend/genealogy-web
        run: npm run test:person-edit
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web
          git commit -m "refactor(ui): remove duplicated page prompts"
          git push
