name: Validate Source Binding Action Refinement

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  targeted-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run focused validation
        shell: bash
        run: |
          set +e
          cd backend/genealogy-backend
          mvn -B -Dtest=SourceApplicationServiceTest test > ../../binding-action-backend.log 2>&1
          backend_status=$?
          cd ../../frontend/genealogy-web
          npm install > ../../binding-action-frontend.log 2>&1
          npm run build >> ../../binding-action-frontend.log 2>&1
          frontend_status=$?
          cd ../..
          printf 'backend=%s\nfrontend=%s\n' "$backend_status" "$frontend_status" > binding-action-validation.status
          if [ "$backend_status" -eq 0 ] && [ "$frontend_status" -eq 0 ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add binding-action-backend.log binding-action-frontend.log binding-action-validation.status
          git commit -m "chore: capture binding action validation"
          git push origin HEAD:${{ github.head_ref }}
