name: Issue 121 Scoped Trace Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/issue-121-adjust.py
      - .github/workflows/issue-121-adjust.yml
      - backend/genealogy-backend/src/main/java/com/genealogy/review/repository/ReviewTaskRepository.java
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/repository/TrackingObjectQueryRepositoryTest.java

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply adjustment
        run: python scripts/issue-121-adjust.py
      - name: Run trace tests
        id: tests
        continue-on-error: true
        working-directory: backend/genealogy-backend
        run: mvn -DtrimStackTrace=false -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test > /tmp/scoped-tests.log 2>&1
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-121-scoped-diagnostics
          path: |
            /tmp/scoped-tests.log
            backend/genealogy-backend/target/surefire-reports
          if-no-files-found: warn
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
