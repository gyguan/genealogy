name: Issue 121 Trace Adjustment

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/issue-121-adjust.py
      - .github/workflows/issue-121-adjust.yml
      - backend/genealogy-backend/src/main/java/com/genealogy/review/repository/ReviewTaskRepository.java
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/repository/TrackingObjectQueryRepositoryTest.java

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply adjustment
        run: python scripts/issue-121-adjust.py
      - name: Run trace tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test
      - name: Commit validated adjustment
        run: |
          rm scripts/issue-121-adjust.py .github/workflows/issue-121-adjust.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: scope trace review tasks to visible branches"
          git push origin HEAD:agent/issue-121-trace-aggregation
