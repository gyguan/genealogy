name: Issue 121 Trace Adjustment Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/issue-121-adjust.py
      - .github/workflows/issue-121-adjust.yml
      - backend/genealogy-backend/src/main/java/com/genealogy/review/repository/ReviewTaskRepository.java

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply adjustment
        run: python scripts/issue-121-adjust.py
      - name: Run trace tests
        working-directory: backend/genealogy-backend
        run: mvn -DtrimStackTrace=false -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test
      - name: Upload adjusted service
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-121-adjusted-service
          path: backend/genealogy-backend/src/main/java/com/genealogy/tracking/application/TrackingTraceApplicationService.java
          if-no-files-found: error
