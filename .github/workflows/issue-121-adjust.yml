name: Issue 121 Trace Adjustment

on:
  push:
    branches:
      - agent/issue-121-trace-aggregation
    paths:
      - scripts/issue-121-adjust.py
      - .github/workflows/issue-121-adjust.yml

permissions:
  contents: write

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply adjustment
        run: python scripts/issue-121-adjust.py
      - name: Compile and run trace tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test
      - name: Commit adjustment
        run: |
          rm scripts/issue-121-adjust.py .github/workflows/issue-121-adjust.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: filter trace review tasks by branch set"
          git push origin HEAD:agent/issue-121-trace-aggregation
