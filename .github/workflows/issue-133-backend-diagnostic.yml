name: Issue 133 Backend Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  full-backend-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run full tests and print focused failure summary
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          set +e
          mvn -B test > /tmp/maven-test.log 2>&1
          status=$?
          echo "===== FAILURE SUMMARY ====="
          grep -E "(^\[ERROR\]|Tests run:|Failures:|Errors:|Caused by:|expected:|but was:)" /tmp/maven-test.log | tail -n 180 || true
          echo "===== SUREFIRE REPORT FILES ====="
          find target/surefire-reports -maxdepth 1 -type f -name '*.txt' -print -exec tail -n 60 {} \; 2>/dev/null | tail -n 240 || true
          exit $status
