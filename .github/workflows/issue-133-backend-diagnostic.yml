name: Issue 133 Backend Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  full-backend-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run full tests and print concise failure summary
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          set +e
          mvn -q test > /tmp/maven-test.log 2>&1
          status=$?
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          print('===== FULL BACKEND FAILURE SUMMARY =====')
          failures = []
          for report in sorted(Path('target/surefire-reports').glob('TEST-*.xml')):
              try:
                  root = ET.parse(report).getroot()
              except Exception:
                  continue
              for testcase in root.findall('testcase'):
                  node = testcase.find('failure') or testcase.find('error')
                  if node is None:
                      continue
                  text = ' '.join((node.get('message') or (node.text or '')).split())
                  failures.append(f"{root.get('name')}#{testcase.get('name')}: {text[:500]}")
          if failures:
              for failure in failures[:30]:
                  print(f'::error::{failure}')
          else:
              log = Path('/tmp/maven-test.log').read_text(errors='replace').splitlines()
              errors = [line for line in log if '[ERROR]' in line or 'COMPILATION ERROR' in line]
              for line in errors[-30:]:
                  print(f'::error::{line[:700]}')
          print(f'FAILURE_COUNT={len(failures)}')
          PY
          exit $status
