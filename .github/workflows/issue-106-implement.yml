package com.genealogy.imports.application;

import com.genealogy.common.exception.BusinessException;
import org.junit.jupiter.api.Test;
import org.springframework.mock.web.MockMultipartFile;

import java.nio.charset.StandardCharsets;

import static org.assertj.core.api.Assertions.assertThatThrownBy;

class SourceImportFilePolicyServiceTest {

    private final SourceImportFilePolicyService service = new SourceImportFilePolicyService();

    @Test
    void shouldAcceptStandardHeader() {
        service.validate(1L, csv(String.join(",", SourceImportTemplateDefinition.HEADERS) + "\n黄氏宗谱卷一,谱书,,,,,,,,,中,宗族内,普通\n"));
    }

    @Test
    void shouldRejectHeaderMismatch() {
        assertThatThrownBy(() -> service.validate(1L, csv("资料名称,资料类型\n黄氏宗谱卷一,谱书\n")))
                .isInstanceOf(BusinessException.class)
                .hasMessageContaining("模板不一致");
    }

    @Test
    void shouldRejectTechnicalColumns() {
        assertThatThrownBy(() -> service.validate(1L, csv(String.join(",", SourceImportTemplateDefinition.HEADERS) + ",sourceId\n")))
                .isInstanceOf(BusinessException.class)
                .hasMessageContaining("模板不一致");
    }

    private MockMultipartFile csv(String content) {
        return new MockMultipartFile("file", "sources.csv", "text/csv", content.getBytes(StandardCharsets.UTF_8));
    }
}
''')

