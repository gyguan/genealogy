          write(f"{base}/application/SourceImportApplicationService.java", r'''
package com.genealogy.imports.application;

import com.genealogy.auth.application.AuthorizationApplicationService;
import com.genealogy.common.exception.BusinessException;
import com.genealogy.imports.dto.ImportJobResponse;
import com.genealogy.imports.dto.ImportRowErrorResponse;
import com.genealogy.imports.dto.SourceImportPreviewResponse;
import com.genealogy.imports.dto.SourceImportPreviewRowResponse;
import com.genealogy.imports.entity.ImportJobEntity;
import com.genealogy.imports.entity.ImportJobErrorEntity;
import com.genealogy.imports.entity.ImportJobRowEntity;
import com.genealogy.imports.repository.ImportJobErrorRepository;
import com.genealogy.imports.repository.ImportJobRepository;
import com.genealogy.imports.repository.ImportJobRowRepository;
import com.genealogy.operationlog.application.OperationLogApplicationService;
import com.genealogy.source.dto.SourceCreateRequest;
import com.genealogy.source.dto.SourceResponse;
import com.genealogy.source.repository.SourceRepository;
import com.genealogy.source.application.SourceApplicationService;
import org.apache.poi.ss.usermodel.Cell;
import org.apache.poi.ss.usermodel.DataFormatter;
import org.apache.poi.ss.usermodel.Row;
import org.apache.poi.ss.usermodel.Sheet;
import org.apache.poi.ss.usermodel.Workbook;
import org.apache.poi.ss.usermodel.WorkbookFactory;
import org.springframework.stereotype.Service;
import org.springframework.transaction.annotation.Transactional;
import org.springframework.web.multipart.MultipartFile;

import java.io.BufferedReader;
import java.io.IOException;
import java.io.InputStreamReader;
import java.nio.charset.StandardCharsets;
import java.time.LocalDateTime;
import java.util.ArrayList;
import java.util.Collection;
import java.util.HashSet;
import java.util.LinkedHashMap;
import java.util.List;
import java.util.Locale;
import java.util.Map;
import java.util.Set;

@Service
public class SourceImportApplicationService {

    private static final String STATUS_COMPLETED = "completed";
    private static final String STATUS_PARTIAL = "partial_completed";
    private static final String STATUS_FAILED = "failed";
    private static final String SOURCE_CREATE = "source:create";
    private static final Collection<String> ACTIVE_SOURCE_STATUSES = List.of("draft", "pending_review", "official", "rejected");

    private final ImportJobRepository importJobRepository;
    private final ImportJobErrorRepository importJobErrorRepository;
    private final ImportJobRowRepository importJobRowRepository;
    private final SourceRepository sourceRepository;
    private final SourceApplicationService sourceApplicationService;
    private final AuthorizationApplicationService authorizationApplicationService;
    private final SourceImportFilePolicyService filePolicyService;
    private final OperationLogApplicationService operationLogApplicationService;

    public SourceImportApplicationService(
            ImportJobRepository importJobRepository,
            ImportJobErrorRepository importJobErrorRepository,
            ImportJobRowRepository importJobRowRepository,
            SourceRepository sourceRepository,
            SourceApplicationService sourceApplicationService,
            AuthorizationApplicationService authorizationApplicationService,
            SourceImportFilePolicyService filePolicyService,
            OperationLogApplicationService operationLogApplicationService
    ) {
        this.importJobRepository = importJobRepository;
        this.importJobErrorRepository = importJobErrorRepository;
        this.importJobRowRepository = importJobRowRepository;
        this.sourceRepository = sourceRepository;
        this.sourceApplicationService = sourceApplicationService;
        this.authorizationApplicationService = authorizationApplicationService;
        this.filePolicyService = filePolicyService;
        this.operationLogApplicationService = operationLogApplicationService;
    }

    @Transactional(readOnly = true)
    public SourceImportPreviewResponse preview(Long clanId, Long branchId, MultipartFile file, Long actorId) {
        filePolicyService.validate(branchId, file);
        authorizationApplicationService.requireBranchWriteScope(clanId, actorId, branchId);
        authorizationApplicationService.requirePermission(clanId, actorId, SOURCE_CREATE);
        ImportReadResult data = readImport(file);
        Set<String> fileKeys = new HashSet<>();
        List<SourceImportPreviewRowResponse> rows = new ArrayList<>();
        for (ImportRow row : data.rows()) {
            rows.add(previewRow(clanId, row, fileKeys));
        }
        int valid = (int) rows.stream().filter(item -> isBlank(item.errorMessage())).count();
        int duplicates = (int) rows.stream().filter(SourceImportPreviewRowResponse::duplicated).count();
        int errors = rows.size() - valid;
        return new SourceImportPreviewResponse(rows.size(), valid, duplicates, errors, rows);
    }

    @Transactional
    public ImportJobResponse importSources(Long clanId, Long branchId, MultipartFile file, Long actorId) {
        filePolicyService.validate(branchId, file);
        authorizationApplicationService.requireBranchWriteScope(clanId, actorId, branchId);
        authorizationApplicationService.requirePermission(clanId, actorId, SOURCE_CREATE);
        ImportReadResult data = readImport(file);
        String filename = file.getOriginalFilename() == null ? "sources.csv" : file.getOriginalFilename();
        String format = filename.toLowerCase(Locale.ROOT).endsWith(".xlsx")
                ? ImportJobEntity.FORMAT_XLSX
                : ImportJobEntity.FORMAT_CSV;
        ImportJobEntity job = createJob(clanId, branchId, filename, format, actorId);
        int success = 0;
        int failure = 0;
        Set<String> fileKeys = new HashSet<>();
        List<ImportJobRowEntity> jobRows = new ArrayList<>();
        List<ImportJobErrorEntity> errors = new ArrayList<>();
        for (ImportRow row : data.rows()) {
            ImportJobRowEntity jobRow = newJobRow(job.getId(), row);
            try {
                ParsedSource parsed = parseRow(row.cells());
                ensureNotDuplicate(clanId, parsed, fileKeys);
                SourceResponse source = sourceApplicationService.create(clanId, request(parsed), actorId);
                jobRow.setNormalizedData(normalizedData(parsed));
                jobRow.setDraftTargetType(ImportJobEntity.TYPE_SOURCE);
                jobRow.setDraftTargetId(source.id());
                jobRow.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);
                success++;
            } catch (RuntimeException exception) {
                failure++;
                String message = errorMessage(exception);
                jobRow.setRowStatus(ImportJobRowEntity.STATUS_INVALID);
                jobRow.setErrorCode(errorCode(exception));
                jobRow.setErrorMessage(message);
                errors.add(error(job.getId(), row.rowNo(), message, row.rawData()));
            }
            jobRow.setUpdatedAt(LocalDateTime.now());
            jobRows.add(jobRow);
        }
        if (!jobRows.isEmpty()) importJobRowRepository.saveAll(jobRows);
        if (!errors.isEmpty()) importJobErrorRepository.saveAll(errors);
        int total = jobRows.size();
        job.setTotalCount(total);
        job.setSuccessCount(success);
        job.setFailureCount(failure);
        job.setStatus(legacyStatus(success, failure));
        job.setProcessingStatus(failure == 0 ? ImportJobEntity.PROCESSING_READY_FOR_REVIEW : ImportJobEntity.PROCESSING_CORRECTION_REQUIRED);
        job.setErrorSummary(failure == 0 ? null : "存在 " + failure + " 行来源资料导入失败，请修正后再提交审核");
        job.setUpdatedAt(LocalDateTime.now());
        ImportJobEntity saved = importJobRepository.save(job);
        operationLogApplicationService.record(
                clanId, actorId, "source_import", "import_job", saved.getId(),
                "来源资料导入批次创建完成", "branchId=" + branchId + ", total=" + total + ", success=" + success + ", failure=" + failure
        );
        return toResponse(saved, errors);
    }

    ParsedSource parseRow(List<String> cells) {
        ensureNoExtraColumns(cells);
        String sourceName = requiredCell(cells, SourceImportTemplateDefinition.SOURCE_NAME_INDEX, "资料名称不能为空");
        String sourceTypeLabel = requiredCell(cells, SourceImportTemplateDefinition.SOURCE_TYPE_INDEX, "资料类型不能为空");
        String sourceType = SourceImportTemplateDefinition.SOURCE_TYPES.get(sourceTypeLabel);
        if (sourceType == null) throw new BusinessException("IMPORT_SOURCE_TYPE_INVALID", "资料类型必须填写谱书、地方志、墓碑、照片、口述、档案或其他");
        String confidence = optionalMapped(cells, SourceImportTemplateDefinition.CONFIDENCE_LEVEL_INDEX, SourceImportTemplateDefinition.CONFIDENCE_LEVELS, "未知", "IMPORT_SOURCE_CONFIDENCE_INVALID", "可信度必须填写高、中、低或未知");
        String privacy = optionalMapped(cells, SourceImportTemplateDefinition.PRIVACY_LEVEL_INDEX, SourceImportTemplateDefinition.PRIVACY_LEVELS, "宗族内", "IMPORT_SOURCE_PRIVACY_INVALID", "可见范围必须填写公开、宗族内、支派内、亲属可见、私密或封存");
        String sensitive = optionalMapped(cells, SourceImportTemplateDefinition.SENSITIVE_LEVEL_INDEX, SourceImportTemplateDefinition.SENSITIVE_LEVELS, "普通", "IMPORT_SOURCE_SENSITIVE_INVALID", "敏感级别必须填写普通、敏感或高度敏感");
        return new ParsedSource(
                sourceName,
                sourceTypeLabel,
                sourceType,
                cell(cells, SourceImportTemplateDefinition.PROVIDER_NAME_INDEX),
                cell(cells, SourceImportTemplateDefinition.BOOK_TITLE_INDEX),
                cell(cells, SourceImportTemplateDefinition.VOLUME_NO_INDEX),
                cell(cells, SourceImportTemplateDefinition.PAGE_NO_INDEX),
                cell(cells, SourceImportTemplateDefinition.SOURCE_DATE_INDEX),
                cell(cells, SourceImportTemplateDefinition.COLLECTION_LOCATION_INDEX),
                cell(cells, SourceImportTemplateDefinition.SOURCE_DESCRIPTION_INDEX),
                cell(cells, SourceImportTemplateDefinition.EXCERPT_INDEX),
                confidence,
                privacy,
                sensitive
        );
    }

    SourceCreateRequest request(ParsedSource parsed) {
        return new SourceCreateRequest(
                parsed.sourceName(),
                parsed.sourceType(),
                parsed.providerName(),
                parsed.bookTitle(),
                parsed.volumeNo(),
                parsed.pageNo(),
                parsed.sourceDate(),
                parsed.excerpt(),
                combinedDescription(parsed.collectionLocation(), parsed.sourceDescription()),
                parsed.confidenceLevel(),
                parsed.privacyLevel(),
                parsed.sensitiveLevel(),
                false
        );
    }

    private SourceImportPreviewRowResponse previewRow(Long clanId, ImportRow row, Set<String> fileKeys) {
        String sourceName = cell(row.cells(), SourceImportTemplateDefinition.SOURCE_NAME_INDEX);
        String sourceType = cell(row.cells(), SourceImportTemplateDefinition.SOURCE_TYPE_INDEX);
        String providerName = cell(row.cells(), SourceImportTemplateDefinition.PROVIDER_NAME_INDEX);
        String bookTitle = cell(row.cells(), SourceImportTemplateDefinition.BOOK_TITLE_INDEX);
        String sourceDate = cell(row.cells(), SourceImportTemplateDefinition.SOURCE_DATE_INDEX);
        String privacy = cell(row.cells(), SourceImportTemplateDefinition.PRIVACY_LEVEL_INDEX);
        try {
            ParsedSource parsed = parseRow(row.cells());
            boolean duplicate = duplicated(clanId, parsed) || !fileKeys.add(key(parsed));
            return new SourceImportPreviewRowResponse(
                    row.rowNo(), parsed.sourceName(), parsed.sourceTypeLabel(), parsed.providerName(), parsed.bookTitle(),
                    parsed.sourceDate(), labelOf(SourceImportTemplateDefinition.PRIVACY_LEVELS, parsed.privacyLevel()), duplicate,
                    duplicate ? "来源资料已存在或导入文件中存在重复资料" : null,
                    row.rawData()
            );
        } catch (RuntimeException exception) {
            return new SourceImportPreviewRowResponse(
                    row.rowNo(), sourceName, sourceType, providerName, bookTitle, sourceDate, privacy, false,
                    errorMessage(exception), row.rawData()
            );
        }
    }

    private void ensureNotDuplicate(Long clanId, ParsedSource parsed, Set<String> fileKeys) {
        if (duplicated(clanId, parsed) || !fileKeys.add(key(parsed))) {
            throw new BusinessException("IMPORT_SOURCE_DUPLICATED", "来源资料已存在或导入文件中存在重复资料");
        }
    }

    private boolean duplicated(Long clanId, ParsedSource parsed) {
        return sourceRepository.existsByClanIdAndSourceNameIgnoreCaseAndSourceTypeAndVerificationStatusIn(
                clanId, parsed.sourceName(), parsed.sourceType(), ACTIVE_SOURCE_STATUSES
        );
    }

    ImportReadResult readImport(MultipartFile file) {
        String filename = file.getOriginalFilename() == null ? "" : file.getOriginalFilename().toLowerCase(Locale.ROOT);
        try {
            List<ImportRow> rows = filename.endsWith(".xlsx") ? readXlsxRows(file) : readCsvRows(file);
            if (rows.isEmpty()) throw new BusinessException("IMPORT_SOURCE_ROW_EMPTY", "来源资料导入文件没有可处理的数据行");
            return new ImportReadResult(rows);
        } catch (BusinessException exception) {
            throw exception;
        } catch (Exception exception) {
            throw new BusinessException("IMPORT_SOURCE_FILE_READ_FAILED", "来源资料导入文件读取失败");
        }
    }

    private List<ImportRow> readCsvRows(MultipartFile file) throws IOException {
        List<ImportRow> rows = new ArrayList<>();
        try (BufferedReader reader = new BufferedReader(new InputStreamReader(file.getInputStream(), StandardCharsets.UTF_8))) {
            String line;
            int rowNo = 0;
            while ((line = reader.readLine()) != null) {
                rowNo++;
                if (rowNo == 1) continue;
                if (line.trim().isEmpty()) continue;
                rows.add(new ImportRow(rowNo, filePolicyService.parseCsvLine(line), line));
            }
        }
        return rows;
    }

    private List<ImportRow> readXlsxRows(MultipartFile file) throws Exception {
        List<ImportRow> rows = new ArrayList<>();
        try (Workbook workbook = WorkbookFactory.create(file.getInputStream())) {
            Sheet sheet = workbook.getNumberOfSheets() > 0 ? workbook.getSheetAt(0) : null;
            if (sheet == null) return rows;
            DataFormatter formatter = new DataFormatter();
            for (int i = sheet.getFirstRowNum() + 1; i <= sheet.getLastRowNum(); i++) {
                Row row = sheet.getRow(i);
                if (row == null) continue;
                int lastCell = Math.max(SourceImportTemplateDefinition.HEADERS.size(), row.getLastCellNum());
                List<String> cells = new ArrayList<>(lastCell);
                for (int index = 0; index < lastCell; index++) {
                    Cell cell = row.getCell(index, Row.MissingCellPolicy.RETURN_BLANK_AS_NULL);
                    cells.add(cell == null ? "" : formatter.formatCellValue(cell));
                }
                if (cells.stream().allMatch(String::isBlank)) continue;
                rows.add(new ImportRow(i + 1, cells, String.join(",", cells)));
            }
        }
        return rows;
    }

    private ImportJobEntity createJob(Long clanId, Long branchId, String filename, String format, Long actorId) {
        ImportJobEntity job = new ImportJobEntity();
        job.setClanId(clanId);
        job.setBranchId(branchId);
        job.setImportType(ImportJobEntity.TYPE_SOURCE);
        job.setFileFormat(format);
        job.setOriginalFilename(filename);
        job.setTotalCount(0);
        job.setSuccessCount(0);
        job.setFailureCount(0);
        job.setStatus("running");
        job.setProcessingStatus(ImportJobEntity.PROCESSING_PROCESSING);
        job.setReviewStatus(ImportJobEntity.REVIEW_NOT_SUBMITTED);
        job.setReviewRound(0);
        job.setCreatedBy(actorId);
        LocalDateTime now = LocalDateTime.now();
        job.setCreatedAt(now);
        job.setUpdatedAt(now);
        return importJobRepository.save(job);
    }

    private ImportJobRowEntity newJobRow(Long jobId, ImportRow row) {
        ImportJobRowEntity entity = new ImportJobRowEntity();
        entity.setJobId(jobId);
        entity.setRowNo(row.rowNo());
        entity.setRawData(row.rawData());
        entity.setRowStatus(ImportJobRowEntity.STATUS_INVALID);
        entity.setRetryCount(0);
        LocalDateTime now = LocalDateTime.now();
        entity.setCreatedAt(now);
        entity.setUpdatedAt(now);
        entity.setVersion(0L);
        return entity;
    }

    private ImportJobErrorEntity error(Long jobId, Integer rowNo, String message, String rawData) {
        ImportJobErrorEntity entity = new ImportJobErrorEntity();
        entity.setJobId(jobId);
        entity.setRowNo(rowNo);
        entity.setErrorMessage(message);
        entity.setRawData(rawData);
        entity.setCreatedAt(LocalDateTime.now());
        return entity;
    }

    private ImportJobResponse toResponse(ImportJobEntity job, List<ImportJobErrorEntity> errors) {
        return new ImportJobResponse(
                job.getId(), job.getClanId(), job.getBranchId(), job.getImportType(), job.getFileFormat(), null,
                job.getOriginalFilename(), job.getTotalCount(), job.getSuccessCount(), job.getFailureCount(),
                job.getStatus(), job.getErrorSummary(), job.getCreatedAt(),
                errors.stream().map(item -> new ImportRowErrorResponse(item.getRowNo(), item.getErrorMessage(), item.getRawData())).toList(),
                job.getProcessingStatus(), job.getReviewStatus(), job.getReviewRound(), job.getLatestReviewTaskId()
        );
    }

    Map<String, Object> normalizedData(ParsedSource parsed) {
        Map<String, Object> data = new LinkedHashMap<>();
        data.put("sourceName", parsed.sourceName());
        data.put("sourceType", labelOf(SourceImportTemplateDefinition.SOURCE_TYPES, parsed.sourceType()));
        data.put("providerName", parsed.providerName());
        data.put("bookTitle", parsed.bookTitle());
        data.put("volumeNo", parsed.volumeNo());
        data.put("pageNo", parsed.pageNo());
        data.put("sourceDate", parsed.sourceDate());
        data.put("collectionLocation", parsed.collectionLocation());
        data.put("sourceDescription", parsed.sourceDescription());
        data.put("excerpt", parsed.excerpt());
        data.put("confidenceLevel", labelOf(SourceImportTemplateDefinition.CONFIDENCE_LEVELS, parsed.confidenceLevel()));
        data.put("privacyLevel", labelOf(SourceImportTemplateDefinition.PRIVACY_LEVELS, parsed.privacyLevel()));
        data.put("sensitiveLevel", labelOf(SourceImportTemplateDefinition.SENSITIVE_LEVELS, parsed.sensitiveLevel()));
        return data;
    }

    private void ensureNoExtraColumns(List<String> cells) {
        if (cells.size() <= SourceImportTemplateDefinition.HEADERS.size()) return;
        for (int index = SourceImportTemplateDefinition.HEADERS.size(); index < cells.size(); index++) {
            if (!cell(cells, index).isBlank()) {
                throw new BusinessException("IMPORT_SOURCE_EXTRA_COLUMN", "来源资料导入文件包含模板外字段");
            }
        }
    }

    private String requiredCell(List<String> cells, int index, String message) {
        String value = cell(cells, index);
        if (value.isBlank()) throw new BusinessException("IMPORT_SOURCE_REQUIRED", message);
        return value;
    }

    private String cell(List<String> cells, int index) {
        return index >= cells.size() || cells.get(index) == null ? "" : cells.get(index).trim();
    }

    private String optionalMapped(List<String> cells, int index, Map<String, String> values, String defaultLabel, String code, String message) {
        String label = cell(cells, index);
        if (label.isBlank()) label = defaultLabel;
        String mapped = values.get(label);
        if (mapped == null) throw new BusinessException(code, message);
        return mapped;
    }

    private String labelOf(Map<String, String> values, String value) {
        return values.entrySet().stream()
                .filter(entry -> entry.getValue().equals(value))
                .map(Map.Entry::getKey)
                .findFirst()
                .orElse(value);
    }

    private String combinedDescription(String collectionLocation, String sourceDescription) {
        List<String> parts = new ArrayList<>();
        if (!isBlank(collectionLocation)) parts.add("馆藏位置：" + collectionLocation);
        if (!isBlank(sourceDescription)) parts.add(sourceDescription);
        return parts.isEmpty() ? null : String.join("\n", parts);
    }

    private String key(ParsedSource parsed) {
        return parsed.sourceType() + ":" + parsed.sourceName().trim().toLowerCase(Locale.ROOT);
    }

    private String legacyStatus(int success, int failure) {
        if (failure == 0) return STATUS_COMPLETED;
        return success > 0 ? STATUS_PARTIAL : STATUS_FAILED;
    }

    private String errorMessage(RuntimeException exception) {
        return exception.getMessage() == null ? "来源资料导入行校验失败" : exception.getMessage();
    }

    private String errorCode(RuntimeException exception) {
        return exception instanceof BusinessException business ? business.getCode() : "IMPORT_SOURCE_ROW_INVALID";
    }

    private boolean isBlank(String value) {
        return value == null || value.isBlank();
    }

    record ImportReadResult(List<ImportRow> rows) {}
    record ImportRow(Integer rowNo, List<String> cells, String rawData) {}
    public record ParsedSource(
            String sourceName,
            String sourceTypeLabel,
            String sourceType,
            String providerName,
            String bookTitle,
            String volumeNo,
            String pageNo,
            String sourceDate,
            String collectionLocation,
            String sourceDescription,
            String excerpt,
            String confidenceLevel,
            String privacyLevel,
            String sensitiveLevel
    ) {}
}
