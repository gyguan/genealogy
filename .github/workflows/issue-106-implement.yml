name: Issue 106 Implement Source Import

on:
  push:
    branches:
      - agent/issue-106-source-import
    paths:
      - '.github/workflows/issue-106-implement.yml'

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-106-source-import
          fetch-depth: 0

      - name: Generate source import implementation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n", encoding="utf-8")

          def patch(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing patch target in {path}: {old[:120]}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          base = "backend/genealogy-backend/src/main/java/com/genealogy/imports"

