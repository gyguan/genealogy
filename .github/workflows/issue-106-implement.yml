package com.genealogy.imports.application;

import com.genealogy.imports.domain.ImportTypeRegistry;
import com.genealogy.imports.domain.SourceImportTypeDefinition;
import org.junit.jupiter.api.Test;

import java.nio.charset.StandardCharsets;
import java.util.List;

import static org.assertj.core.api.Assertions.assertThat;

class SourceImportTemplateApplicationServiceTest {

    private final SourceImportTemplateApplicationService service = new SourceImportTemplateApplicationService(
            new ImportTypeRegistry(List.of(new SourceImportTypeDefinition()))
    );

    @Test
    void csvTemplateShouldContainStrictHeaderAndChineseSample() {
        String content = new String(service.buildCsvTemplate(), StandardCharsets.UTF_8);
        assertThat(content).startsWith("\ufeff资料名称,资料类型,作者/编纂者,书名/题名,卷号,页码,形成时间,馆藏位置,来源说明,摘录内容,可信度,可见范围,敏感级别");
        assertThat(content).contains("黄氏宗谱卷一,谱书");
        assertThat(content).doesNotContain("clanId").doesNotContain("sourceId").doesNotContain("branchId");
    }

    @Test
    void xlsxTemplateShouldBeCreated() {
        assertThat(service.buildXlsxTemplate()).isNotEmpty();
    }
}
''')

