name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  diagnose-empty-state:
    name: Diagnose empty state migration
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-776-unify-empty-state
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture diagnostics
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json > empty-state-diagnostics.log 2>&1
          echo "audit=$?" >> empty-state-diagnostics.log
          npm run test:feedback >> empty-state-diagnostics.log 2>&1
          echo "feedback=$?" >> empty-state-diagnostics.log
          npm run typecheck >> empty-state-diagnostics.log 2>&1
          echo "typecheck=$?" >> empty-state-diagnostics.log
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f frontend/genealogy-web/empty-state-diagnostics.log
          git commit -m "chore: capture empty state diagnostics"
          git push origin HEAD:agent/issue-776-unify-empty-state
