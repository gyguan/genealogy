name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  finalize-notify:
    name: Verify completed application notify migration
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-767-remove-app-notify
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Remove final ToastStack residual
        working-directory: frontend/genealogy-web
        run: |
          sed -i '/function closeToast(id: number)/d' src/app/App.tsx
          rm -f typecheck-output.log feedback-test-output.log
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback audit and contract
        working-directory: frontend/genealogy-web
        run: |
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json
          npm run test:feedback
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit verified fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "fix: complete application notify migration"
          git push origin HEAD:agent/issue-767-remove-app-notify
