name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  refine-lineage:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/lineage-query-and-workbench-layout' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/lineage-query-and-workbench-layout
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply requested lineage interaction refinements
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx')
          text = path.read_text()
          text = text.replace("  TreeDataView,\n", "")
          text = text.replace("  type LineageMode,\n  type PersonSearchScope\n", "  type LineageMode\n")
          text = text.replace("const DATA_VIEW_OPTIONS = [\n  { value: 'official', label: '正式谱' },\n  { value: 'editing', label: '修谱视图' }\n];\n", "")
          text = text.replace("  const [searchScope, setSearchScope] = useState<PersonSearchScope>(initialUrlState.searchScope);\n", "")
          text = text.replace("  const [dataView, setDataView] = useState<TreeDataView>(initialUrlState.dataView);\n", "  const dataView = 'official' as const;\n")
          text = text.replace("  const [selectedEdge, setSelectedEdge] = useState<TreeEdgeResponse | null>(null);\n", "  const [selectedEdge, setSelectedEdge] = useState<TreeEdgeResponse | null>(null);\n  const [locatedNodeId, setLocatedNodeId] = useState('');\n")
          text = text.replace("    requestedScope = searchScope,\n    branchId = selectedBranchId\n", "    branchId = selectedBranchId\n")
          text = text.replace("        branchId: requestedScope === 'branch' ? branchId : undefined,\n", "        branchId: undefined,\n")
          text = text.replace("未找到匹配人物，请调整姓名、谱名、字号或搜索范围。", "未找到匹配人物，请调整姓名、谱名或字号。")
          text = text.replace("      const page = await requestPersonPage(clanId, 1, '', branchRows, searchScope, nextBranchId);", "      const page = await requestPersonPage(clanId, 1, '', branchRows, nextBranchId);")
          text = text.replace("""  async function handleBranchChange(branchId: string) {
    setSelectedBranchId(branchId);
    workspace.patch({ branchId, relationshipId: '' });
    clearSelection();
    const tasks: Promise<unknown>[] = [loadBranchGraph(branchId, workspace.clanId, {}, true)];
    if (searchScope === 'branch') tasks.push(requestPersonPage(workspace.clanId, 1, appliedKeyword, branches, 'branch', branchId));
    await Promise.all(tasks);
  }

  async function handleSearchScopeChange(nextScope: PersonSearchScope) {
    setSearchScope(nextScope);
    await requestPersonPage(workspace.clanId, 1, appliedKeyword, branches, nextScope, selectedBranchId);
  }
""", """  function handleBranchChange(branchId: string) {
    setSelectedBranchId(branchId);
    workspace.patch({ branchId, relationshipId: '' });
    clearSelection();
    setLocatedNodeId('');
  }

  async function applyGraphQuery() {
    clearSelection();
    setLocatedNodeId('');
    if (mode === 'person') await loadPersonGraph(workspace.personId);
    else await loadBranchGraph(selectedBranchId, workspace.clanId, {}, true);
  }
""")
          text = text.replace("  async function handlePersonDepthChange(nextDepth: string) {\n    setPersonDepth(nextDepth);\n    clearSelection();\n    await loadPersonGraph(workspace.personId, { depth: nextDepth });\n  }", "  function handlePersonDepthChange(nextDepth: string) {\n    setPersonDepth(nextDepth);\n  }")
          text = text.replace("  async function handleBranchDepthChange(nextDepth: string) {\n    setBranchDepth(nextDepth);\n    clearSelection();\n    await loadBranchGraph(selectedBranchId, workspace.clanId, { depth: nextDepth }, true);\n  }", "  function handleBranchDepthChange(nextDepth: string) {\n    setBranchDepth(nextDepth);\n  }")
          text = text.replace("  async function handleDirectionChange(nextDirection: TreeDirection) {\n    setDirection(nextDirection);\n    clearSelection();\n    await loadPersonGraph(workspace.personId, { direction: nextDirection });\n  }", "  function handleDirectionChange(nextDirection: TreeDirection) {\n    setDirection(nextDirection);\n  }")
          text = text.replace("""  async function handleRelationScopeChange(nextScopes: TreeRelationScope[]) {
    if (!nextScopes.length) return;
    setRelationScopes(nextScopes);
    clearSelection();
    await Promise.all([
      loadPersonGraph(workspace.personId, { relationScopes: nextScopes }),
      loadBranchGraph(selectedBranchId, workspace.clanId, { relationScopes: nextScopes })
    ]);
  }

  async function handleDataViewChange(nextDataView: TreeDataView) {
    setDataView(nextDataView);
    clearSelection();
    await Promise.all([
      loadPersonGraph(workspace.personId, { dataView: nextDataView }),
      loadBranchGraph(selectedBranchId, workspace.clanId, { dataView: nextDataView })
    ]);
  }

  async function handleIncludeSubBranchesChange(nextValue: boolean) {
    setIncludeSubBranches(nextValue);
    clearSelection();
    await loadBranchGraph(selectedBranchId, workspace.clanId, { includeSubBranches: nextValue }, true);
  }
""", """  function handleRelationScopeChange(nextScopes: TreeRelationScope[]) {
    if (nextScopes.length) setRelationScopes(nextScopes);
  }

  function handleIncludeSubBranchesChange(nextValue: boolean) {
    setIncludeSubBranches(nextValue);
  }
""")
          text = text.replace("      dataView,\n      includeSubBranches,\n      searchScope\n", "      dataView,\n      includeSubBranches,\n      searchScope: 'clan'\n")
          text = text.replace("  }, [workspace.clanId, selectedBranchId, workspace.personId, mode, personDepth, branchDepth, direction, relationScopes, dataView, includeSubBranches, searchScope]);", "  }, [workspace.clanId, selectedBranchId, workspace.personId, mode, personDepth, branchDepth, direction, relationScopes, includeSubBranches]);")
          text = text.replace("  const highlightedPath = useMemo(\n    () => activeGraph && selectedNode && graphCenterNodeId\n      ? findLineagePath(activeGraph, graphCenterNodeId, selectedNode.nodeId)\n", "  const locatedNode = activeGraph?.nodes.find(node => node.nodeId === locatedNodeId) || null;\n  const highlightedPath = useMemo(\n    () => activeGraph && locatedNode && graphCenterNodeId\n      ? findLineagePath(activeGraph, graphCenterNodeId, locatedNode.nodeId)\n")
          text = text.replace("    [activeGraph, selectedNode, graphCenterNodeId]\n", "    [activeGraph, locatedNode, graphCenterNodeId]\n")
          text = text.replace("  function locateNode(nodeId: string) {\n    const node = activeGraph?.nodes.find(item => item.nodeId === nodeId);\n    if (node) selectNode(node);\n  }", "  function locateNode(nodeId: string) {\n    setLocatedNodeId(nodeId || '');\n  }")
          text = text.replace("""          <Field label="人物搜索范围">
            <Select
              aria-label="人物搜索范围"
              value={searchScope}
              options={[{ value: 'clan', label: '全宗族' }, { value: 'branch', label: '当前支派' }]}
              onChange={value => void handleSearchScopeChange(value as PersonSearchScope)}
            />
          </Field>
""", "")
          text = text.replace("disabled={!workspace.clanId || (searchScope === 'branch' && !selectedBranchId)}", "disabled={!workspace.clanId}")
          text = text.replace("<Tag>{searchScope === 'branch' ? '当前支派' : '全宗族'}</Tag>\n", "")
          text = text.replace("""        <div className="lineage-workbench-head">
          <div><span>{currentClanName}</span><h3>中国式世系关系工作台</h3><p>围绕当前人物或支派定位真实关系路径，详情在右侧展开，不遮挡图谱。</p></div>
          <Segmented
            aria-label="图谱视角"
            value={mode}
            options={[
              { value: 'person', label: <Space size={6}><UserOutlined />人物中心</Space> },
              { value: 'branch', label: <Space size={6}><BranchesOutlined />支派全局</Space> }
            ]}
            onChange={value => { setMode(value as LineageMode); clearSelection(); }}
          />
        </div>

        <div className="summary-card lineage-workbench-summary">
          <div><span>当前范围</span><strong>{mode === 'person' ? center?.name || '-' : branchName}</strong></div>
          <div><span>当前展示人物</span><strong>{activeGraph?.meta.nodeCount ?? '-'}</strong></div>
          <div><span>当前展示关系</span><strong>{activeGraph?.meta.edgeCount ?? '-'}</strong></div>
          <div><span>当前图谱起点</span><strong>{activeRoot?.displayName || '-'}</strong></div>
          <div><span>实际展开深度</span><strong>{activeGraph?.meta.appliedDepth ?? currentDepth} 代</strong></div>
          <div><span>数据完整性</span><strong title={graphCompletenessText(activeGraph?.meta)}>{graphCompletenessText(activeGraph?.meta)}</strong></div>
        </div>

""", "")
          text = text.replace("""          <Field label="数据视图">
            <Select aria-label="数据视图" value={dataView} options={DATA_VIEW_OPTIONS} onChange={value => void handleDataViewChange(value as TreeDataView)} />
          </Field>
""", "")
          text = text.replace("onChange={value => void handleDirectionChange(value as TreeDirection)}", "onChange={value => handleDirectionChange(value as TreeDirection)}")
          text = text.replace("onChange={values => void handleRelationScopeChange(values as TreeRelationScope[])}", "onChange={values => handleRelationScopeChange(values as TreeRelationScope[])}")
          text = text.replace("onChange={value => mode === 'person' ? void handlePersonDepthChange(value) : void handleBranchDepthChange(value)}", "onChange={value => mode === 'person' ? handlePersonDepthChange(value) : handleBranchDepthChange(value)}")
          text = text.replace("onChange={value => void handleIncludeSubBranchesChange(value)}", "onChange={handleIncludeSubBranchesChange}")
          marker = """          {mode === 'branch' ? (
            <Field label="包含下级支派">
              <div className="lineage-switch-field"><Switch checked={includeSubBranches} onChange={handleIncludeSubBranchesChange} /><span>{includeSubBranches ? '包含' : '仅当前支派'}</span></div>
            </Field>
          ) : null}
        </div>

        <section className={`lineage-logic-card lineage-logic-card--${mode}`}>
"""
          replacement = """          {mode === 'branch' ? (
            <Field label="包含下级支派">
              <div className="lineage-switch-field"><Switch checked={includeSubBranches} onChange={handleIncludeSubBranchesChange} /><span>{includeSubBranches ? '包含' : '仅当前支派'}</span></div>
            </Field>
          ) : null}
          <div className="lineage-query-action"><Button type="primary" icon={<SearchOutlined />} loading={activeLoadState.loading} onClick={() => void applyGraphQuery()}>查询图谱</Button></div>
        </div>

        <div className="lineage-canvas-mode-bar">
          <div><span>{currentClanName}</span><strong>{mode === 'person' ? center?.name || '人物中心' : branchName}</strong></div>
          <Segmented aria-label="图谱视角" value={mode} options={[{ value: 'person', label: <Space size={6}><UserOutlined />人物中心</Space> }, { value: 'branch', label: <Space size={6}><BranchesOutlined />支派全局</Space> }]} onChange={value => { setMode(value as LineageMode); clearSelection(); setLocatedNodeId(''); }} />
        </div>

        <section className={`lineage-logic-card lineage-logic-card--${mode}`}>
"""
          text = text.replace(marker, replacement)
          text = text.replace("value={selectedNode?.nodeId}", "value={locatedNodeId || undefined}")
          text = text.replace("onChange={value => value ? locateNode(value) : clearSelection()}", "onChange={value => locateNode(value || '')}")
          text = text.replace("focusNodeId={selectedNode?.nodeId}", "focusNodeId={locatedNodeId}")
          path.write_text(text)

          css = Path('frontend/genealogy-web/src/lineage-tree.css')
          styles = css.read_text()
          styles += """

.lineage-search-grid--workbench { grid-template-columns: 180px 220px minmax(260px, 420px); justify-content: start; align-items: end; }
.lineage-search-grid--workbench .ant-input-search { max-width: 420px; }
.lineage-search-grid--workbench .ant-input-affix-wrapper, .lineage-search-grid--workbench .ant-input-search-button { height: 36px; }
.lineage-search-grid--workbench .ant-input { height: 34px; line-height: 34px; padding-block: 0; }
.lineage-search-grid--workbench .ant-input::placeholder { line-height: 34px; }
.lineage-search-grid--workbench .ant-input-search-button { display: inline-flex; align-items: center; justify-content: center; padding-inline: 16px; }
.lineage-query-toolbar { grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(150px, .8fr)) auto; }
.lineage-query-action { display: flex; align-items: end; padding-bottom: 1px; }
.lineage-query-action .ant-btn { min-width: 112px; height: 32px; display: inline-flex; align-items: center; justify-content: center; }
.lineage-canvas-mode-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 4px 2px 0; }
.lineage-canvas-mode-bar > div { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.lineage-canvas-mode-bar span { color: #1677ff; font-size: 12px; font-weight: 600; }
.lineage-canvas-mode-bar strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(0,0,0,.65); }
@media (max-width: 1000px) { .lineage-search-grid--workbench, .lineage-query-toolbar { grid-template-columns: 1fr 1fr; } .lineage-canvas-mode-bar { align-items: flex-start; flex-direction: column; } }
@media (max-width: 640px) { .lineage-search-grid--workbench, .lineage-query-toolbar { grid-template-columns: 1fr; } .lineage-search-grid--workbench .ant-input-search { max-width: none; } }
"""
          css.write_text(styles)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx frontend/genealogy-web/src/lineage-tree.css
          git commit -m "fix(tree): refine query trigger and workbench layout"
          git push origin HEAD:fix/lineage-query-and-workbench-layout

  frontend-build:
    needs: [refine-lineage]
    if: always() && (needs.refine-lineage.result == 'success' || needs.refine-lineage.result == 'skipped')
    name: Frontend Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - working-directory: frontend/genealogy-web
        run: npm install
      - working-directory: frontend/genealogy-web
        run: npm run test:tree
      - working-directory: frontend/genealogy-web
        run: npm run typecheck
      - working-directory: frontend/genealogy-web
        run: npm run build
