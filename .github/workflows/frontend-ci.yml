name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Typecheck and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Detect Tree-related changes
        id: tree-changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="${HEAD_SHA}^"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/frontend-changed-files.txt
          if grep -Eq '^frontend/genealogy-web/(src/features/tree(/|[^/])|e2e/tree[^/]*|src/shared/api/generated/tree[^/]*|src/shared/api/tree[^/]*)' /tmp/frontend-changed-files.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test Tree graph model
        if: steps.tree-changes.outputs.changed == 'true'
        working-directory: frontend/genealogy-web
        shell: bash
        run: set -o pipefail; npm run test:tree 2>&1 | tee tree-test-output.log

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Upload failed Tree diagnostics
        if: failure() && steps.tree-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tree-diagnostics
          path: frontend/genealogy-web/tree-test-output.log
          if-no-files-found: ignore
          retention-days: 3

  tree-release-gate:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-273-lineage-interactions'
    name: PostgreSQL Security, Topology and Browser
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/genealogy
      SPRING_DATASOURCE_USERNAME: genealogy
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_FLYWAY_ENABLED: "true"
      GENEALOGY_AUTH_EXPOSE_BEARER_TOKEN: "true"
      GENEALOGY_AUTH_COOKIE_SECURE: "false"
      GENEALOGY_AUTH_COOKIE_SAME_SITE: Lax
      TREE_RELEASE_GATE: "true"
      VITE_API_PROXY_TARGET: http://127.0.0.1:8080
      E2E_BASE_URL: http://127.0.0.1:5179

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify backend against PostgreSQL
        working-directory: backend/genealogy-backend
        run: mvn -B verify

      - name: Start real backend
        working-directory: backend/genealogy-backend
        run: |
          nohup java -jar target/genealogy-backend-0.1.0-SNAPSHOT.jar > /tmp/tree-backend.log 2>&1 &
          echo $! > /tmp/tree-backend.pid
          for attempt in $(seq 1 60); do
            if curl -sS http://127.0.0.1:8080/api/v1/auth/me >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/tree-backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Verify Tree models, types, build and API contract
        working-directory: frontend/genealogy-web
        run: |
          npm run test:tree
          npm run typecheck
          npm run build
          npm run api:check

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start real frontend
        working-directory: frontend/genealogy-web
        run: |
          nohup npm run dev -- --host 127.0.0.1 > /tmp/tree-frontend.log 2>&1 &
          echo $! > /tmp/tree-frontend.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/tree-frontend.log
          exit 1

      - name: Run real Tree browser gate
        working-directory: frontend/genealogy-web
        run: npx playwright test e2e/tree-release-gate.spec.ts

      - name: Upload release gate diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tree-release-gate-diagnostics
          path: |
            /tmp/tree-backend.log
            /tmp/tree-frontend.log
            backend/genealogy-backend/target/surefire-reports
            frontend/genealogy-web/test-results
            frontend/genealogy-web/playwright-report
          if-no-files-found: ignore
          retention-days: 5
