name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

concurrency:
  group: wizard-feedback-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Migrate and verify wizard feedback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-763-finish-wizard-feedback-unification
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply migration
        if: github.actor != 'github-actions[bot]'
        working-directory: frontend/genealogy-web
        run: node scripts/finish-wizard-feedback-unification.mjs
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback contract
        working-directory: frontend/genealogy-web
        run: npm run test:feedback
      - name: Verify wizard tests
        working-directory: frontend/genealogy-web
        run: |
          npm run test:wizard
          npm run test:wizard-session
          npm run test:wizard-dependencies
          npm run test:wizard-forms
          npm run test:generation-validation
          npm run test:source-stage
          npm run test:wizard-result-lists
          npm run test:wizard-summary
          npm run test:wizard-completion
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit migration
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src frontend/genealogy-web/package.json
          git commit -m "refactor: finish wizard feedback unification"
          git push origin HEAD:agent/issue-763-finish-wizard-feedback-unification
