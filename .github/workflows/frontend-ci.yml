          text = replace_once(text, "              <Select aria-label=\"人物图查看方向\" value={direction} options={DIRECTION_OPTIONS} onChange={value => void handleDirectionChange(value as TreeDirection)} />", "              <Select aria-label=\"人物图查看方向\" value={direction} options={DIRECTION_OPTIONS} onChange={value => handleDirectionChange(value as TreeDirection)} />", 'direction pending')
          text = replace_once(text, "              onChange={values => void handleRelationScopeChange(values as TreeRelationScope[])}", "              onChange={values => handleRelationScopeChange(values as TreeRelationScope[])}", 'relations pending')
          text = replace_once(
