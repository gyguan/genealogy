name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  migrate-notify:
    name: Diagnose remaining application notify
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-767-remove-app-notify
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Generate residual report
        working-directory: frontend/genealogy-web
        run: |
          grep -Rnw --include='*.ts' --include='*.tsx' --exclude='*.test.*' --exclude='*.spec.*' '\bnotify\b' src > notify-residual.txt || true
          cat notify-residual.txt
      - name: Commit residual report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/notify-residual.txt
          git commit -m "chore: capture notify residuals"
          git push origin HEAD:agent/issue-767-remove-app-notify
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
