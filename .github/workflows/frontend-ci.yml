name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  diagnose-types:
    name: Diagnose notify migration types
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-767-remove-app-notify
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Persist baseline fix
        working-directory: frontend/genealogy-web
        run: |
          sed -i 's/baseline.maxCounts.app_notify, 141/baseline.maxCounts.app_notify, 0/' src/shared/ui/FeedbackUnification.test.mjs
          rm -f feedback-test-output.log typecheck-output.log
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture type diagnostics
        working-directory: frontend/genealogy-web
        run: npm run typecheck > typecheck-output.log 2>&1 || true
      - name: Commit baseline and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/shared/ui/FeedbackUnification.test.mjs
          git add -f frontend/genealogy-web/typecheck-output.log
          git commit -m "fix: align notify audit baseline and capture type diagnostics"
          git push origin HEAD:agent/issue-767-remove-app-notify
