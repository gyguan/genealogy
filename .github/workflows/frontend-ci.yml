name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  migrate-empty-state:
    name: Migrate and verify empty states
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-776-unify-empty-state
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Run empty state migration
        working-directory: frontend/genealogy-web
        run: node scripts/migrate-empty-state.mjs
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "refactor: unify empty state components"
          git push origin HEAD:agent/issue-776-unify-empty-state
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback contract
        working-directory: frontend/genealogy-web
        run: |
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json
          npm run test:feedback
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
