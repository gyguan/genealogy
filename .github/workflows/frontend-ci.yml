name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  diagnose-notify:
    name: Diagnose notify migration tests
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-767-remove-app-notify
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture diagnostics
        working-directory: frontend/genealogy-web
        run: |
          npm run test:feedback > feedback-test-output.log 2>&1 || true
          npm run typecheck > typecheck-output.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f frontend/genealogy-web/feedback-test-output.log frontend/genealogy-web/typecheck-output.log
          git commit -m "chore: capture notify migration diagnostics"
          git push origin HEAD:agent/issue-767-remove-app-notify
