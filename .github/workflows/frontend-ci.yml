name: Frontend CI

on:
  push:
    branches:
      - agent/source-search-url-413

permissions:
  contents: write

jobs:
  apply-source-query-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/source-search-url-413
          fetch-depth: 0
      - name: Apply URL state persistence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx')
          s = p.read_text()
          s = s.replace("import { useEffect, useMemo, useState } from 'react';", "import { useEffect, useMemo, useRef, useState } from 'react';")
          anchor = """function readSourceIdFromUrl() {
  const value = new URLSearchParams(window.location.search).get('sourceId');
  const parsed = Number(value);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : undefined;
}
"""
          helpers = anchor + """
function readSearchFromUrl(): SourceSearchParams {
  const params = new URLSearchParams(window.location.search);
  const positiveInt = (name: string, fallback: number) => {
    const parsed = Number(params.get(name));
    return Number.isInteger(parsed) && parsed > 0 ? parsed : fallback;
  };
  const boolValue = (name: string) => {
    const value = params.get(name);
    if (value === 'true') return true;
    if (value === 'false') return false;
    return undefined;
  };
  return {
    pageNo: positiveInt('pageNo', 1),
    pageSize: positiveInt('pageSize', 10),
    sort: params.get('sort') || 'updatedAt,desc',
    keyword: params.get('keyword') || undefined,
    sourceType: params.get('sourceType') || undefined,
    verificationStatus: params.get('verificationStatus') || undefined,
    privacyLevel: params.get('privacyLevel') || undefined,
    hasAttachment: boolValue('hasAttachment'),
    hasBinding: boolValue('hasBinding')
  };
}

function searchFormValues(value: SourceSearchParams): SourceSearchFormValues {
  return {
    ...value,
    hasAttachment: value.hasAttachment === undefined ? undefined : String(value.hasAttachment),
    hasBinding: value.hasBinding === undefined ? undefined : String(value.hasBinding)
  };
}

function writeSearchToUrl(value: SourceSearchParams, mode: 'push' | 'replace' = 'push') {
  const url = new URL(window.location.href);
  url.pathname = '/';
  url.hash = '';
  url.searchParams.set('view', 'sourceLibrary');
  url.searchParams.delete('sourceId');
  ['keyword', 'sourceType', 'verificationStatus', 'privacyLevel', 'hasAttachment', 'hasBinding', 'pageNo', 'pageSize', 'sort'].forEach(key => url.searchParams.delete(key));
  Object.entries(value).forEach(([key, item]) => {
    if (item !== undefined && item !== null && item !== '') url.searchParams.set(key, String(item));
  });
  window.history[mode === 'push' ? 'pushState' : 'replaceState'](
    { ...window.history.state, sourceLibraryScrollY: window.scrollY },
    '',
    `${url.pathname}${url.search}`
  );
}
"""
          if 'function readSearchFromUrl()' not in s:
              s = s.replace(anchor, helpers, 1)
          s = s.replace("const [search, setSearch] = useState<SourceSearchParams>({ pageNo: 1, pageSize: 10, sort: 'updatedAt,desc' });", "const [search, setSearch] = useState<SourceSearchParams>(readSearchFromUrl);")
          s = s.replace("const [sourceForm] = Form.useForm<SourceSearchFormValues>();", "const [sourceForm] = Form.useForm<SourceSearchFormValues>();\n  const listScrollRef = useRef<number>(Number(window.history.state?.sourceLibraryScrollY || 0));")
          s = s.replace("""  function openDetail(row: SourceRecord) {
    if (!row.id) return;
    writeSourceIdToUrl(row.id);
    setDetailSourceId(row.id);
  }
""", """  function openDetail(row: SourceRecord) {
    if (!row.id) return;
    listScrollRef.current = window.scrollY;
    window.history.replaceState({ ...window.history.state, sourceLibraryScrollY: window.scrollY }, '', window.location.href);
    writeSourceIdToUrl(row.id);
    setDetailSourceId(row.id);
  }
""", 1)
          s = s.replace("""  function closeDetail(mode: 'push' | 'replace' = 'push') {
    writeSourceIdToUrl(undefined, mode);
    setDetailSourceId(undefined);
    setDetail(null);
    setDetailError(null);
  }
""", """  function closeDetail(mode: 'push' | 'replace' = 'push') {
    writeSearchToUrl(search, mode);
    setDetailSourceId(undefined);
    setDetail(null);
    setDetailError(null);
    window.setTimeout(() => window.scrollTo({ top: listScrollRef.current }), 0);
  }
""", 1)
          s = s.replace("""    setSearch(next);
    void loadSources(next);
  }

  function resetSearch()""", """    setSearch(next);
    writeSearchToUrl(next);
    void loadSources(next);
  }

  function resetSearch()""", 1)
          s = s.replace("""    setSearch(next);
    void loadSources(next);
  }

  function openCreateBinding()""", """    setSearch(next);
    writeSearchToUrl(next);
    void loadSources(next);
  }

  function openCreateBinding()""", 1)
          s = s.replace("""  useEffect(() => {
    const onPopState = () => setDetailSourceId(readSourceIdFromUrl());
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, []);
""", """  useEffect(() => {
    const onPopState = (event: PopStateEvent) => {
      const nextSourceId = readSourceIdFromUrl();
      const nextSearch = readSearchFromUrl();
      setDetailSourceId(nextSourceId);
      setSearch(nextSearch);
      sourceForm.setFieldsValue(searchFormValues(nextSearch));
      listScrollRef.current = Number(event.state?.sourceLibraryScrollY || 0);
      if (!nextSourceId && clanId) void loadSources(nextSearch);
      window.setTimeout(() => window.scrollTo({ top: listScrollRef.current }), 0);
    };
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, [clanId, sourceForm]);
""", 1)
          s = s.replace('<Form form={sourceForm} layout="vertical" onFinish={submitSearch} initialValues={search}>', '<Form form={sourceForm} layout="vertical" onFinish={submitSearch} initialValues={searchFormValues(search)}>')
          s = s.replace("""                setSearch(next);
                void loadSources(next);
""", """                setSearch(next);
                writeSearchToUrl(next);
                void loadSources(next);
""", 1)
          p.write_text(s)
          PY
          git show origin/main:.github/workflows/frontend-ci.yml > .github/workflows/frontend-ci.yml
          rm -f frontend/genealogy-web/.source-413-trigger
          git rm -f .github/workflows/source-issue-413-patch.yml || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx .github/workflows/frontend-ci.yml frontend/genealogy-web/.source-413-trigger
          git commit -m "persist source search state in URL"
          git push origin HEAD:agent/source-search-url-413
