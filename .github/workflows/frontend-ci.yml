name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Test Tree graph model
        working-directory: frontend/genealogy-web
        shell: bash
        run: set -o pipefail; npm run test:tree 2>&1 | tee tree-test-output.log

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Upload failed frontend diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: frontend/genealogy-web/tree-test-output.log
          if-no-files-found: ignore
          retention-days: 3
