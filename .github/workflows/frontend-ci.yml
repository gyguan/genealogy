name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  fix-person-archive:
    name: Fix person archive import contract
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-unify-page-alerts
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Fix import structure
        working-directory: frontend/genealogy-web
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/features/persons/PersonArchiveSearchPage.tsx')
          s=p.read_text()
          start=s.index("import {")
          marker="import type { MenuProps } from 'antd';"
          end=s.index(marker)
          imports="""import { useEffect, useMemo, useRef, useState } from 'react';
import { ExportOutlined, PlusOutlined } from '@ant-design/icons';
import { Button, Card, Collapse, Dropdown, Empty, Form, Input, Pagination, Result, Select, Space, Table, Tag } from 'antd';
"""
          s=imports+s[end:]
          p.write_text(s)
          Path('person-archive-gate.log').unlink(missing_ok=True)
          PY
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify person archive gate
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          rm -rf .person-archive-test .person-create-entry-test
          npx tsc src/features/persons/personArchiveUrlState.ts --ignoreConfig --rootDir src --target ES2020 --module ESNext --moduleResolution Bundler --lib ES2020,DOM --outDir .person-archive-test --skipLibCheck
          npx tsc src/features/persons/personCreateEntryModel.ts --ignoreConfig --rootDir src --target ES2020 --module ESNext --moduleResolution Bundler --lib ES2020,DOM --outDir .person-create-entry-test --skipLibCheck
          node --test src/features/persons/personArchiveUrlState.test.mjs src/features/persons/personCreateEntryModel.test.mjs
          rm -rf .person-archive-test .person-create-entry-test
      - name: Verify feedback, typecheck and build
        working-directory: frontend/genealogy-web
        run: |
          npm run test:feedback
          npm run typecheck
          npm run build
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "fix: preserve person archive import contract"
          git push origin HEAD:agent/issue-771-unify-page-alerts
