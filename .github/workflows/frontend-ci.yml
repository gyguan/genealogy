          )
          text = replace_once(text, "              onChange={value => mode === 'person' ? void handlePersonDepthChange(value) : void handleBranchDepthChange(value)}", "              onChange={value => mode === 'person' ? handlePersonDepthChange(value) : handleBranchDepthChange(value)}", 'depth pending')
          text = replace_once(text, "<Switch checked={includeSubBranches} onChange={value => void handleIncludeSubBranchesChange(value)} />", "<Switch checked={includeSubBranches} onChange={handleIncludeSubBranchesChange} />", 'branch scope pending')
