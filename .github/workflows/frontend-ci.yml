name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  diagnose-person-archive:
    name: Diagnose person archive gate
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-unify-page-alerts
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture person archive diagnostics
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          rm -rf .person-archive-test .person-create-entry-test
          {
            npx tsc src/features/persons/personArchiveUrlState.ts --ignoreConfig --rootDir src --target ES2020 --module ESNext --moduleResolution Bundler --lib ES2020,DOM --outDir .person-archive-test --skipLibCheck
            echo "archive-tsc=$?"
            npx tsc src/features/persons/personCreateEntryModel.ts --ignoreConfig --rootDir src --target ES2020 --module ESNext --moduleResolution Bundler --lib ES2020,DOM --outDir .person-create-entry-test --skipLibCheck
            echo "create-tsc=$?"
            node --test src/features/persons/personArchiveUrlState.test.mjs src/features/persons/personCreateEntryModel.test.mjs
            echo "tests=$?"
          } > person-archive-gate.log 2>&1
          rm -rf .person-archive-test .person-create-entry-test
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f frontend/genealogy-web/person-archive-gate.log
          git commit -m "chore: capture person archive gate diagnostics"
          git push origin HEAD:agent/issue-771-unify-page-alerts
