name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  verify-alerts:
    name: Fix and verify page alert migration
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-unify-page-alerts
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply targeted fixes
        working-directory: frontend/genealogy-web
        run: |
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync, writeFileSync } from 'node:fs';
          import path from 'node:path';
          const root = path.resolve('src');
          const walk = d => readdirSync(d,{withFileTypes:true}).flatMap(e=>e.isDirectory()?walk(path.join(d,e.name)):(e.name.endsWith('.tsx')?[path.join(d,e.name)]:[]));
          for (const file of walk(root)) {
            let source = readFileSync(file,'utf8');
            const original = source;
            source = source.replace(/<Button\b([\s\S]*?)>/g, tag => tag.replace(/\btone=/g,'type='));
            if (file.endsWith('ReviewCenterPageContent.tsx')) source = source.replace(/batchDecision\.tone/g,'batchDecision.type');
            if (source !== original) writeFileSync(file,source);
          }
          NODE
          sed -i "s/'showIcon'>/'showIcon' | 'variant'>/" src/shared/ui/Feedback.tsx
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/audit-ui-feedback.mjs')
          s=p.read_text()
          s=s.replace("patterns: [/<Tooltip\\b/g, /\\btitle\\s*=\\s*\\{?['\"`][^'\"`]*(提示|说明|帮助)/g]", "patterns: [/<Tooltip\\b/g]")
          p.write_text(s)
          PY
          rm -f alert-feedback-test.log alert-typecheck.log
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback audit and contract
        working-directory: frontend/genealogy-web
        run: |
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json
          npm run test:feedback
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit verified fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "fix: complete page alert migration"
          git push origin HEAD:agent/issue-771-unify-page-alerts
