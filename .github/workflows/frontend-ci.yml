  frontend-build:
    name: Frontend Typecheck and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Detect Tree-related changes
        id: tree-changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="${HEAD_SHA}^"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/frontend-changed-files.txt
          if grep -Eq '^frontend/genealogy-web/(src/features/tree(/|[^/])|e2e/tree[^/]*|src/shared/api/generated/tree[^/]*|src/shared/api/tree[^/]*)' /tmp/frontend-changed-files.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test Tree graph model
        if: steps.tree-changes.outputs.changed == 'true'
        working-directory: frontend/genealogy-web
        shell: bash
        run: set -o pipefail; npm run test:tree 2>&1 | tee tree-test-output.log

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Upload failed Tree diagnostics
        if: failure() && steps.tree-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tree-diagnostics
          path: frontend/genealogy-web/tree-test-output.log
          if-no-files-found: ignore
          retention-days: 3
