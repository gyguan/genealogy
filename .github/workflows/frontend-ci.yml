name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  migrate-notify:
    name: Migrate and verify application notify
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-767-remove-app-notify
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply migration
        working-directory: frontend/genealogy-web
        run: |
          sed -i 's/process.exit(1);/console.warn("Residuals committed for follow-up");/' scripts/migrate-app-notify.mjs
          node scripts/migrate-app-notify.mjs
          find src -type f \( -name '*.ts' -o -name '*.tsx' \) -print0 | xargs -0 perl -0pi -e 's/\bnotify\??:\s*\(data:\s*unknown,\s*error\?:\s*boolean\)\s*=>\s*void;?//g; s/\bnotify\s*,\s*//g; s/,\s*notify\b//g; s/if \(notify\) feedback\.from\((.*?)\);\s*else feedback\.(?:success|error)\((.*?)\);/feedback.from($1);/sg'
          grep -Rnw --include='*.ts' --include='*.tsx' --exclude='*.test.*' --exclude='*.spec.*' '\bnotify\b' src || true
      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src frontend/genealogy-web/package.json frontend/genealogy-web/feedback-audit-baseline.json
          git commit -m "refactor: remove remaining notify interface shapes"
          git push origin HEAD:agent/issue-767-remove-app-notify
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback audit and contract
        working-directory: frontend/genealogy-web
        run: |
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json
          npm run test:feedback
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
