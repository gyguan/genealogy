name: Issue 233 Fix Typecheck

on:
  push:
    branches:
      - agent/issue-233-lineage-workbench
    paths:
      - .github/workflows/issue-233-fix-typecheck.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove synchronized legacy state references
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx')
          text = path.read_text()
          text = text.replace(
              "setSearchNotice('');\n    setSearchResultsExpanded(false);",
              "setSearchNotice('');\n    setSearchCollapsed(true);"
          )
          text = text.replace(
              "setSearchCollapsed(true);\n    const nextBranchId = item.branchId || selectedBranchId;\n    setSearchResultsExpanded(false);",
              "setSearchCollapsed(true);\n    const nextBranchId = item.branchId || selectedBranchId;"
          )
          text = text.replace('orientation="left"', 'orientation="start"')
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx
          git commit -m "fix(tree): remove legacy search state references"
          git push origin HEAD:agent/issue-233-lineage-workbench
