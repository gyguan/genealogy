name: Issue 121 Contract Generate

on:
  push:
    branches:
      - agent/issue-121-trace-aggregation
    paths:
      - .github/workflows/issue-121-contract-preview.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Generate contract files
        working-directory: frontend/genealogy-web
        run: npm run api:generate
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/shared/api/generated/api-contract.ts frontend/genealogy-web/src/shared/api/generated/tracking-types.ts
          git commit -m "chore: generate issue 121 trace contract types"
          git push origin HEAD:agent/issue-121-trace-aggregation
