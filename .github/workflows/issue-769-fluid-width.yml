name: Issue 769 Fluid Width

on:
  pull_request:
    types: [ready_for_review]
    branches: [main]

permissions:
  contents: read

jobs:
  implement:
    if: github.head_ref == 'agent/issue-769-fluid-page-width'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-769-fluid-page-width
      - name: Apply and validate page width changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          targets = [
              Path('frontend/genealogy-web/src/features/imports/import-workbench.css'),
              Path('frontend/genealogy-web/src/features/logs/tracking-page.css'),
          ]
          for path in targets:
              source = path.read_text()
              updated = source.replace('  max-width: 1600px;\n  margin: 0 auto;\n', '')
              if updated == source:
                  raise SystemExit(f'expected fixed-width rule not found: {path}')
              path.write_text(updated)

          test_path = Path('frontend/genealogy-web/src/shared/ui/FluidPageWidth.test.mjs')
          test_path.write_text("""import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const importCss = readFileSync(new URL('../../features/imports/import-workbench.css', import.meta.url), 'utf8');
          const trackingCss = readFileSync(new URL('../../features/logs/tracking-page.css', import.meta.url), 'utf8');

          function ruleBody(source, selector) {
            const start = source.indexOf(`${selector} {`);
            assert.notEqual(start, -1, `missing ${selector}`);
            const end = source.indexOf('}', start);
            return source.slice(start, end);
          }

          test('data import page uses all available browser width', () => {
            const body = ruleBody(importCss, '.import-center-page');
            assert.match(body, /width:\\s*100%/);
            assert.doesNotMatch(body, /max-width/);
          });

          test('audit tracking page uses all available browser width', () => {
            const body = ruleBody(trackingCss, '.tracking-double-card-page');
            assert.match(body, /width:\\s*100%/);
            assert.doesNotMatch(body, /max-width/);
          });
          """)
          PY
          node --test frontend/genealogy-web/src/shared/ui/FluidPageWidth.test.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: issue-769-fluid-width-files
          path: |
            frontend/genealogy-web/src/features/imports/import-workbench.css
            frontend/genealogy-web/src/features/logs/tracking-page.css
            frontend/genealogy-web/src/shared/ui/FluidPageWidth.test.mjs
          if-no-files-found: error
