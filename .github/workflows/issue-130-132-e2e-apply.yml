name: Issue 130-132 E2E Apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  persist-verified-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Recreate the already verified E2E assets
        run: |
          python3 .github/scripts/issue-130-132-e2e-apply.py
          python3 .github/scripts/issue-130-132-e2e-selector-fix.py
          rm .github/workflows/auth-commercial-e2e.yml
      - name: Persist Playwright dependency lock
        working-directory: frontend/genealogy-web
        run: |
          npm install --save-dev @playwright/test
          npm run typecheck
      - name: Commit verified E2E suite and remove temporary assets
        shell: bash
        run: |
          rm .github/workflows/issue-130-132-e2e-apply.yml
          rm .github/scripts/issue-130-132-e2e-apply.py
          rm .github/scripts/issue-130-132-e2e-selector-fix.py
          rm -f tasks/issue-130-132-e2e-diagnostic.md
          rm -f tasks/issue-130-132-e2e-diagnostic-2.md
          rm -f tasks/issue-130-132-e2e-diagnostic-3.md
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'test(auth): add PostgreSQL browser E2E suite'
          git push
