name: Large Page Loading Feedback Migration

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/large-page-loading-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/issue-780-finalize-large-page-feedback'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - working-directory: frontend/genealogy-web
        run: node scripts/normalize-large-page-loading-feedback.mjs
      - working-directory: frontend/genealogy-web
        run: npm install
      - working-directory: frontend/genealogy-web
        run: npm run test:feedback
      - working-directory: frontend/genealogy-web
        run: npm run typecheck
      - working-directory: frontend/genealogy-web
        run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "refactor: normalize large-page loading feedback"
          git push origin HEAD:agent/issue-780-finalize-large-page-feedback
