name: Issue 120 Review Fix

on:
  push:
    branches:
      - agent/issue-120-business-object-search
    paths:
      - .github/scripts/fix-issue-120-review.py
      - .github/workflows/issue-120-review-fix.yml

permissions:
  contents: write

jobs:
  apply-review-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-120-business-object-search
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply review fixes
        run: python .github/scripts/fix-issue-120-review.py
      - name: Run focused repository tests
        working-directory: backend/genealogy-backend
        run: mvn -B -Dtest=TrackingObjectQueryRepositoryTest test
      - name: Commit review fixes and remove temporary automation
        run: |
          rm .github/scripts/fix-issue-120-review.py .github/workflows/issue-120-review-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: enforce tracking search visibility for issue 120"
          git push origin HEAD:agent/issue-120-business-object-search
