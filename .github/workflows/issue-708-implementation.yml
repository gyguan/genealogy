name: Issue 708 implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-708-implementation.yml

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-708-approved-dependencies
          fetch-depth: 0
      - name: Apply dependency approval guards
        shell: bash
        run: |
          cat > /tmp/patch_issue708.py <<'PY'
          from pathlib import Path
          import re

          ROOT = Path('.')

          def read(path):
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path, content):
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding='utf-8')

          def replace(path, old, new, count=1):
              text = read(path)
              if old not in text:
                  raise SystemExit(f'missing replacement in {path}: {old[:120]!r}')
              text = text.replace(old, new, count)
              write(path, text)

          def ensure_import(path, import_line, after_line):
              text = read(path)
              if import_line in text:
                  return
              if after_line not in text:
                  raise SystemExit(f'missing import anchor in {path}: {after_line}')
              write(path, text.replace(after_line, after_line + '\n' + import_line, 1))

          policy_path = 'backend/genealogy-backend/src/main/java/com/genealogy/common/domain/ApprovedStatusPolicy.java'
          write(policy_path, '''package com.genealogy.common.domain;

          import com.genealogy.common.exception.BusinessException;

          import java.util.Locale;
          import java.util.Set;

          public final class ApprovedStatusPolicy {

              private static final Set<String> APPROVED_STATUSES = Set.of("official", "approved", "active");

              private ApprovedStatusPolicy() {
              }

              public static boolean isApproved(String status) {
                  return status != null && APPROVED_STATUSES.contains(status.trim().toLowerCase(Locale.ROOT));
              }

              public static void requireApproved(String status, String code, String message) {
                  if (!isApproved(status)) {
                      throw new BusinessException(code, message);
                  }
              }
          }
          '''.replace('          ', ''))

          # Branch-scoped write operations, including imports, must target approved branches.
          auth = 'backend/genealogy-backend/src/main/java/com/genealogy/auth/application/AuthorizationApplicationService.java'
          ensure_import(auth, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.branch.repository.BranchRepository;')
          replace(auth, '''    public ClanMembershipEntity requireBranchWriteScope(Long clanId, Long userId, Long branchId) {
                  return requireBranchPermission(clanId, userId, branchId, "person.update");
              }''', '''    public ClanMembershipEntity requireBranchWriteScope(Long clanId, Long userId, Long branchId) {
                  if (branchId != null) {
                      String status = branchRepository.findByIdAndClanId(branchId, clanId)
                              .orElseThrow(() -> new BusinessException("BRANCH_NOT_FOUND", "支派不存在或不属于当前宗族"))
                              .getStatus();
                      ApprovedStatusPolicy.requireApproved(status, "BRANCH_NOT_OFFICIAL", "支派审核通过后才能作为依赖对象");
                  }
                  return requireBranchPermission(clanId, userId, branchId, "person.update");
              }''')

          # Parent branch must be approved.
          branch = 'backend/genealogy-backend/src/main/java/com/genealogy/branch/application/BranchApplicationService.java'
          ensure_import(branch, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.clan.repository.ClanRepository;')
          replace(branch, '        BranchEntity parent = getParentBranch(clanId, request.parentId());\n        BranchEntity entity = BranchMapper.toEntity(clanId, request);', '        BranchEntity parent = getParentBranch(clanId, request.parentId());\n        if (parent != null) {\n            ApprovedStatusPolicy.requireApproved(parent.getStatus(), "BRANCH_PARENT_NOT_OFFICIAL", "父支派审核通过后才能创建下级支派");\n        }\n        BranchEntity entity = BranchMapper.toEntity(clanId, request);')
          replace(branch, '        BranchEntity parent = getParentBranch(entity.getClanId(), request.parentId());\n        validateParentIsNotDescendant(id, parent);', '        BranchEntity parent = getParentBranch(entity.getClanId(), request.parentId());\n        if (parent != null) {\n            ApprovedStatusPolicy.requireApproved(parent.getStatus(), "BRANCH_PARENT_NOT_OFFICIAL", "父支派审核通过后才能作为上级支派");\n        }\n        validateParentIsNotDescendant(id, parent);')

          # Person dependencies: branch and generation scheme.
          person = 'backend/genealogy-backend/src/main/java/com/genealogy/person/application/PersonApplicationService.java'
          ensure_import(person, 'import com.genealogy.branch.entity.BranchEntity;', 'import com.genealogy.auth.application.AuthorizationApplicationService;')
          ensure_import(person, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.common.api.PageResponse;')
          replace(person, '        ensureBranchBelongsToClan(clanId, request.branchId());\n        validatePersonCodeForCreate', '        ensureBranchBelongsToClan(clanId, request.branchId());\n        requireApprovedBranch(clanId, request.branchId());\n        validatePersonCodeForCreate')
          replace(person, '        ensureBranchBelongsToClan(entity.getClanId(), request.branchId());\n        validatePersonCodeForUpdate', '        ensureBranchBelongsToClan(entity.getClanId(), effectiveBranchId);\n        requireApprovedBranch(entity.getClanId(), effectiveBranchId);\n        validatePersonCodeForUpdate')
          replace(person, '        List<GenerationSchemeEntity> schemes = genSchemeRepository.findByClanIdOrderByIsDefaultDescIdAsc(clanId);', '        List<GenerationSchemeEntity> schemes = genSchemeRepository.findByClanIdOrderByIsDefaultDescIdAsc(clanId).stream()\n                .filter(item -> ApprovedStatusPolicy.isApproved(item.getStatus()))\n                .toList();')
          marker = '    private void ensureBranchBelongsToClan(Long clanId, Long branchId) {'
          text = read(person)
          if 'private void requireApprovedBranch' not in text:
              method = '''    private void requireApprovedBranch(Long clanId, Long branchId) {
                  if (branchId == null) {
                      return;
                  }
                  BranchEntity branch = branchRepository.findByIdAndClanId(branchId, clanId)
                          .orElseThrow(() -> new BusinessException("BRANCH_CLAN_MISMATCH", "支派不存在或不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "BRANCH_NOT_OFFICIAL", "所属支派审核通过后才能录入或编辑人物");
              }

          '''
              if marker not in text:
                  raise SystemExit('person branch marker missing')
              write(person, text.replace(marker, method + marker, 1))

          # Relationship dependencies: both people and successor branch.
          rel = 'backend/genealogy-backend/src/main/java/com/genealogy/relationship/application/RelationshipApplicationService.java'
          ensure_import(rel, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.branch.repository.BranchRepository;')
          replace(rel, '''        if (!from.getClanId().equals(clanId) || !to.getClanId().equals(clanId)) {
                      throw new BusinessException("RELATIONSHIP_CLAN_MISMATCH", "persons must belong to the clan");
                  }
                  String relationLabel''', '''        if (!from.getClanId().equals(clanId) || !to.getClanId().equals(clanId)) {
                      throw new BusinessException("RELATIONSHIP_CLAN_MISMATCH", "persons must belong to the clan");
                  }
                  ApprovedStatusPolicy.requireApproved(from.getDataStatus(), "RELATIONSHIP_PERSON_NOT_OFFICIAL", "关系两端人物审核通过后才能建立关系");
                  ApprovedStatusPolicy.requireApproved(to.getDataStatus(), "RELATIONSHIP_PERSON_NOT_OFFICIAL", "关系两端人物审核通过后才能建立关系");
                  String relationLabel''')
          replace(rel, '''        PersonEntity from = getActivePerson(entity.getFromPersonId());
                  PersonEntity to = getActivePerson(entity.getToPersonId());
                  validateGenerationOrder(from, to, relationType);''', '''        PersonEntity from = getActivePerson(entity.getFromPersonId());
                  PersonEntity to = getActivePerson(entity.getToPersonId());
                  ApprovedStatusPolicy.requireApproved(from.getDataStatus(), "RELATIONSHIP_PERSON_NOT_OFFICIAL", "关系两端人物审核通过后才能编辑关系");
                  ApprovedStatusPolicy.requireApproved(to.getDataStatus(), "RELATIONSHIP_PERSON_NOT_OFFICIAL", "关系两端人物审核通过后才能编辑关系");
                  validateGenerationOrder(from, to, relationType);''')
          replace(rel, '''    private void validateSuccessorBranch(Long clanId, Long successorBranchId) {
                  if (successorBranchId == null) {
                      return;
                  }
                  if (branchRepository.findByIdAndClanId(successorBranchId, clanId).isEmpty()) {
                      throw new BusinessException("SUCCESSOR_BRANCH_NOT_FOUND", "承继房支不存在或不属于当前宗族");
                  }
              }''', '''    private void validateSuccessorBranch(Long clanId, Long successorBranchId) {
                  if (successorBranchId == null) {
                      return;
                  }
                  var branch = branchRepository.findByIdAndClanId(successorBranchId, clanId)
                          .orElseThrow(() -> new BusinessException("SUCCESSOR_BRANCH_NOT_FOUND", "承继房支不存在或不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "SUCCESSOR_BRANCH_NOT_OFFICIAL", "承继房支审核通过后才能用于关系维护");
              }''')

          # Source binding validation for every supported target type.
          source_target = 'backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceBindingTargetValidationService.java'
          write(source_target, '''package com.genealogy.source.application;

          import com.genealogy.branch.entity.BranchEntity;
          import com.genealogy.branch.repository.BranchRepository;
          import com.genealogy.clan.repository.ClanRepository;
          import com.genealogy.common.domain.ApprovedStatusPolicy;
          import com.genealogy.common.exception.BusinessException;
          import com.genealogy.generation.entity.GenerationSchemeEntity;
          import com.genealogy.generation.entity.GenerationWordEntity;
          import com.genealogy.generation.repository.GenerationSchemeRepository;
          import com.genealogy.generation.repository.GenerationWordRepository;
          import com.genealogy.person.entity.PersonEntity;
          import com.genealogy.person.repository.PersonRepository;
          import com.genealogy.relationship.entity.RelationshipEntity;
          import com.genealogy.relationship.repository.RelationshipRepository;
          import org.springframework.stereotype.Service;
          import org.springframework.transaction.annotation.Transactional;

          import java.util.Locale;

          @Service
          public class SourceBindingTargetValidationService {

              private final GenerationWordRepository generationWordRepository;
              private final GenerationSchemeRepository generationSchemeRepository;
              private final PersonRepository personRepository;
              private final RelationshipRepository relationshipRepository;
              private final BranchRepository branchRepository;
              private final ClanRepository clanRepository;

              public SourceBindingTargetValidationService(
                      GenerationWordRepository generationWordRepository,
                      GenerationSchemeRepository generationSchemeRepository,
                      PersonRepository personRepository,
                      RelationshipRepository relationshipRepository,
                      BranchRepository branchRepository,
                      ClanRepository clanRepository
              ) {
                  this.generationWordRepository = generationWordRepository;
                  this.generationSchemeRepository = generationSchemeRepository;
                  this.personRepository = personRepository;
                  this.relationshipRepository = relationshipRepository;
                  this.branchRepository = branchRepository;
                  this.clanRepository = clanRepository;
              }

              @Transactional(readOnly = true)
              public void validate(Long clanId, String targetType, Long targetId) {
                  if (clanId == null || targetType == null || targetId == null) {
                      throw new BusinessException("SOURCE_TARGET_INVALID", "来源绑定对象参数不完整");
                  }
                  switch (targetType.trim().toLowerCase(Locale.ROOT)) {
                      case "person" -> validatePerson(clanId, targetId);
                      case "relationship" -> validateRelationship(clanId, targetId);
                      case "branch" -> validateBranch(clanId, targetId);
                      case "clan" -> validateClan(clanId, targetId);
                      case "generation_word" -> validateGenerationWord(clanId, targetId);
                      default -> throw new BusinessException("SOURCE_TARGET_TYPE_INVALID", "来源绑定对象类型不合法");
                  }
              }

              private void validatePerson(Long clanId, Long personId) {
                  PersonEntity person = personRepository.findByIdAndDeletedAtIsNull(personId)
                          .filter(item -> clanId.equals(item.getClanId()))
                          .orElseThrow(() -> new BusinessException("SOURCE_TARGET_CLAN_MISMATCH", "人物不存在或不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(person.getDataStatus(), "PERSON_NOT_OFFICIAL", "人物审核通过后才能绑定来源资料");
              }

              private void validateRelationship(Long clanId, Long relationshipId) {
                  RelationshipEntity relationship = relationshipRepository.findByIdAndClanIdAndDeletedAtIsNull(relationshipId, clanId)
                          .orElseThrow(() -> new BusinessException("SOURCE_TARGET_CLAN_MISMATCH", "关系不存在或不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(relationship.getDataStatus(), "RELATIONSHIP_NOT_OFFICIAL", "关系审核通过后才能绑定来源资料");
              }

              private void validateBranch(Long clanId, Long branchId) {
                  BranchEntity branch = branchRepository.findByIdAndClanId(branchId, clanId)
                          .orElseThrow(() -> new BusinessException("SOURCE_TARGET_CLAN_MISMATCH", "支派不存在或不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "BRANCH_NOT_OFFICIAL", "支派审核通过后才能绑定来源资料");
              }

              private void validateClan(Long clanId, Long targetId) {
                  if (!clanId.equals(targetId) || !clanRepository.existsById(targetId)) {
                      throw new BusinessException("SOURCE_TARGET_CLAN_MISMATCH", "宗族绑定对象无效");
                  }
              }

              private void validateGenerationWord(Long clanId, Long generationWordId) {
                  GenerationWordEntity word = generationWordRepository.findById(generationWordId)
                          .orElseThrow(() -> new BusinessException("GENERATION_WORD_NOT_FOUND", "字辈明细不存在"));
                  GenerationSchemeEntity scheme = generationSchemeRepository.findByIdAndClanId(word.getSchemeId(), clanId)
                          .orElseThrow(() -> new BusinessException("SOURCE_TARGET_CLAN_MISMATCH", "字辈不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(scheme.getStatus(), "GENERATION_SCHEME_NOT_OFFICIAL", "字辈方案审核通过后才能绑定来源资料");
              }
          }
          '''.replace('          ', ''))

          command = 'backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceBindingCommandApplicationService.java'
          replace(command, '''        SourceBindingResponse response = sourceApplicationService.bind(clanId, request, actorId);
                  validateTarget(clanId, request);
                  return response;''', '''        validateTarget(clanId, request);
                  return sourceApplicationService.bind(clanId, request, actorId);''')
          replace(command, '''        SourceBindingRevisionResponse response = sourceBindingReviewApplicationService.approve(
                          revisionId, request, actorId, requestId, clientIp
                  );
                  validateRevisionTarget(revisionId);
                  return response;''', '''        validateRevisionTarget(revisionId);
                  return sourceBindingReviewApplicationService.approve(
                          revisionId, request, actorId, requestId, clientIp
                  );''')

          evidence = 'backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceEvidenceApplicationService.java'
          ensure_import(evidence, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.branch.repository.BranchRepository;')
          replace(evidence, '        SourceEntity source = getSource(request.sourceId());\n        authorizationApplicationService.requirePermission', '        SourceEntity source = getSource(request.sourceId());\n        ApprovedStatusPolicy.requireApproved(source.getVerificationStatus(), "SOURCE_NOT_OFFICIAL", "来源审核通过后才能绑定业务对象");\n        authorizationApplicationService.requirePermission')
          replace(evidence, '                authorizationApplicationService.requireBranchPermission(source.getClanId(), actorId, person.getBranchId(), permissionCode);', '                ApprovedStatusPolicy.requireApproved(person.getDataStatus(), "PERSON_NOT_OFFICIAL", "人物审核通过后才能绑定来源资料");\n                authorizationApplicationService.requireBranchPermission(source.getClanId(), actorId, person.getBranchId(), permissionCode);', 1)
          replace(evidence, '                PersonEntity from = personRepository.findByIdAndDeletedAtIsNull(relationship.getFromPersonId())', '                ApprovedStatusPolicy.requireApproved(relationship.getDataStatus(), "RELATIONSHIP_NOT_OFFICIAL", "关系审核通过后才能绑定来源资料");\n                PersonEntity from = personRepository.findByIdAndDeletedAtIsNull(relationship.getFromPersonId())', 1)
          replace(evidence, '                authorizationApplicationService.requireBranchPermission(source.getClanId(), actorId, branch.getId(), permissionCode);', '                ApprovedStatusPolicy.requireApproved(branch.getStatus(), "BRANCH_NOT_OFFICIAL", "支派审核通过后才能绑定来源资料");\n                authorizationApplicationService.requireBranchPermission(source.getClanId(), actorId, branch.getId(), permissionCode);', 1)

          # Culture modules.
          culture_item = 'backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureItemApplicationService.java'
          ensure_import(culture_item, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.common.exception.BusinessException;')
          text = read(culture_item)
          pattern = r'    private void requireBranchInClan\(Long clanId, Long branchId\) \{.*?\n    \}'
          replacement = '''    private void requireBranchInClan(Long clanId, Long branchId) {
                  if (branchId == null) return;
                  BranchEntity branch = branchRepository.findByIdAndClanId(branchId, clanId)
                          .orElseThrow(() -> new BusinessException("CULTURE_ITEM_BRANCH_INVALID", "支派不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "CULTURE_ITEM_BRANCH_NOT_OFFICIAL", "所属支派审核通过后才能维护文化资料");
              }'''
          next_text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1: raise SystemExit('culture item branch method not patched')
          write(culture_item, next_text)

          migration = 'backend/genealogy-backend/src/main/java/com/genealogy/culture/application/MigrationEventApplicationService.java'
          ensure_import(migration, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.common.exception.BusinessException;')
          text = read(migration)
          pattern = r'    private BranchEntity requireBranch\(Long clanId, Long branchId\) \{.*?\n    \}'
          replacement = '''    private BranchEntity requireBranch(Long clanId, Long branchId) {
                  BranchEntity branch = branchRepository.findByIdAndClanId(branchId, clanId)
                          .orElseThrow(() -> new BusinessException("MIGRATION_EVENT_BRANCH_INVALID", "支派不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "MIGRATION_EVENT_BRANCH_NOT_OFFICIAL", "所属支派审核通过后才能维护迁徙事件");
                  return branch;
              }'''
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1: raise SystemExit('migration branch method not patched')
          old = '''        if (!Objects.equals(founder.getClanId(), clanId)) {
                      throw new BusinessException(
                              "MIGRATION_EVENT_FOUNDER_CLAN_MISMATCH",
                              "始迁祖不属于当前宗族"
                      );
                  }'''
          new = old + '''
                  ApprovedStatusPolicy.requireApproved(founder.getDataStatus(), "MIGRATION_EVENT_FOUNDER_NOT_OFFICIAL", "始迁祖审核通过后才能用于迁徙事件");'''
          if old not in text: raise SystemExit('migration founder anchor missing')
          write(migration, text.replace(old, new, 1))

          site = 'backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureSiteApplicationService.java'
          ensure_import(site, 'import com.genealogy.common.domain.ApprovedStatusPolicy;', 'import com.genealogy.common.exception.BusinessException;')
          text = read(site)
          pattern = r'    private void requireBranchInClan\(Long clanId, Long branchId\) \{.*?\n    \}'
          replacement = '''    private void requireBranchInClan(Long clanId, Long branchId) {
                  if (branchId == null) return;
                  BranchEntity branch = branchRepository.findByIdAndClanId(branchId, clanId)
                          .orElseThrow(() -> new BusinessException("CULTURE_SITE_BRANCH_INVALID", "支派不属于当前宗族"));
                  ApprovedStatusPolicy.requireApproved(branch.getStatus(), "CULTURE_SITE_BRANCH_NOT_OFFICIAL", "所属支派审核通过后才能维护文化场所");
              }'''
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1: raise SystemExit('culture site branch method not patched')
          old = '''        if (!Objects.equals(person.getClanId(), clanId)) {
                      throw new BusinessException("CULTURE_SITE_PERSON_CLAN_MISMATCH", "关联人物不属于当前宗族");
                  }'''
          new = old + '''
                  ApprovedStatusPolicy.requireApproved(person.getDataStatus(), "CULTURE_SITE_PERSON_NOT_OFFICIAL", "关联人物审核通过后才能用于文化场所");'''
          if old not in text: raise SystemExit('culture site person anchor missing')
          write(site, text.replace(old, new, 1))

          # Frontend: status must be explicit; empty status is never approved.
          status_file = 'frontend/genealogy-web/src/features/mvp1/domain/status.ts'
          replace(status_file, '  return !status || OFFICIAL_STATUSES.includes(status);', '  return OFFICIAL_STATUSES.includes(status);')

          source_service = 'frontend/genealogy-web/src/features/sources/sourceLibraryService.ts'
          replace(source_service, '''export type BranchOption = {
              id?: number;
              branchName?: string;
              branchPath?: string;
            };''', '''export type BranchOption = {
              id?: number;
              branchName?: string;
              branchPath?: string;
              status?: string;
              dataStatus?: string;
            };''')
          replace(source_service, '''export async function listBranches(clanId: string) {
              return toRows<BranchOption>(await apiClient.get(`/clans/${clanId}/branches`));
            }''', '''export async function listBranches(clanId: string) {
              return toRows<BranchOption>(await apiClient.get(`/clans/${clanId}/branches`))
                .filter(row => ['official', 'approved', 'active'].includes(String(row.status || row.dataStatus || '').trim().toLowerCase()));
            }''')

          culture_person = 'frontend/genealogy-web/src/features/culture/culturePersonService.ts'
          replace(culture_person, "    pageSize: '20'\n  });", "    pageSize: '20',\n    dataStatus: 'official'\n  });")

          person_edit = 'frontend/genealogy-web/src/features/persons/PersonEditPage.tsx'
          text = read(person_edit)
          helper_anchor = '''function isOfficialGenerationScheme(scheme: any) {
              const status = String(scheme.dataStatus || scheme.status || scheme.verificationStatus || '').toLowerCase();
              return ['official', 'active', 'approved'].includes(status);
            }'''
          helper = helper_anchor + '''

            function isOfficialBranch(branch: any) {
              const status = String(branch.status || branch.dataStatus || branch.verificationStatus || '').trim().toLowerCase();
              return ['official', 'active', 'approved'].includes(status);
            }'''
          if helper_anchor not in text: raise SystemExit('person edit helper anchor missing')
          text = text.replace(helper_anchor, helper, 1)
          text = text.replace('() => branches.map(branch => ({ value: String(branch.id), label: branchLabel(branch) }))', '() => branches.filter(isOfficialBranch).map(branch => ({ value: String(branch.id), label: branchLabel(branch) }))', 1)
          write(person_edit, text)

          # Import page: reject non-approved branch options before they reach workspaces.
          import_pages = []
          for candidate in Path('frontend/genealogy-web/src/features/imports').rglob('*.tsx'):
              content = candidate.read_text(encoding='utf-8')
              if '目标支派加载失败' in content and 'import-double-card-page' in content:
                  import_pages.append(candidate)
          if len(import_pages) != 1:
              raise SystemExit(f'import page resolution failed: {import_pages}')
          import_page = import_pages[0]
          text = import_page.read_text(encoding='utf-8')
          old = '        const records = Array.isArray(data) ? data : [];'
          new = "        const records = (Array.isArray(data) ? data : []).filter(branch => ['official', 'approved', 'active'].includes(String(branch.status || '').trim().toLowerCase()));"
          if old not in text: raise SystemExit('import records anchor missing')
          import_page.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Focused policy test.
          test_path = 'backend/genealogy-backend/src/test/java/com/genealogy/common/domain/ApprovedStatusPolicyTest.java'
          write(test_path, '''package com.genealogy.common.domain;

          import com.genealogy.common.exception.BusinessException;
          import org.junit.jupiter.api.Test;

          import static org.junit.jupiter.api.Assertions.assertFalse;
          import static org.junit.jupiter.api.Assertions.assertThrows;
          import static org.junit.jupiter.api.Assertions.assertTrue;

          class ApprovedStatusPolicyTest {

              @Test
              void acceptsOnlyExplicitApprovedStatuses() {
                  assertTrue(ApprovedStatusPolicy.isApproved("official"));
                  assertTrue(ApprovedStatusPolicy.isApproved(" APPROVED "));
                  assertTrue(ApprovedStatusPolicy.isApproved("active"));
                  assertFalse(ApprovedStatusPolicy.isApproved(null));
                  assertFalse(ApprovedStatusPolicy.isApproved(""));
