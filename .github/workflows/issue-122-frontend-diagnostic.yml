name: Issue 122 Frontend Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/issue-122-frontend-diagnostic.yml'
      - 'frontend/genealogy-web/**'

permissions:
  contents: read

jobs:
  frontend-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Run log model tests
        working-directory: frontend/genealogy-web
        run: npm run test:logs
      - name: Typecheck with focused output
        id: typecheck
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run typecheck > /tmp/issue-122-typecheck.log 2>&1
      - name: Print TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: grep -n -E 'error TS[0-9]+' /tmp/issue-122-typecheck.log | head -120 || tail -120 /tmp/issue-122-typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-122-typecheck-diagnostics
          path: /tmp/issue-122-typecheck.log
          if-no-files-found: error
      - name: Fail on TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
