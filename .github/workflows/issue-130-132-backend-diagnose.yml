name: Issue 130-132 Backend Diagnose

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply closure patch
        run: python3 .github/scripts/issue-130-132-backend-apply.py
      - name: Persist failure summary and remove diagnostic workflow
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          set +e
          mvn -q clean test >/tmp/test.log 2>&1
          status=$?
          set -e
          {
            echo '# Backend closure diagnostic'
            echo
            echo "Exit status: $status"
            echo
            echo '## Maven errors'
            grep -E '\[ERROR\]|COMPILATION ERROR|Failures:|Errors:' /tmp/test.log | tail -n 160 || true
            echo
            echo '## Surefire failures'
            python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          failures = []
          for report in sorted(Path('target/surefire-reports').glob('TEST-*.xml')):
              try:
                  root = ET.parse(report).getroot()
              except Exception:
                  continue
              for case in root.findall('testcase'):
                  node = case.find('failure')
                  if node is None:
                      node = case.find('error')
                  if node is not None:
                      failures.append((root.get('name'), case.get('name'), node.get('message') or ''))
          print(f'FAILURE_COUNT={len(failures)}')
          for suite, case, message in failures:
              print(f'FAILURE={suite}#{case}::{message[:2000]}')
          PY
          } > ../../../tasks/issue-130-132-backend-diagnostic.md
          cd ../../..
          rm .github/workflows/issue-130-132-backend-diagnose.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add tasks/issue-130-132-backend-diagnostic.md .github/workflows/issue-130-132-backend-diagnose.yml
          git commit -m 'chore(auth): record backend diagnostic'
          git push
