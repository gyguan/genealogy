name: Apply Issue 171 Review Fixes

on:
  push:
    branches:
      - agent/issue-171-review-fixes
    paths:
      - .github/workflows/issue-171-apply-review-fixes.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-171-review-fixes
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Apply focused fixes and tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"expected one match in {path}, found {text.count(old)}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          review = Path("backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureAwareSourceBindingReviewApplicationService.java")
          replace_once(review,
              "import com.genealogy.culture.domain.CulturePermissionPolicyService;\nimport com.genealogy.culture.domain.MigrationEventPermissionPolicyService;",
              "import com.genealogy.culture.domain.CulturePermissionPolicyService;\nimport com.genealogy.culture.domain.CultureSitePermissionPolicyService;\nimport com.genealogy.culture.domain.MigrationEventPermissionPolicyService;")
          replace_once(review,
              "import com.genealogy.culture.entity.CultureItemEntity;\nimport com.genealogy.culture.entity.MigrationEventEntity;",
              "import com.genealogy.culture.entity.CultureItemEntity;\nimport com.genealogy.culture.entity.CultureSiteEntity;\nimport com.genealogy.culture.entity.MigrationEventEntity;")
          replace_once(review,
              "import com.genealogy.culture.repository.CultureItemRepository;\nimport com.genealogy.culture.repository.MigrationEventRepository;",
              "import com.genealogy.culture.repository.CultureItemRepository;\nimport com.genealogy.culture.repository.CultureSiteRepository;\nimport com.genealogy.culture.repository.MigrationEventRepository;")
          replace_once(review,
              "    private final MigrationEventRepository migrationEventRepository;\n    private final MigrationEventPermissionPolicyService migrationPermissionPolicy;\n    private final ObjectMapper governedObjectMapper;",
              "    private final MigrationEventRepository migrationEventRepository;\n    private final MigrationEventPermissionPolicyService migrationPermissionPolicy;\n    private final CultureSiteRepository cultureSiteRepository;\n    private final CultureSitePermissionPolicyService cultureSitePermissionPolicy;\n    private final ObjectMapper governedObjectMapper;")
          replace_once(review,
              "            CulturePermissionPolicyService culturePermissionPolicy,\n            MigrationEventRepository migrationEventRepository,\n            MigrationEventPermissionPolicyService migrationPermissionPolicy\n    ) {",
              "            CulturePermissionPolicyService culturePermissionPolicy,\n            MigrationEventRepository migrationEventRepository,\n            MigrationEventPermissionPolicyService migrationPermissionPolicy,\n            CultureSiteRepository cultureSiteRepository,\n            CultureSitePermissionPolicyService cultureSitePermissionPolicy\n    ) {")
          replace_once(review,
              "        this.migrationEventRepository = migrationEventRepository;\n        this.migrationPermissionPolicy = migrationPermissionPolicy;\n        this.governedObjectMapper = objectMapper;",
              "        this.migrationEventRepository = migrationEventRepository;\n        this.migrationPermissionPolicy = migrationPermissionPolicy;\n        this.cultureSiteRepository = cultureSiteRepository;\n        this.cultureSitePermissionPolicy = cultureSitePermissionPolicy;\n        this.governedObjectMapper = objectMapper;")
          migration_block = '''        if (MigrationEventGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)) {
              MigrationEventEntity event = migrationEventRepository.findByIdAndDeletedAtIsNull(targetId)
                      .orElseThrow(() -> new BusinessException("MIGRATION_EVENT_NOT_FOUND", "迁徙事件不存在或不可见"));
              if (!Objects.equals(clanId, event.getClanId())) {
                  throw clanMismatch();
              }
              if (action == TargetAction.REVIEW) {
                  migrationPermissionPolicy.requireVisible(event, actorId);
              } else {
                  migrationPermissionPolicy.requireAction(
                          event,
                          actorId,
                          MigrationEventPermissionPolicyService.UPDATE
                  );
              }
              if (BINDING_ARCHIVED.equals(normalize(event.getDataStatus()))) {
                  throw archivedTarget();
              }
              return new CultureTarget(clanId, event.getBranchId(), normalizedType, targetId);
          }
          throw new BusinessException("SOURCE_TARGET_TYPE_UNSUPPORTED", "不支持的文化对象类型");'''
          site_block = '''        if (MigrationEventGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)) {
              MigrationEventEntity event = migrationEventRepository.findByIdAndDeletedAtIsNull(targetId)
                      .orElseThrow(() -> new BusinessException("MIGRATION_EVENT_NOT_FOUND", "迁徙事件不存在或不可见"));
              if (!Objects.equals(clanId, event.getClanId())) {
                  throw clanMismatch();
              }
              if (action == TargetAction.REVIEW) {
                  migrationPermissionPolicy.requireVisible(event, actorId);
              } else {
                  migrationPermissionPolicy.requireAction(
                          event,
                          actorId,
                          MigrationEventPermissionPolicyService.UPDATE
                  );
              }
              if (BINDING_ARCHIVED.equals(normalize(event.getDataStatus()))) {
                  throw archivedTarget();
              }
              return new CultureTarget(clanId, event.getBranchId(), normalizedType, targetId);
          }
          if (CultureSiteGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)) {
              CultureSiteEntity site = cultureSiteRepository.findByIdAndDeletedAtIsNull(targetId)
                      .orElseThrow(() -> new BusinessException("CULTURE_SITE_NOT_FOUND", "文化场所不存在或不可见"));
              if (!Objects.equals(clanId, site.getClanId())) {
                  throw clanMismatch();
              }
              if (action == TargetAction.REVIEW) {
                  cultureSitePermissionPolicy.requireVisible(site, actorId);
              } else {
                  cultureSitePermissionPolicy.requireAction(
                          site,
                          actorId,
                          CultureSitePermissionPolicyService.UPDATE
                  );
              }
              if (BINDING_ARCHIVED.equals(normalize(site.getDataStatus()))) {
                  throw archivedTarget();
              }
              return new CultureTarget(clanId, site.getBranchId(), normalizedType, targetId);
          }
          throw new BusinessException("SOURCE_TARGET_TYPE_UNSUPPORTED", "不支持的文化对象类型");'''
          replace_once(review, migration_block, site_block)
          replace_once(review,
              "        return CultureItemGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)\n                || MigrationEventGovernanceApplicationService.TARGET_TYPE.equals(normalizedType);",
              "        return CultureItemGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)\n                || MigrationEventGovernanceApplicationService.TARGET_TYPE.equals(normalizedType)\n                || CultureSiteGovernanceApplicationService.TARGET_TYPE.equals(normalizedType);")

          policy = Path("backend/genealogy-backend/src/main/java/com/genealogy/culture/domain/CultureSitePermissionPolicyService.java")
          replace_once(policy,
              "    public boolean canCreate(Long clanId, Long branchId, Long actorId) {\n        return canOnScope(actorId, clanId, branchId, CREATE);\n    }",
              "    public boolean canCreate(Long clanId, Long branchId, Long actorId) {\n        return canOnScope(actorId, clanId, branchId, CREATE);\n    }\n\n    @Transactional(readOnly = true)\n    public boolean canUpdate(Long clanId, Long branchId, Long actorId) {\n        return canOnScope(actorId, clanId, branchId, UPDATE);\n    }")

          app = Path("backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureSiteApplicationService.java")
          replace_once(app,
              '''        requireBranchInClan(site.getClanId(), input.branchId());
          validateRelatedPerson(site.getClanId(), input.branchId(), input.relatedPersonId());
          if (CultureSiteDomainService.STATUS_OFFICIAL.equals(normalize(site.getDataStatus()))) {
              governanceApplicationService.submitOfficialUpdate(site, request, actorId, requestId, clientIp);
              return getDetail(siteId, actorId);
          }
          domainService.requireDirectlyMutable(site);
          domainService.requireExpectedVersion(site, request.version());
          if (!permissionPolicyService.canCreate(site.getClanId(), input.branchId(), actorId)) {
              throw new BusinessException("AUTH_FORBIDDEN", "您暂无权限将文化场所移动到该范围");
          }''',
              '''        requireBranchInClan(site.getClanId(), input.branchId());
          validateRelatedPerson(site.getClanId(), input.branchId(), input.relatedPersonId());
          if (!permissionPolicyService.canUpdate(site.getClanId(), input.branchId(), actorId)) {
              throw new BusinessException("AUTH_FORBIDDEN", "您暂无权限将文化场所移动到该范围");
          }
          if (CultureSiteDomainService.STATUS_OFFICIAL.equals(normalize(site.getDataStatus()))) {
              governanceApplicationService.submitOfficialUpdate(site, request, actorId, requestId, clientIp);
              return getDetail(siteId, actorId);
          }
          domainService.requireDirectlyMutable(site);
          domainService.requireExpectedVersion(site, request.version());''')

          review_test = Path("backend/genealogy-backend/src/test/java/com/genealogy/culture/application/CultureAwareSourceBindingReviewApplicationServiceTest.java")
          replace_once(review_test,
              "import com.genealogy.culture.domain.CulturePermissionPolicyService;\nimport com.genealogy.culture.domain.MigrationEventPermissionPolicyService;",
              "import com.genealogy.culture.domain.CulturePermissionPolicyService;\nimport com.genealogy.culture.domain.CultureSitePermissionPolicyService;\nimport com.genealogy.culture.domain.MigrationEventPermissionPolicyService;")
          replace_once(review_test,
              "import com.genealogy.culture.entity.CultureItemEntity;\nimport com.genealogy.culture.entity.MigrationEventEntity;",
              "import com.genealogy.culture.entity.CultureItemEntity;\nimport com.genealogy.culture.entity.CultureSiteEntity;\nimport com.genealogy.culture.entity.MigrationEventEntity;")
          replace_once(review_test,
              "import com.genealogy.culture.repository.CultureItemRepository;\nimport com.genealogy.culture.repository.MigrationEventRepository;",
              "import com.genealogy.culture.repository.CultureItemRepository;\nimport com.genealogy.culture.repository.CultureSiteRepository;\nimport com.genealogy.culture.repository.MigrationEventRepository;")
          replace_once(review_test,
              "    @Mock private MigrationEventRepository migrationEventRepository;\n    @Mock private MigrationEventPermissionPolicyService migrationPermissionPolicyService;",
              "    @Mock private MigrationEventRepository migrationEventRepository;\n    @Mock private MigrationEventPermissionPolicyService migrationPermissionPolicyService;\n    @Mock private CultureSiteRepository cultureSiteRepository;\n    @Mock private CultureSitePermissionPolicyService cultureSitePermissionPolicyService;")
          replace_once(review_test,
              "                migrationEventRepository,\n                migrationPermissionPolicyService\n        );",
              "                migrationEventRepository,\n                migrationPermissionPolicyService,\n                cultureSiteRepository,\n                cultureSitePermissionPolicyService\n        );")
          marker = '''    private AtomicReference<RevisionEntity> prepareCreate(
          '''
          site_test = '''    @Test
              void submitCultureSiteCreateShouldUseReviewedBindingPathAndSitePermission() {
                  CultureSiteEntity site = new CultureSiteEntity();
                  site.setId(300L);
                  site.setClanId(1L);
                  site.setBranchId(29L);
                  site.setDataStatus("draft");

                  SourceEntity source = officialSource();
                  AtomicReference<RevisionEntity> revisionRef = prepareCreate(1L, 10L, "culture_site", 300L, source);
                  when(cultureSiteRepository.findByIdAndDeletedAtIsNull(300L)).thenReturn(Optional.of(site));

                  service.submitCreate(
                          1L,
                          request("culture_site", 300L),
                          2L,
                          "req-site",
                          "127.0.0.1"
                  );

                  verify(cultureSitePermissionPolicyService).requireAction(
                          site,
                          2L,
                          CultureSitePermissionPolicyService.UPDATE
                  );
                  ArgumentCaptor<ReviewTaskEntity> task = ArgumentCaptor.forClass(ReviewTaskEntity.class);
                  verify(reviewTaskRepository).save(task.capture());
                  assertThat(task.getValue().getBranchId()).isEqualTo(29L);
                  assertThat(revisionRef.get().getAfterData()).contains("\\\"targetType\\\":\\\"culture_site\\\"");
              }

              private AtomicReference<RevisionEntity> prepareCreate(
          '''
          replace_once(review_test, marker, site_test)

          app_test = Path("backend/genealogy-backend/src/test/java/com/genealogy/culture/application/CultureSiteApplicationServiceTest.java")
          app_test.write_text('''package com.genealogy.culture.application;

          import com.genealogy.auth.application.AuthorizationApplicationService;
          import com.genealogy.auth.application.RbacAuthorizationApplicationService;
          import com.genealogy.auth.repository.AppUserRepository;
          import com.genealogy.branch.entity.BranchEntity;
          import com.genealogy.branch.repository.BranchRepository;
          import com.genealogy.clan.repository.ClanRepository;
          import com.genealogy.common.exception.BusinessException;
          import com.genealogy.culture.domain.CultureSiteDomainService;
          import com.genealogy.culture.domain.CultureSitePermissionPolicyService;
          import com.genealogy.culture.dto.CultureSiteUpdateRequest;
          import com.genealogy.culture.entity.CultureSiteEntity;
          import com.genealogy.culture.repository.CultureSiteRepository;
          import com.genealogy.operationlog.application.OperationLogApplicationService;
          import com.genealogy.person.repository.PersonRepository;
          import com.genealogy.review.repository.ReviewTaskRepository;
          import com.genealogy.review.repository.RevisionRepository;
          import com.genealogy.source.repository.SourceAttachmentRepository;
          import com.genealogy.source.repository.SourceBindingRepository;
          import com.genealogy.source.repository.SourceRepository;
          import org.junit.jupiter.api.BeforeEach;
          import org.junit.jupiter.api.Test;
          import org.junit.jupiter.api.extension.ExtendWith;
          import org.mockito.Mock;
          import org.mockito.junit.jupiter.MockitoExtension;

          import java.util.Optional;

          import static org.junit.jupiter.api.Assertions.assertEquals;
          import static org.junit.jupiter.api.Assertions.assertThrows;
          import static org.mockito.ArgumentMatchers.any;
          import static org.mockito.ArgumentMatchers.eq;
          import static org.mockito.Mockito.never;
          import static org.mockito.Mockito.verify;
          import static org.mockito.Mockito.when;

          @ExtendWith(MockitoExtension.class)
          class CultureSiteApplicationServiceTest {

              @Mock private CultureSiteRepository siteRepository;
              @Mock private CultureSitePermissionPolicyService permissionPolicyService;
              @Mock private CultureSiteGovernanceApplicationService governanceApplicationService;
              @Mock private ClanRepository clanRepository;
              @Mock private BranchRepository branchRepository;
              @Mock private PersonRepository personRepository;
              @Mock private AppUserRepository appUserRepository;
              @Mock private SourceBindingRepository sourceBindingRepository;
              @Mock private SourceRepository sourceRepository;
              @Mock private SourceAttachmentRepository sourceAttachmentRepository;
              @Mock private RevisionRepository revisionRepository;
              @Mock private ReviewTaskRepository reviewTaskRepository;
              @Mock private AuthorizationApplicationService authorizationApplicationService;
              @Mock private RbacAuthorizationApplicationService rbacAuthorizationApplicationService;
              @Mock private OperationLogApplicationService operationLogApplicationService;

              private CultureSiteApplicationService service;

              @BeforeEach
              void setUp() {
                  service = new CultureSiteApplicationService(
                          siteRepository,
                          new CultureSiteDomainService(),
                          permissionPolicyService,
                          governanceApplicationService,
                          clanRepository,
                          branchRepository,
                          personRepository,
                          appUserRepository,
                          sourceBindingRepository,
                          sourceRepository,
                          sourceAttachmentRepository,
                          revisionRepository,
                          reviewTaskRepository,
                          authorizationApplicationService,
                          rbacAuthorizationApplicationService,
                          operationLogApplicationService
                  );
              }

              @Test
              void rejectsOfficialMoveToUnauthorizedBranchBeforeCreatingRevision() {
                  CultureSiteEntity site = new CultureSiteEntity();
                  site.setId(100L);
                  site.setClanId(1L);
                  site.setBranchId(10L);
                  site.setDataStatus("official");
                  site.setVersion(0L);

                  BranchEntity targetBranch = new BranchEntity();
                  targetBranch.setId(20L);
                  targetBranch.setClanId(1L);

                  when(siteRepository.findByIdAndDeletedAtIsNull(100L)).thenReturn(Optional.of(site));
                  when(branchRepository.findByIdAndClanId(20L, 1L)).thenReturn(Optional.of(targetBranch));
                  when(permissionPolicyService.canUpdate(1L, 20L, 7L)).thenReturn(false);

                  CultureSiteUpdateRequest request = new CultureSiteUpdateRequest(
                          20L, null, "ancestral_hall", "张氏宗祠", "长沙", "清代", "存续",
                          "摘要", "说明", null, null, "high", "clan_only", "normal", false, 0, 0L
                  );

                  BusinessException exception = assertThrows(
                          BusinessException.class,
                          () -> service.update(100L, request, 7L, "req", "127.0.0.1")
                  );

                  assertEquals("AUTH_FORBIDDEN", exception.getCode());
                  verify(governanceApplicationService, never()).submitOfficialUpdate(
                          eq(site), any(CultureSiteUpdateRequest.class), eq(7L), eq("req"), eq("127.0.0.1")
                  );
              }
          }
