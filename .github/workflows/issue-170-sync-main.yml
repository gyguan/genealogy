name: Issue 170 Sync Main

on:
  push:
    branches: ["agent/issue-170-migration-timeline"]
    paths: [".github/workflows/issue-170-sync-main.yml"]

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-170-migration-timeline
          fetch-depth: 0
      - name: Merge latest main and reconcile shared culture adapters
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main || true

          SOURCE="backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureAwareSourceBindingReviewApplicationService.java"
          TRACE="backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureAwareTrackingTraceApplicationService.java"
          PACKAGE="frontend/genealogy-web/package.json"

          git checkout --ours "$SOURCE" "$TRACE" "$PACKAGE"

          python3 <<'PY'
          from pathlib import Path
          import json

          def replace_once(text, old, new, label):
              if old not in text:
                  if new in text:
                      return text
                  raise SystemExit(f"missing replacement anchor: {label}")
              return text.replace(old, new, 1)

          source_path = Path("backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureAwareSourceBindingReviewApplicationService.java")
          s = source_path.read_text()
          s = replace_once(s,
              "import com.genealogy.operationlog.application.OperationLogApplicationService;\n",
              "import com.genealogy.operationlog.application.OperationLogApplicationService;\nimport com.genealogy.operationlog.application.OperationTraceContext;\n",
              "source trace import")
          s = replace_once(s,
              '"提交文化对象来源绑定审核", revision.getDiffSummary(), requestId, clientIp\n        );',
              '"提交文化对象来源绑定审核", revision.getDiffSummary(), requestId, clientIp,\n                trace(revision, task, "submitted")\n        );',
              "source create log trace")
          s = replace_once(s,
              '"提交文化对象来源绑定变更", revision.getDiffSummary(), requestId, clientIp\n        );',
              '"提交文化对象来源绑定变更", revision.getDiffSummary(), requestId, clientIp,\n                trace(revision, task, "submitted")\n        );',
              "source replace log trace")
          s = replace_once(s,
              "        task.setRevisionId(revision.getId());\n        task.setReviewLevel(1);",
              "        task.setRevisionId(revision.getId());\n        task.setTraceId(revision.getTraceId());\n        task.setReviewLevel(1);",
              "source task trace")
          s = replace_once(s,
              "                revision.getSubmitterId(), revision.getSubmitTime(), revision.getApprovedAt(), revision.getRejectedReason()\n        );\n    }\n\n    private String toJson",
              "                revision.getSubmitterId(), revision.getSubmitTime(), revision.getApprovedAt(), revision.getRejectedReason(), revision.getTraceId()\n        );\n    }\n\n    private OperationTraceContext trace(RevisionEntity revision, ReviewTaskEntity task, String result) {\n        String businessTargetType = revision.getTargetType();\n        Long businessTargetId = revision.getTargetId();\n        if (\"create\".equals(revision.getChangeType()) && revision.getAfterData() != null) {\n            try {\n                JsonNode data = governedObjectMapper.readTree(revision.getAfterData());\n                businessTargetType = normalize(data.path(\"targetType\").asText(null));\n                businessTargetId = data.path(\"targetId\").isIntegralNumber()\n                        ? data.path(\"targetId\").longValue()\n                        : null;\n            } catch (JsonProcessingException exception) {\n                throw new BusinessException(\"SOURCE_BINDING_REVISION_DATA_INVALID\", \"来源绑定变更数据无法解析\");\n            }\n        }\n        return OperationTraceContext.of(\n                revision.getTraceId(), revision.getId(), task == null ? null : task.getId(),\n                businessTargetType, businessTargetId, result\n        );\n    }\n\n    private String toJson",
              "source response and trace helper")
          source_path.write_text(s)

          trace_path = Path("backend/genealogy-backend/src/main/java/com/genealogy/culture/application/CultureAwareTrackingTraceApplicationService.java")
          t = trace_path.read_text()
          t = replace_once(t,
              "import com.genealogy.tracking.dto.TrackingTraceDetailResponse;\n",
              "import com.genealogy.tracking.dto.TrackingTraceDetailResponse;\nimport com.genealogy.tracking.dto.TrackingTraceDetailResponse.ChangeChain;\n",
              "tracking chain import")
          t = replace_once(t,
              "import java.util.Objects;\n",
              "import java.util.Objects;\nimport java.util.UUID;\n",
              "tracking uuid import")
          t = replace_once(t,
              "                revision.getRejectedReason()\n        )).toList();",
              "                revision.getRejectedReason(), revision.getTraceId()\n        )).toList();",
              "tracking revision trace")
          t = replace_once(t,
              "                task.getReviewComment(), task.getCreatedAt(), task.getReviewedAt()\n        )).toList();",
              "                task.getReviewComment(), task.getCreatedAt(), task.getReviewedAt(), task.getTraceId()\n        )).toList();",
              "tracking task trace")
          t = replace_once(t,
              "        List<TimelineEvent> timeline = timeline(targetType, revisions, tasks, bindings, logs, actorNames);\n        List<String> truncated",
              "        List<TimelineEvent> timeline = timeline(targetType, revisions, tasks, bindings, logs, actorNames);\n        List<ChangeChain> changeChains = changeChains(revisions, tasks, timeline);\n        List<String> truncated",
              "tracking chain creation")
          t = replace_once(t,
              "        TraceCoverage coverage = new TraceCoverage(\n                truncated.isEmpty() ? \"complete\" : \"partial\",\n                truncated.isEmpty(),\n                historyFrom,\n                List.copyOf(truncated),\n                List.of(),\n                List.copyOf(notes)\n        );",
              "        boolean legacyTrace = revisions.stream().anyMatch(revision -> revision.getTraceId() == null);\n        List<String> missing = legacyTrace ? List.of(\"traceIds\") : List.of();\n        if (legacyTrace) notes.add(\"部分历史文化对象版本缺少稳定 trace_id，按独立 legacy 链路展示\");\n        boolean complete = truncated.isEmpty() && missing.isEmpty();\n        TraceCoverage coverage = new TraceCoverage(\n                complete ? \"complete\" : \"partial\",\n                complete,\n                historyFrom,\n                List.copyOf(truncated),\n                missing,\n                List.copyOf(notes)\n        );",
              "tracking coverage")
          t = replace_once(t,
              "                summary, currentStatus, timeline, revisionItems, reviewTaskItems,",
              "                summary, currentStatus, timeline, changeChains, revisionItems, reviewTaskItems,",
              "tracking response chain")
          t = replace_once(t,
              "                actors.get(revision.getSubmitterId()), revision.getStatus()\n        )));",
              "                actors.get(revision.getSubmitterId()), revision.getStatus(), revision.getTraceId(),\n                revision.getId(), null, \"submitted\"\n        )));",
              "tracking revision event")
          t = replace_once(t,
              "                actors.get(task.getReviewerId()), task.getStatus()\n        )));",
              "                actors.get(task.getReviewerId()), task.getStatus(), task.getTraceId(), task.getRevisionId(),\n                task.getId(), task.getReviewedAt() == null ? \"submitted\" : task.getStatus()\n        )));",
              "tracking task event")
          t = replace_once(t,
              "                actors.get(binding.getCreatedBy()), binding.getBindingStatus()\n        )));",
              "                actors.get(binding.getCreatedBy()), binding.getBindingStatus(), null, null, null, null\n        )));",
              "tracking binding event")
          t = replace_once(t,
              "                log.summary(), log.detail(), log.createdAt(), log.actorDisplayName(), log.resultStatus()\n        )));",
              "                log.summary(), log.detail(), log.createdAt(), log.actorDisplayName(), log.resultStatus(),\n                log.traceId(), log.revisionId(), log.reviewTaskId(), log.eventResult()\n        )));",
              "tracking log event")
          chain_method = '''\n    private List<ChangeChain> changeChains(\n            List<RevisionEntity> revisions,\n            List<ReviewTaskEntity> tasks,\n            List<TimelineEvent> timeline\n    ) {\n        Map<Long, List<ReviewTaskEntity>> tasksByRevision = tasks.stream()\n                .filter(task -> task.getRevisionId() != null)\n                .collect(Collectors.groupingBy(ReviewTaskEntity::getRevisionId));\n        return revisions.stream().map(revision -> {\n            List<ReviewTaskEntity> related = tasksByRevision.getOrDefault(revision.getId(), List.of());\n            List<Long> taskIds = related.stream().map(ReviewTaskEntity::getId).filter(Objects::nonNull).toList();\n            UUID traceId = revision.getTraceId();\n            boolean inconsistent = traceId != null && related.stream().anyMatch(task -> !traceId.equals(task.getTraceId()));\n            List<TimelineEvent> events = timeline.stream().filter(event ->\n                    traceId != null && traceId.equals(event.traceId())\n                            || Objects.equals(revision.getId(), event.revisionId())\n                            || event.reviewTaskId() != null && taskIds.contains(event.reviewTaskId())\n            ).toList();\n            LocalDateTime completedAt = events.stream().map(TimelineEvent::occurredAt)\n                    .filter(Objects::nonNull).max(LocalDateTime::compareTo).orElse(revision.getApprovedAt());\n            return new ChangeChain(\n                    traceId == null ? \"legacy-revision:\" + revision.getId() : \"trace:\" + traceId,\n                    traceId, traceId == null ? \"legacy_partial\" : inconsistent ? \"inconsistent\" : \"complete\",\n                    revision.getId(), taskIds, revision.getTargetType(), revision.getTargetId(), revision.getStatus(),\n                    revision.getSubmitTime(), completedAt, events.stream().map(TimelineEvent::eventKey).toList()\n            );\n        }).sorted(Comparator.comparing(ChangeChain::startedAt, Comparator.nullsLast(Comparator.reverseOrder())))\n                .toList();\n    }\n'''
          t = replace_once(t,
              "\n    private Map<Long, String> actorNames(",
              chain_method + "\n    private Map<Long, String> actorNames(",
              "tracking chain helper")
          trace_path.write_text(t)

          package_path = Path("frontend/genealogy-web/package.json")
          package = json.loads(package_path.read_text())
          package["scripts"]["test:tree"] = "rm -rf .tree-test && npx tsc src/features/tree/lineageGraphModel.ts src/features/tree/lineageRequestState.ts src/features/tree/lineageSemanticsModel.ts --ignoreConfig --target ES2020 --module ESNext --moduleResolution Bundler --outDir .tree-test --skipLibCheck && node --test src/features/tree/lineageGraphModel.test.mjs src/features/tree/lineageRequestState.test.mjs src/features/tree/lineageSemanticsModel.test.mjs; status=$?; rm -rf .tree-test; exit $status"
          package["scripts"]["test:migration"] = "playwright test e2e/migration-timeline.spec.ts"
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n")
          PY

          git add -A
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain"
            git diff --name-only --diff-filter=U
            exit 1
          fi
          rm -f .github/workflows/issue-170-sync-main.yml
          git add -A
          git commit -m "chore(issue-170): sync latest main trace lifecycle"
          git push origin HEAD:agent/issue-170-migration-timeline

      - name: Compile backend after reconciliation
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package
