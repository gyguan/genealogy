name: Run Source Binding Action Refinement

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-binding-action-refinement.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          script = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script.splitlines())
          exec(compile(script, 'apply-binding-action-refinement.py', 'exec'))
          PY
      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/review/repository/RevisionRepository.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/dto/SourceBindingSummaryResponse.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceApplicationService.java \
            backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceApplicationServiceTest.java \
            frontend/genealogy-web/src/features/sources/sourceLibraryService.ts \
            frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx \
            docs/api/openapi.json
          git commit -m "refactor(source): clarify binding review actions"
          git push origin HEAD:${{ github.head_ref }}
