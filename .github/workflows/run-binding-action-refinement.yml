name: Run Source Binding Action Refinement

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused changes
        shell: bash
        run: |
          set +e
          python .github/scripts/apply_binding_action_refinement.py > .github/binding-refinement-error.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/binding-refinement-error.txt
            git commit -m "chore: capture binding refinement error"
            git push origin HEAD:${{ github.head_ref }}
            exit 0
          fi
          rm -f .github/binding-refinement-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/review/repository/RevisionRepository.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/dto/SourceBindingSummaryResponse.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceApplicationService.java \
            backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceApplicationServiceTest.java \
            frontend/genealogy-web/src/features/sources/sourceLibraryService.ts \
            frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx \
            docs/api/openapi.json
          git commit -m "refactor(source): clarify binding review actions"
          git push origin HEAD:${{ github.head_ref }}
