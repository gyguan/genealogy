name: Run Source Binding Action Refinement

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Prepare focused script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/apply_binding_action_refinement.py')
          text = path.read_text(encoding='utf-8')
          marker = '\nopenapi_path = Path("docs/api/openapi.json")'
          prefix = text.split(marker, 1)[0]
          replacement = [
              'openapi_path = Path("docs/api/openapi.json")',
              'openapi = json.loads(openapi_path.read_text(encoding="utf-8"))',
              'schema = openapi.get("components", {}).get("schemas", {}).get("SourceBindingSummaryResponse")',
              'if schema is not None:',
              '    properties = schema.setdefault("properties", {})',
              '    properties["hasPendingRevision"] = {',
              '        "type": "boolean",',
              '        "description": "当前绑定是否存在待审核的变更或解除申请",',
              '    }',
              '    properties["pendingChangeType"] = {',
              '        "type": "string",',
              '        "nullable": True,',
              '        "enum": ["replace", "delete"],',
              '        "description": "待审核变更类型：replace-变更绑定，delete-解除绑定",',
              '    }',
              '    openapi_path.write_text(json.dumps(openapi, ensure_ascii=False, indent=2) + "\\n", encoding="utf-8")',
          ]
          path.write_text(prefix + '\n' + '\n'.join(replacement) + '\n', encoding='utf-8')
          PY
      - name: Apply focused changes
        shell: bash
        run: |
          set +e
          python .github/scripts/apply_binding_action_refinement.py > .github/binding-refinement-error.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/binding-refinement-error.txt
            git commit -m "chore: capture binding refinement error"
            git push origin HEAD:${{ github.head_ref }}
            exit 0
          fi
          rm -f .github/binding-refinement-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u .github/binding-refinement-error.txt
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/review/repository/RevisionRepository.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/dto/SourceBindingSummaryResponse.java \
            backend/genealogy-backend/src/main/java/com/genealogy/source/application/SourceApplicationService.java \
            backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceApplicationServiceTest.java \
            frontend/genealogy-web/src/features/sources/sourceLibraryService.ts \
            frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx \
            docs/api/openapi.json
          git commit -m "refactor(source): clarify binding review actions"
          git push origin HEAD:${{ github.head_ref }}
