name: Issue 108 Generate Integration

on:
  push:
    branches:
      - agent/issue-108-bulk-failure-handling
    paths:
      - '.github/workflows/issue-108-generate.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-108-bulk-failure-handling
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Integrate bulk UI and generate contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def patch(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'missing patch target in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          panel = 'frontend/genealogy-web/src/features/imports/ImportJobManagementPanel.tsx'
          patch(panel,
                "import { useEffect, useState } from 'react';\n",
                "import { useEffect, useState } from 'react';\nimport type { Key } from 'react';\n")
          patch(panel,
                "import { importFileFormatOptions, importFileFormatText, importTypeOptions, importTypeText } from './import-type-registry';\n",
                "import { importFileFormatOptions, importFileFormatText, importTypeOptions, importTypeText } from './import-type-registry';\nimport { ImportFailureBulkActions } from './ImportFailureBulkActions';\n")
          patch(panel,
                "  const [rowLoading, setRowLoading] = useState(false);\n",
                "  const [rowLoading, setRowLoading] = useState(false);\n  const [selectedRowKeys, setSelectedRowKeys] = useState<Key[]>([]);\n")
          patch(panel,
                "    setEditingRow(null);\n  }\n",
                "    setEditingRow(null);\n    setSelectedRowKeys([]);\n  }\n")
          patch(panel,
                "      setRows(page.records || []);\n      setRowTotal(page.total || 0);\n",
                "      setRows(page.records || []);\n      setRowTotal(page.total || 0);\n      setSelectedRowKeys([]);\n")
          patch(panel,
                "          {(selectedJob.failureCount || 0) > 0 ? (\n            <Table<ImportJobRow>\n",
                "          {(selectedJob.failureCount || 0) > 0 ? (\n            <>\n              <ImportFailureBulkActions\n                notify={notify}\n                clanId={workspace.clanId}\n                jobId={selectedJob.id}\n                selectedRows={rows.filter(row => selectedRowKeys.includes(row.id))}\n                totalFailures={rowTotal}\n                editable={String(selectedJob.processingStatus || '').toLowerCase() === 'correction_required' && ['not_submitted', 'rejected'].includes(String(selectedJob.reviewStatus || 'not_submitted').toLowerCase())}\n                onChanged={async () => {\n                  setSelectedRowKeys([]);\n                  await refreshDetail(selectedJob.id);\n                  await loadRows(selectedJob.id, rowPageNo, rowPageSize);\n                  await loadJobs();\n                }}\n              />\n              <Table<ImportJobRow>\n")
          patch(panel,
                "              dataSource={rows}\n              pagination=",
                "              dataSource={rows}\n              rowSelection={{\n                selectedRowKeys,\n                onChange: keys => setSelectedRowKeys(keys),\n                getCheckboxProps: row => ({ disabled: !retryable(row, selectedJob) })\n              }}\n              pagination=")
          patch(panel,
                "              scroll={{ x: 'max-content' }}\n            />\n          ) : <Empty",
                "              scroll={{ x: 'max-content' }}\n              />\n            </>\n          ) : <Empty")

          review = 'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobReviewApplicationService.java'
          patch(review,
                '                .append("，草稿：").append(value(job.getSuccessCount())).append(" 条，第 ")\n                .append(reviewRound).append(" 轮审核");',
                '                .append("，草稿：").append(value(job.getSuccessCount())).append(" 条")\n                .append("，排除：").append(importJobRowRepository.countByJobIdAndRowStatus(job.getId(), ImportJobRowEntity.STATUS_EXCLUDED)).append(" 条，第 ")\n                .append(reviewRound).append(" 轮审核");')
          PY

          node scripts/api/generate-frontend-client.mjs
          node scripts/api/generate-import-execution-types.mjs
          node scripts/api/generate-import-failure-types.mjs

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobReviewApplicationService.java \
            frontend/genealogy-web/src/features/imports/ImportJobManagementPanel.tsx \
            frontend/genealogy-web/src/shared/api/generated/api-contract.ts \
            frontend/genealogy-web/src/shared/api/generated/import-execution-types.ts \
            frontend/genealogy-web/src/shared/api/generated/import-failure-types.ts
          git commit -m "feat(issue-108): integrate bulk remediation UI and generated contracts"
          git push origin HEAD:agent/issue-108-bulk-failure-handling
