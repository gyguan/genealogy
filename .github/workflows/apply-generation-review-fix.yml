name: Apply Generation Review Fix

on:
  push:
    branches:
      - agent/fix-generation-scheme-review
    paths:
      - '.github/workflows/apply-generation-review-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-generation-review-fix
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-generation-scheme-review
          fetch-depth: 0
      - name: Patch generation scheme revision apply
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('backend/genealogy-backend/src/main/java/com/genealogy/review/application/RevisionApplyService.java')
          source = path.read_text()
          old = '''    private void applyGenerationScheme(AuditRecordEntity revision) {
              GenerationSchemeEntity snapshot = readPayload(revision.getNewPayload(), GenerationSchemeEntity.class);
              if (snapshot == null) {
                  genSchemeRepository.findById(revision.getTargetId()).ifPresent(entity -> {
                      entity.setStatus(STATUS_OFFICIAL);
                      genSchemeRepository.save(entity);
                  });
                  return;
              }
              snapshot.setId(revision.getTargetId());
              snapshot.setClanId(revision.getClanId());
              snapshot.setStatus(STATUS_OFFICIAL);
              genSchemeRepository.save(snapshot);
          }
          '''
          new = '''    private void applyGenerationScheme(AuditRecordEntity revision) {
              GenerationSchemeEntity snapshot = readGenerationSchemePayload(revision.getNewPayload());
              if (snapshot == null) {
                  genSchemeRepository.findById(revision.getTargetId()).ifPresent(entity -> {
                      entity.setStatus(STATUS_OFFICIAL);
                      genSchemeRepository.save(entity);
                  });
                  return;
              }
              snapshot.setId(revision.getTargetId());
              snapshot.setClanId(revision.getClanId());
              snapshot.setStatus(STATUS_OFFICIAL);
              genSchemeRepository.save(snapshot);
          }
          '''
          if old not in source:
              raise SystemExit('applyGenerationScheme block not found')
          source = source.replace(old, new)
          marker = '''    private PersonRevisionSnapshot readPersonRevisionSnapshot(String payload) {
          '''
          helper = '''    private GenerationSchemeEntity readGenerationSchemePayload(String payload) {
              if (payload == null || payload.isBlank()) return null;
              try {
                  JsonNode root = objectMapper.readTree(payload);
                  if (root == null || root.isNull()) return null;
                  JsonNode schemeNode = root.isObject() && root.has("scheme") ? root.get("scheme") : root;
                  if (schemeNode == null || schemeNode.isNull() || !schemeNode.isObject()) {
                      throw new BusinessException("REVISION_PAYLOAD_INVALID", "generation scheme revision payload invalid");
                  }
                  GenerationSchemeEntity scheme = objectMapper.treeToValue(schemeNode, GenerationSchemeEntity.class);
                  if (scheme == null || scheme.getSchemeName() == null || scheme.getSchemeName().isBlank()) {
                      throw new BusinessException("REVISION_PAYLOAD_INVALID", "generation scheme revision payload missing scheme name");
                  }
                  return scheme;
              } catch (JsonProcessingException ex) {
                  throw new BusinessException("REVISION_PAYLOAD_INVALID", "revision payload invalid");
              }
          }

          '''
          if marker not in source:
              raise SystemExit('helper insertion marker not found')
          source = source.replace(marker, helper + marker)
          path.write_text(source)
          PY
      - name: Add regression test
        shell: bash
        run: |
          cat > backend/genealogy-backend/src/test/java/com/genealogy/review/application/RevisionApplyServiceGenerationSchemeTest.java <<'JAVA'
          package com.genealogy.review.application;

          import com.fasterxml.jackson.databind.ObjectMapper;
          import com.genealogy.branch.repository.BranchRepository;
          import com.genealogy.generation.entity.GenerationSchemeEntity;
          import com.genealogy.generation.repository.GenSchemeRepository;
          import com.genealogy.imports.repository.ImportJobRepository;
          import com.genealogy.imports.repository.ImportJobRowRepository;
          import com.genealogy.person.repository.PersonRepository;
          import com.genealogy.relationship.repository.RelationshipRepository;
          import com.genealogy.review.entity.AuditRecordEntity;
          import com.genealogy.source.repository.SourceRepository;
          import org.junit.jupiter.api.Test;
          import org.junit.jupiter.api.extension.ExtendWith;
          import org.mockito.ArgumentCaptor;
          import org.mockito.Mock;
          import org.mockito.junit.jupiter.MockitoExtension;

          import java.time.LocalDateTime;
          import java.util.List;
          import java.util.Map;

          import static org.assertj.core.api.Assertions.assertThat;
          import static org.mockito.Mockito.verify;

          @ExtendWith(MockitoExtension.class)
          class RevisionApplyServiceGenerationSchemeTest {

              @Mock PersonRepository personRepository;
              @Mock RelationshipRepository relationshipRepository;
              @Mock SourceRepository sourceRepository;
              @Mock BranchRepository branchRepository;
              @Mock GenSchemeRepository genSchemeRepository;
              @Mock ImportJobRepository importJobRepository;
              @Mock ImportJobRowRepository importJobRowRepository;

              @Test
              void appliesWrappedGenerationSchemeSnapshotWithoutLosingRequiredFields() throws Exception {
                  ObjectMapper objectMapper = new ObjectMapper().findAndRegisterModules();
                  RevisionApplyService service = new RevisionApplyService(
                          personRepository,
                          relationshipRepository,
                          sourceRepository,
                          branchRepository,
                          genSchemeRepository,
                          importJobRepository,
                          importJobRowRepository,
                          objectMapper
                  );

                  GenerationSchemeEntity scheme = new GenerationSchemeEntity();
                  scheme.setId(23L);
                  scheme.setClanId(14L);
                  scheme.setBranchId(7L);
                  scheme.setSchemeName("敦本堂字辈");
                  scheme.setPoemText("敦本承先志");
                  scheme.setStartGeneration(12);
                  scheme.setIsDefault(true);
                  scheme.setValidationEnabled(true);
                  scheme.setStrictMode(false);
                  scheme.setStatus("pending_review");
                  scheme.setCreatedAt(LocalDateTime.of(2026, 7, 23, 10, 0));

                  AuditRecordEntity revision = new AuditRecordEntity();
                  revision.setTargetType("generation_scheme");
                  revision.setTargetId(23L);
                  revision.setClanId(14L);
                  revision.setNewPayload(objectMapper.writeValueAsString(Map.of(
                          "scheme", scheme,
                          "words", List.of(Map.of("generationNo", 12, "word", "敦"))
                  )));

                  service.apply(revision, LocalDateTime.of(2026, 7, 23, 11, 0));

                  ArgumentCaptor<GenerationSchemeEntity> captor = ArgumentCaptor.forClass(GenerationSchemeEntity.class);
                  verify(genSchemeRepository).save(captor.capture());
                  GenerationSchemeEntity saved = captor.getValue();
                  assertThat(saved.getId()).isEqualTo(23L);
                  assertThat(saved.getClanId()).isEqualTo(14L);
                  assertThat(saved.getBranchId()).isEqualTo(7L);
                  assertThat(saved.getSchemeName()).isEqualTo("敦本堂字辈");
                  assertThat(saved.getPoemText()).isEqualTo("敦本承先志");
                  assertThat(saved.getStartGeneration()).isEqualTo(12);
                  assertThat(saved.getIsDefault()).isTrue();
                  assertThat(saved.getValidationEnabled()).isTrue();
                  assertThat(saved.getStrictMode()).isFalse();
                  assertThat(saved.getStatus()).isEqualTo("official");
                  assertThat(saved.getCreatedAt()).isEqualTo(LocalDateTime.of(2026, 7, 23, 10, 0));
              }
          }
          JAVA
      - name: Run focused backend test
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=RevisionApplyServiceGenerationSchemeTest test
      - name: Commit fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/genealogy-backend/src/main/java/com/genealogy/review/application/RevisionApplyService.java \
                  backend/genealogy-backend/src/test/java/com/genealogy/review/application/RevisionApplyServiceGenerationSchemeTest.java
          git commit -m 'fix: preserve generation scheme snapshot on approval'
          git push origin HEAD:agent/fix-generation-scheme-review
