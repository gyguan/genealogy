name: Debug Generation Word Binding

on:
  pull_request:
    branches: ["main"]

jobs:
  targeted-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run targeted source binding tests
        working-directory: backend/genealogy-backend
        run: mvn -B -Dtest=SourceBindingTargetValidationServiceTest,SourceBindingCommandApplicationServiceTest test
