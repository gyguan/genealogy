name: Issue 121 Final Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-121-final-check.yml
      - backend/genealogy-backend/src/main/java/com/genealogy/tracking/**
      - backend/genealogy-backend/src/main/java/com/genealogy/operationlog/**
      - backend/genealogy-backend/src/main/java/com/genealogy/review/repository/**
      - backend/genealogy-backend/src/main/java/com/genealogy/source/repository/**
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/**
      - docs/api/openapi.tracking-trace.json
      - frontend/genealogy-web/src/features/logs/LogPage.tsx
      - frontend/genealogy-web/src/shared/api/generated/**
      - scripts/api/**

permissions:
  contents: read

jobs:
  backend-trace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run trace tests
        working-directory: backend/genealogy-backend
        run: mvn -DtrimStackTrace=false -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test

  frontend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Validate contract and frontend
        working-directory: frontend/genealogy-web
        run: |
          npm run api:check
          npm run typecheck
          npm run build
