name: Generate Issue 234 Contract

on:
  push:
    branches:
      - agent/issue-234-culture-governance-quality
    paths:
      - .github/workflows/issue-234-generate-contract.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-234-culture-governance-quality
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate API artifacts
        run: node scripts/api/generate-all-api-contracts.mjs
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/issue-234-generate-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api frontend/genealogy-web/src/shared/api/generated scripts/api .github/workflows/issue-234-generate-contract.yml
          git diff --cached --quiet || git commit -m "build(api): sync issue 234 generated contract"
          git push origin HEAD:agent/issue-234-culture-governance-quality
