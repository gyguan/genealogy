name: Issue 120 Patch Nullable Filters

on:
  push:
    branches:
      - "agent/issue-120-business-object-search"
    paths:
      - ".github/workflows/issue-120-patch-null-filters.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-120-business-object-search
          fetch-depth: 0
      - name: Insert typed boolean filter flags
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/genealogy-backend/src/main/java/com/genealogy/tracking/repository/TrackingObjectQueryRepository.java')
          text = path.read_text()
          pairs = [
              ('.addValue("branchId", branchId, Types.BIGINT)\n', '.addValue("branchId", branchId, Types.BIGINT)\n        .addValue("hasBranchId", branchId != null, Types.BOOLEAN)\n'),
              ('.addValue("changedFrom", changedFrom, Types.TIMESTAMP)\n', '.addValue("changedFrom", changedFrom, Types.TIMESTAMP)\n        .addValue("hasChangedFrom", changedFrom != null, Types.BOOLEAN)\n'),
              ('.addValue("changedTo", changedTo, Types.TIMESTAMP)\n', '.addValue("changedTo", changedTo, Types.TIMESTAMP)\n        .addValue("hasChangedTo", changedTo != null, Types.BOOLEAN)\n')
          ]
          for old, new in pairs:
              marker = new.split('\n')[-2].strip()
              if marker not in text:
                  if old not in text:
                      raise SystemExit(f'Expected anchor not found: {old.strip()}')
                  text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/genealogy-backend/src/main/java/com/genealogy/tracking/repository/TrackingObjectQueryRepository.java
          git commit -m "fix(tracking): register nullable filter flags"
          git push origin HEAD:agent/issue-120-business-object-search
