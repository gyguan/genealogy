name: Source Library Diagnostics

on:
  push:
    branches:
      - agent/source-search-layout-412

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Capture typecheck output
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > source-library-typecheck.log 2>&1
          status=$?
          cat source-library-typecheck.log
          echo "$status" > source-library-typecheck.status
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: source-library-typecheck
          path: |
            frontend/genealogy-web/source-library-typecheck.log
            frontend/genealogy-web/source-library-typecheck.status
