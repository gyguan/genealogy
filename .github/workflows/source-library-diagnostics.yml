name: Source Library Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/source-search-layout-412'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Fix reset form value types
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx')
          text = path.read_text()
          old = """    sourceForm.resetFields();
              sourceForm.setFieldsValue(next);
              setSearch(next);"""
          new = """    sourceForm.resetFields();
              sourceForm.setFieldsValue({
                keyword: undefined,
                sourceType: undefined,
                verificationStatus: undefined,
                privacyLevel: undefined,
                hasAttachment: undefined,
                hasBinding: undefined
              });
              setSearch(next);"""
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('expected resetSearch block not found')
          PY
      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx
          git commit -m "fix source search reset types"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
