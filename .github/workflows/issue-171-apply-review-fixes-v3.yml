name: Apply Issue 171 Review Fixes V3

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-171-apply-review-fixes-v3.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-171-review-fixes
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Execute V2 patch with ordered replacement
        shell: bash
        run: |
          python3 - <<'RUNNER'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/issue-171-apply-review-fixes-v2.yml').read_text(encoding='utf-8')
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n"
          script = textwrap.dedent(workflow.split(start, 1)[1].split(end, 1)[0])
          script = script.replace(
              "if count != 1:\n        raise SystemExit(f'expected one match in {path}, found {count}')",
              "if count < 1:\n        raise SystemExit(f'expected at least one match in {path}, found {count}')",
              1
          )
          exec(compile(script, 'issue-171-v3.py', 'exec'))
          RUNNER
      - name: Run focused backend tests
        working-directory: backend/genealogy-backend
        run: mvn -B -q -Dtest=CultureAwareSourceBindingReviewApplicationServiceTest,CultureSiteApplicationServiceTest test
      - name: Commit focused fix
        shell: bash
        run: |
          rm -f .github/workflows/issue-171-apply-review-fixes.yml
          rm -f .github/workflows/issue-171-apply-review-fixes-pr.yml
          rm -f .github/workflows/issue-171-patch-diagnostic.yml
          rm -f .github/workflows/issue-171-apply-review-fixes-v2.yml
          rm -f .github/workflows/issue-171-v2-diagnostic.yml
          rm -f .github/workflows/issue-171-apply-review-fixes-v3.yml
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "199175422+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(culture): close culture site review gaps"
          git push origin HEAD:agent/issue-171-review-fixes
