name: Import Type Format Focused Check

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/main/resources/db/migration/V6__split_import_type_and_file_format.sql'
      - 'frontend/genealogy-web/src/features/imports/**'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'docs/api/openapi.zz-import-descriptor.json'
      - '.github/workflows/import-type-format-focused.yml'

permissions:
  contents: write

jobs:
  backend-import-descriptor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend and tests
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package
      - name: Run focused import descriptor tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -q
          -Dtest=ImportJobDescriptorTest,ImportTypeRegistryTest,ImportJobEntityTest,ImportJobApplicationServiceTest,ImportApplicationServiceRowStateTest,PersonImportTemplateApplicationServiceTest
          test

  frontend-import-descriptor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate API operation map
        run: node scripts/api/generate-frontend-client.mjs
      - name: Commit generated operation map when changed
        shell: bash
        run: |
          if git diff --quiet -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts; then
            echo 'Generated operation map is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/genealogy-web/src/shared/api/generated/api-contract.ts
          git commit -m 'chore(api): regenerate import descriptor operations [skip ci]'
          git push origin HEAD:${{ github.head_ref }}
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Check import module TypeScript errors
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          TYPECHECK_EXIT=$?
          set -e
          grep -E 'src/features/imports/(ImportJobManagementPanel|ImportPage|PersonImportWorkspace|import-type-registry)\.tsx?' /tmp/typecheck.log > /tmp/import-errors.log || true
          if [[ -s /tmp/import-errors.log ]]; then
            cat /tmp/import-errors.log
            exit 1
          fi
          if [[ ${TYPECHECK_EXIT} -ne 0 ]]; then
            echo 'Full-project typecheck has unrelated existing errors; import module is clean.'
          fi
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
