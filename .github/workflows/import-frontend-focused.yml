name: Import Frontend Focused Check

on:
  pull_request:
    paths:
      - 'frontend/genealogy-web/src/features/imports/**'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'docs/api/openapi.imports.json'
      - 'scripts/api/generate-frontend-client.mjs'
      - '.github/workflows/import-frontend-focused.yml'

jobs:
  focused-import-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Check import module TypeScript errors
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          TYPECHECK_EXIT=$?
          set -e
          grep -E 'src/features/imports/(ImportJobManagementPanel|PersonImportWorkspace)\.tsx' /tmp/typecheck.log > /tmp/import-errors.log || true
          if [[ -s /tmp/import-errors.log ]]; then
            echo 'Import module TypeScript errors:'
            cat /tmp/import-errors.log
            exit 1
          fi
          if [[ ${TYPECHECK_EXIT} -ne 0 ]]; then
            echo 'Full-project typecheck still has unrelated existing errors; no import-module errors were found.'
          else
            echo 'Full-project typecheck passed.'
          fi
