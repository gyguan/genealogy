name: Issue 715 discovery

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-715-discovery.yml

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-715-clan-review-entry
      - name: Locate review implementation
        run: |
          echo '=== review files ==='
          find backend/genealogy-backend/src -type f | grep -Ei '/review|ReviewTask|Revision' | sort
          echo '=== review endpoints and target validation ==='
          grep -RInE 'review-tasks|targetType|generation_scheme|relationship|branch|person|source' backend/genealogy-backend/src/main/java/com/genealogy/review backend/genealogy-backend/src/main/java 2>/dev/null | head -n 500
          echo '=== clan response/entity ==='
          sed -n '1,240p' backend/genealogy-backend/src/main/java/com/genealogy/clan/entity/ClanEntity.java
          sed -n '1,220p' backend/genealogy-backend/src/main/java/com/genealogy/clan/dto/ClanResponse.java
          echo '=== review frontend ==='
          grep -RInE "targetType|review-tasks|submitReviewTask" frontend/genealogy-web/src/features/reviews frontend/genealogy-web/src/features/mvp1 2>/dev/null | head -n 400
