name: Issue 103 Migration Version Diagnostic

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/resources/db/migration/**'
      - '.github/workflows/issue-103-targeted-discovery.yml'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Fetch main and print migration versions
        shell: bash
        run: |
          git fetch origin main:refs/remotes/origin/main --force
          echo '=== latest base migrations ==='
          git ls-tree -r --name-only origin/main -- backend/genealogy-backend/src/main/resources/db/migration \
            | sed 's#^.*/##' \
            | grep '^V' \
            | sort -V \
            | tail -20
          echo '=== governance result ==='
          python3 .github/scripts/validate-flyway-migrations.py --base-ref origin/main || true
