name: Issue 103 Relationship Import Verification

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/review/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/relationship/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/person/repository/PersonRepository.java'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/main/resources/db/migration/V2026071302__import_row_generic_draft_target.sql'
      - 'frontend/genealogy-web/src/features/imports/**'
      - 'docs/api/openapi.relationship-import.json'
      - '.github/workflows/issue-103-targeted-discovery.yml'

permissions:
  contents: write

jobs:
  backend-and-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply compatibility edits
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected snippet not found in {path}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportApplicationService.java',
              '                jobRow.setDraftPersonId(savedPerson == null ? null : savedPerson.getId());\n                jobRow.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);',
              '                jobRow.setDraftPersonId(savedPerson == null ? null : savedPerson.getId());\n                jobRow.setDraftTargetType(ImportJobEntity.TYPE_PERSON);\n                jobRow.setDraftTargetId(savedPerson == null ? null : savedPerson.getId());\n                jobRow.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java',
              '        ImportJobEntity job = requireJob(clanId, jobId, actorId);\n        ensureJobEditable(job);',
              '        ImportJobEntity job = requireJob(clanId, jobId, actorId);\n        if (!ImportJobEntity.TYPE_PERSON.equals(job.getImportType())) {\n            throw new BusinessException("IMPORT_JOB_TYPE_MISMATCH", "当前批次不是人物导入批次");\n        }\n        ensureJobEditable(job);'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java',
              '            row.setDraftPersonId(savedPerson.getId());\n            row.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);',
              '            row.setDraftPersonId(savedPerson.getId());\n            row.setDraftTargetType(ImportJobEntity.TYPE_PERSON);\n            row.setDraftTargetId(savedPerson.getId());\n            row.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java',
              '        if (!FAILED_STATUSES.contains(row.getRowStatus()) || row.getDraftPersonId() != null) {',
              '        if (!FAILED_STATUSES.contains(row.getRowStatus())\n                || row.getDraftTargetId() != null\n                || row.getDraftPersonId() != null) {'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java',
              '                entity.getDraftPersonId() != null,',
              '                entity.getDraftTargetId() != null || entity.getDraftPersonId() != null,'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/relationship/application/RelationshipApplicationService.java',
              '        applyDefaults(entity);\n        LocalDateTime now = LocalDateTime.now();',
              '        applyDefaults(entity);\n        entity.setCreatedBy(actorId);\n        LocalDateTime now = LocalDateTime.now();'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/relationship/application/RelationshipApplicationService.java',
              '        reverse.setDataStatus(saved.getDataStatus());\n        reverse.setCreatedAt(now);',
              '        reverse.setDataStatus(saved.getDataStatus());\n        reverse.setCreatedBy(saved.getCreatedBy());\n        reverse.setCreatedAt(now);'
          )
          replace(
              'backend/genealogy-backend/src/main/java/com/genealogy/review/application/ApprovalApplicationService.java',
              '            case "import_job" -> "人物导入批次审核";',
              '            case "import_job" -> "导入批次审核";'
          )
          Path('tasks/issue-103-implementation.patch').unlink(missing_ok=True)
          PY
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate API operation map
        run: node scripts/api/generate-frontend-client.mjs
      - name: Commit mechanical updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No mechanical updates needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportApplicationService.java \
                  backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java \
                  backend/genealogy-backend/src/main/java/com/genealogy/relationship/application/RelationshipApplicationService.java \
                  backend/genealogy-backend/src/main/java/com/genealogy/review/application/ApprovalApplicationService.java \
                  frontend/genealogy-web/src/shared/api/generated/api-contract.ts \
                  tasks/issue-103-implementation.patch
          git commit -m 'chore(issue-103): finalize generic import integration [skip ci]'
          git push origin HEAD:${{ github.head_ref }}
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend and tests
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package
      - name: Run focused relationship import tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -q
          -Dtest=RelationshipImportTemplateApplicationServiceTest,RelationshipImportFilePolicyServiceTest,RelationshipImportApplicationServiceTest,ImportJobReviewApplicationServiceTest,ImportApplicationServiceRowStateTest,ImportJobRowApplicationServiceTest,RevisionApplyImportJobTest
          test
      - name: Verify generic draft target migration
        shell: bash
        run: |
          psql -h localhost -U postgres -d genealogy_test <<'SQL'
          create table import_job_row (
            id bigserial primary key,
            draft_person_id bigint
          );
          insert into import_job_row(draft_person_id) values (1001), (null);
          SQL
          psql -h localhost -U postgres -d genealogy_test -f backend/genealogy-backend/src/main/resources/db/migration/V2026071302__import_row_generic_draft_target.sql
          psql -h localhost -U postgres -d genealogy_test -Atc "select draft_target_type || ':' || draft_target_id from import_job_row where draft_person_id = 1001" | grep -qx 'person:1001'
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Check import TypeScript errors
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          STATUS=$?
          set -e
          grep -E 'src/features/imports/(ImportJobManagementPanel|ImportPage|PersonImportWorkspace|RelationshipImportWorkspace|import-type-registry)\.tsx?' /tmp/typecheck.log > /tmp/import-errors.log || true
          if [[ -s /tmp/import-errors.log ]]; then
            cat /tmp/import-errors.log
            exit 1
          fi
          if [[ $STATUS -ne 0 ]]; then
            echo 'Full-project typecheck has unrelated existing errors; import module is clean.'
          fi
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
