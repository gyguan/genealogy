name: Issue 103 Targeted Discovery

on:
  pull_request:
    paths:
      - '.github/workflows/issue-103-targeted-discovery.yml'

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build targeted context
        shell: bash
        run: |
          mkdir -p /tmp/issue-103-context
          cp -R backend/genealogy-backend/src/main/java/com/genealogy/relationship /tmp/issue-103-context/
          cp -R backend/genealogy-backend/src/main/java/com/genealogy/review /tmp/issue-103-context/
          cp -R backend/genealogy-backend/src/main/java/com/genealogy/imports /tmp/issue-103-context/
          cp -R backend/genealogy-backend/src/main/java/com/genealogy/person /tmp/issue-103-context/
          cp docs/api/openapi.imports.json /tmp/issue-103-context/
          cp frontend/genealogy-web/src/features/imports/ImportPage.tsx /tmp/issue-103-context/
          cp frontend/genealogy-web/src/features/imports/ImportJobManagementPanel.tsx /tmp/issue-103-context/
          cp frontend/genealogy-web/src/features/imports/import-type-registry.ts /tmp/issue-103-context/
      - name: Upload targeted context
        uses: actions/upload-artifact@v4
        with:
          name: issue-103-targeted-context
          path: /tmp/issue-103-context
          retention-days: 1
