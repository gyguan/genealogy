name: Issue 103 Apply Review Fixes

on:
  pull_request:
    paths:
      - '.github/workflows/issue-103-targeted-discovery.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply privacy and empty-file hardening
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected snippet not found in {path}: {old[:100]}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          service = 'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportApplicationService.java'
          replace(service,
              '    private static final String STATUS_FAILED = "failed";\n',
              '    private static final String STATUS_FAILED = "failed";\n    private static final String PERMISSION_CREATE = "relationship:create";\n    private static final String PERMISSION_CHECK_CONFLICT = "relationship:check_conflict";\n')
          replace(service,
              '        String filename = file.getOriginalFilename() == null ? "relationships.csv" : file.getOriginalFilename();\n        String format = filename.toLowerCase(Locale.ROOT).endsWith(".xlsx")\n                ? ImportJobEntity.FORMAT_XLSX\n                : ImportJobEntity.FORMAT_CSV;\n        ImportJobEntity job = createJob(clanId, branchId, filename, format, actorId);\n        ImportReadResult data = readImport(file);',
              '        ImportReadResult data = readImport(file);\n        String filename = file.getOriginalFilename() == null ? "relationships.csv" : file.getOriginalFilename();\n        String format = filename.toLowerCase(Locale.ROOT).endsWith(".xlsx")\n                ? ImportJobEntity.FORMAT_XLSX\n                : ImportJobEntity.FORMAT_CSV;\n        ImportJobEntity job = createJob(clanId, branchId, filename, format, actorId);')
          replace(service,
              '                ParsedRelationship parsed = parseAndResolve(clanId, row.cells());',
              '                ParsedRelationship parsed = parseAndResolve(clanId, row.cells(), actorId, PERMISSION_CREATE);')
          replace(service,
              '    ParsedRelationship parseAndResolve(Long clanId, List<String> cells) {',
              '    ParsedRelationship parseAndResolve(Long clanId, List<String> cells, Long actorId, String permission) {')
          replace(service,
              '        PersonEntity from = requireUniquePerson(clanId, fromCode, "关系主体");\n        PersonEntity to = requireUniquePerson(clanId, toCode, "关系对象");',
              '        PersonEntity from = requireUniquePerson(clanId, fromCode, "关系主体");\n        PersonEntity to = requireUniquePerson(clanId, toCode, "关系对象");\n        authorizationApplicationService.requireBranchPermission(clanId, actorId, from.getBranchId(), permission);\n        if (!from.getBranchId().equals(to.getBranchId())) {\n            authorizationApplicationService.requireBranchPermission(clanId, actorId, to.getBranchId(), permission);\n        }')
          replace(service,
              '            ParsedRelationship parsed = parseAndResolve(clanId, row.cells());',
              '            ParsedRelationship parsed = parseAndResolve(clanId, row.cells(), actorId, PERMISSION_CHECK_CONFLICT);')
          replace(service,
              '        try {\n            return filename.toLowerCase(Locale.ROOT).endsWith(".xlsx") ? readXlsxRows(file) : readCsvRows(file);\n        } catch (IOException exception) {',
              '        try {\n            ImportReadResult result = filename.toLowerCase(Locale.ROOT).endsWith(".xlsx")\n                    ? readXlsxRows(file)\n                    : readCsvRows(file);\n            if (result.rows().isEmpty()) {\n                throw new BusinessException("IMPORT_RELATIONSHIP_DATA_EMPTY", "人物关系导入文件至少需要一行数据");\n            }\n            return result;\n        } catch (IOException exception) {')

          retry = 'backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportJobRowApplicationService.java'
          replace(retry,
              '                    relationshipImportApplicationService.parseAndResolve(clanId, cells);',
              '                    relationshipImportApplicationService.parseAndResolve(\n                            clanId, cells, actorId, "relationship:create"\n                    );')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportApplicationService.java \
                  backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportJobRowApplicationService.java
          git commit -m 'fix(imports): protect relationship preview privacy and reject empty files'
          git push origin HEAD:${{ github.head_ref }}
