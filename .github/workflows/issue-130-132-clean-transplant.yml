name: Issue 130-132 Clean Transplant

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  transplant:
    if: github.event.pull_request.head.ref == 'agent/issue-130-132-auth-security-main-ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-130-132-auth-security-main-ready
          fetch-depth: 0
      - name: Copy verified delivery files from the implementation branch
        shell: bash
        run: |
          git fetch origin agent/issue-130-132-auth-security-closure
          source_ref=origin/agent/issue-130-132-auth-security-closure
          files=(
            .github/workflows/auth-commercial-e2e.yml
            backend/genealogy-backend/pom.xml
            backend/genealogy-backend/src/main/java/com/genealogy/GenealogyApplication.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/application/AuthApplicationService.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/application/AuthSecurityService.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/application/AuthSessionMaintenanceService.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/config/AuthProperties.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/repository/AuthLoginAttemptRepository.java
            backend/genealogy-backend/src/main/java/com/genealogy/auth/repository/AuthSessionRepository.java
            backend/genealogy-backend/src/main/java/com/genealogy/importexport/controller/CsvImportController.java
            backend/genealogy-backend/src/main/resources/application.yml
            backend/genealogy-backend/src/main/resources/db/migration/V20260714070000__rebuild_legacy_duplicate_migrations.sql
            backend/genealogy-backend/src/test/java/com/genealogy/auth/application/AuthApplicationServiceCommercialTest.java
            backend/genealogy-backend/src/test/java/com/genealogy/auth/application/AuthSecurityServiceTest.java
            backend/genealogy-backend/src/test/java/com/genealogy/auth/application/AuthSessionMaintenanceServiceTest.java
            docs/16-auth-security-readiness-closure.md
            frontend/genealogy-web/e2e/auth-commercial.spec.ts
            frontend/genealogy-web/package-lock.json
            frontend/genealogy-web/package.json
            frontend/genealogy-web/playwright.config.ts
            tasks/issue-130-execution.md
            tasks/issue-131-execution.md
            tasks/issue-132-execution.md
          )
          git checkout "$source_ref" -- "${files[@]}"
          rm .github/workflows/issue-130-132-clean-transplant.yml
          rm -f tasks/.issue-130-132-trigger
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'security(auth): close issues 130-132 production readiness gaps'
          git push origin HEAD:agent/issue-130-132-auth-security-main-ready
