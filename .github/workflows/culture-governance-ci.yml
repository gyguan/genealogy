name: Culture Governance CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/src/main/java/com/genealogy/culture/**"
      - "backend/genealogy-backend/src/test/java/com/genealogy/culture/**"
      - "backend/genealogy-backend/src/main/resources/db/migration/**culture**"
      - ".github/workflows/culture-governance-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/src/main/java/com/genealogy/culture/**"
      - "backend/genealogy-backend/src/test/java/com/genealogy/culture/**"
      - "backend/genealogy-backend/src/main/resources/db/migration/**culture**"
      - ".github/workflows/culture-governance-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  culture-governance:
    name: Culture Tests and PostgreSQL Startup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
      SPRING_DATASOURCE_USERNAME: genealogy
      SPRING_DATASOURCE_PASSWORD: genealogy
      SPRING_FLYWAY_ENABLED: "true"
      RUN_POSTGRES_INTEGRATION_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run culture and regression tests
        working-directory: backend/genealogy-backend
        run: mvn -B test
      - name: Package backend
        working-directory: backend/genealogy-backend
        run: mvn -B -DskipTests package
      - name: Verify PostgreSQL startup and Flyway
        working-directory: backend/genealogy-backend
        run: |
          nohup java -jar target/genealogy-backend-0.1.0-SNAPSHOT.jar >/tmp/culture-backend.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null && exit 0
            sleep 2
          done
          tail -n 200 /tmp/culture-backend.log || true
          exit 1
