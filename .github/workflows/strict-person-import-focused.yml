name: Strict Person Import Focused Check

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/**'
      - 'frontend/genealogy-web/src/features/imports/PersonImportWorkspace.tsx'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'docs/api/openapi.imports.json'
      - 'docs/api/openapi.zz-removals.json'
      - '.github/workflows/strict-person-import-focused.yml'

jobs:
  backend-strict-import-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend and tests
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package
      - name: Verify CSV and XLSX templates
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=PersonImportTemplateApplicationServiceTest test
      - name: Verify strict template headers
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=PersonImportFilePolicyServiceTest test
      - name: Verify successful fixed mapping
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=ImportApplicationServiceRowStateTest#successfulRowsShouldBeLinkedToDraftPersonsAndBecomeReadyForReview test
      - name: Verify correctable invalid row
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=ImportApplicationServiceRowStateTest#invalidRowsShouldRemainTraceableAndRequireCorrection test
      - name: Verify strict business values
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=ImportApplicationServiceRowStateTest#invalidBusinessValuesShouldBecomeCorrectableRows test
      - name: Verify import audit command
        if: always()
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=PersonImportCommandApplicationServiceTest test

  frontend-strict-import-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Check person import TypeScript errors
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          TYPECHECK_EXIT=$?
          set -e
          grep -E 'src/features/imports/PersonImportWorkspace\.tsx' /tmp/typecheck.log > /tmp/import-errors.log || true
          if [[ -s /tmp/import-errors.log ]]; then
            echo 'Person import TypeScript errors:'
            cat /tmp/import-errors.log
            exit 1
          fi
          if [[ ${TYPECHECK_EXIT} -ne 0 ]]; then
            echo 'Full-project typecheck has unrelated existing errors; no person import errors were found.'
          else
            echo 'Full-project typecheck passed.'
          fi
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
