name: Issue 233 Review Text Fix

on:
  push:
    branches:
      - agent/issue-233-lineage-workbench
    paths:
      - .github/workflows/issue-233-review-text-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Match combined review summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/e2e/tree-release-gate.spec.ts')
          text = path.read_text().replace(
              "personDrawer.getByText('待审核', { exact: true }).first()",
              "personDrawer.getByText(/待审核/).first()"
          )
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/e2e/tree-release-gate.spec.ts
          git commit -m "test(tree): match combined review summary text"
          git push origin HEAD:agent/issue-233-lineage-workbench
