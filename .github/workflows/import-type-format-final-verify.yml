name: Import Descriptor Final Verification

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/main/resources/db/migration/V6__split_import_type_and_file_format.sql'
      - '.github/workflows/import-type-format-final-verify.yml'

jobs:
  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Ensure Flyway V6 is unique
        shell: bash
        run: |
          COUNT=$(find backend/genealogy-backend/src/main/resources/db/migration -maxdepth 1 -type f -name 'V6__*.sql' | wc -l)
          test "$COUNT" -eq 1 || { echo "Expected exactly one V6 migration, found $COUNT"; exit 1; }
      - name: Prepare historical import jobs
        run: |
          psql -h localhost -U postgres -d genealogy_test <<'SQL'
          create table import_job (
            id bigserial primary key,
            clan_id bigint not null,
            import_type varchar(64),
            original_filename varchar(255),
            created_at timestamp not null default now()
          );
          insert into import_job(clan_id, import_type, original_filename) values
            (1, 'person_csv', 'people.csv'),
            (1, 'person_xlsx', 'people.xlsx'),
            (1, 'person', 'legacy.xlsx');
          SQL
      - name: Apply descriptor migration
        run: psql -h localhost -U postgres -d genealogy_test -f backend/genealogy-backend/src/main/resources/db/migration/V6__split_import_type_and_file_format.sql
      - name: Assert split values and constraints
        run: |
          psql -h localhost -U postgres -d genealogy_test <<'SQL'
          do $$
          declare
            invalid_count integer;
          begin
            select count(*) into invalid_count
            from import_job
            where import_type <> 'person'
               or file_format not in ('csv', 'xlsx')
               or (original_filename = 'people.csv' and file_format <> 'csv')
               or (original_filename in ('people.xlsx', 'legacy.xlsx') and file_format <> 'xlsx');
            if invalid_count <> 0 then
              raise exception 'descriptor migration assertions failed: % invalid rows', invalid_count;
            end if;
          end $$;
          SQL

  full-java-import-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run full Java tests and isolate import regressions
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          set +e
          mvn -q test > /tmp/mvn-test.log 2>&1
          STATUS=$?
          set -e
          if [[ $STATUS -eq 0 ]]; then
            echo 'Full Java test suite passed.'
            exit 0
          fi
          find target/surefire-reports -type f -name '*.txt' -print0 2>/dev/null \
            | xargs -0 grep -H -E '<<< FAILURE|<<< ERROR' > /tmp/failures.log || true
          echo 'Full-suite failures:'
          cat /tmp/failures.log || true
          if grep -E -i 'genealogy\.imports|/imports/|Import(Job|Application|Type|Template|Row)' /tmp/failures.log; then
            echo 'Import-module regression detected.'
            exit 1
          fi
          echo 'Full suite has unrelated existing failures; no import-module regression was found.'
