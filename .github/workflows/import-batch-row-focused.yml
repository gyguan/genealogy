name: Import Batch Row Focused Check

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/application/ImportApplicationServiceRowStateTest.java'
      - 'backend/genealogy-backend/src/main/resources/db/migration/V5__import_batch_row_state_foundation.sql'
      - '.github/workflows/import-batch-row-focused.yml'

jobs:
  focused-import-batch-row-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests package
      - name: Run import batch row test
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=ImportApplicationServiceRowStateTest test
