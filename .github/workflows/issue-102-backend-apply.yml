name: Issue 102 Backend Apply

on:
  push:
    branches:
      - agent/issue-102-member-permission-p1

concurrency:
  group: issue-102-backend-apply
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-build-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-102-member-permission-p1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply backend patch
        run: python3 scripts/issue102/apply_backend_slice.py
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -DskipTests package
      - name: Commit backend slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/genealogy-backend/src/main/java docs/api/openapi.member-permission.json
          if git diff --cached --quiet; then
            echo "Backend slice already applied"
            exit 0
          fi
          git commit -m "feat(members): add scoped permission audit and error statuses [skip ci]"
          git push origin HEAD:agent/issue-102-member-permission-p1
