name: Issue 444 Apply Toolbar Refactor

on:
  push:
    branches:
      - agent/issue-444-expand-lineage-filters

permissions:
  contents: write

jobs:
  apply-refactor:
    if: ${{ !contains(github.event.head_commit.message, '[skip issue-444-refactor]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-444-expand-lineage-filters
          fetch-depth: 0
      - name: Refactor lineage toolbar
        shell: python
        run: |
          from pathlib import Path

          ts_path = Path('frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx')
          css_path = Path('frontend/genealogy-web/src/features/tree/lineage-workbench-issue376.css')

          ts = ts_path.read_text()
          ts = ts.replace('  Pagination,\n  Popover,\n  Segmented,', '  Pagination,\n  Segmented,')

          old_settings = '''  const moreSettings = (
              <div className="lineage-more-settings">
                {mode === 'person' ? <Field label="查看方向"><Select aria-label="人物图查看方向" value={direction} options={DIRECTION_OPTIONS} onChange={value => setDirection(value as TreeDirection)} /></Field> : null}
                <Field label="关系范围"><Select aria-label="关系范围" mode="multiple" value={relationScopes} maxTagCount="responsive" options={RELATION_OPTIONS} onChange={values => { if (values.length) setRelationScopes(values as TreeRelationScope[]); }} /></Field>
                {mode === 'branch' ? <Field label="包含下级支派"><div className="lineage-switch-field"><Switch checked={includeSubBranches} onChange={setIncludeSubBranches} /><span>{includeSubBranches ? '包含' : '仅当前支派'}</span></div></Field> : null}
              </div>
            );
          '''
          ts = ts.replace(old_settings, '')

          old_toolbar = '''        <div className="lineage-query-toolbar lineage-query-toolbar--standardized">
                    <Field label="图内定位"><Select aria-label="图内定位人物" showSearch allowClear value={locatedNodeId || undefined} placeholder="搜索当前图人物" optionFilterProp="label" options={graphOptions} suffixIcon={<AimOutlined />} onChange={value => locateNode(value || '')} /></Field>
                    <Field label="展开深度"><Select aria-label={mode === 'person' ? '人物中心展开深度' : '支派全局展开深度'} value={mode === 'person' ? personDepth : branchDepth} options={mode === 'person' ? PERSON_DEPTH_OPTIONS : BRANCH_DEPTH_OPTIONS} onChange={value => mode === 'person' ? setPersonDepth(value) : setBranchDepth(value)} /></Field>
                    <div className="lineage-query-secondary-action"><Popover placement="bottomRight" trigger="click" title="更多设置" content={moreSettings}><Button icon={<MoreOutlined />}>更多设置</Button></Popover></div>
                    <div className="lineage-query-action">{queryDirty ? <Tag color="processing">条件待应用</Tag> : <Tag>条件已应用</Tag>}<Button type="primary" icon={<SearchOutlined />} loading={activeLoadState.loading} disabled={mode === 'person' ? !workspace.personId : !selectedBranchId} onClick={() => void applyGraphQuery()}>更新图谱</Button></div>
                  </div>'''
          new_toolbar = '''        <div className={`lineage-query-toolbar lineage-query-toolbar--standardized lineage-query-toolbar--${mode}`}>
                    <Field label="图内定位"><Select aria-label="图内定位人物" showSearch allowClear value={locatedNodeId || undefined} placeholder="搜索当前图人物" optionFilterProp="label" options={graphOptions} suffixIcon={<AimOutlined />} onChange={value => locateNode(value || '')} /></Field>
                    {mode === 'person' ? <Field label="查看方向"><Select aria-label="人物图查看方向" value={direction} options={DIRECTION_OPTIONS} onChange={value => setDirection(value as TreeDirection)} /></Field> : null}
                    <Field label="关系范围"><Select aria-label="关系范围" mode="multiple" value={relationScopes} maxTagCount="responsive" options={RELATION_OPTIONS} onChange={values => { if (values.length) setRelationScopes(values as TreeRelationScope[]); }} /></Field>
                    <Field label="展开深度"><Select aria-label={mode === 'person' ? '人物中心展开深度' : '支派全局展开深度'} value={mode === 'person' ? personDepth : branchDepth} options={mode === 'person' ? PERSON_DEPTH_OPTIONS : BRANCH_DEPTH_OPTIONS} onChange={value => mode === 'person' ? setPersonDepth(value) : setBranchDepth(value)} /></Field>
                    {mode === 'branch' ? <Field label="包含下级支派"><div className="lineage-switch-field lineage-switch-field--toolbar"><Switch checked={includeSubBranches} onChange={setIncludeSubBranches} /><span>{includeSubBranches ? '包含' : '仅当前支派'}</span></div></Field> : null}
                    <div className="lineage-query-action">{queryDirty ? <Tag color="processing">条件待应用</Tag> : null}<Button type="primary" icon={<SearchOutlined />} loading={activeLoadState.loading} disabled={mode === 'person' ? !workspace.personId : !selectedBranchId} onClick={() => void applyGraphQuery()}>更新图谱</Button></div>
                  </div>'''
          if old_toolbar not in ts:
              raise SystemExit('Expected toolbar block not found')
          ts = ts.replace(old_toolbar, new_toolbar)
          ts_path.write_text(ts)

          css = css_path.read_text()
          start = css.index('.lineage-query-toolbar--standardized {')
          end = css.index('.lineage-canvas-view-bar {')
          replacement = '''.lineage-query-toolbar--standardized {
            display: grid;
            grid-template-columns: minmax(220px, 1.35fr) minmax(150px, .8fr) minmax(220px, 1.2fr) minmax(150px, .8fr) auto;
            align-items: end;
            gap: 12px;
            margin-bottom: 16px;
          }

          .lineage-query-toolbar--standardized > .ant-form-item {
            margin-bottom: 0;
            min-width: 0;
          }

          .lineage-query-toolbar--standardized .ant-select,
          .lineage-query-toolbar--standardized .ant-select-selector,
          .lineage-query-toolbar--standardized .ant-btn,
          .lineage-switch-field--toolbar {
            min-height: 32px;
          }

          .lineage-query-toolbar--standardized .ant-select {
            width: 100%;
          }

          .lineage-switch-field--toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
          }

          .lineage-query-action {
            min-height: 32px;
            display: flex;
            align-items: center;
            align-self: end;
            justify-content: flex-end;
            gap: 8px;
            white-space: nowrap;
          }

          .lineage-query-action .ant-btn {
            height: 32px;
          }

          '''
          css = css[:start] + replacement + css[end:]
          css = css.replace('''@media (max-width: 991px) {
            .lineage-query-toolbar--standardized {
              grid-template-columns: 1fr 1fr;
            }

            .lineage-query-action {
              justify-content: flex-start;
            }
          }
          ''', '''@media (max-width: 1199px) {
            .lineage-query-toolbar--standardized {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .lineage-query-action {
              justify-content: flex-start;
            }
          }
          ''')
          css = css.replace('''  .lineage-query-secondary-action,
            .lineage-query-action,
            .lineage-query-secondary-action .ant-btn,
            .lineage-query-action .ant-btn {
              width: 100%;
            }
          ''', '''  .lineage-query-action,
            .lineage-query-action .ant-btn {
              width: 100%;
            }
          ''')
          css_path.write_text(css)
      - name: Commit refactor
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx frontend/genealogy-web/src/features/tree/lineage-workbench-issue376.css
          git commit -m "fix(tree): expand lineage filters [skip issue-444-refactor]"
          git push
