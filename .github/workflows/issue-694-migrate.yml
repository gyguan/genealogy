name: Issue 694 Validate Wizard Query Results

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/issue-694-wizard-strict-two-layer-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Validate wizard result structure
        working-directory: frontend/genealogy-web
        run: node src/features/mvp1/domain/wizardQueryResultStructure.test.mjs

      - name: Run wizard result model tests
        working-directory: frontend/genealogy-web
        run: npm run test:wizard-result-lists

      - name: Run source stage model tests
        working-directory: frontend/genealogy-web
        run: npm run test:source-stage

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          npm run dev > /tmp/wizard-result-vite.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/wizard-result-vite.log
          exit 1

      - name: Run wizard Chromium E2E
        working-directory: frontend/genealogy-web
        run: npx playwright test e2e/wizard-query-result-pattern.spec.ts --project=chromium

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue-694-wizard-result-diagnostics
          path: |
            frontend/genealogy-web/playwright-report
            frontend/genealogy-web/test-results
            /tmp/wizard-result-vite.log
          if-no-files-found: ignore
          retention-days: 5