name: Issue 694 Migrate Wizard Query Results

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  migrate-and-validate:
    if: github.event.pull_request.head.ref == 'agent/issue-694-wizard-strict-two-layer-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply strict two-layer migration
        shell: bash
        run: python scripts/issue-694-migrate.py

      - name: Persist implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/genealogy-web/src frontend/genealogy-web/e2e tasks/issue-694-execution.md
          if git diff --cached --quiet; then
            echo 'Implementation already applied'
          else
            git commit -m 'fix(issue-694): enforce strict two-layer wizard query results'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm ci

      - name: Validate wizard result structure
        working-directory: frontend/genealogy-web
        run: node src/features/mvp1/domain/wizardQueryResultStructure.test.mjs

      - name: Run wizard result model tests
        working-directory: frontend/genealogy-web
        run: node src/features/mvp1/domain/wizardResultListModel.test.mjs

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build