name: Issue 694 Validate Wizard Query Results

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/issue-694-wizard-strict-two-layer-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Validate wizard result structure
        working-directory: frontend/genealogy-web
        run: node src/features/mvp1/domain/wizardQueryResultStructure.test.mjs

      - name: Run wizard result model tests
        working-directory: frontend/genealogy-web
        run: npm run test:wizard-result-lists

      - name: Run source stage model tests
        working-directory: frontend/genealogy-web
        run: npm run test:source-stage

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build