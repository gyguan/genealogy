name: Issue 260 Patch

on:
  push:
    branches: ["agent/issue-260-culture-multiselect"]
    paths: [".github/workflows/issue-260-patch.yml"]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-260-culture-multiselect
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply multiselect implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def write(path: str, content: str):
              Path(path).write_text(content, encoding='utf-8')

          def replace(path: str, old: str, new: str):
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'expected block not found in {path}: {old[:120]!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          write('frontend/genealogy-web/src/features/culture/CultureSearchPanel.tsx', '''import { useEffect } from 'react';
          import { Button, Card, Col, Form, Input, Row, Select, Space } from 'antd';
          import type { CultureCategory, CultureDataStatus, CulturePrivacyLevel } from '../../shared/api/generated/culture-types';
          import type { CultureBranchOption } from './cultureLibraryService';
          import { booleanOptions, categoryOptions, privacyOptions, sortOptions, statusOptions } from './cultureOptions';
          import type { CultureSearchState } from './cultureUrlState';
          import { defaultCultureSearch } from './cultureUrlState';

          type BooleanText = 'true' | 'false';

          type FormValues = {
            keyword?: string;
            category?: CultureCategory[];
            branchId?: number[];
            dataStatus?: CultureDataStatus[];
            privacyLevel?: CulturePrivacyLevel[];
            hasSource?: BooleanText[];
            featuredOnHome?: BooleanText[];
            sort?: string;
          };

          type Props = {
            branches: CultureBranchOption[];
            clanId: string;
            search: CultureSearchState;
            loading: boolean;
            onSearch: (search: CultureSearchState) => void;
            onCreate: () => void;
          };

          function branchLabel(branch: CultureBranchOption) {
            return branch.branchName || branch.branchPath || '未命名支派';
          }

          function boolText(values?: boolean[]): BooleanText[] | undefined {
            return values?.map(value => String(value) as BooleanText);
          }

          function boolValues(values?: BooleanText[]): boolean[] | undefined {
            return values?.map(value => value === 'true');
          }

          const multiSelectProps = {
            mode: 'multiple' as const,
            allowClear: true,
            maxTagCount: 'responsive' as const
          };

          export function CultureSearchPanel(props: Props) {
            const [form] = Form.useForm<FormValues>();

            useEffect(() => {
              form.setFieldsValue({
                keyword: props.search.keyword,
                category: props.search.category,
                branchId: props.search.branchId,
                dataStatus: props.search.dataStatus,
                privacyLevel: props.search.privacyLevel,
                hasSource: boolText(props.search.hasSource),
                featuredOnHome: boolText(props.search.featuredOnHome),
                sort: props.search.sort
              });
            }, [form, props.search]);

            function submit(values: FormValues) {
              props.onSearch({
                ...props.search,
                keyword: values.keyword?.trim() || '',
                category: values.category?.length ? values.category : undefined,
                branchId: values.branchId?.length ? values.branchId : undefined,
                dataStatus: values.dataStatus?.length ? values.dataStatus : undefined,
                privacyLevel: values.privacyLevel?.length ? values.privacyLevel : undefined,
                hasSource: values.hasSource?.length ? boolValues(values.hasSource) : undefined,
                featuredOnHome: values.featuredOnHome?.length ? boolValues(values.featuredOnHome) : undefined,
                sort: values.sort || defaultCultureSearch.sort,
                pageNo: 1
              });
            }

            function reset() {
              form.resetFields();
              props.onSearch({ ...defaultCultureSearch, pageSize: props.search.pageSize });
            }

            return (
              <Card size="small" title="文化资料检索" extra={<Button type="primary" onClick={props.onCreate} disabled={!props.clanId}>新增资料</Button>}>
                <Form form={form} layout="vertical" onFinish={submit}>
                  <Row gutter={[12, 0]}>
                    <Col xs={24} sm={12} lg={6}><Form.Item name="keyword" label="关键词"><Input allowClear placeholder="标题、摘要、时期或地点" /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="category" label="分类"><Select {...multiSelectProps} placeholder="可多选" options={categoryOptions} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="branchId" label="支派"><Select {...multiSelectProps} placeholder="可多选" showSearch optionFilterProp="label" options={props.branches.filter(branch => branch.id).map(branch => ({ value: branch.id, label: branchLabel(branch) }))} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="dataStatus" label="状态"><Select {...multiSelectProps} placeholder="可多选" options={statusOptions} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="privacyLevel" label="可见范围"><Select {...multiSelectProps} placeholder="可多选" options={privacyOptions} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="hasSource" label="已有来源"><Select {...multiSelectProps} placeholder="可多选" options={booleanOptions} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="featuredOnHome" label="首页精选"><Select {...multiSelectProps} placeholder="可多选" options={booleanOptions} /></Form.Item></Col>
                    <Col xs={24} sm={12} lg={4}><Form.Item name="sort" label="排序"><Select options={sortOptions} /></Form.Item></Col>
                    <Col xs={24} lg={8} className="culture-search-actions">
                      <Space><Button type="primary" htmlType="submit" loading={props.loading}>查询</Button><Button onClick={reset}>重置</Button></Space>
                    </Col>
                  </Row>
                </Form>
              </Card>
            );
          }
          ''')

          write('frontend/genealogy-web/src/features/culture/cultureUrlState.ts', '''import type { CultureCategory, CultureDataStatus, CulturePrivacyLevel } from '../../shared/api/generated/culture-types';

          export type CultureSearchState = {
            keyword: string;
            category?: CultureCategory[];
            branchId?: number[];
            dataStatus?: CultureDataStatus[];
            privacyLevel?: CulturePrivacyLevel[];
            hasSource?: boolean[];
            featuredOnHome?: boolean[];
            sort: string;
            pageNo: number;
            pageSize: number;
          };

          export const defaultCultureSearch: CultureSearchState = {
            keyword: '', sort: 'updatedAt,desc', pageNo: 1, pageSize: 10
          };

          const categories: CultureCategory[] = [
            'surname_origin', 'hall_name', 'commandery', 'family_instruction', 'ancestor_instruction',
            'clan_rule', 'genealogy_preface', 'genealogy_rule', 'person_story', 'custom_tradition', 'other'
          ];
          const statuses: CultureDataStatus[] = ['draft', 'pending_review', 'official', 'rejected', 'archived'];
          const privacyLevels: CulturePrivacyLevel[] = ['public', 'clan_only', 'branch_only', 'relatives_only', 'private', 'sealed'];
          const sorts = ['updatedAt,desc', 'createdAt,desc', 'title,asc', 'category,asc', 'sortOrder,asc'];
          const keys = [
            'cultureKeyword', 'cultureCategory', 'cultureBranch', 'cultureStatus', 'culturePrivacy',
            'cultureHasSource', 'cultureFeatured', 'cultureSort', 'culturePage', 'culturePageSize', 'cultureItem'
          ];

          function positive(value: string | null, fallback?: number) {
            if (!value || !/^\\d+$/.test(value)) return fallback;
            const parsed = Number(value);
            return parsed > 0 ? parsed : fallback;
          }

          function unique<T>(values: T[]) {
            return [...new Set(values)];
          }

          function positiveMany(values: string[]) {
            const parsed = unique(values.map(value => positive(value)).filter((value): value is number => Boolean(value)));
            return parsed.length ? parsed : undefined;
          }

          function boolMany(values: string[]) {
            const parsed = unique(values.filter(value => value === 'true' || value === 'false').map(value => value === 'true'));
            return parsed.length ? parsed : undefined;
          }

          function valid<T extends string>(options: readonly T[], value: string | null) {
            return options.includes(value as T) ? value as T : undefined;
          }

          function validMany<T extends string>(options: readonly T[], values: string[]) {
            const parsed = unique(values.map(value => valid(options, value)).filter((value): value is T => Boolean(value)));
            return parsed.length ? parsed : undefined;
          }

          export function readCultureLocation(href = window.location.href) {
            const url = new URL(href, 'https://genealogy.local');
            const pageSize = positive(url.searchParams.get('culturePageSize'), 10) || 10;
            return {
              search: {
                keyword: String(url.searchParams.get('cultureKeyword') || '').trim().slice(0, 100),
                category: validMany(categories, url.searchParams.getAll('cultureCategory')),
                branchId: positiveMany(url.searchParams.getAll('cultureBranch')),
                dataStatus: validMany(statuses, url.searchParams.getAll('cultureStatus')),
                privacyLevel: validMany(privacyLevels, url.searchParams.getAll('culturePrivacy')),
                hasSource: boolMany(url.searchParams.getAll('cultureHasSource')),
                featuredOnHome: boolMany(url.searchParams.getAll('cultureFeatured')),
                sort: valid(sorts, url.searchParams.get('cultureSort')) || defaultCultureSearch.sort,
                pageNo: positive(url.searchParams.get('culturePage'), 1) || 1,
                pageSize: [10, 20, 50].includes(pageSize) ? pageSize : 10
              } satisfies CultureSearchState,
              selectedItemId: positive(url.searchParams.get('cultureItem'))
            };
          }

          function appendMany(params: URLSearchParams, key: string, values?: Array<string | number | boolean>) {
            values?.forEach(value => params.append(key, String(value)));
          }

          export function buildCultureLocation(href: string, search: CultureSearchState, selectedItemId?: number) {
            const url = new URL(href, 'https://genealogy.local');
            keys.forEach(key => url.searchParams.delete(key));
            const keyword = search.keyword.trim();
            if (keyword) url.searchParams.set('cultureKeyword', keyword);
            appendMany(url.searchParams, 'cultureCategory', search.category);
            appendMany(url.searchParams, 'cultureBranch', search.branchId);
            appendMany(url.searchParams, 'cultureStatus', search.dataStatus);
            appendMany(url.searchParams, 'culturePrivacy', search.privacyLevel);
            appendMany(url.searchParams, 'cultureHasSource', search.hasSource);
            appendMany(url.searchParams, 'cultureFeatured', search.featuredOnHome);
            if (search.sort !== defaultCultureSearch.sort) url.searchParams.set('cultureSort', search.sort);
            if (search.pageNo > 1) url.searchParams.set('culturePage', String(search.pageNo));
            if (search.pageSize !== defaultCultureSearch.pageSize) url.searchParams.set('culturePageSize', String(search.pageSize));
            if (selectedItemId) url.searchParams.set('cultureItem', String(selectedItemId));
            return `${url.pathname}${url.search}${url.hash}`;
          }

          export function buildCultureQueryString(search: CultureSearchState) {
            const params = new URLSearchParams();
            if (search.keyword.trim()) params.set('keyword', search.keyword.trim());
            appendMany(params, 'category', search.category);
            appendMany(params, 'branchId', search.branchId);
            appendMany(params, 'dataStatus', search.dataStatus);
            appendMany(params, 'privacyLevel', search.privacyLevel);
            appendMany(params, 'hasSource', search.hasSource);
            appendMany(params, 'featuredOnHome', search.featuredOnHome);
            params.set('sort', search.sort);
            params.set('pageNo', String(search.pageNo));
            params.set('pageSize', String(search.pageSize));
            return params.toString();
          }

          function stable<T extends string | number | boolean>(values?: T[]) {
            return values ? [...values].sort((left, right) => String(left).localeCompare(String(right))) : [];
          }

          export function cultureSearchKey(clanId: string, search: CultureSearchState) {
            return JSON.stringify([clanId, search.keyword.trim(), stable(search.category), stable(search.branchId),
              stable(search.dataStatus), stable(search.privacyLevel), stable(search.hasSource), stable(search.featuredOnHome),
              search.sort, search.pageNo, search.pageSize]);
          }
          ''')

          write('frontend/genealogy-web/src/features/culture/cultureLibraryService.ts', '''import { ApiRequestError, apiClient } from '../../shared/api/client';
          import type {
            CultureArchiveRequest,
            CultureCommandResponse,
            CultureItemCreateRequest,
            CultureItemDetailResponse,
            CultureItemPage,
            CultureItemUpdateRequest,
            CultureOverviewResponse,
            CultureQualityResponse,
            CultureSubmitReviewRequest
          } from '../../shared/api/generated/culture-types';
          import type { TrackingTraceDetailResponse } from '../../shared/api/generated/tracking-types';
          import { listBranches, listClans } from '../sources/sourceLibraryService';
          import { buildCultureQueryString, cultureSearchKey } from './cultureUrlState';
          import type { CultureSearchState } from './cultureUrlState';

          export type CultureClanOption = Awaited<ReturnType<typeof listClans>>[number];
          type RawCultureBranchOption = Awaited<ReturnType<typeof listBranches>>[number];
          export type CultureBranchOption = RawCultureBranchOption & { name: string };

          const cultureItemPageCache = new Map<string, CultureItemPage>();
          const cultureItemRefreshListeners = new Set<(message?: string) => void>();

          function refreshErrorText(error: unknown) {
            return error instanceof Error && error.message ? error.message : '文化资料刷新失败';
          }

          function publishCultureItemRefresh(message?: string) {
            cultureItemRefreshListeners.forEach(listener => listener(message));
          }

          export function subscribeCultureItemRefresh(listener: (message?: string) => void) {
            cultureItemRefreshListeners.add(listener);
            return () => {
              cultureItemRefreshListeners.delete(listener);
            };
          }

          export function listCultureClans() {
            return listClans();
          }

          export function listCultureBranches(clanId: string): Promise<CultureBranchOption[]> {
            return listBranches(clanId).then(rows => rows.map(row => ({
              ...row,
              name: row.branchName || row.branchPath || '未命名支派'
            })));
          }

          export function getCultureOverview(clanId: string) {
            return apiClient.get<CultureOverviewResponse>(`/clans/${clanId}/culture-overview`);
          }

          export function getCultureQuality(clanId: string) {
            return apiClient.get<CultureQualityResponse>(`/clans/${clanId}/culture-quality`);
          }

          export function listCultureItems(clanId: string, search: CultureSearchState) {
            const query = buildCultureQueryString(search);
            const cacheKey = cultureSearchKey(clanId, search);
            publishCultureItemRefresh(undefined);
            return apiClient.get<CultureItemPage>(`/clans/${clanId}/culture-items?${query}`)
              .then(page => {
                cultureItemPageCache.set(cacheKey, page);
                return page;
              })
              .catch(error => {
                if (error instanceof ApiRequestError && error.status === 403) throw error;
                const cached = cultureItemPageCache.get(cacheKey);
                if (!cached) throw error;
                publishCultureItemRefresh(refreshErrorText(error));
                return cached;
              });
          }

          export function getCultureItem(cultureItemId: number) {
            return apiClient.get<CultureItemDetailResponse>(`/culture-items/${cultureItemId}`);
          }

          export function createCultureItem(clanId: string, request: CultureItemCreateRequest) {
            return apiClient.post<CultureItemDetailResponse>(`/clans/${clanId}/culture-items`, request);
          }

          export function updateCultureItem(cultureItemId: number, request: CultureItemUpdateRequest) {
            return apiClient.put<CultureItemDetailResponse>(`/culture-items/${cultureItemId}`, request);
          }

          export function submitCultureItemReview(cultureItemId: number, request: CultureSubmitReviewRequest) {
            return apiClient.post<CultureCommandResponse>(`/culture-items/${cultureItemId}/submit-review`, request);
          }

          export function archiveCultureItem(cultureItemId: number, request: CultureArchiveRequest) {
            return apiClient.post<CultureCommandResponse>(`/culture-items/${cultureItemId}/archive`, request);
          }

          export function deleteCultureItem(cultureItemId: number) {
            return apiClient.delete<CultureCommandResponse>(`/culture-items/${cultureItemId}`);
          }

          export function getCultureTrace(clanId: string, cultureItemId: number) {
            return apiClient.get<TrackingTraceDetailResponse>(
              `/tracking/objects/culture_item/${cultureItemId}/trace?clanId=${encodeURIComponent(clanId)}`
            );
          }

          export function previewCultureAttachment(attachmentId: number) {
            return apiClient.download(`/source-attachments/${attachmentId}/preview`);
          }

          export function downloadCultureAttachment(attachmentId: number) {
            return apiClient.download(`/source-attachments/${attachmentId}/download`);
          }
          ''')

          write('frontend/genealogy-web/src/features/culture/cultureUrlState.test.mjs', '''import test from 'node:test';
          import assert from 'node:assert/strict';
          import { pathToFileURL } from 'node:url';
          import path from 'node:path';

          const modulePath = path.resolve('.culture-shell-test/features/culture/cultureUrlState.js');
          const { buildCultureLocation, buildCultureQueryString, defaultCultureSearch, readCultureLocation } = await import(pathToFileURL(modulePath).href);

          test('reads repeated culture item filters and keeps legacy single values compatible', () => {
            const location = readCultureLocation('https://example.test/?view=culture&tab=items&cultureKeyword=%E5%AE%B6%E8%AE%AD&cultureCategory=family_instruction&cultureCategory=clan_rule&cultureBranch=7&cultureBranch=8&cultureStatus=official&cultureStatus=draft&culturePrivacy=branch_only&culturePrivacy=clan_only&cultureHasSource=true&cultureHasSource=false&cultureFeatured=true&cultureSort=title%2Casc&culturePage=3&culturePageSize=20&cultureItem=88');
            assert.deepEqual(location, {
              search: {
                keyword: '家训',
                category: ['family_instruction', 'clan_rule'],
                branchId: [7, 8],
                dataStatus: ['official', 'draft'],
                privacyLevel: ['branch_only', 'clan_only'],
                hasSource: [true, false],
                featuredOnHome: [true],
                sort: 'title,asc',
                pageNo: 3,
                pageSize: 20
              },
              selectedItemId: 88
            });
          });

          test('falls back from invalid values without touching other tab state', () => {
            const location = readCultureLocation('https://example.test/?view=culture&tab=items&cultureCategory=invalid&culturePage=0&culturePageSize=999&migrationPage=4&sitePage=6');
            assert.equal(location.search.keyword, defaultCultureSearch.keyword);
            assert.equal(location.search.sort, defaultCultureSearch.sort);
            assert.equal(location.search.pageNo, defaultCultureSearch.pageNo);
            assert.equal(location.search.pageSize, defaultCultureSearch.pageSize);
            assert.equal(location.search.category, undefined);
            assert.equal(location.search.branchId, undefined);
            assert.equal(location.search.dataStatus, undefined);
            assert.equal(location.search.privacyLevel, undefined);

            const next = buildCultureLocation('https://example.test/?view=culture&tab=items&migrationPage=4&sitePage=6', {
              ...defaultCultureSearch,
              keyword: '堂号',
              category: ['hall_name', 'commandery'],
              branchId: [3, 5],
              pageNo: 2
            }, 19);
            const url = new URL(next, 'https://example.test');
            assert.equal(url.searchParams.get('view'), 'culture');
            assert.equal(url.searchParams.get('tab'), 'items');
            assert.equal(url.searchParams.get('migrationPage'), '4');
            assert.equal(url.searchParams.get('sitePage'), '6');
            assert.deepEqual(url.searchParams.getAll('cultureCategory'), ['hall_name', 'commandery']);
            assert.deepEqual(url.searchParams.getAll('cultureBranch'), ['3', '5']);
            assert.equal(url.searchParams.get('cultureKeyword'), '堂号');
            assert.equal(url.searchParams.get('culturePage'), '2');
            assert.equal(url.searchParams.get('cultureItem'), '19');
          });

          test('serializes repeated API query parameters for every multiselect dimension', () => {
            const query = buildCultureQueryString({
              ...defaultCultureSearch,
              category: ['family_instruction', 'clan_rule'],
              branchId: [7, 8],
              dataStatus: ['draft', 'official'],
              privacyLevel: ['clan_only', 'branch_only'],
              hasSource: [true, false],
              featuredOnHome: [true]
            });
            const params = new URLSearchParams(query);
            assert.deepEqual(params.getAll('category'), ['family_instruction', 'clan_rule']);
            assert.deepEqual(params.getAll('branchId'), ['7', '8']);
            assert.deepEqual(params.getAll('dataStatus'), ['draft', 'official']);
            assert.deepEqual(params.getAll('privacyLevel'), ['clan_only', 'branch_only']);
            assert.deepEqual(params.getAll('hasSource'), ['true', 'false']);
            assert.deepEqual(params.getAll('featuredOnHome'), ['true']);
          });
          ''')

          write('backend/genealogy-backend/src/main/java/com/genealogy/culture/dto/CultureItemSearchCriteria.java', '''package com.genealogy.culture.dto;

          import java.util.List;
          import java.util.Objects;

          public final class CultureItemSearchCriteria {

              private final String keyword;
              private final List<String> categories;
              private final List<Long> branchIds;
              private final List<String> dataStatuses;
              private final List<String> privacyLevels;
              private final List<Boolean> hasSourceValues;
              private final List<Boolean> featuredOnHomeValues;
              private final String sort;

              public CultureItemSearchCriteria(
                      String keyword,
                      String category,
                      Long branchId,
                      String dataStatus,
                      String privacyLevel,
                      Boolean hasSource,
                      Boolean featuredOnHome,
                      String sort
              ) {
                  this(keyword, single(category), single(branchId), single(dataStatus), single(privacyLevel),
                          single(hasSource), single(featuredOnHome), sort);
              }

              private CultureItemSearchCriteria(
                      String keyword,
                      List<String> categories,
                      List<Long> branchIds,
                      List<String> dataStatuses,
                      List<String> privacyLevels,
                      List<Boolean> hasSourceValues,
                      List<Boolean> featuredOnHomeValues,
                      String sort
              ) {
                  this.keyword = keyword;
                  this.categories = copy(categories);
                  this.branchIds = copy(branchIds);
                  this.dataStatuses = copy(dataStatuses);
                  this.privacyLevels = copy(privacyLevels);
                  this.hasSourceValues = copy(hasSourceValues);
                  this.featuredOnHomeValues = copy(featuredOnHomeValues);
                  this.sort = sort;
              }

              public static CultureItemSearchCriteria multi(
                      String keyword,
                      List<String> categories,
                      List<Long> branchIds,
                      List<String> dataStatuses,
                      List<String> privacyLevels,
                      List<Boolean> hasSourceValues,
                      List<Boolean> featuredOnHomeValues,
                      String sort
              ) {
                  return new CultureItemSearchCriteria(keyword, categories, branchIds, dataStatuses, privacyLevels,
                          hasSourceValues, featuredOnHomeValues, sort);
              }

              private static <T> List<T> single(T value) {
                  return value == null ? List.of() : List.of(value);
              }

              private static <T> List<T> copy(List<T> values) {
                  return values == null ? List.of() : values.stream().filter(Objects::nonNull).toList();
              }

              public String keyword() { return keyword; }
              public List<String> categories() { return categories; }
              public List<Long> branchIds() { return branchIds; }
              public List<String> dataStatuses() { return dataStatuses; }
              public List<String> privacyLevels() { return privacyLevels; }
              public List<Boolean> hasSourceValues() { return hasSourceValues; }
              public List<Boolean> featuredOnHomeValues() { return featuredOnHomeValues; }
              public String sort() { return sort; }

              public String category() { return categories.isEmpty() ? null : categories.get(0); }
              public Long branchId() { return branchIds.isEmpty() ? null : branchIds.get(0); }
              public String dataStatus() { return dataStatuses.isEmpty() ? null : dataStatuses.get(0); }
              public String privacyLevel() { return privacyLevels.isEmpty() ? null : privacyLevels.get(0); }
              public Boolean hasSource() { return hasSourceValues.isEmpty() ? null : hasSourceValues.get(0); }
              public Boolean featuredOnHome() { return featuredOnHomeValues.isEmpty() ? null : featuredOnHomeValues.get(0); }
          }
          ''')

          write('backend/genealogy-backend/src/main/java/com/genealogy/culture/controller/CultureItemController.java', '''package com.genealogy.culture.controller;

          import com.genealogy.auth.application.RequestContextApplicationService;
          import com.genealogy.auth.dto.RequestUserContext;
          import com.genealogy.common.api.ApiResponse;
          import com.genealogy.common.api.PageQuery;
          import com.genealogy.culture.application.CultureItemApplicationService;
          import com.genealogy.culture.domain.CultureItemDomainService;
          import com.genealogy.culture.dto.CultureCommandResponse;
          import com.genealogy.culture.dto.CultureItemCreateRequest;
          import com.genealogy.culture.dto.CultureItemDetailResponse;
          import com.genealogy.culture.dto.CultureItemPageResponse;
          import com.genealogy.culture.dto.CultureItemSearchCriteria;
          import com.genealogy.culture.dto.CultureItemUpdateRequest;
          import com.genealogy.culture.dto.CultureOverviewResponse;
          import jakarta.servlet.http.HttpServletRequest;
          import jakarta.validation.Valid;
          import jakarta.validation.constraints.Positive;
          import jakarta.validation.constraints.Size;
          import org.springframework.validation.annotation.Validated;
          import org.springframework.web.bind.annotation.DeleteMapping;
          import org.springframework.web.bind.annotation.GetMapping;
          import org.springframework.web.bind.annotation.PathVariable;
          import org.springframework.web.bind.annotation.PostMapping;
          import org.springframework.web.bind.annotation.PutMapping;
          import org.springframework.web.bind.annotation.RequestBody;
          import org.springframework.web.bind.annotation.RequestMapping;
          import org.springframework.web.bind.annotation.RequestParam;
          import org.springframework.web.bind.annotation.RestController;

          import java.util.List;

          @Validated
          @RestController
          @RequestMapping("/api/v1")
          public class CultureItemController {

              private final CultureItemApplicationService cultureItemApplicationService;
              private final RequestContextApplicationService requestContextApplicationService;

              public CultureItemController(
                      CultureItemApplicationService cultureItemApplicationService,
