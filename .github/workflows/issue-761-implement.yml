name: Issue 761 Implement

on:
  push:
    branches:
      - agent/issue-761-person-grouping
    paths:
      - '.github/workflows/issue-761-implement.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-761-implement
  cancel-in-progress: true

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-761-person-grouping
          fetch-depth: 0
      - name: Apply grouping changes
        run: python scripts/issue-761-implement.py
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm ci
      - name: Run person tests
        working-directory: frontend/genealogy-web
        run: npm run test:person-edit
      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/issue-761-implement.yml scripts/issue-761-implement.py
          git add frontend/genealogy-web tasks/issue-761-execution.md
          git commit -m 'feat: unify person information grouping'
          git push origin HEAD:agent/issue-761-person-grouping
