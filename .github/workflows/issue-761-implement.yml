name: Issue 761 Implement

on:
  pull_request:
    types: [ready_for_review]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-761-implement
  cancel-in-progress: true

jobs:
  implement:
    if: github.head_ref == 'agent/issue-761-person-grouping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-761-person-grouping
          fetch-depth: 0
      - name: Apply grouping changes
        run: python scripts/issue-761-implement.py
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture validation results
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          : > ../../tasks/issue-761-validation.txt
          npm run test:person-edit > /tmp/person-test.log 2>&1
          echo "person-test-status=$?" >> ../../tasks/issue-761-validation.txt
          tail -n 160 /tmp/person-test.log >> ../../tasks/issue-761-validation.txt
          npm run typecheck > /tmp/person-typecheck.log 2>&1
          echo "typecheck-status=$?" >> ../../tasks/issue-761-validation.txt
          tail -n 160 /tmp/person-typecheck.log >> ../../tasks/issue-761-validation.txt
          npm run build > /tmp/person-build.log 2>&1
          echo "build-status=$?" >> ../../tasks/issue-761-validation.txt
          tail -n 160 /tmp/person-build.log >> ../../tasks/issue-761-validation.txt
          exit 0
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/issue-761-implement.yml scripts/issue-761-implement.py
          git add frontend/genealogy-web tasks/issue-761-execution.md tasks/issue-761-validation.txt
          git commit -m 'feat: unify person information grouping'
          git push origin HEAD:agent/issue-761-person-grouping
