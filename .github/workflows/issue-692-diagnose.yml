name: Issue 692 Diagnose Migration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/issue-692-strict-two-layer-query-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Build diagnostic report
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          root = Path('frontend/genealogy-web')
          pages = [
            'src/features/persons/PersonArchiveSearchPage.tsx',
            'src/features/sources/SourceLibraryQueryPage.tsx',
            'src/features/logs/LogPage.tsx',
            'src/features/tree/LineageTreeProductPage.tsx',
            'src/features/imports/ImportPage.tsx',
            'src/features/workbench/EditingWorkspacePage.tsx',
            'src/features/culture/CultureItemStandardTab.tsx',
            'src/features/culture/MigrationEventStandardTab.tsx',
            'src/features/culture/CultureSiteStandardTab.tsx',
            'src/features/reviews/ReviewCenterPageContent.tsx',
            'src/features/members/MemberPage.tsx',
          ]
          lines = []
          for rel in pages:
            text = (root / rel).read_text()
            lines.append(f'{rel}: QueryResultCard={text.count("<QueryResultCard")}, businessTitle={text.count("businessTitle=")}, businessExtra={text.count("businessExtra=")}, businessClassName={text.count("businessClassName=")}')
          import_text = (root / 'e2e/import-page-pattern.spec.ts').read_text()
          tracking_text = (root / 'e2e/tracking-page-pattern.spec.ts').read_text()
          culture_text = (root / 'e2e/culture-page-pattern.spec.ts').read_text()
          lines.append(f'import function matches={len(re.findall(r"async function expectBusinessCardDirectChild\\(page: Page, minimumInset = 15\\) \\{.*?\\n\\}\\n", import_text, re.S))}')
          lines.append(f'tracking function matches={len(re.findall(r"async function expectResultHeaders\\(page: Page, title: string, total: string\\) \\{.*?\\n\\}\\n", tracking_text, re.S))}')
          lines.append(f'tracking calls={len(re.findall(r"await expectResultHeaders\\(page, \'[^\']+\', (\'[^\']+\')\\);", tracking_text))}')
          lines.append(f'culture function matches={len(re.findall(r"async function expectDoubleCardShell\\(page: Page, businessTitle: string, total: string\\) \\{.*?\\n\\}\\n", culture_text, re.S))}')
          lines.append(f'culture calls={len(re.findall(r"await expectDoubleCardShell\\(page, \'[^\']+\', (\'[^\']+\')\\);", culture_text))}')
          doc = Path('docs/22-frontend-query-page-pattern-spec.md').read_text()
          lines.append(f'docs has inner card={"内层业务结果 Card" in doc}')
          lines.append(f'docs has business rule={"BusinessResultCard" in doc}')
          Path('tasks/issue-692-diagnostic.txt').write_text('\n'.join(lines) + '\n')
          PY
      - name: Persist report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/issue-692-diagnostic.txt
          git diff --cached --quiet || git commit -m "chore: record issue 692 migration diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
