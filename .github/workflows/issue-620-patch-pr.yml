name: Apply issue 620 patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/issue-620-workbench-collapse-filters'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/temp_issue_620_patch.py
      - run: |
          rm scripts/temp_issue_620_patch.py .github/workflows/issue-620-patch-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/workbench/EditingWorkspacePage.tsx scripts/temp_issue_620_patch.py .github/workflows/issue-620-patch-pr.yml
          git commit -m "fix(workbench): place actions after collapse filters"
          git push origin HEAD:${{ github.head_ref }}
