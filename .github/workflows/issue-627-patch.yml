name: Apply issue 627 patch

on:
  push:
    branches:
      - agent/issue-627-workbench-filter-action-group
    paths:
      - .github/workflows/issue-627-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-627-workbench-filter-action-group
          fetch-depth: 0
      - run: python scripts/temp_issue_627_patch.py
      - run: rm scripts/temp_issue_627_patch.py .github/workflows/issue-627-patch.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/workbench/EditingWorkspacePage.tsx scripts/temp_issue_627_patch.py .github/workflows/issue-627-patch.yml
          git commit -m "fix(workbench): keep filter actions in one group"
          git push
