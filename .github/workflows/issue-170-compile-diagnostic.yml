name: Issue 170 Verify Diagnostic

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backend/genealogy-backend/**"
      - ".github/workflows/issue-170-compile-diagnostic.yml"

permissions:
  contents: read

jobs:
  verify-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Capture backend verify output
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          set +e
          mvn -B verify > /tmp/issue-170-verify.log 2>&1
          echo "exit_code=$?" >> /tmp/issue-170-verify.log
          exit 0
      - name: Upload verify output
        uses: actions/upload-artifact@v4
        with:
          name: issue-170-verify-log
          path: |
            /tmp/issue-170-verify.log
            backend/genealogy-backend/target/surefire-reports
          if-no-files-found: error
          retention-days: 1
