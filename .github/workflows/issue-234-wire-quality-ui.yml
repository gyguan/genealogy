name: Wire Issue 234 Quality UI

on:
  push:
    branches:
      - agent/issue-234-culture-governance-quality
    paths:
      - .github/workflows/issue-234-wire-quality-ui.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-234-culture-governance-quality
          fetch-depth: 0
      - name: Update culture product page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/features/culture/CultureProductPage.tsx')
          text = path.read_text()
          text = text.replace(
          "  CultureOverviewResponse\n} from '../../shared/api/generated/culture-types';",
          "  CultureOverviewResponse,\n  CultureQualityResponse\n} from '../../shared/api/generated/culture-types';")
          text = text.replace(
          "import { CultureOverviewPanel } from './CultureOverviewPanel';\n",
          "import { CultureOverviewPanel } from './CultureOverviewPanel';\nimport { CultureQualityPanel } from './CultureQualityPanel';\n")
          text = text.replace(
          "  getCultureOverview,\n  getCultureTrace,",
          "  getCultureOverview,\n  getCultureQuality,\n  getCultureTrace,")
          text = text.replace(
          "  const [overviewError, setOverviewError] = useState('');\n  const [items, setItems]",
          "  const [overviewError, setOverviewError] = useState('');\n  const [quality, setQuality] = useState<CultureQualityResponse | null>(null);\n  const [qualityLoading, setQualityLoading] = useState(false);\n  const [qualityError, setQualityError] = useState('');\n  const [qualityForbidden, setQualityForbidden] = useState(false);\n  const [qualityRefreshVersion, setQualityRefreshVersion] = useState(0);\n  const [items, setItems]")
          text = text.replace(
          "  const overviewRequest = useRef(0);\n  const detailRequest",
          "  const overviewRequest = useRef(0);\n  const qualityRequest = useRef(0);\n  const detailRequest")
          marker = "  useEffect(() => {\n    if (!clanId) {\n      setItems([]);"
          effect = """  useEffect(() => {
    if (!clanId) {
      setQuality(null);
      setQualityError('');
      setQualityForbidden(false);
      return;
    }
    const requestId = ++qualityRequest.current;
    setQualityLoading(true);
    setQualityError('');
    setQualityForbidden(false);
    getCultureQuality(clanId)
      .then(data => { if (requestId === qualityRequest.current) setQuality(data); })
      .catch(error => {
        if (requestId !== qualityRequest.current) return;
        setQualityError(errorText(error, '文化质量数据加载失败'));
        setQualityForbidden(forbidden(error));
      })
      .finally(() => { if (requestId === qualityRequest.current) setQualityLoading(false); });
  }, [clanId, refreshVersion, qualityRefreshVersion]);

"""
          if marker not in text:
              raise SystemExit('list effect marker not found')
          text = text.replace(marker, effect + marker, 1)
          text = text.replace(
          "      <CultureOverviewPanel overview={overview} loading={overviewLoading} error={overviewError} onOpenItem={openItem} />\n\n      <Card title=\"文化资料列表\">",
          "      <CultureOverviewPanel overview={overview} loading={overviewLoading} error={overviewError} onOpenItem={openItem} />\n\n      <CultureQualityPanel\n        quality={quality}\n        loading={qualityLoading}\n        error={qualityError}\n        forbidden={qualityForbidden}\n        onRetry={() => setQualityRefreshVersion(value => value + 1)}\n        onOpenCultureItem={openItem}\n      />\n\n      <Card title=\"文化资料列表\">")
          path.write_text(text)
          PY
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/issue-234-wire-quality-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/culture .github/workflows/issue-234-wire-quality-ui.yml
          git diff --cached --quiet || git commit -m "feat(culture): surface quality operations in library"
          git push origin HEAD:agent/issue-234-culture-governance-quality
