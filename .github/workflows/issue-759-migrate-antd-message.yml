name: Issue 759 migrate Ant Design Message

on:
  push:
    branches:
      - agent/issue-759-migrate-all-antd-message
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    # Idempotent verification after the one-time migration has been committed.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/genealogy-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-759-migrate-all-antd-message
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Run migration codemod
        run: |
          node scripts/migrate-antd-message.mjs
          sed -i "s/assert.equal(baseline.maxCounts.antd_message, 91)/assert.equal(baseline.maxCounts.antd_message, 0)/" src/shared/ui/FeedbackUnification.test.mjs
      - name: Commit migrated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src package.json feedback-audit-baseline.json
          if git diff --cached --quiet; then
            echo "No migration changes to commit"
          else
            git commit -m "refactor: migrate all direct Ant Design Message calls"
            git push origin HEAD:agent/issue-759-migrate-all-antd-message
          fi
      - name: Install dependencies
        run: npm install
      - name: Verify feedback contract
        run: npm run test:feedback
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
