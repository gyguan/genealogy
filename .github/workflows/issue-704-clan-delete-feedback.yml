name: Issue 704 Clan Delete Feedback

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  clan-delete-feedback:
    if: github.event.pull_request.head.ref == 'agent/issue-704-clan-delete-error-feedback'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Run draft delete regression tests
        working-directory: frontend/genealogy-web
        run: npm run test:draft-delete

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          npm run dev > /tmp/issue-704-vite.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/issue-704-vite.log
          exit 1

      - name: Run wizard Chromium E2E
        working-directory: frontend/genealogy-web
        run: npx playwright test e2e/wizard-query-result-pattern.spec.ts

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue-704-clan-delete-feedback-diagnostics
          path: |
            frontend/genealogy-web/playwright-report
            frontend/genealogy-web/test-results
            /tmp/issue-704-vite.log
          if-no-files-found: ignore
          retention-days: 5
