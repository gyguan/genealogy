name: Patch wizard business dependencies

on:
  push:
    branches: ["agent/fix-wizard-business-dependencies"]
    paths:
      - "scripts/patch-wizard-business-dependencies.mjs"
      - ".github/workflows/patch-wizard-business-dependencies.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-wizard-business-dependencies
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Patch wizard dependency model
        run: node scripts/patch-wizard-business-dependencies.mjs
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/mvp1/domain
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(frontend): decouple wizard navigation from completion order"
          git push origin HEAD:agent/fix-wizard-business-dependencies
