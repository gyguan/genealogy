name: Import Page Gate

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/import-page-gate.yml"

permissions:
  contents: write

jobs:
  apply-alert-fix:
    name: Apply page alert final fix
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-unify-page-alerts
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Fix person archive import contract
        working-directory: frontend/genealogy-web
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/features/persons/PersonArchiveSearchPage.tsx')
          s=p.read_text()
          marker="import type { MenuProps } from 'antd';"
          end=s.index(marker)
          imports="""import { useEffect, useMemo, useRef, useState } from 'react';
import { ExportOutlined, PlusOutlined } from '@ant-design/icons';
import { Button, Card, Collapse, Dropdown, Empty, Form, Input, Pagination, Result, Select, Space, Table, Tag } from 'antd';
"""
          p.write_text(imports+s[end:])
          Path('person-archive-gate.log').unlink(missing_ok=True)
          Path('.alert-migration-trigger').unlink(missing_ok=True)
          PY
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify targeted and frontend checks
        working-directory: frontend/genealogy-web
        run: |
          node --test src/features/persons/personArchiveUrlState.test.mjs src/features/persons/personCreateEntryModel.test.mjs
          npm run test:feedback
          npm run typecheck
          npm run build
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "fix: preserve person archive import contract"
          git push origin HEAD:agent/issue-771-unify-page-alerts
