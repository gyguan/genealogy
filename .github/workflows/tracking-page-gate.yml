name: Tracking Page Gate

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/src/features/logs/**"
      - "frontend/genealogy-web/src/page-content-cleanup.css"
      - "frontend/genealogy-web/e2e/tracking-page-pattern.spec.ts"
      - "frontend/genealogy-web/e2e/fluid-page-width.spec.ts"
      - ".github/workflows/tracking-page-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tracking-page-gate:
    name: Tracking Model and Chromium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Run tracking center model tests
        working-directory: frontend/genealogy-web
        run: npm run test:tracking-center

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          npm run dev > /tmp/tracking-vite.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tracking-vite.log
          exit 1

      - name: Run tracking Chromium E2E
        working-directory: frontend/genealogy-web
        run: npx playwright test e2e/tracking-page-pattern.spec.ts e2e/fluid-page-width.spec.ts

      - name: Upload tracking diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tracking-page-gate-diagnostics
          path: |
            frontend/genealogy-web/playwright-report
            frontend/genealogy-web/test-results
            /tmp/tracking-vite.log
          if-no-files-found: ignore
          retention-days: 5
