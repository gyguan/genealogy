name: Issue 170 Fix Test Fixture

on:
  push:
    branches: ["agent/issue-170-migration-timeline"]
    paths: [".github/workflows/issue-170-fix-test.yml"]

permissions:
  contents: write

jobs:
  fix-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-170-migration-timeline
      - name: Reconcile stable trace test fixture
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('backend/genealogy-backend/src/test/java/com/genealogy/culture/application/CultureAwareSourceBindingReviewApplicationServiceTest.java')
          text = path.read_text()

          replacements = [
              (
                  'import com.genealogy.culture.domain.CulturePermissionPolicyService;\n',
                  'import com.genealogy.culture.domain.CulturePermissionPolicyService;\nimport com.genealogy.culture.domain.MigrationEventPermissionPolicyService;\n'
              ),
              (
                  'import com.genealogy.culture.repository.CultureItemRepository;\n',
                  'import com.genealogy.culture.repository.CultureItemRepository;\nimport com.genealogy.culture.repository.MigrationEventRepository;\n'
              ),
              (
                  '    @Mock private CulturePermissionPolicyService culturePermissionPolicyService;\n',
                  '    @Mock private CulturePermissionPolicyService culturePermissionPolicyService;\n    @Mock private MigrationEventRepository migrationEventRepository;\n    @Mock private MigrationEventPermissionPolicyService migrationEventPermissionPolicyService;\n'
              ),
              (
                  '                cultureItemRepository,\n                culturePermissionPolicyService\n',
                  '                cultureItemRepository,\n                culturePermissionPolicyService,\n                migrationEventRepository,\n                migrationEventPermissionPolicyService\n'
              ),
              (
                  'org.mockito.ArgumentMatchers.eq("提交文化资料来源绑定审核")',
                  'org.mockito.ArgumentMatchers.eq("提交文化对象来源绑定审核")'
              )
          ]
          for old, new in replacements:
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f'missing test fixture anchor: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY

          rm -f tasks/issue-170-mvn-diagnostic.txt
          rm -f .github/workflows/issue-170-fix-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(issue-170): reconcile migration source review fixture"
          git push origin HEAD:agent/issue-170-migration-timeline
