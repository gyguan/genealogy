name: Issue 689 Remove Query Result Body

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  migrate-and-validate:
    if: github.event.pull_request.head.ref == 'agent/issue-689-remove-query-result-body' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove outer Ant Card body
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('frontend/genealogy-web')

          shared = root / 'src/shared/ui/QueryResultCards.tsx'
          shared.write_text("""import type { ReactNode } from 'react';
          import { Card, Typography } from 'antd';
          import type { CardProps } from 'antd';
          import './query-result-cards.css';

          type QueryResultProps = Omit<CardProps, 'title' | 'children'> & {
            total: number;
            totalSuffix?: string;
            businessTitle: ReactNode;
            businessExtra?: ReactNode;
            businessClassName?: string;
            children: ReactNode;
          };

          type BusinessResultProps = {
            title: ReactNode;
            extra?: ReactNode;
            children: ReactNode;
            className?: string;
          };

          function BusinessResultCard({ title, extra, children, className = '' }: BusinessResultProps) {
            return (
              <Card
                size="small"
                className={`business-result-card ${className}`.trim()}
                data-query-result-role="business"
                title={<Typography.Text strong className="business-result-card__title">{title}</Typography.Text>}
                extra={extra}
              >
                {children}
              </Card>
            );
          }

          export function QueryResultCard({
            total,
            totalSuffix = '条',
            businessTitle,
            businessExtra,
            businessClassName = '',
            children,
            className = '',
            extra,
            size = 'small',
            style,
            id
          }: QueryResultProps) {
            return (
              <section
                id={id}
                style={style}
                className={`query-result-outer-card ${className}`.trim()}
                data-query-result-role="outer"
                data-query-result-size={size}
              >
                <div className="query-result-outer-card__header">
                  <div className="query-result-card__title">
                    <Typography.Text strong>查询结果</Typography.Text>
                    <Typography.Text type="secondary">（共 {total} {totalSuffix}）</Typography.Text>
                  </div>
                  {extra ? <div className="query-result-outer-card__extra">{extra}</div> : null}
                </div>
                <BusinessResultCard
                  title={businessTitle}
                  extra={businessExtra}
                  className={businessClassName}
                >
                  {children}
                </BusinessResultCard>
              </section>
            );
          }
          """.replace('          ', ''))

          css = root / 'src/shared/ui/query-result-cards.css'
          css.write_text(""".query-result-outer-card {
            min-width: 0;
            overflow: hidden;
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
          }

          .query-result-outer-card__header {
            display: flex;
            min-height: 56px;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
          }

          .query-result-card__title {
            display: flex;
            min-width: 0;
            align-items: baseline;
            gap: 8px;
          }

          .query-result-card__title .ant-typography,
          .business-result-card__title.ant-typography {
            margin: 0;
          }

          .query-result-outer-card__extra {
            flex: 0 0 auto;
            margin-left: auto;
          }

          .query-result-outer-card > .business-result-card {
            width: calc(100% - 32px);
            margin: 16px;
          }

          .business-result-card {
            min-width: 0;
            border-color: #e5e7eb;
            background: #fafbfc;
            box-shadow: none;
          }

          .business-result-card > .ant-card-head {
            min-height: 56px;
            padding-inline: 16px;
            background: #fff;
          }

          .business-result-card > .ant-card-head .ant-card-head-wrapper {
            align-items: center;
          }

          .business-result-card > .ant-card-body {
            padding: 16px;
            background: #fff;
          }

          .business-result-card__title {
            display: inline-flex;
          }

          @media (max-width: 767px) {
            .query-result-outer-card__header {
              min-height: 0;
              align-items: stretch;
              flex-direction: column;
              gap: 12px;
              padding: 16px;
            }

            .query-result-card__title,
            .query-result-outer-card__extra {
              width: 100%;
              margin: 0;
            }

            .query-result-outer-card__extra .ant-btn,
            .business-result-card > .ant-card-head .ant-card-extra .ant-btn {
              min-height: 44px;
            }

            .query-result-outer-card > .business-result-card {
              width: calc(100% - 24px);
              margin: 12px;
            }

            .business-result-card > .ant-card-head .ant-card-head-wrapper {
              min-height: 0;
              align-items: stretch;
              flex-direction: column;
              gap: 12px;
              padding-block: 16px;
            }

            .business-result-card > .ant-card-head .ant-card-head-title,
            .business-result-card > .ant-card-head .ant-card-extra {
              width: 100%;
              margin: 0;
              padding: 0;
            }

            .business-result-card > .ant-card-body {
              padding: 12px;
            }
          }
          """.replace('          ', ''))

          test_file = root / 'src/shared/ui/QueryResultCards.test.mjs'
          test_file.write_text("""import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import test from 'node:test';

          const files = [
            ['features/persons/PersonArchiveSearchPage.tsx', '人物档案'],
            ['features/sources/SourceLibraryQueryPage.tsx', '来源资料'],
            ['features/logs/LogPage.tsx', '业务对象'],
            ['features/tree/LineageTreeProductPage.tsx', '世系图谱'],
            ['features/imports/ImportPage.tsx', '导入任务'],
            ['features/workbench/EditingWorkspacePage.tsx', '修谱任务'],
            ['features/culture/CultureItemStandardTab.tsx', '文化资料'],
            ['features/culture/MigrationEventStandardTab.tsx', '迁徙脉络'],
            ['features/culture/CultureSiteStandardTab.tsx', '文化场所'],
            ['features/reviews/ReviewCenterPageContent.tsx', '审核任务'],
            ['features/members/MemberPage.tsx', '成员列表']
          ];

          test('pages keep one shared QueryResultCard configuration', () => {
            for (const [relativePath, businessTitle] of files) {
              const source = readFileSync(new URL(`../../${relativePath}`, import.meta.url), 'utf8');
              assert.equal((source.match(/<QueryResultCard/g) || []).length, 1, `${relativePath} should render one result container`);
              assert.match(source, /\stotal=\{/);
              assert.match(source, /\sbusinessTitle=/);
              assert.ok(source.includes(businessTitle), `${relativePath} should expose ${businessTitle}`);
              assert.doesNotMatch(source, /BusinessResultCard/, `${relativePath} must not assemble the inner card`);
            }
          });

          test('QueryResultCard uses a custom outer section and directly owns one BusinessResultCard', () => {
            const source = readFileSync(new URL('./QueryResultCards.tsx', import.meta.url), 'utf8');
            const component = source.slice(source.indexOf('export function QueryResultCard'));
            assert.equal((component.match(/<BusinessResultCard/g) || []).length, 1);
            assert.match(component, /<section[\s\S]*data-query-result-role="outer"[\s\S]*>\s*<div className="query-result-outer-card__header">[\s\S]*<BusinessResultCard/);
            assert.doesNotMatch(component, /<Card[\s\S]*data-query-result-role="outer"/);
            assert.doesNotMatch(component, /ant-card-body/);
          });

          test('shared styles make the business card a direct child without an outer card body', () => {
            const source = readFileSync(new URL('./query-result-cards.css', import.meta.url), 'utf8');
            assert.match(source, /\.query-result-outer-card\s*>\s*\.business-result-card/);
            assert.doesNotMatch(source, /\.query-result-outer-card\s*>\s*\.ant-card-body/);
          });
          """.replace('          ', ''))

          import_e2e = root / 'e2e/import-page-pattern.spec.ts'
          source = import_e2e.read_text()
          source = source.replace("const header = resultCard.locator(':scope > .ant-card-head');", "const header = resultCard.locator(':scope > .query-result-outer-card__header');")
          source = source.replace("const titleGroup = resultCard.locator(':scope > .ant-card-head .ant-card-head-title');", "const titleGroup = resultCard.locator(':scope > .query-result-outer-card__header > .query-result-card__title');")
          source = re.sub(
              r"async function expectBusinessCardNestedInsideOuterBody\(page: Page\) \{[\s\S]*?\n\}",
              """async function expectBusinessCardDirectChild(page: Page) {
            const outerCard = page.locator('.import-result-card');
            const outerHeader = outerCard.locator(':scope > .query-result-outer-card__header');
            const businessCard = outerCard.locator(':scope > .business-result-card[data-query-result-role=\"business\"]');
            await expect(outerCard.locator(':scope > .ant-card-body')).toHaveCount(0);
            await expect(businessCard).toHaveCount(1);

            const [outerCardBox, outerHeaderBox, businessCardBox, outerBackground] = await Promise.all([
              outerCard.boundingBox(),
              outerHeader.boundingBox(),
              businessCard.boundingBox(),
              outerCard.evaluate(element => getComputedStyle(element).backgroundColor)
            ]);
            expect(outerCardBox).not.toBeNull();
            expect(outerHeaderBox).not.toBeNull();
            expect(businessCardBox).not.toBeNull();
            expect(outerBackground).toBe('rgb(255, 255, 255)');
            if (!outerCardBox || !outerHeaderBox || !businessCardBox) return;

            expect(businessCardBox.x - outerCardBox.x).toBeGreaterThanOrEqual(15);
            expect(businessCardBox.y - outerHeaderBox.y - outerHeaderBox.height).toBeGreaterThanOrEqual(15);
            expect(outerCardBox.x + outerCardBox.width - businessCardBox.x - businessCardBox.width).toBeGreaterThanOrEqual(15);
            expect(outerCardBox.y + outerCardBox.height - businessCardBox.y - businessCardBox.height).toBeGreaterThanOrEqual(15);
          }""",
              source,
              count=1,
          )
          source = source.replace("const outerResultHeader = page.locator('.import-result-card > .ant-card-head');", "const outerResultHeader = page.locator('.import-result-card > .query-result-outer-card__header');")
          source = source.replace("const businessResultHeader = page.locator('.import-result-card > .ant-card-body > .business-result-card > .ant-card-head');", "const businessResultHeader = page.locator('.import-result-card > .business-result-card > .ant-card-head');")
          source = source.replace('expectBusinessCardNestedInsideOuterBody', 'expectBusinessCardDirectChild')
          source = source.replace("const headerWrapper = page.locator('.import-result-card > .ant-card-head > .ant-card-head-wrapper');", "const headerWrapper = page.locator('.import-result-card > .query-result-outer-card__header');")
          import_e2e.write_text(source)

          tracking_e2e = root / 'e2e/tracking-page-pattern.spec.ts'
          source = tracking_e2e.read_text()
          source = source.replace("const outerHeader = resultCard.locator(':scope > .ant-card-head');", "const outerHeader = resultCard.locator(':scope > .query-result-outer-card__header');")
          source = source.replace("const businessCard = resultCard.locator(':scope > .ant-card-body > .business-result-card');", "const businessCard = resultCard.locator(':scope > .business-result-card');")
          source = source.replace("page.locator('.tracking-result-card > .ant-card-head')", "page.locator('.tracking-result-card > .query-result-outer-card__header')")
          source = source.replace("await expect(businessCard).toHaveCount(1);", "await expect(resultCard.locator(':scope > .ant-card-body')).toHaveCount(0);\n  await expect(businessCard).toHaveCount(1);", 1)
          tracking_e2e.write_text(source)

          culture_e2e = root / 'e2e/culture-page-pattern.spec.ts'
          source = culture_e2e.read_text()
          source = source.replace("const outerHeader = resultCard.locator(':scope > .ant-card-head');", "const outerHeader = resultCard.locator(':scope > .query-result-outer-card__header');")
          source = source.replace("const businessHeader = resultCard.locator('.business-result-card > .ant-card-head');", "await expect(resultCard.locator(':scope > .ant-card-body')).toHaveCount(0);\n  const businessHeader = resultCard.locator(':scope > .business-result-card > .ant-card-head');")
          culture_e2e.write_text(source)

          docs = Path('docs/22-frontend-query-page-pattern-spec.md')
          doc = docs.read_text()
          old = '- 页面只使用 `QueryResultCard`；内层 `BusinessResultCard` 必须由共享组件内部唯一创建，禁止页面自行拼装两层 Card；'
          new = old + '\n- 外层 `QueryResultCard` 使用自定义语义容器，不使用 Ant Design `Card`，不得生成 `.ant-card-body`；内层业务 Card 必须是 `.query-result-outer-card` 的直接子节点；'
          if new not in doc:
              doc = doc.replace(old, new)
          docs.write_text(doc)

          task = Path('tasks/issue-689-execution.md')
          task.write_text(task.read_text().replace('- [ ]', '- [x]'))
          PY

      - name: Persist implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/22-frontend-query-page-pattern-spec.md \
            frontend/genealogy-web/src/shared/ui/QueryResultCards.tsx \
            frontend/genealogy-web/src/shared/ui/query-result-cards.css \
            frontend/genealogy-web/src/shared/ui/QueryResultCards.test.mjs \
            frontend/genealogy-web/e2e/import-page-pattern.spec.ts \
            frontend/genealogy-web/e2e/tracking-page-pattern.spec.ts \
            frontend/genealogy-web/e2e/culture-page-pattern.spec.ts \
            tasks/issue-689-execution.md
          git diff --cached --quiet || git commit -m "fix: remove outer query result card body"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Validate query result DOM
        working-directory: frontend/genealogy-web
        run: node --test src/shared/ui/QueryResultCards.test.mjs

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build
