name: Issue 763 finish wizard feedback unification

on:
  push:
    branches:
      - agent/issue-763-finish-wizard-feedback-unification

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/genealogy-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-763-finish-wizard-feedback-unification
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Apply wizard feedback migration
        run: node scripts/finish-wizard-feedback-unification.mjs
      - name: Install dependencies
        run: npm install
      - name: Verify feedback contract
        run: npm run test:feedback
      - name: Verify wizard tests
        run: |
          npm run test:wizard
          npm run test:wizard-session
          npm run test:wizard-dependencies
          npm run test:wizard-forms
          npm run test:generation-validation
          npm run test:wizard-result-lists
          npm run test:wizard-summary
          npm run test:wizard-completion
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src frontend/genealogy-web/package.json
          git commit -m "refactor: finish wizard feedback unification"
          git push origin HEAD:agent/issue-763-finish-wizard-feedback-unification
