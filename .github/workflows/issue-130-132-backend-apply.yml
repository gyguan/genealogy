name: Issue 130-132 Backend Apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply backend closure
        run: |
          python3 .github/scripts/issue-130-132-backend-apply.py
          python3 .github/scripts/issue-130-132-import-route-fix.py
          python3 .github/scripts/issue-130-132-migration-order-fix.py
          python3 .github/scripts/issue-130-132-compat-index-fix.py
      - name: Run full backend tests
        working-directory: backend/genealogy-backend
        run: mvn -q clean test
      - name: Package and start with PostgreSQL/Flyway
        working-directory: backend/genealogy-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
          SPRING_FLYWAY_ENABLED: 'true'
        shell: bash
        run: |
          mvn -q -DskipTests package
          java -jar target/genealogy-backend-0.1.0-SNAPSHOT.jar >/tmp/auth-closure-startup.log 2>&1 &
          pid=$!
          trap 'kill $pid >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo 'PostgreSQL startup check passed.'
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              tail -n 180 /tmp/auth-closure-startup.log
              exit 1
            fi
            sleep 2
          done
          tail -n 180 /tmp/auth-closure-startup.log
          exit 1
      - name: Commit verified backend closure and remove temporary assets
        shell: bash
        run: |
          rm .github/workflows/issue-130-132-backend-apply.yml
          rm .github/scripts/issue-130-132-backend-apply.py
          rm .github/scripts/issue-130-132-import-route-fix.py
          rm .github/scripts/issue-130-132-migration-order-fix.py
          rm .github/scripts/issue-130-132-compat-index-fix.py
          rm -f tasks/issue-130-132-backend-diagnostic.md tasks/issue-130-132-startup-diagnostic.md tasks/issue-130-132-startup-diagnostic-2.md tasks/issue-130-132-startup-diagnostic-3.md tasks/issue-132-baseline-inspection.md
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'security(auth): enforce cooldown and session lifecycle'
          git push
