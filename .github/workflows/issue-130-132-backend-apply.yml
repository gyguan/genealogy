      - name: Run full backend tests
        working-directory: backend/genealogy-backend
        run: mvn -B clean test
      - name: Package and start with PostgreSQL/Flyway
        working-directory: backend/genealogy-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
          SPRING_FLYWAY_ENABLED: 'true'
        shell: bash
        run: |
          mvn -q -DskipTests package
          java -jar target/genealogy-backend-0.1.0-SNAPSHOT.jar >/tmp/auth-closure-startup.log 2>&1 &
          pid=$!
          trap 'kill $pid >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo 'PostgreSQL startup check passed.'
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              tail -n 160 /tmp/auth-closure-startup.log
              exit 1
            fi
            sleep 2
          done
          tail -n 160 /tmp/auth-closure-startup.log
          exit 1
      - name: Commit verified backend closure and remove workflow
        shell: bash
        run: |
          rm .github/workflows/issue-130-132-backend-apply.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add backend/genealogy-backend .github/workflows/issue-130-132-backend-apply.yml
          git commit -m 'security(auth): enforce cooldown and session lifecycle'
          git push
