name: Issue 121 Targeted Check

on:
  pull_request:
    branches:
      - main
    paths:
      - backend/genealogy-backend/src/main/java/com/genealogy/tracking/**
      - backend/genealogy-backend/src/main/java/com/genealogy/operationlog/**
      - backend/genealogy-backend/src/main/java/com/genealogy/review/repository/**
      - backend/genealogy-backend/src/main/java/com/genealogy/source/repository/**
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/**
      - .github/workflows/issue-121-targeted-check.yml

permissions:
  contents: read

jobs:
  backend-targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run issue 121 backend tests
        working-directory: backend/genealogy-backend
        run: mvn -DtrimStackTrace=false -Dtest=TrackingTraceApplicationServiceTest,TrackingObjectQueryRepositoryTest,TrackingControllerTest test
