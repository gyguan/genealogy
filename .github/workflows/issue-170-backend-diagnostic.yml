name: Issue 170 Backend Diagnostic

on:
  push:
    branches: ["agent/issue-170-migration-timeline"]
    paths: [".github/workflows/issue-170-backend-diagnostic.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-170-migration-timeline
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Capture backend failure tail
        shell: bash
        run: |
          set +e
          cd backend/genealogy-backend
          mvn -B test package > /tmp/issue-170-backend.log 2>&1
          status=$?
          cd ../..
          mkdir -p tasks
          tail -n 220 /tmp/issue-170-backend.log > tasks/issue-170-backend-diagnostic.txt
          rm -f .github/workflows/issue-170-backend-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(issue-170): capture backend diagnostic"
          git push origin HEAD:agent/issue-170-migration-timeline
          exit "$status"
