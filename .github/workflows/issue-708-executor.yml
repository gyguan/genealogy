name: Issue 708 branch executor

on:
  push:
    branches:
      - agent/issue-708-approved-dependencies
    paths:
      - .github/workflows/issue-708-executor.yml

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-708-approved-dependencies
          fetch-depth: 0
      - name: Implement validate and persist result
        shell: bash
        run: |
          set +e
          LOG=issue-708-execution.log
          : > "$LOG"

          echo '=== apply patch ===' >> "$LOG"
          python scripts/issue-708-apply.py >> "$LOG" 2>&1
          status=$?

          if [ "$status" -eq 0 ]; then
            echo '=== git diff check ===' >> "$LOG"
            git diff --check >> "$LOG" 2>&1
            status=$?
          fi

          if [ "$status" -eq 0 ]; then
            echo '=== backend tests ===' >> "$LOG"
            (cd backend/genealogy-backend && mvn -q test) >> "$LOG" 2>&1
            status=$?
          fi

          if [ "$status" -eq 0 ]; then
            echo '=== frontend install ===' >> "$LOG"
            (cd frontend/genealogy-web && npm ci) >> "$LOG" 2>&1
            status=$?
          fi

          if [ "$status" -eq 0 ]; then
            echo '=== frontend typecheck ===' >> "$LOG"
            (cd frontend/genealogy-web && npm run typecheck) >> "$LOG" 2>&1
            status=$?
          fi

          for command in test:wizard test:wizard-dependencies test:source-stage test:person-edit test:imports test:culture-shell build; do
            if [ "$status" -eq 0 ]; then
              echo "=== frontend $command ===" >> "$LOG"
              (cd frontend/genealogy-web && npm run "$command") >> "$LOG" 2>&1
              status=$?
            fi
          done

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [ "$status" -ne 0 ]; then
            mkdir -p tasks
            cp "$LOG" tasks/issue-708-failure.log
            git add tasks/issue-708-failure.log
            git commit -m 'chore: record issue 708 validation failure' || true
            git push origin HEAD:agent/issue-708-approved-dependencies
            cat "$LOG"
            exit "$status"
          fi

          python - <<'PY'
          from pathlib import Path

          task = Path('tasks/issue-708-execution.md')
          text = task.read_text(encoding='utf-8')
          for item in [
              '建立后端统一依赖审核策略',
              '接入支派、字辈、人物、关系、来源绑定写接口',
              '接入宗族文化与导入场景',
              '收紧前端依赖对象候选过滤',
              '增加自动化测试',
              '通过前后端 CI'
          ]:
              text = text.replace(f'- [ ] {item}', f'- [x] {item}')
          task.write_text(text, encoding='utf-8')

          for name in [
              '.github/workflows/issue-708-implementation.yml',
              '.github/workflows/issue-708-diagnostic.yml',
              '.github/workflows/issue-708-executor.yml',
              'scripts/issue-708-apply.py',
              'tasks/issue-708-failure.log'
          ]:
              path = Path(name)
              if path.exists():
                  path.unlink()
          PY

          rm -f "$LOG" backend-test.log
          git add -A
          git commit -m 'feat: require approved dependency objects'
          git push origin HEAD:agent/issue-708-approved-dependencies
