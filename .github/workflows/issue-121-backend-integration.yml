name: Issue 121 Backend Integration

on:
  push:
    branches:
      - agent/issue-121-trace-aggregation
    paths:
      - scripts/issue-121-backend-patch.py
      - .github/workflows/issue-121-backend-integration.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Apply integration patch
        run: python scripts/issue-121-backend-patch.py
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests compile
      - name: Commit integrated backend
        run: |
          rm scripts/issue-121-backend-patch.py .github/workflows/issue-121-backend-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate issue 121 trace backend"
          git push origin HEAD:agent/issue-121-trace-aggregation
