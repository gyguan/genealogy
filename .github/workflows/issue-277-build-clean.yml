name: Issue 277 Build Clean Branch

on:
  push:
    branches: ["agent/issue-277-builder"]
    paths: [".github/workflows/issue-277-build-clean.yml"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-277-builder
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Apply implementation to clean branch
        shell: bash
        run: |
          cp .github/issue-277-patch.py /tmp/issue-277-patch.py
          git fetch origin agent/issue-277-search-multiselect
          git switch -C agent/issue-277-search-multiselect origin/agent/issue-277-search-multiselect
          python /tmp/issue-277-patch.py
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/genealogy-backend/src/test/java/com/genealogy/culture/domain/CultureSearchMultiSelectDomainServiceTest.java')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'import static org.junit.jupiter.api.Assertions.assertThrows;',
              'import static org.junit.jupiter.api.Assertions.assertThrows;\nimport static org.junit.jupiter.api.Assertions.assertNull;'
          )
          text = text.replace('assertEquals("sequenceNo,asc", normalized.sort());', 'assertNull(normalized.sort());')
          text = text.replace('assertEquals("sortOrder,asc", normalized.sort());', 'assertNull(normalized.sort());')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate frontend and API contract
        shell: bash
        run: |
          cd frontend/genealogy-web
          npm install --package-lock=false
          npm run test:culture-shell
          npm run typecheck
          npm run build
          cd ../..
          bash scripts/api/check-api-contract.sh
          rm -f frontend/genealogy-web/package-lock.json
      - name: Validate backend multi-select normalization
        working-directory: backend/genealogy-backend
        shell: bash
        run: |
          mvn -q -DskipITs -Dtest=CultureSearchMultiSelectDomainServiceTest test || {
            find target/surefire-reports -maxdepth 1 -type f -name '*.txt' -print -exec cat {} \;
            exit 1
          }
      - name: Publish one clean implementation commit
        shell: bash
        run: |
          test ! -e .github/workflows/issue-277-build-clean.yml
          test ! -e .github/issue-277-patch.py
          rm -f frontend/genealogy-web/package-lock.json
          git config user.name "openai-agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          git commit -m "feat(culture): sync multi-select filters across tabs"
          git push --force origin HEAD:agent/issue-277-search-multiselect
