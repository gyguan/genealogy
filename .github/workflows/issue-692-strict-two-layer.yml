name: Issue 692 Strict Two Layer Query Results

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  migrate-and-validate:
    if: github.event.pull_request.head.ref == 'agent/issue-692-strict-two-layer-query-results' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove third result layer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('frontend/genealogy-web')
          pages = [
              root / 'src/features/persons/PersonArchiveSearchPage.tsx',
              root / 'src/features/sources/SourceLibraryQueryPage.tsx',
              root / 'src/features/logs/LogPage.tsx',
              root / 'src/features/tree/LineageTreeProductPage.tsx',
              root / 'src/features/imports/ImportPage.tsx',
              root / 'src/features/workbench/EditingWorkspacePage.tsx',
              root / 'src/features/culture/CultureItemStandardTab.tsx',
              root / 'src/features/culture/MigrationEventStandardTab.tsx',
              root / 'src/features/culture/CultureSiteStandardTab.tsx',
              root / 'src/features/reviews/ReviewCenterPageContent.tsx',
              root / 'src/features/members/MemberPage.tsx',
          ]

          def opening_tag_end(source: str, start: int) -> int:
              depth = 0
              quote = ''
              escaped = False
              for index in range(start, len(source)):
                  char = source[index]
                  if quote:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == quote:
                          quote = ''
                      continue
                  if char in ('"', "'", '`'):
                      quote = char
                  elif char == '{':
                      depth += 1
                  elif char == '}':
                      depth -= 1
                  elif char == '>' and depth == 0:
                      return index + 1
              raise AssertionError(f'Unclosed JSX tag at {start}')

          def prop_span(tag: str, name: str):
              match = re.search(rf'\s+{re.escape(name)}\s*=\s*', tag)
              if not match:
                  return None
              value_start = match.end()
              if tag[value_start] in ('"', "'"):
                  quote = tag[value_start]
                  index = value_start + 1
                  escaped = False
                  while index < len(tag):
                      char = tag[index]
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == quote:
                          return match.start(), index + 1
                      index += 1
              if tag[value_start] == '{':
                  depth = 0
                  quote = ''
                  escaped = False
                  for index in range(value_start, len(tag)):
                      char = tag[index]
                      if quote:
                          if escaped:
                              escaped = False
                          elif char == '\\':
                              escaped = True
                          elif char == quote:
                              quote = ''
                          continue
                      if char in ('"', "'", '`'):
                          quote = char
                      elif char == '{':
                          depth += 1
                      elif char == '}':
                          depth -= 1
                          if depth == 0:
                              return match.start(), index + 1
              raise AssertionError(f'Unsupported {name} value in {tag}')

          def remove_prop(tag: str, name: str) -> str:
              span = prop_span(tag, name)
              if not span:
                  return tag
              return tag[:span[0]] + tag[span[1]:]

          for path in pages:
              source = path.read_text()
              start = source.index('<QueryResultCard')
              end = opening_tag_end(source, start)
              tag = source[start:end]
              tag = remove_prop(tag, 'businessTitle')
              tag = remove_prop(tag, 'businessClassName')
              tag = re.sub(r'(\s+)businessExtra(\s*=)', r'\1resultExtra\2', tag)
              source = source[:start] + tag + source[end:]
              assert 'businessTitle=' not in source, path
              assert 'businessClassName=' not in source, path
              assert 'businessExtra=' not in source, path
              path.write_text(source)

          shared = root / 'src/shared/ui/QueryResultCards.tsx'
          shared.write_text("""import type { HTMLAttributes, ReactNode } from 'react';
          import { Typography } from 'antd';
          import type { CardProps } from 'antd';
          import './query-result-cards.css';

          type QueryResultProps = Omit<HTMLAttributes<HTMLElement>, 'title' | 'children'> & {
            total: number;
            totalSuffix?: string;
            extra?: ReactNode;
            resultExtra?: ReactNode;
            size?: CardProps['size'];
            children: ReactNode;
          };

          export function QueryResultCard({
            total,
            totalSuffix = '条',
            children,
            className = '',
            extra,
            resultExtra,
            size = 'small',
            ...sectionProps
          }: QueryResultProps) {
            return (
              <section
                {...sectionProps}
                className={`query-result-outer-card ${className}`.trim()}
                data-query-result-role="outer"
                data-query-result-size={size}
              >
                <div className="query-result-outer-card__header">
                  <div className="query-result-card__title">
                    <Typography.Text strong>查询结果</Typography.Text>
                    <Typography.Text type="secondary">（共 {total} {totalSuffix}）</Typography.Text>
                  </div>
                  {resultExtra || extra ? (
                    <div className="query-result-outer-card__actions">
                      {resultExtra ? <div className="query-result-outer-card__result-extra">{resultExtra}</div> : null}
                      {extra ? <div className="query-result-outer-card__extra">{extra}</div> : null}
                    </div>
                  ) : null}
                </div>
                {children}
              </section>
            );
          }
          """.replace('          ', ''))

          styles = root / 'src/shared/ui/query-result-cards.css'
          styles.write_text(""".query-result-outer-card {
            min-width: 0;
            overflow: hidden;
            padding: 0 16px 16px;
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
          }

          .query-result-outer-card__header {
            display: flex;
            min-height: 56px;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin: 0 -16px 16px;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
          }

          .query-result-card__title {
            display: flex;
            min-width: 0;
            align-items: baseline;
            gap: 8px;
          }

          .query-result-card__title .ant-typography {
            margin: 0;
          }

          .query-result-outer-card__actions {
            display: flex;
            flex: 0 0 auto;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-left: auto;
          }

          .query-result-outer-card__result-extra,
          .query-result-outer-card__extra {
            min-width: 0;
          }

          @media (max-width: 767px) {
            .query-result-outer-card {
              padding: 0 12px 12px;
            }

            .query-result-outer-card__header {
              min-height: 0;
              align-items: stretch;
              flex-direction: column;
              gap: 12px;
              margin: 0 -12px 12px;
              padding: 16px 12px;
            }

            .query-result-card__title,
            .query-result-outer-card__actions,
            .query-result-outer-card__result-extra,
            .query-result-outer-card__extra {
              width: 100%;
              margin: 0;
            }

            .query-result-outer-card__actions {
              align-items: stretch;
              flex-direction: column;
            }

            .query-result-outer-card__actions .ant-btn {
              min-height: 44px;
            }
          }
          """.replace('          ', ''))

          test_file = root / 'src/shared/ui/QueryResultCards.test.mjs'
          test_file.write_text("""import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import test from 'node:test';

          const files = [
            'features/persons/PersonArchiveSearchPage.tsx',
            'features/sources/SourceLibraryQueryPage.tsx',
            'features/logs/LogPage.tsx',
            'features/tree/LineageTreeProductPage.tsx',
            'features/imports/ImportPage.tsx',
            'features/workbench/EditingWorkspacePage.tsx',
            'features/culture/CultureItemStandardTab.tsx',
            'features/culture/MigrationEventStandardTab.tsx',
            'features/culture/CultureSiteStandardTab.tsx',
            'features/reviews/ReviewCenterPageContent.tsx',
            'features/members/MemberPage.tsx'
          ];

          test('pages use one QueryResultCard without business-card configuration', () => {
            for (const relativePath of files) {
              const source = readFileSync(new URL(`../../${relativePath}`, import.meta.url), 'utf8');
              assert.equal((source.match(/<QueryResultCard/g) || []).length, 1, `${relativePath} should render one result container`);
              assert.match(source, /\stotal=\{/);
              assert.doesNotMatch(source, /businessTitle|businessExtra|businessClassName|BusinessResultCard/);
            }
          });

          test('QueryResultCard renders result children directly after its header', () => {
            const source = readFileSync(new URL('./QueryResultCards.tsx', import.meta.url), 'utf8');
            const component = source.slice(source.indexOf('export function QueryResultCard'));
            assert.match(component, /<section[\s\S]*data-query-result-role="outer"[\s\S]*>\s*<div className="query-result-outer-card__header">[\s\S]*<\/div>\s*\{children\}\s*<\/section>/);
            assert.doesNotMatch(component, /BusinessResultCard|business-result-card|<Card|ant-card-body|query-result-content/);
          });

          test('shared styles contain no third-layer result card or content wrapper', () => {
            const source = readFileSync(new URL('./query-result-cards.css', import.meta.url), 'utf8');
            assert.doesNotMatch(source, /business-result-card|ant-card-body|query-result-content/);
          });
          """.replace('          ', ''))

          import_e2e = root / 'e2e/import-page-pattern.spec.ts'
          source = import_e2e.read_text()
          source, count = re.subn(
              r'async function expectBusinessCardDirectChild\(page: Page, minimumInset = 15\) \{.*?\n\}\n',
              """async function expectStrictTwoLayerResult(page: Page) {
            const outerCard = page.locator('.import-result-card');
            const outerHeader = outerCard.locator(':scope > .query-result-outer-card__header');
            await expect(outerHeader).toHaveCount(1);
            await expect(outerCard.locator(':scope > .ant-card-body')).toHaveCount(0);
            await expect(outerCard.locator('.business-result-card')).toHaveCount(0);
            await expect(page.locator('.import-execution-table')).toHaveCount(1);
          }
          """.replace('          ', ''),
              source,
              flags=re.S,
          )
          assert count == 1
          source = re.sub(r"\n\s*const businessResultHeader = page\.locator\([^\n]+\);", '', source)
          source = re.sub(r"\n\s*await expect\(businessResultHeader[^\n]+", '', source)
          source = source.replace('expectBusinessCardDirectChild(page)', 'expectStrictTwoLayerResult(page)')
          source = source.replace('expectBusinessCardDirectChild(page, 11)', 'expectStrictTwoLayerResult(page)')
          source = source.replace('uses query and nested result cards', 'uses a strict two-layer query result')
          import_e2e.write_text(source)

          tracking_e2e = root / 'e2e/tracking-page-pattern.spec.ts'
          source = tracking_e2e.read_text()
          source, count = re.subn(
              r'async function expectResultHeaders\(page: Page, title: string, total: string\) \{.*?\n\}\n',
              """async function expectResultHeader(page: Page, total: string) {
            const resultCard = page.locator('.tracking-result-card');
            const outerHeader = resultCard.locator(':scope > .query-result-outer-card__header');
            await expect(resultCard.locator(':scope > .ant-card-body')).toHaveCount(0);
            await expect(resultCard.locator('.business-result-card')).toHaveCount(0);
            await expect(outerHeader.getByText('查询结果', { exact: true })).toBeVisible();
            await expect(outerHeader.getByText(total, { exact: true })).toBeVisible();
          }
          """.replace('          ', ''),
              source,
              flags=re.S,
          )
          assert count == 1
          source, call_count = re.subn(r"await expectResultHeaders\(page, '[^']+', ('[^']+')\);", r'await expectResultHeader(page, \1);', source)
          assert call_count == 3
          source = source.replace('audit tracking uses two cards', 'audit tracking uses strict two-layer results')
          tracking_e2e.write_text(source)

          culture_e2e = root / 'e2e/culture-page-pattern.spec.ts'
          source = culture_e2e.read_text()
          source, count = re.subn(
              r'async function expectDoubleCardShell\(page: Page, businessTitle: string, total: string\) \{.*?\n\}\n',
              """async function expectStrictTwoLayerShell(page: Page, total: string) {
            await expect(page.locator('.tabbed-module-intro')).toHaveCount(0);
            await expect(page.locator('.tabbed-module-tabs-card')).toHaveCount(0);
            await expect(page.locator('.culture-search-card')).toHaveCount(1);
            const resultCard = page.locator('.culture-result-card');
            await expect(resultCard).toHaveCount(1);
            const outerHeader = resultCard.locator(':scope > .query-result-outer-card__header');
            await expect(resultCard.locator(':scope > .ant-card-body')).toHaveCount(0);
            await expect(resultCard.locator('.business-result-card')).toHaveCount(0);
            await expect(outerHeader.getByText('查询结果', { exact: true })).toBeVisible();
            await expect(outerHeader.getByText(total, { exact: true })).toBeVisible();
            await expect(page.locator('.culture-search-card .ant-card-head-title')).toHaveText('宗族文化');
            const formBorder = await page.locator('.culture-search-card form').evaluate(element => getComputedStyle(element).borderTopWidth);
            expect(formBorder).toBe('0px');
          }
          """.replace('          ', ''),
              source,
              flags=re.S,
          )
          assert count == 1
          source, call_count = re.subn(r"await expectDoubleCardShell\(page, '[^']+', ('[^']+')\);", r'await expectStrictTwoLayerShell(page, \1);', source)
          assert call_count == 5
          source = source.replace('culture shell uses double cards', 'culture shell uses strict two-layer results')
          culture_e2e.write_text(source)

          docs = Path('docs/22-frontend-query-page-pattern-spec.md')
          doc = docs.read_text()
          doc = doc.replace('查询类页面统一采用上下双 Card 结构，不增加无业务价值的顶部介绍 Card。', '查询类页面统一采用“查询 Card + 查询结果容器”的上下两区结构，不增加无业务价值的顶部介绍 Card。')
          old_structure = """外层结果 Card
          ├─ 标题：查询结果（共 XX 条）
          ├─ 页面级业务操作（标题同一行右对齐）
          └─ 内层业务结果 Card
             ├─ 业务数据标题
             ├─ Tabs、排序、批量状态等结果局部控件
             ├─ 查询状态与结果说明
             ├─ Table / Mobile Card List / Graph Canvas
             └─ 分页""".replace('          ', '')
          new_structure = """查询结果容器
          ├─ Header：查询结果（共 XX 条）+ 页面级业务操作
          └─ Table / Mobile Card List / Graph Canvas / Tabs / 分页""".replace('          ', '')
          assert old_structure in doc
          doc = doc.replace(old_structure, new_structure)
          old_rules = """- 页面只使用 `QueryResultCard`；内层 `BusinessResultCard` 必须由共享组件内部唯一创建，禁止页面自行拼装两层 Card；
          - 外层 `QueryResultCard` 使用自定义语义容器，不使用 Ant Design `Card`，不得生成 `.ant-card-body`；内层业务 Card 必须是 `.query-result-outer-card` 的直接子节点；
          - 内层业务结果 Card 使用具体业务名称，例如“人物档案”“审核任务”“来源资料”，不重复展示总数；
          - Tabs、排序、批量选择、图内定位等结果局部控件放在内层业务结果 Card；""".replace('          ', '')
          new_rules = """- 页面只使用一个 `QueryResultCard`，禁止再创建 `BusinessResultCard` 或其他结果 Card；
          - `QueryResultCard` 使用自定义语义容器，不使用 Ant Design `Card`，不得生成 `.ant-card-body`；
          - 查询结果内容直接渲染在 `.query-result-outer-card` 内，不增加 `.business-result-card` 或 `.query-result-content` 包装层；
          - Tabs、排序、批量选择、图内定位等结果局部控件并入外层 Header 或直接置于结果内容中；""".replace('          ', '')
          assert old_rules in doc
          docs.write_text(doc.replace(old_rules, new_rules))

          task = Path('tasks/issue-692-execution.md')
          task.write_text(task.read_text().replace('- [ ]', '- [x]'))
          PY

      - name: Persist implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/22-frontend-query-page-pattern-spec.md \
            frontend/genealogy-web/src/shared/ui/QueryResultCards.tsx \
            frontend/genealogy-web/src/shared/ui/QueryResultCards.test.mjs \
            frontend/genealogy-web/src/shared/ui/query-result-cards.css \
            frontend/genealogy-web/src/features \
            frontend/genealogy-web/e2e/culture-page-pattern.spec.ts \
            frontend/genealogy-web/e2e/tracking-page-pattern.spec.ts \
            frontend/genealogy-web/e2e/import-page-pattern.spec.ts \
            tasks/issue-692-execution.md
          git diff --cached --quiet || git commit -m "fix: remove third query result layer"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Validate strict two-layer structure
        working-directory: frontend/genealogy-web
        run: |
          node --test src/shared/ui/QueryResultCards.test.mjs
          ! grep -R -n -E 'BusinessResultCard|business-result-card|businessTitle|businessExtra|businessClassName|query-result-content' src e2e

      - name: Typecheck
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build
        working-directory: frontend/genealogy-web
        run: npm run build
