name: Issue 699 Merge Import Dialogs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event.pull_request.head.ref == 'agent/issue-699-merge-import-dialogs' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply unified import drawer migration
        run: python scripts/issue-699-merge-import-dialogs.py

      - name: Persist implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/genealogy-web/src/features/imports frontend/genealogy-web/e2e/import-page-pattern.spec.ts frontend/genealogy-web/package.json tasks/issue-699-execution.md
          if git diff --cached --quiet; then
            echo 'Implementation already applied'
          else
            git commit -m 'feat(issue-699): merge new import dialogs'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund

      - name: Run import state and structure tests
        working-directory: frontend/genealogy-web
        run: npm run test:imports

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Check API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
