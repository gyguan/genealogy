name: Issue 293 Source Cleanup

on:
  push:
    branches:
      - agent/issue-293-culture-item-editor
    paths:
      - .github/workflows/issue-293-transform.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-293-culture-item-editor
          fetch-depth: 0
      - name: Remove duplicate query actions and legacy modal
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
            'frontend/genealogy-web/src/features/culture/MigrationEventStandardTab.tsx': [
              ('<Card size="small" title="迁徙事件查询" extra={<Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: \'migration\', mode: \'create\' })}>新增迁徙事件</Button>}>', '<Card size="small" title="迁徙事件查询">')
            ],
            'frontend/genealogy-web/src/features/culture/CultureSiteStandardTab.tsx': [
              ('<Card size="small" title="文化场所查询" extra={<Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: \'site\', mode: \'create\' })}>新增场所</Button>}>', '<Card size="small" title="文化场所查询">')
            ],
            'frontend/genealogy-web/src/features/culture/culture.css': [
              ('.culture-managed-tab > .ant-space .ant-card-extra { display: none; }\n', '')
            ],
            'frontend/genealogy-web/src/features/culture/CultureItemEditorPage.tsx': [
              ("import { Alert, Card, Checkbox, Col, Form, Input, InputNumber, Result, Row, Select, Space, message } from 'antd';", "import { Alert, Button, Card, Checkbox, Col, Form, Input, InputNumber, Result, Row, Select, Space, message } from 'antd';"),
              ('extra={<button onClick={onCancel}>返回文化资料列表</button>}', 'extra={<Button onClick={onCancel}>返回文化资料列表</Button>}'),
              ('extra={<Space><button onClick={onCancel}>返回列表</button><button onClick={() => setReloadVersion(value => value + 1)}>重新加载</button></Space>}', 'extra={<Space><Button onClick={onCancel}>返回列表</Button><Button type="primary" onClick={() => setReloadVersion(value => value + 1)}>重新加载</Button></Space>}')
            ]
          }

          for file_name, pairs in replacements.items():
            path = Path(file_name)
            text = path.read_text()
            for old, new in pairs:
              if old not in text:
                raise SystemExit(f'missing expected source in {file_name}: {old[:100]}')
              text = text.replace(old, new, 1)
            path.write_text(text)

          legacy = Path('frontend/genealogy-web/src/features/culture/CultureItemFormModal.tsx')
          if legacy.exists():
            legacy.unlink()

          Path('.github/workflows/issue-293-transform.yml').unlink()
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(culture): remove duplicate query actions and legacy modal"
          git push origin HEAD:agent/issue-293-culture-item-editor
