name: Issue 120 Hotfix PR

on:
  pull_request:
    branches: ["main"]
    paths:
      - .github/scripts/fix-issue-120-hotfix.py
      - .github/workflows/issue-120-hotfix-pr.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Rewrite review visibility SQL
        run: python .github/scripts/fix-issue-120-hotfix.py
      - name: Compile and run structure tests
        working-directory: backend/genealogy-backend
        run: mvn -q -DskipTests compile && mvn -q -Dtest=TrackingObjectQueryRepositoryTest test
      - name: Commit hotfix and remove temporary automation
        run: |
          rm .github/scripts/fix-issue-120-hotfix.py .github/workflows/issue-120-hotfix-pr.yml .github/workflows/issue-120-hotfix-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair tracking review visibility SQL for issue 120"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
