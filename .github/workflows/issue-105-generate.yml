package com.genealogy.imports.application;

import com.genealogy.common.exception.BusinessException;
import com.genealogy.generation.entity.GenerationSchemeEntity;
import com.genealogy.generation.repository.GenSchemeRepository;
import com.genealogy.imports.dto.GenerationImportRowRetryRequest;
import com.genealogy.imports.dto.ImportJobRowResponse;
import com.genealogy.imports.entity.ImportJobEntity;
import com.genealogy.imports.entity.ImportJobRowEntity;
import com.genealogy.imports.repository.ImportJobRepository;
import com.genealogy.imports.repository.ImportJobRowRepository;
import org.springframework.dao.OptimisticLockingFailureException;
import org.springframework.stereotype.Service;
import org.springframework.transaction.annotation.Transactional;

import java.time.LocalDateTime;
import java.util.LinkedHashMap;
import java.util.Map;
import java.util.Objects;

@Service
public class GenerationImportJobRowApplicationService {

    private final ImportJobRepository importJobRepository;
    private final ImportJobRowRepository importJobRowRepository;
    private final GenSchemeRepository genSchemeRepository;
    private final GenerationImportApplicationService generationImportApplicationService;

    public GenerationImportJobRowApplicationService(
            ImportJobRepository importJobRepository,
            ImportJobRowRepository importJobRowRepository,
            GenSchemeRepository genSchemeRepository,
            GenerationImportApplicationService generationImportApplicationService
    ) {
        this.importJobRepository = importJobRepository;
        this.importJobRowRepository = importJobRowRepository;
        this.genSchemeRepository = genSchemeRepository;
        this.generationImportApplicationService = generationImportApplicationService;
    }

    @Transactional
    public ImportJobRowResponse retry(Long clanId, Long jobId, Long rowId, GenerationImportRowRetryRequest request, Long actorId) {
        ImportJobEntity job = importJobRepository.findByIdAndClanId(jobId, clanId)
                .orElseThrow(() -> new BusinessException("IMPORT_JOB_NOT_FOUND", "导入任务不存在"));
        if (!ImportJobEntity.TYPE_GENERATION.equals(job.getImportType())) {
            throw new BusinessException("IMPORT_JOB_TYPE_MISMATCH", "当前批次不是字辈导入");
        }
        ImportJobRowEntity row = importJobRowRepository.findById(rowId)
                .filter(item -> Objects.equals(item.getJobId(), jobId))
                .orElseThrow(() -> new BusinessException("IMPORT_JOB_ROW_NOT_FOUND", "导入失败行不存在"));
        if (!Objects.equals(row.getVersion(), request.expectedVersion())) {
            throw new OptimisticLockingFailureException("导入失败行已被其他人修改，请刷新后重试");
        }
        Map<String, Object> data = normalized(request);
        try {
            GenerationImportApplicationService.ParsedGeneration parsed = generationImportApplicationService.parseRow(
                    java.util.List.of(
                            request.schemeName(), request.scope(), String.valueOf(request.startGeneration()),
                            String.valueOf(request.generationNo()), request.generationWord(), request.strategy(),
                            request.description() == null ? "" : request.description()
                    ),
                    job.getBranchId()
            );
            GenerationSchemeEntity draft = createDraft(job, parsed);
            row.setNormalizedData(data);
            row.setCorrectedData(data);
            row.setDraftTargetType(ImportJobEntity.TYPE_GENERATION);
            row.setDraftTargetId(draft.getId());
            row.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);
            row.setErrorCode(null);
            row.setErrorMessage(null);
        } catch (RuntimeException exception) {
            row.setCorrectedData(data);
            row.setRowStatus(ImportJobRowEntity.STATUS_RETRY_FAILED);
            row.setErrorCode(exception instanceof BusinessException business ? business.getCode() : "IMPORT_GENERATION_ROW_INVALID");
            row.setErrorMessage(exception.getMessage());
        }
        row.setRetryCount((row.getRetryCount() == null ? 0 : row.getRetryCount()) + 1);
        row.setCorrectedBy(actorId);
        row.setCorrectedAt(LocalDateTime.now());
        row.setUpdatedAt(LocalDateTime.now());
        ImportJobRowEntity saved = importJobRowRepository.save(row);
        recalculateJob(job);
        return response(saved);
    }

    private GenerationSchemeEntity createDraft(ImportJobEntity job, GenerationImportApplicationService.ParsedGeneration parsed) {
        GenerationSchemeEntity draft = new GenerationSchemeEntity();
        draft.setClanId(job.getClanId());
        draft.setBranchId(parsed.targetBranchId());
        draft.setSchemeName(parsed.schemeName());
        draft.setStartGeneration(parsed.startGeneration());
        draft.setPoemText(parsed.generationWord());
        draft.setIsDefault(false);
        draft.setValidationEnabled(true);
        draft.setStrictMode(false);
        draft.setStatus("draft");
        draft.setCreatedAt(LocalDateTime.now());
        return genSchemeRepository.save(draft);
    }

    private Map<String, Object> normalized(GenerationImportRowRetryRequest request) {
        Map<String, Object> data = new LinkedHashMap<>();
        data.put("schemeName", request.schemeName());
        data.put("scope", request.scope());
        data.put("startGeneration", request.startGeneration());
        data.put("generationNo", request.generationNo());
        data.put("generationWord", request.generationWord());
        data.put("strategy", request.strategy());
        data.put("description", request.description());
        return data;
    }

    private void recalculateJob(ImportJobEntity job) {
        long failed = importJobRowRepository.countByJobIdAndRowStatus(job.getId(), ImportJobRowEntity.STATUS_INVALID)
                + importJobRowRepository.countByJobIdAndRowStatus(job.getId(), ImportJobRowEntity.STATUS_RETRY_FAILED);
        long draft = importJobRowRepository.countByJobIdAndRowStatus(job.getId(), ImportJobRowEntity.STATUS_DRAFT_CREATED);
        job.setSuccessCount((int) draft);
        job.setFailureCount((int) failed);
        if (failed == 0) {
            job.setStatus("completed");
            job.setProcessingStatus(ImportJobEntity.PROCESSING_READY_FOR_REVIEW);
            job.setErrorSummary(null);
        } else if (draft > 0) {
            job.setStatus("partial_completed");
            job.setProcessingStatus(ImportJobEntity.PROCESSING_CORRECTION_REQUIRED);
            job.setErrorSummary("存在 " + failed + " 行字辈导入失败，请修正后再提交审核");
        } else {
            job.setStatus("failed");
            job.setProcessingStatus(ImportJobEntity.PROCESSING_CORRECTION_REQUIRED);
            job.setErrorSummary("全部字辈导入行处理失败，请修正后再提交审核");
        }
        job.setUpdatedAt(LocalDateTime.now());
        importJobRepository.save(job);
    }

    private ImportJobRowResponse response(ImportJobRowEntity row) {
        boolean draftCreated = ImportJobRowEntity.STATUS_DRAFT_CREATED.equals(row.getRowStatus());
        return new ImportJobRowResponse(row.getId(), row.getRowNo(), row.getRawData(), row.getNormalizedData(), row.getCorrectedData(), row.getRowStatus(), row.getErrorCode(), row.getErrorMessage(), row.getRetryCount(), draftCreated, row.getVersion(), row.getUpdatedAt());
    }
}
