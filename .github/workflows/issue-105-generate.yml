name: Issue 105 Generate Generation Import

on:
  push:
    branches:
      - agent/issue-105-generation-import-v2
    paths:
      - '.github/workflows/issue-105-generate.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-105-generation-import-v2
      - name: Generate implementation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n", encoding="utf-8")

          def patch(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing patch target in {path}: {old[:80]}")
              p.write_text(text.replace(old, new), encoding="utf-8")

