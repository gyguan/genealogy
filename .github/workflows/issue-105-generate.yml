package com.genealogy.imports.application;

import java.util.List;
import java.util.Map;

public final class GenerationImportTemplateDefinition {

    private GenerationImportTemplateDefinition() {}

    public static final int SCHEME_NAME_INDEX = 0;
    public static final int SCOPE_INDEX = 1;
    public static final int START_GENERATION_INDEX = 2;
    public static final int GENERATION_NO_INDEX = 3;
    public static final int GENERATION_WORD_INDEX = 4;
    public static final int STRATEGY_INDEX = 5;
    public static final int DESCRIPTION_INDEX = 6;

    public static final List<String> HEADERS = List.of(
            "方案名称", "适用范围", "起始代次", "代次", "字辈文字", "策略", "说明"
    );

    public static final List<String> SAMPLE_ROW = List.of(
            "黄氏通用字辈", "支派", "1", "1", "德", "新增", "示例：同一方案按代次逐行填写"
    );

    public static final Map<String, String> SCOPES = Map.of(
            "宗族", "clan",
            "支派", "branch"
    );

    public static final Map<String, String> STRATEGIES = Map.of(
            "新增", "create",
            "追加", "append"
    );

    public static List<String> normalizeHeaders(List<String> headers) {
        return headers.stream()
                .map(value -> value == null ? "" : value.replace("\ufeff", "").trim())
                .toList();
    }

    public static String expectedHeaderText() {
        return String.join("、", HEADERS);
    }
}
