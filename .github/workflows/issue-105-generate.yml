          patch("backend/genealogy-backend/src/main/java/com/genealogy/review/application/RevisionApplyService.java", "    private List<RelationshipEntity> requireImportRelationships", "    private List<GenerationSchemeEntity> requireImportGenerationSchemes(ImportJobEntity job, String expectedStatus) {\n        List<ImportJobRowEntity> rows = draftRows(job);\n        List<GenerationSchemeEntity> schemes = new ArrayList<>();\n        for (ImportJobRowEntity row : rows) {\n            GenerationSchemeEntity scheme = genSchemeRepository.findById(draftTargetId(row))\n                    .orElseThrow(() -> new BusinessException(\"IMPORT_JOB_DRAFT_GENERATION_NOT_FOUND\", \"导入批次关联的字辈方案草稿不存在\"));\n            if (!Objects.equals(scheme.getClanId(), job.getClanId())) {\n                throw new BusinessException(\"IMPORT_JOB_DRAFT_GENERATION_SCOPE_MISMATCH\", \"导入字辈方案不属于批次宗族\");\n            }\n            if (!expectedStatus.equals(normalize(scheme.getStatus()))) {\n                throw new BusinessException(\"IMPORT_JOB_DRAFT_GENERATION_STATUS_INVALID\", \"导入字辈方案状态与批次审核状态不一致\");\n            }\n            if (schemes.stream().noneMatch(item -> Objects.equals(item.getId(), scheme.getId()))) schemes.add(scheme);\n        }\n        return schemes;\n    }\n\n    private void archiveExistingGenerationSchemes(ImportJobEntity job, List<GenerationSchemeEntity> drafts) {\n        List<GenerationSchemeEntity> existing = genSchemeRepository.findByClanIdOrderByIsDefaultDescIdAsc(job.getClanId());\n        for (GenerationSchemeEntity draft : drafts) {\n            for (GenerationSchemeEntity item : existing) {\n                if (!Objects.equals(item.getId(), draft.getId())\n                        && Objects.equals(item.getBranchId(), draft.getBranchId())\n                        && Objects.equals(item.getSchemeName(), draft.getSchemeName())\n                        && STATUS_OFFICIAL.equals(normalize(item.getStatus()))) {\n                    item.setStatus(\"archived\");\n     