package com.genealogy.imports.application;

import com.genealogy.common.exception.BusinessException;
import com.genealogy.imports.domain.GenerationImportTypeDefinition;
import com.genealogy.imports.domain.ImportJobDescriptor;
import com.genealogy.imports.domain.ImportTypeRegistry;
import org.apache.poi.ss.usermodel.Row;
import org.apache.poi.ss.usermodel.Sheet;
import org.apache.poi.ss.usermodel.Workbook;
import org.apache.poi.xssf.usermodel.XSSFWorkbook;
import org.springframework.stereotype.Service;

import java.io.ByteArrayOutputStream;
import java.io.IOException;
import java.nio.charset.StandardCharsets;

@Service
public class GenerationImportTemplateApplicationService {

    private final ImportTypeRegistry importTypeRegistry;

    public GenerationImportTemplateApplicationService(ImportTypeRegistry importTypeRegistry) {
        this.importTypeRegistry = importTypeRegistry;
    }

    public byte[] buildCsvTemplate() {
        importTypeRegistry.require(GenerationImportTypeDefinition.TYPE, ImportJobDescriptor.FORMAT_CSV);
        String content = "\ufeff"
                + String.join(",", GenerationImportTemplateDefinition.HEADERS)
                + "\n"
                + String.join(",", GenerationImportTemplateDefinition.SAMPLE_ROW)
                + "\n";
        return content.getBytes(StandardCharsets.UTF_8);
    }

    public byte[] buildXlsxTemplate() {
        importTypeRegistry.require(GenerationImportTypeDefinition.TYPE, ImportJobDescriptor.FORMAT_XLSX);
        try (Workbook workbook = new XSSFWorkbook(); ByteArrayOutputStream output = new ByteArrayOutputStream()) {
            Sheet sheet = workbook.createSheet("字辈导入");
            writeRow(sheet.createRow(0), GenerationImportTemplateDefinition.HEADERS);
            writeRow(sheet.createRow(1), GenerationImportTemplateDefinition.SAMPLE_ROW);
            for (int index = 0; index < GenerationImportTemplateDefinition.HEADERS.size(); index++) {
                sheet.autoSizeColumn(index);
            }
            workbook.write(output);
            return output.toByteArray();
        } catch (IOException exception) {
            throw new BusinessException("IMPORT_TEMPLATE_BUILD_FAILED", "字辈导入模板生成失败");
        }
    }

    private void writeRow(Row row, java.util.List<String> values) {
        for (int index = 0; index < values.size(); index++) {
            row.createCell(index).setCellValue(values.get(index));
        }
    }
}
