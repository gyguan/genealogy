package com.genealogy.imports.application;

import com.genealogy.auth.application.AuthorizationApplicationService;
import com.genealogy.common.exception.BusinessException;
import com.genealogy.generation.entity.GenerationSchemeEntity;
import com.genealogy.generation.repository.GenSchemeRepository;
import com.genealogy.imports.dto.GenerationImportPreviewResponse;
import com.genealogy.imports.dto.GenerationImportPreviewRowResponse;
import com.genealogy.imports.dto.ImportJobResponse;
import com.genealogy.imports.dto.ImportRowErrorResponse;
import com.genealogy.imports.entity.ImportJobEntity;
import com.genealogy.imports.entity.ImportJobErrorEntity;
import com.genealogy.imports.entity.ImportJobRowEntity;
import com.genealogy.imports.repository.ImportJobErrorRepository;
import com.genealogy.imports.repository.ImportJobRepository;
import com.genealogy.imports.repository.ImportJobRowRepository;
import com.genealogy.operationlog.application.OperationLogApplicationService;
import org.apache.poi.ss.usermodel.Cell;
import org.apache.poi.ss.usermodel.DataFormatter;
import org.apache.poi.ss.usermodel.Row;
import org.apache.poi.ss.usermodel.Sheet;
import org.apache.poi.ss.usermodel.Workbook;
import org.apache.poi.ss.usermodel.WorkbookFactory;
import org.springframework.stereotype.Service;
import org.springframework.transaction.annotation.Transactional;
import org.springframework.web.multipart.MultipartFile;

import java.io.BufferedReader;
import java.io.IOException;
import java.io.InputStreamReader;
import java.nio.charset.StandardCharsets;
import java.time.LocalDateTime;
import java.util.ArrayList;
import java.util.HashMap;
import java.util.LinkedHashMap;
import java.util.List;
import java.util.Locale;
import java.util.Map;
import java.util.Objects;
import java.util.TreeMap;

@Service
public class GenerationImportApplicationService {

    private static final String STATUS_COMPLETED = "completed";
    private static final String STATUS_PARTIAL = "partial_completed";
    private static final String STATUS_FAILED = "failed";
    private static final String PERMISSION_CREATE = "generation_scheme:create";

    private final ImportJobRepository importJobRepository;
    private final ImportJobErrorRepository importJobErrorRepository;
    private final ImportJobRowRepository importJobRowRepository;
    private final GenSchemeRepository genSchemeRepository;
    private final AuthorizationApplicationService authorizationApplicationService;
    private final GenerationImportFilePolicyService filePolicyService;
    private final OperationLogApplicationService operationLogApplicationService;

    public GenerationImportApplicationService(
            ImportJobRepository importJobRepository,
            ImportJobErrorRepository importJobErrorRepository,
            ImportJobRowRepository importJobRowRepository,
            GenSchemeRepository genSchemeRepository,
            AuthorizationApplicationService authorizationApplicationService,
            GenerationImportFilePolicyService filePolicyService,
            OperationLogApplicationService operationLogApplicationService
    ) {
        this.importJobRepository = importJobRepository;
        this.importJobErrorRepository = importJobErrorRepository;
        this.importJobRowRepository = importJobRowRepository;
        this.genSchemeRepository = genSchemeRepository;
        this.authorizationApplicationService = authorizationApplicationService;
        this.filePolicyService = filePolicyService;
        this.operationLogApplicationService = operationLogApplicationService;
    }

    @Transactional(readOnly = true)
    public GenerationImportPreviewResponse preview(Long clanId, Long branchId, MultipartFile file, Long actorId) {
        filePolicyService.validate(branchId, file);
        authorizationApplicationService.requireBranchWriteScope(clanId, actorId, branchId);
        ImportReadResult data = readImport(file);
        Map<String, Integer> keys = new HashMap<>();
        List<GenerationImportPreviewRowResponse> rows = new ArrayList<>();
        for (ImportRow row : data.rows()) {
            rows.add(previewRow(clanId, branchId, row, keys));
        }
        int valid = (int) rows.stream().filter(item -> isBlank(item.errorMessage())).count();
        int duplicates = (int) rows.stream().filter(GenerationImportPreviewRowResponse::duplicated).count();
        int errors = rows.size() - valid;
        return new GenerationImportPreviewResponse(rows.size(), valid, duplicates, errors, rows);
    }

    @Transactional
    public ImportJobResponse importGenerations(Long clanId, Long branchId, MultipartFile file, Long actorId) {
        filePolicyService.validate(branchId, file);
        authorizationApplicationService.requireBranchWriteScope(clanId, actorId, branchId);
        ImportReadResult data = readImport(file);
        String filename = file.getOriginalFilename() == null ? "generations.csv" : file.getOriginalFilename();
        String format = filename.toLowerCase(Locale.ROOT).endsWith(".xlsx")
                ? ImportJobEntity.FORMAT_XLSX
                : ImportJobEntity.FORMAT_CSV;
        ImportJobEntity job = createJob(clanId, branchId, filename, format, actorId);
        List<RowPlan> plans = new ArrayList<>();
        Map<String, Integer> keys = new HashMap<>();
        int failure = 0;
        for (ImportRow row : data.rows()) {
            try {
                ParsedGeneration parsed = parseRow(row.cells(), branchId);
                String key = parsed.key() + ":" + parsed.generationNo();
                if (keys.putIfAbsent(key, row.rowNo()) != null) {
                    throw new BusinessException("IMPORT_GENERATION_DUPLICATED", "同一方案内代次不能重复");
                }
                plans.add(new RowPlan(row, parsed, null));
            } catch (RuntimeException exception) {
                failure++;
                plans.add(new RowPlan(row, null, exception));
            }
        }
        Map<String, GenerationSchemeEntity> drafts = createDrafts(clanId, branchId, plans);
        int success = 0;
        List<ImportJobRowEntity> jobRows = new ArrayList<>();
        List<ImportJobErrorEntity> errors = new ArrayList<>();
        for (RowPlan plan : plans) {
            ImportJobRowEntity jobRow = newJobRow(job.getId(), plan.row());
            if (plan.error() == null && plan.parsed() != null) {
                GenerationSchemeEntity draft = drafts.get(plan.parsed().key());
                jobRow.setNormalizedData(normalizedData(plan.parsed()));
                jobRow.setDraftTargetType(ImportJobEntity.TYPE_GENERATION);
                jobRow.setDraftTargetId(draft.getId());
                jobRow.setRowStatus(ImportJobRowEntity.STATUS_DRAFT_CREATED);
                success++;
            } else {
                String message = errorMessage(plan.error());
                jobRow.setRowStatus(ImportJobRowEntity.STATUS_INVALID);
                jobRow.setErrorCode(errorCode(plan.error()));
                jobRow.setErrorMessage(message);
                errors.add(error(job.getId(), plan.row().rowNo(), message, plan.row().rawData()));
            }
            jobRow.setUpdatedAt(LocalDateTime.now());
            jobRows.add(jobRow);
        }
        if (!jobRows.isEmpty()) importJobRowRepository.saveAll(jobRows);
        if (!errors.isEmpty()) importJobErrorRepository.saveAll(errors);
        int total = jobRows.size();
        job.setTotalCount(total);
        job.setSuccessCount(success);
        job.setFailureCount(failure);
        job.setStatus(legacyStatus(success, failure));
        job.setProcessingStatus(failure == 0 ? ImportJobEntity.PROCESSING_READY_FOR_REVIEW : ImportJobEntity.PROCESSING_CORRECTION_REQUIRED);
        job.setErrorSummary(failure == 0 ? null : "存在 " + failure + " 行字辈导入失败，请修正后再提交审核");
        job.setUpdatedAt(LocalDateTime.now());
        ImportJobEntity saved = importJobRepository.save(job);
        operationLogApplicationService.record(clanId, actorId, "generation_import", "import_job", saved.getId(), "字辈导入批次创建完成", "branchId=" + branchId + ", total=" + total + ", success=" + success + ", failure=" + failure);
        return toResponse(saved, errors);
    }

    ParsedGeneration parseRow(List<String> cells, Long branchId) {
        ensureNoExtraColumns(cells);
        String schemeName = requiredCell(cells, GenerationImportTemplateDefinition.SCHEME_NAME_INDEX, "方案名称不能为空");
        String scopeText = requiredCell(cells, GenerationImportTemplateDefinition.SCOPE_INDEX, "适用范围不能为空");
        String scope = GenerationImportTemplateDefinition.SCOPES.get(scopeText);
        if (scope == null) throw new BusinessException("IMPORT_GENERATION_SCOPE_INVALID", "适用范围必须填写宗族或支派");
        Integer startGeneration = positiveInt(requiredCell(cells, GenerationImportTemplateDefinition.START_GENERATION_INDEX, "起始代次不能为空"), "起始代次");
        Integer generationNo = positiveInt(requiredCell(cells, GenerationImportTemplateDefinition.GENERATION_NO_INDEX, "代次不能为空"), "代次");
        String generationWord = requiredCell(cells, GenerationImportTemplateDefinition.GENERATION_WORD_INDEX, "字辈文字不能为空");
        if (generationWord.length() > 20) throw new BusinessException("IMPORT_GENERATION_WORD_TOO_LONG", "字辈文字不能超过 20 个字符");
        String strategyText = requiredCell(cells, GenerationImportTemplateDefinition.STRATEGY_INDEX, "策略不能为空");
        String strategy = GenerationImportTemplateDefinition.STRATEGIES.get(strategyText);
        if (strategy == null) throw new BusinessException("IMPORT_GENERATION_STRATEGY_INVALID", "策略必须填写新增或追加");
        Long targetBranchId = "branch".equals(scope) ? branchId : null;
        String description = cell(cells, GenerationImportTemplateDefinition.DESCRIPTION_INDEX);
        return new ParsedGeneration(schemeName, scopeText, scope, targetBranchId, startGeneration, generationNo, generationWord, strategyText, strategy, description);
    }

    private Map<String, GenerationSchemeEntity> createDrafts(Long clanId, Long branchId, List<RowPlan> plans) {
        Map<String, TreeMap<Integer, ParsedGeneration>> grouped = new LinkedHashMap<>();
        for (RowPlan plan : plans) {
            if (plan.error() == null && plan.parsed() != null) {
                grouped.computeIfAbsent(plan.parsed().key(), ignored -> new TreeMap<>())
                        .put(plan.parsed().generationNo(), plan.parsed());
            }
        }
        Map<String, GenerationSchemeEntity> drafts = new HashMap<>();
        for (Map.Entry<String, TreeMap<Integer, ParsedGeneration>> entry : grouped.entrySet()) {
            ParsedGeneration first = entry.getValue().firstEntry().getValue();
            GenerationSchemeEntity draft = new GenerationSchemeEntity();
            GenerationSchemeEntity existing = findExisting(clanId, first.targetBranchId(), first.schemeName());
            if ("create".equals(first.strategy()) && existing != null) {
                throw new BusinessException("IMPORT_GENERATION_SCHEME_EXISTS", "目标字辈方案已存在，新增策略不能覆盖：" + first.schemeName());
            }
            Map<Integer, String> words = new TreeMap<>();
            int start = first.startGeneration();
            if ("append".equals(first.strategy())) {
                if (existing == null) throw new BusinessException("IMPORT_GENERATION_SCHEME_NOT_FOUND", "追加策略要求目标方案已存在：" + first.schemeName());
                start = existing.getStartGeneration() == null ? start : existing.getStartGeneration();
                String poem = existing.getPoemText() == null ? "" : existing.getPoemText();
                for (int i = 0; i < poem.length(); i++) words.put(start + i, String.valueOf(poem.charAt(i)));
            }
            for (ParsedGeneration item : entry.getValue().values()) {
                if (!Objects.equals(first.startGeneration(), item.startGeneration())) throw new BusinessException("IMPORT_GENERATION_START_MISMATCH", "同一方案起始代次必须一致");
                String old = words.putIfAbsent(item.generationNo(), item.generationWord());
                if (old != null && !old.equals(item.generationWord())) throw new BusinessException("IMPORT_GENERATION_CONFLICT", "代次 " + item.generationNo() + " 已存在不同字辈");
            }
            draft.setClanId(clanId);
            draft.setBranchId(first.targetBranchId());
            draft.setSchemeName(first.schemeName());
            draft.setStartGeneration(start);
            draft.setPoemText(buildPoem(start, words));
            draft.setIsDefault(false);
            draft.setValidationEnabled(true);
            draft.setStrictMode(false);
            draft.setStatus("draft");
            draft.setCreatedAt(LocalDateTime.now());
            drafts.put(first.key(), genSchemeRepository.save(draft));
        }
        return drafts;
    }

    private String buildPoem(int start, Map<Integer, String> words) {
        if (words.isEmpty()) return "";
        int max = words.keySet().stream().mapToInt(Integer::intValue).max().orElse(start);
        StringBuilder builder = new StringBuilder();
        for (int gen = start; gen <= max; gen++) builder.append(words.getOrDefault(gen, ""));
        return builder.toString();
    }

    private GenerationSchemeEntity findExisting(Long clanId, Long branchId, String schemeName) {
        return genSchemeRepository.findByClanIdOrderByIsDefaultDescIdAsc(clanId).stream()
                .filter(item -> Objects.equals(item.getBranchId(), branchId))
                .filter(item -> schemeName.equals(item.getSchemeName()))
                .filter(item -> "official".equalsIgnoreCase(String.valueOf(item.getStatus())))
                .findFirst().orElse(null);
    }

    private GenerationImportPreviewRowResponse previewRow(Long clanId, Long branchId, ImportRow row, Map<String, Integer> keys) {
        try {
            ParsedGeneration parsed = parseRow(row.cells(), branchId);
            boolean duplicated = keys.putIfAbsent(parsed.key() + ":" + parsed.generationNo(), row.rowNo()) != null;
            String error = duplicated ? "同一方案内代次不能重复" : null;
            return preview(row, parsed, duplicated, error);
        } catch (RuntimeException exception) {
            return new GenerationImportPreviewRowResponse(row.rowNo(), cell(row.cells(), 0), cell(row.cells(), 1), null, null, cell(row.cells(), 4), cell(row.cells(), 5), cell(row.cells(), 6), false, errorMessage(exception), row.rawData());
        }
    }

    private GenerationImportPreviewRowResponse preview(ImportRow row, ParsedGeneration p, boolean duplicated, String error) {
        return new GenerationImportPreviewRowResponse(row.rowNo(), p.schemeName(), p.scopeText(), p.startGeneration(), p.generationNo(), p.generationWord(), p.strategyText(), p.description(), duplicated, error, row.rawData());
    }

    ImportReadResult readImport(MultipartFile file) {
        String filename = file.getOriginalFilename() == null ? "" : file.getOriginalFilename().toLowerCase(Locale.ROOT);
        try {
            List<ImportRow> rows = filename.endsWith(".xlsx") ? readXlsx(file) : readCsv(file);
            if (rows.isEmpty()) throw new BusinessException("IMPORT_GENERATION_ROWS_EMPTY", "字辈导入文件没有数据行");
            return new ImportReadResult(rows);
        } catch (BusinessException exception) {
            throw exception;
        } catch (Exception exception) {
            throw new BusinessException("IMPORT_GENERATION_READ_FAILED", "无法读取字辈导入文件内容");
        }
    }

    private List<ImportRow> readCsv(MultipartFile file) throws IOException {
        List<ImportRow> rows = new ArrayList<>();
        try (BufferedReader reader = new BufferedReader(new InputStreamReader(file.getInputStream(), StandardCharsets.UTF_8))) {
            String line;
            int rowNo = 0;
            while ((line = reader.readLine()) != null) {
                rowNo++;
                if (rowNo == 1) continue;
                if (line.isBlank()) continue;
                rows.add(new ImportRow(rowNo, filePolicyService.parseCsvLine(line), line));
            }
        }
        return rows;
    }

    private List<ImportRow> readXlsx(MultipartFile file) throws Exception {
        List<ImportRow> rows = new ArrayList<>();
        try (Workbook workbook = WorkbookFactory.create(file.getInputStream())) {
            Sheet sheet = workbook.getNumberOfSheets() > 0 ? workbook.getSheetAt(0) : null;
            if (sheet == null) return rows;
            DataFormatter formatter = new DataFormatter();
            for (int i = sheet.getFirstRowNum() + 1; i <= sheet.getLastRowNum(); i++) {
                Row row = sheet.getRow(i);
                if (row == null) continue;
                List<String> cells = new ArrayList<>();
                for (int index = 0; index < GenerationImportTemplateDefinition.HEADERS.size(); index++) {
                    Cell cell = row.getCell(index, Row.MissingCellPolicy.RETURN_BLANK_AS_NULL);
                    cells.add(cell == null ? "" : formatter.formatCellValue(cell));
                }
                if (cells.stream().allMatch(String::isBlank)) continue;
                rows.add(new ImportRow(i + 1, cells, String.join(",", cells)));
            }
        }
        return rows;
    }

    private void ensureNoExtraColumns(List<String> cells) {
        for (int index = GenerationImportTemplateDefinition.HEADERS.size(); index < cells.size(); index++) {
            if (!isBlank(cells.get(index))) throw new BusinessException("IMPORT_GENERATION_EXTRA_COLUMN", "文件中存在模板外字段");
        }
    }

    private Integer positiveInt(String value, String label) {
        try {
            int parsed = Integer.parseInt(value.trim());
            if (parsed <= 0) throw new NumberFormatException();
            return parsed;
        } catch (Exception ex) {
            throw new BusinessException("IMPORT_GENERATION_NUMBER_INVALID", label + "必须为正整数");
        }
    }

    private String requiredCell(List<String> cells, int index, String message) {
        String value = cell(cells, index);
        if (isBlank(value)) throw new BusinessException("IMPORT_GENERATION_REQUIRED", message);
        return value.trim();
    }

    private String cell(List<String> cells, int index) {
        return index < cells.size() && cells.get(index) != null ? cells.get(index).trim() : "";
    }

    private Map<String, Object> normalizedData(ParsedGeneration p) {
        Map<String, Object> data = new LinkedHashMap<>();
        data.put("schemeName", p.schemeName());
        data.put("scope", p.scopeText());
        data.put("startGeneration", p.startGeneration());
        data.put("generationNo", p.generationNo());
        data.put("generationWord", p.generationWord());
        data.put("strategy", p.strategyText());
        data.put("description", p.description());
        return data;
    }

    private ImportJobEntity createJob(Long clanId, Long branchId, String filename, String format, Long actorId) {
        ImportJobEntity job = new ImportJobEntity();
        job.setClanId(clanId);
        job.setBranchId(branchId);
        job.setImportType(ImportJobEntity.TYPE_GENERATION);
        job.setFileFormat(format);
        job.setOriginalFilename(filename);
        job.setTotalCount(0);
        job.setSuccessCount(0);
        job.setFailureCount(0);
        job.setStatus("running");
        job.setProcessingStatus(ImportJobEntity.PROCESSING_PROCESSING);
        job.setReviewStatus(ImportJobEntity.REVIEW_NOT_SUBMITTED);
        job.setReviewRound(0);
        job.setCreatedBy(actorId);
        job.setCreatedAt(LocalDateTime.now());
        job.setUpdatedAt(LocalDateTime.now());
        return importJobRepository.save(job);
    }

    private ImportJobRowEntity newJobRow(Long jobId, ImportRow row) {
        ImportJobRowEntity entity = new ImportJobRowEntity();
        entity.setJobId(jobId);
        entity.setRowNo(row.rowNo());
        entity.setRawData(row.rawData());
        entity.setRetryCount(0);
        entity.setCreatedAt(LocalDateTime.now());
        entity.setUpdatedAt(LocalDateTime.now());
        return entity;
    }

    private ImportJobErrorEntity error(Long jobId, Integer rowNo, String message, String rawData) {
        ImportJobErrorEntity error = new ImportJobErrorEntity();
        error.setJobId(jobId);
        error.setRowNo(rowNo);
        error.setErrorMessage(message);
        error.setRawData(rawData);
        return error;
    }

    private String legacyStatus(int success, int failure) {
        if (success > 0 && failure == 0) return STATUS_COMPLETED;
        if (success > 0) return STATUS_PARTIAL;
        return STATUS_FAILED;
    }

    private ImportJobResponse toResponse(ImportJobEntity job, List<ImportJobErrorEntity> errors) {
        return new ImportJobResponse(job.getId(), job.getClanId(), job.getBranchId(), job.getImportType(), job.getFileFormat(), null, job.getOriginalFilename(), job.getTotalCount(), job.getSuccessCount(), job.getFailureCount(), job.getStatus(), job.getErrorSummary(), job.getCreatedAt(), errors.stream().map(item -> new ImportRowErrorResponse(item.getRowNo(), item.getErrorMessage(), item.getRawData())).toList(), job.getProcessingStatus(), job.getReviewStatus(), job.getReviewRound(), job.getLatestReviewTaskId());
    }

    private String errorMessage(Throwable exception) {
        return exception == null || exception.getMessage() == null ? "字辈导入行校验失败" : exception.getMessage();
    }

    private String errorCode(Throwable exception) {
        return exception instanceof BusinessException business ? business.getCode() : "IMPORT_GENERATION_ROW_INVALID";
    }

    private boolean isBlank(String value) {
        return value == null || value.isBlank();
    }

    record ImportReadResult(List<ImportRow> rows) {}
    record ImportRow(Integer rowNo, List<String> cells, String rawData) {}
    record RowPlan(ImportRow row, ParsedGeneration parsed, RuntimeException error) {}
    record ParsedGeneration(String schemeName, String scopeText, String scope, Long targetBranchId, Integer startGeneration, Integer generationNo, String generationWord, String strategyText, String strategy, String description) {
        String key() { return schemeName + ":" + scope + ":" + targetBranchId + ":" + strategy; }
    }
}
