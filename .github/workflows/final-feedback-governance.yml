name: Final Feedback Governance

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/final-feedback-governance.yml"

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/issue-final-feedback-governance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - working-directory: frontend/genealogy-web
        run: node scripts/finalize-feedback-governance.mjs
      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "refactor: complete final feedback governance" || true
          git push origin HEAD:agent/issue-final-feedback-governance
      - working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture feedback diagnostics
        working-directory: frontend/genealogy-web
        run: npm run test:feedback > final-feedback-test.log 2>&1 || true
      - name: Persist diagnostics
        run: |
          git add -f frontend/genealogy-web/final-feedback-test.log
          git commit -m "chore: capture final feedback diagnostics" || true
          git push origin HEAD:agent/issue-final-feedback-governance
