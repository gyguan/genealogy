name: Auth Commercial E2E

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/auth-commercial-e2e.yml'
      - 'backend/genealogy-backend/pom.xml'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/auth/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/member/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/common/**'
      - 'backend/genealogy-backend/src/main/resources/application*.yml'
      - 'backend/genealogy-backend/src/main/resources/db/migration/**'
      - 'frontend/genealogy-web/package.json'
      - 'frontend/genealogy-web/src/features/auth/**'
      - 'frontend/genealogy-web/src/features/members/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/src/shared/context/**'
      - 'frontend/genealogy-web/src/shared/ui/**'
      - 'frontend/genealogy-web/tests/**'
      - 'frontend/genealogy-web/playwright.config.*'
  push:
    branches: [main]
    paths:
      - '.github/workflows/auth-commercial-e2e.yml'
      - 'backend/genealogy-backend/pom.xml'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/auth/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/member/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/common/**'
      - 'backend/genealogy-backend/src/main/resources/application*.yml'
      - 'backend/genealogy-backend/src/main/resources/db/migration/**'
      - 'frontend/genealogy-web/package.json'
      - 'frontend/genealogy-web/src/features/auth/**'
      - 'frontend/genealogy-web/src/features/members/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/src/shared/context/**'
      - 'frontend/genealogy-web/src/shared/ui/**'
      - 'frontend/genealogy-web/tests/**'
      - 'frontend/genealogy-web/playwright.config.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auth-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium
      - name: Verify auth frontend tests
        working-directory: frontend/genealogy-web
        run: npm run test:auth
      - name: Verify member frontend tests
        working-directory: frontend/genealogy-web
        run: npm run test:members
      - name: Verify frontend types
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Verify API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Scan production auth artifacts
        working-directory: frontend/genealogy-web
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          patterns = {
              "demo username": re.compile(r"demo_admin"),
              "demo password": re.compile(r"Admin@123456"),
              "persistent auth token write": re.compile(
                  r"(?:window\.)?localStorage\.setItem\(\s*(['\"`])genealogy\.token\1"
              ),
          }
          findings = []
          for root_name in ("dist", "src/features/auth"):
              root = Path(root_name)
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding="utf-8", errors="ignore")
                  for label, pattern in patterns.items():
                      for match in pattern.finditer(text):
                          start = max(0, match.start() - 80)
                          end = min(len(text), match.end() + 120)
                          context = text[start:end].replace("\n", "\\n")
                          findings.append(
                              f"{path}:{match.start()}: {label}: {context}"
                          )

          evidence = Path("/tmp/auth-artifact-matches.txt")
          evidence.write_text("\n".join(findings), encoding="utf-8")
          if findings:
              print("Blocked auth artifact matches:")
              print("\n".join(findings[:80]))
              sys.exit(1)
          PY
      - name: Upload auth artifact scan evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-artifact-scan-matches
          path: /tmp/auth-artifact-matches.txt
          if-no-files-found: ignore
      - name: Start backend
        working-directory: backend/genealogy-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/genealogy
          SPRING_DATASOURCE_USERNAME: genealogy
          SPRING_DATASOURCE_PASSWORD: genealogy
          SPRING_FLYWAY_ENABLED: 'true'
          GENEALOGY_AUTH_PUBLIC_REGISTRATION_ENABLED: 'true'
          GENEALOGY_AUTH_EXPOSE_RESET_TOKEN: 'true'
          GENEALOGY_AUTH_LOGIN_COOLDOWN_MINUTES: '1'
        run: |
          mvn -q -DskipTests package
          nohup java -jar target/genealogy-backend-0.1.0-SNAPSHOT.jar >/tmp/auth-e2e-backend.log 2>&1 &
      - name: Start frontend
        working-directory: frontend/genealogy-web
        run: nohup npm run dev >/tmp/auth-e2e-frontend.log 2>&1 &
      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null && curl -fsS http://127.0.0.1:5179 >/dev/null && exit 0
            sleep 2
          done
          tail -n 160 /tmp/auth-e2e-backend.log || true
          tail -n 80 /tmp/auth-e2e-frontend.log || true
          exit 1
      - name: Run browser authentication E2E
        working-directory: frontend/genealogy-web
        env:
          CI: 'true'
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-playwright-report
          path: frontend/genealogy-web/playwright-report
          if-no-files-found: ignore
