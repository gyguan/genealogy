name: Issue 109 Sync Main

on:
  push:
    branches:
      - agent/issue-109-review-history
    paths:
      - '.github/workflows/issue-109-sync-main.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-109-review-history
          fetch-depth: 0
      - name: Merge latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit
          git push origin HEAD:agent/issue-109-review-history
