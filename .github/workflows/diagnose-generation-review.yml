name: Diagnose Generation Review

on:
  push:
    branches:
      - agent/fix-generation-scheme-review
    paths:
      - '.github/workflows/diagnose-generation-review.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-generation-scheme-review
          fetch-depth: 0
      - name: Collect generation review code
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tasks
          {
            echo '# generation review diagnostics'
            echo
            echo '## matching files'
            find backend -type f \( -name '*.java' -o -name '*.sql' \) | sort | grep -Ei 'generation|revision|review' || true
            echo
            echo '## generation scheme references'
            grep -RIn --include='*.java' --include='*.sql' -E 'GenerationScheme|generation_scheme|schemeName|scheme_name' backend || true
            echo
            echo '## revision apply references'
            grep -RIn --include='*.java' -E 'applyGeneration|GENERATION_SCHEME|generation.*scheme|targetType' backend/genealogy-backend/src/main/java/com/genealogy/review backend/genealogy-backend/src/main/java/com/genealogy/generation 2>/dev/null || true
          } > tasks/generation-review-diagnostics.txt
      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tasks/generation-review-diagnostics.txt
          git commit -m 'chore: capture generation review diagnostics'
          git push origin HEAD:agent/fix-generation-scheme-review
