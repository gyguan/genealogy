name: Issue 133 Align Source Permission Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  align-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-133-auth-commercialization
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Align strict Mockito permission stubs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_test = Path('backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceApplicationServiceTest.java')
          text = source_test.read_text()
          old = '''        when(authorizationApplicationService.can(1L, 2L, "source:bind")).thenReturn(true);
                  when(authorizationApplicationService.can(1L, 2L, "attachment:view")).thenReturn(true);
                  when(authorizationApplicationService.can(1L, 2L, "attachment:download")).thenReturn(true);
          '''
          new = '''        when(authorizationApplicationService.can(1L, 2L, "source:update")).thenReturn(false);
                  when(authorizationApplicationService.can(1L, 2L, "source:delete")).thenReturn(false);
                  when(authorizationApplicationService.can(1L, 2L, "source:bind")).thenReturn(true);
                  when(authorizationApplicationService.can(1L, 2L, "source:submit_review")).thenReturn(false);
                  when(authorizationApplicationService.can(1L, 2L, "attachment:upload")).thenReturn(false);
                  when(authorizationApplicationService.can(1L, 2L, "attachment:preview")).thenReturn(true);
                  when(authorizationApplicationService.can(1L, 2L, "attachment:download")).thenReturn(true);
          '''
          if text.count(old) != 1:
              raise SystemExit('SourceApplicationServiceTest marker mismatch')
          source_test.write_text(text.replace(old, new, 1))

          attachment_test = Path('backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceAttachmentApplicationServiceTest.java')
          text = attachment_test.read_text()
          replacements = {
              'when(authorizationApplicationService.can(1L, 2L, "attachment:view")).thenReturn(true);':
                  'when(authorizationApplicationService.can(1L, 2L, "attachment:preview")).thenReturn(true);',
              'when(authorizationApplicationService.can(1L, 2L, "attachment:download")).thenReturn(true);\n\n        SourceAttachmentFileResponse response = service.preview':
                  'when(authorizationApplicationService.can(1L, 2L, "attachment:preview")).thenReturn(false);\n        when(authorizationApplicationService.can(1L, 2L, "attachment:view")).thenReturn(false);\n        when(authorizationApplicationService.can(1L, 2L, "attachment:download")).thenReturn(true);\n\n        SourceAttachmentFileResponse response = service.preview'
          }
          for old, new in replacements.items():
              count = text.count(old)
              if old.startswith('when(authorizationApplicationService.can(1L, 2L, "attachment:view"'):
                  if count != 2:
                      raise SystemExit(f'expected two attachment:view stubs, found {count}')
                  text = text.replace(old, new)
              else:
                  if count != 1:
                      raise SystemExit(f'attachment preview marker mismatch: {count}')
                  text = text.replace(old, new, 1)
          attachment_test.write_text(text)
          PY
      - name: Run full backend test suite
        working-directory: backend/genealogy-backend
        run: mvn -B test
      - name: Commit test alignment and remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-133-fix-full-test-baseline.yml
          git add backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceApplicationServiceTest.java \
                  backend/genealogy-backend/src/test/java/com/genealogy/source/application/SourceAttachmentApplicationServiceTest.java
          git commit -m "test(source): align permission stubs with runtime checks"
          git push origin HEAD:agent/issue-133-auth-commercialization
