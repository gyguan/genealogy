name: Issue 105 Apply Generation Import

on:
  pull_request:
    paths:
      - '.github/workflows/issue-105-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Diagnose staged patch
        shell: bash
        run: |
          set +e
          cat tasks/.issue-105-code.patch.* > /tmp/issue-105.patch
          sha256sum /tmp/issue-105.patch | tee /tmp/issue-105-diagnostic.txt
          wc -c /tmp/issue-105.patch | tee -a /tmp/issue-105-diagnostic.txt
          git apply --check /tmp/issue-105.patch >> /tmp/issue-105-diagnostic.txt 2>&1
          echo "apply_status=$?" >> /tmp/issue-105-diagnostic.txt
          cat /tmp/issue-105-diagnostic.txt
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: issue-105-patch-diagnostic
          path: /tmp/issue-105-diagnostic.txt
