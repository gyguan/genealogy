name: Issue 120 Hotfix Verify

on:
  pull_request:
    branches: ["main"]
    paths:
      - .github/workflows/issue-120-hotfix-verify.yml
      - backend/genealogy-backend/src/main/java/com/genealogy/tracking/repository/TrackingObjectQueryRepository.java
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/repository/TrackingObjectQueryRepositoryTest.java
      - backend/genealogy-backend/src/test/java/com/genealogy/tracking/repository/TrackingObjectQueryRepositoryReviewPostgresTest.java

jobs:
  postgres-hotfix:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy -d genealogy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_POSTGRES_URL: jdbc:postgresql://localhost:5432/genealogy
      TEST_POSTGRES_USERNAME: genealogy
      TEST_POSTGRES_PASSWORD: genealogy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile and run SQL regression tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=TrackingObjectQueryRepositoryTest,TrackingObjectQueryRepositoryReviewPostgresTest test
