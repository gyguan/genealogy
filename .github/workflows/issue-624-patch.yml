name: Apply issue 624 patch

on:
  push:
    branches:
      - agent/issue-624-workbench-filter-action-order
    paths:
      - .github/workflows/issue-624-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/issue-624-workbench-filter-action-order
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: python scripts/temp_issue_624_patch.py
      - name: Remove temporary files
        run: rm scripts/temp_issue_624_patch.py .github/workflows/issue-624-patch.yml
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/workbench/EditingWorkspacePage.tsx scripts/temp_issue_624_patch.py .github/workflows/issue-624-patch.yml
          git commit -m "fix(workbench): keep advanced filters before reset"
          git push
