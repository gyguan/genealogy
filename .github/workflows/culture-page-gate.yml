name: Culture Page Gate

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/src/features/culture/**"
      - "frontend/genealogy-web/e2e/culture-*.spec.ts"
      - "frontend/genealogy-web/package.json"
      - ".github/workflows/culture-page-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  culture-page-gate:
    name: Culture Shell and Chromium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Run culture shell tests
        working-directory: frontend/genealogy-web
        run: npm run test:culture-shell

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee /tmp/culture-typecheck.log

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          npm run dev > /tmp/culture-vite.log 2>&1 &
          echo $! > /tmp/culture-vite.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/culture-vite.log
          exit 1

      - name: Run culture Chromium E2E
        working-directory: frontend/genealogy-web
        run: npm run test:culture

      - name: Upload culture diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: culture-page-gate-diagnostics
          path: |
            frontend/genealogy-web/playwright-report
            frontend/genealogy-web/test-results
            /tmp/culture-vite.log
            /tmp/culture-typecheck.log
          if-no-files-found: ignore
          retention-days: 5
