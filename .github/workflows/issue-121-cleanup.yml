name: Issue 121 Temporary Cleanup

on:
  push:
    branches:
      - agent/issue-121-trace-aggregation
    paths:
      - .github/workflows/issue-121-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-121-trace-aggregation
          fetch-depth: 0
      - name: Remove temporary issue assets
        run: |
          rm -f scripts/issue-121-frontend-patch.py
          rm -f scripts/issue-121-frontend-fix.py
          rm -f .github/workflows/issue-121-frontend-integration.yml
          rm -f .github/workflows/issue-121-targeted-check.yml
          rm -f .github/workflows/issue-121-cleanup.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove issue 121 temporary assets"
          git push origin HEAD:agent/issue-121-trace-aggregation
