name: Temporary Issue 602 Patch

on:
  push:
    branches:
      - agent/issue-602-relationship-draft-delete
    paths:
      - .github/workflows/temporary-issue-602-patch.yml

permissions:
  contents: write

jobs:
  patch-relationship-step:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-602-relationship-draft-delete
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply focused source patch
        run: python scripts/temporary/patch_issue_602_relationship_step.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/mvp1/steps/relationship/RelationshipStep.tsx
          git commit -m "feat(wizard): add relationship draft delete entry"
          git push origin HEAD:agent/issue-602-relationship-draft-delete
