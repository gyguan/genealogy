name: Issue 372 source migration

on:
  push:
    branches: ["agent/issue-372-result-list-card"]
    paths:
      - "scripts/migrate-wizard-result-lists.mjs"
      - ".github/workflows/issue-372-migrate.yml"

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-372-result-list-card
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Migrate wizard tables
        run: node scripts/migrate-wizard-result-lists.mjs
      - name: Commit migrated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/mvp1/steps
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "refactor(frontend): migrate wizard tables to ResultListCard"
          git push origin HEAD:agent/issue-372-result-list-card
