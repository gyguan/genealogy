name: Issue 293 Test Fix

on:
  push:
    branches:
      - agent/issue-293-culture-item-editor
    paths:
      - .github/workflows/issue-293-test-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-293-culture-item-editor
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/e2e/culture-library.spec.ts')
          text = path.read_text()
          text = text.replace("page.getByRole('button', { name: '取消' }).click()", "page.getByRole('button', { name: /取\\s*消/ }).click()")
          text = text.replace("page.getByRole('button', { name: '提交变更申请' }).click()", "page.getByRole('button', { name: /提\\s*交\\s*变\\s*更\\s*申\\s*请/ }).click()")
          path.write_text(text)
          Path('.github/workflows/issue-293-test-fix.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(culture): use stable editor action locators"
          git push origin HEAD:agent/issue-293-culture-item-editor
