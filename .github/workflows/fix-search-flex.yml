name: Fix Search Flex

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/fix-search-flex.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Make Ant Design affix input flexible
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/genealogy-web/src/lineage-tree.css')
          text = path.read_text()
          old = ".lineage-person-search-compact { width: 100%; }\n.lineage-person-search-input { height: 36px; line-height: 36px; padding: 0 12px !important; }\n.lineage-person-search-input::placeholder { line-height: 36px; }"
          new = ".lineage-person-search-compact { width: 100%; }\n.lineage-person-search-input { flex: 1 1 auto; width: auto; min-width: 0; height: 36px; padding: 0 12px !important; }\n.lineage-person-search-input .ant-input { min-width: 0; height: 34px; padding: 0; line-height: 34px; }\n.lineage-person-search-input .ant-input::placeholder { line-height: 34px; }"
          if old not in text:
              raise SystemExit('search input CSS target not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/lineage-tree.css
          git commit -m "fix(tree): make compact search input flexible"
          git push origin HEAD:${{ github.head_ref }}
