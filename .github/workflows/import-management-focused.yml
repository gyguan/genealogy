name: Import Management Focused Check

on:
  pull_request:
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/importexport/controller/CsvImportController.java'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/imports/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/importexport/controller/CsvImportControllerNamingTest.java'
      - '.github/workflows/import-management-focused.yml'

jobs:
  focused-import-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run focused import tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -q
          -Dtest=ImportJobApplicationServiceTest,PersonImportCommandApplicationServiceTest,PersonImportFilePolicyServiceTest,PersonImportTemplateApplicationServiceTest,CsvImportControllerNamingTest
          test
