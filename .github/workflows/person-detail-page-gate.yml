name: Person Detail Page Gate

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/src/features/persons/PersonDetailPage.tsx"
      - "frontend/genealogy-web/src/person-detail-page.css"
      - "frontend/genealogy-web/e2e/person-detail-width.spec.ts"
      - ".github/workflows/person-detail-page-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  person-detail-page-gate:
    name: Person Detail Chromium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json

      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          npm run dev > /tmp/person-detail-vite.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5179/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/person-detail-vite.log
          exit 1

      - name: Run person detail width E2E
        working-directory: frontend/genealogy-web
        run: npx playwright test e2e/person-detail-width.spec.ts

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: person-detail-page-gate-diagnostics
          path: |
            frontend/genealogy-web/playwright-report
            frontend/genealogy-web/test-results
            /tmp/person-detail-vite.log
          if-no-files-found: ignore
          retention-days: 5
