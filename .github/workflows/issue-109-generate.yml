name: Issue 109 Generate Review History

on:
  push:
    branches:
      - agent/issue-109-review-history
    paths:
      - '.github/workflows/issue-109-generate.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-109-review-history
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Generate review contracts and verify backend compilation
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          generator = Path('scripts/api/generate-frontend-client.mjs')
          text = generator.read_text(encoding='utf-8')
          old = "  'ReviewTaskDetailResponse',\n  'FieldDiff',\n  'ReviewDiffResponse'\n"
          new = "  'ReviewTaskDetailResponse',\n  'FieldDiff',\n  'ReviewDiffResponse',\n  'ReviewTaskView',\n  'ReviewTaskScope',\n  'ReviewTargetSummaryResponse',\n  'ReviewTaskListItemResponse',\n  'ReviewTaskPage',\n  'ReviewTaskViewDetailResponse'\n"
          if old not in text:
              raise SystemExit('tracking schema insertion point not found')
          generator.write_text(text.replace(old, new, 1), encoding='utf-8')

          service = Path('backend/genealogy-backend/src/main/java/com/genealogy/review/application/ReviewTaskQueryApplicationService.java')
          text = service.read_text(encoding='utf-8').replace('.getFirst()', '.get(0)')
          service.write_text(text, encoding='utf-8')
          PY

          node scripts/api/generate-frontend-client.mjs
          mvn -q -f backend/genealogy-backend/pom.xml -DskipTests compile

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/api/generate-frontend-client.mjs \
            backend/genealogy-backend/src/main/java/com/genealogy/review/application/ReviewTaskQueryApplicationService.java \
            frontend/genealogy-web/src/shared/api/generated/api-contract.ts \
            frontend/genealogy-web/src/shared/api/generated/tracking-types.ts
          git commit -m "feat(issue-109): generate review history contracts"
          git push origin HEAD:agent/issue-109-review-history
