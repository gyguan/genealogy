name: Culture Library UI CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/src/features/culture/**"
      - "frontend/genealogy-web/src/shared/navigation/trackingDeepLink*"
      - "frontend/genealogy-web/e2e/culture-library.spec.ts"
      - "frontend/genealogy-web/package.json"
      - ".github/workflows/culture-library-ui-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/src/features/culture/**"
      - "frontend/genealogy-web/src/shared/navigation/trackingDeepLink*"
      - "frontend/genealogy-web/e2e/culture-library.spec.ts"
      - "frontend/genealogy-web/package.json"
      - ".github/workflows/culture-library-ui-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  culture-library-ui:
    name: Culture Types, Contract, Build and Browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify TypeScript
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Verify API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Verify tracking deep links
        working-directory: frontend/genealogy-web
        run: npm run test:logs
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Install Chromium
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium
      - name: Start frontend
        working-directory: frontend/genealogy-web
        run: nohup npm run dev >/tmp/culture-ui-vite.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in $(seq 1 40); do
            curl -fsS http://127.0.0.1:5179 >/dev/null && exit 0
            sleep 2
          done
          tail -n 120 /tmp/culture-ui-vite.log || true
          exit 1
      - name: Run culture browser test
        working-directory: frontend/genealogy-web
        env:
          CI: "true"
        run: npm run test:culture
      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: culture-library-playwright-report
          path: frontend/genealogy-web/playwright-report
          if-no-files-found: ignore
