name: Refine Lineage Search Controls PR

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/refine-lineage-search-controls.yml
      - .github/workflows/refine-lineage-search-controls-pr.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract refinement script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/refine-lineage-search-controls.yml').read_text()
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          raw = workflow[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in raw.splitlines())

          search_exact = "text = replace_once(text, old_search, new_search, 'search controls')"
          search_resilient = """search_pattern = re.compile(r'          <Field label=\"人物搜索范围\">.*?          </Field>\\n          <Field label=\"搜索人物\">.*?          </Field>\\n', re.S)\nif not search_pattern.search(text):\n    raise SystemExit('missing replacement target: search controls')\ntext = search_pattern.sub(new_search, text, count=1)"""
          if search_exact not in script:
              raise SystemExit('missing search patch hook')
          script = script.replace(search_exact, search_resilient)

          head_exact = "text = replace_once(text, old_head, new_head, 'workbench head')"
          head_resilient = """head_pattern = re.compile(r'        <div className=\"lineage-workbench-head\">.*?\\n        <div className=\"lineage-query-toolbar\">', re.S)\nif not head_pattern.search(text):\n    raise SystemExit('missing replacement target: workbench head')\ntext = head_pattern.sub(new_head + '\\n        <div className=\"lineage-query-toolbar\">', text, count=1)"""
          if head_exact not in script:
              raise SystemExit('missing workbench patch hook')
          script = script.replace(head_exact, head_resilient)

          Path('/tmp/refine_lineage.py').write_text(script)
          PY
      - name: Apply refinement script
        id: apply
        shell: bash
        run: |
          set +e
          python /tmp/refine_lineage.py > refinement-diagnostics.log 2>&1
          code=$?
          cat refinement-diagnostics.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload refinement diagnostics
        if: steps.apply.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: lineage-refinement-diagnostics
          path: refinement-diagnostics.log
          retention-days: 1
      - name: Commit refinement
        if: steps.apply.outputs.exit_code == '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx \
                  frontend/genealogy-web/src/lineage-tree.css \
                  frontend/genealogy-web/e2e/tree-release-gate.spec.ts
          git commit -m "refactor(tree): refine search and canvas controls"
          git push origin HEAD:${{ github.head_ref }}
      - name: Preserve failing conclusion
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1
