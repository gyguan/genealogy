name: Diagnose Issue 171 V2 Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-171-v2-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-171-review-fixes
      - name: Capture V2 patch output
        shell: bash
        run: |
          set +e
          python3 - <<'RUNNER' > /tmp/issue-171-v2.log 2>&1
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/issue-171-apply-review-fixes-v2.yml').read_text(encoding='utf-8')
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n"
          print('start_found=', start in workflow)
          print('end_found=', end in workflow)
          script = workflow.split(start, 1)[1].split(end, 1)[0]
          exec(compile(textwrap.dedent(script), 'issue-171-v2.py', 'exec'))
          RUNNER
          echo "exit_code=$?" >> /tmp/issue-171-v2.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue-171-v2-log
          path: /tmp/issue-171-v2.log
          retention-days: 1
