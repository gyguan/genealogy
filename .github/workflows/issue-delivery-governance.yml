name: Issue Delivery Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  validate-issue-pr:
    name: Validate issue PR structure
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue linkage, task board and recovery checkpoint
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          head_ref = os.environ.get("HEAD_REF", "")
          body = os.environ.get("PR_BODY", "") or ""

          branch_match = re.match(r"^(?:agent|feature|fix)/issue-(\d+)(?:-|$)", head_ref)
          if not branch_match:
              print(f"Branch {head_ref!r} is not an Issue implementation branch; governance check is not applicable.")
              sys.exit(0)

          issue_number = branch_match.group(1)
          clean_body = re.sub(r"<!--.*?-->", "", body, flags=re.DOTALL)
          failures = []

          issue_reference = re.search(
              rf"\b(?:closes|fixes|resolves|refs|relates\s+to)\s*#\s*{issue_number}(?!\d)",
              clean_body,
              flags=re.IGNORECASE,
          )
          if not issue_reference:
              failures.append(
                  f"PR 必须使用 Refs/Closes/Fixes/Resolves #{issue_number} 关联分支中的同一 Issue。"
              )

          required_headings = [
              "## 执行任务看板",
              "### 当前进行中",
              "### 下一步最小任务",
              "### 未完成项",
              "### 恢复检查点",
              "## 验证结果",
              "## Issue 验收标准核对",
          ]
          for heading in required_headings:
              if heading not in clean_body:
                  failures.append(f"缺少必填章节：{heading}")

          task_row_pattern = re.compile(
              r"^\|\s*\d+(?:\.\d+)?\s*\|\s*([^|\n]+?)\s*\|\s*(?:✅|🔄|⏳|⚠️|❌|⏭️)",
              flags=re.MULTILINE,
          )
          task_rows = [match.group(1).strip() for match in task_row_pattern.finditer(clean_body)]
          if not task_rows:
              failures.append("任务看板至少需要一条已填写的原子任务，不能只保留模板占位行。")

          required_checkpoint_fields = ["当前 Issue", "当前分支", "最后完成任务", "当前进行中", "下一步最小任务", "最后更新时间"]
          for field in required_checkpoint_fields:
              field_match = re.search(rf"^-\s*{re.escape(field)}：\s*(\S.*)$", clean_body, flags=re.MULTILINE)
              if not field_match:
                  failures.append(f"恢复检查点未填写：{field}")

          unfinished_placeholders = [
              "替换为可独立验证的原子任务",
              "替换为验证或收尾任务",
              "验收标准 1",
              "验收标准 2",
              "验收标准 3",
          ]
          for placeholder in unfinished_placeholders:
              if placeholder in clean_body:
                  failures.append(f"仍保留模板占位内容：{placeholder}")

          if failures:
              print("Issue Delivery Governance 检查失败：")
              for failure in failures:
                  print(f"- {failure}")
              print("\n请按 docs/ai/issue-execution-governance.md 和 PR 模板补齐后重新运行。")
              sys.exit(1)

          print(f"Issue #{issue_number} 的 PR 结构检查通过。")
          PY