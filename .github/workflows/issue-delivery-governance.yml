name: Issue Delivery Governance

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-issue-pr:
    name: Validate issue PR structure
    runs-on: ubuntu-latest

    steps:
      - name: Manual governance reminder
        run: |
          cat <<'EOF'
          Issue Delivery Governance is no longer an automatic CI gate.
          Use PR review and docs/ai/issue-execution-governance.md for process checks when needed.
          EOF
