name: Fix Search Layout

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/fix-search-layout.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace compact wrapper with stable flex layout
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx')
          source = page.read_text()
          source = source.replace('<Space.Compact className="lineage-person-search-compact">', '<div className="lineage-person-search-compact">', 1)
          source = source.replace('</Space.Compact>', '</div>', 1)
          page.write_text(source)

          css_path = Path('frontend/genealogy-web/src/lineage-tree.css')
          css = css_path.read_text()
          css = css.replace(
              '.lineage-person-search-compact { width: 100%; }',
              '.lineage-person-search-compact { display: flex; width: 100%; }',
              1
          )
          css_path.write_text(css)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/tree/LineageTreeProductPage.tsx frontend/genealogy-web/src/lineage-tree.css
          git commit -m "fix(tree): use stable flex search layout"
          git push origin HEAD:${{ github.head_ref }}
