name: Apply source return fix

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    if: github.event.pull_request.number == 457
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/source-library-return-list
      - name: Apply fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx')
          s = p.read_text()
          old = """  function closeDetail(mode: 'push' | 'replace' = 'push') {
    writeSearchToUrl(search, mode);
    setDetailSourceId(undefined);
    setDetail(null);
    setDetailError(null);
    window.setTimeout(() => window.scrollTo({ top: listScrollRef.current }), 0);
  }
"""
          new = """  function closeDetail(mode: 'push' | 'replace' = 'push') {
    const url = new URL(window.location.href);
    url.pathname = '/';
    url.hash = '';
    url.searchParams.set('view', 'sourceLibrary');
    url.searchParams.delete('sourceId');
    ['keyword', 'sourceType', 'verificationStatus', 'privacyLevel', 'hasAttachment', 'hasBinding', 'pageNo', 'pageSize', 'sort'].forEach(key => url.searchParams.delete(key));
    Object.entries(search).forEach(([key, item]) => {
      if (item !== undefined && item !== null && item !== '') url.searchParams.set(key, String(item));
    });
    const scrollY = listScrollRef.current;
    window.history[mode === 'push' ? 'pushState' : 'replaceState'](
      { ...window.history.state, sourceLibraryScrollY: scrollY },
      '',
      `${url.pathname}${url.search}`
    );
    setDetailSourceId(undefined);
    setDetail(null);
    setDetailError(null);
    sourceForm.setFieldsValue(searchFormValues(search));
    window.setTimeout(() => window.scrollTo({ top: scrollY }), 0);
  }
"""
          if old not in s:
              raise SystemExit('closeDetail anchor not found')
          p.write_text(s.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/sources/SourceLibraryPage.tsx
          git rm .github/workflows/fix-source-return-list.yml
          git commit -m "fix source detail return to list"
          git push origin HEAD:fix/source-library-return-list
