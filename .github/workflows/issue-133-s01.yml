name: Issue 133 S01 Apply

on:
  push:
    branches:
      - agent/issue-133-auth-commercialization
    paths:
      - .github/workflows/issue-133-s01.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-133-auth-commercialization
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply app shell and secure client changes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              p.write_text(text.replace(old, new))

          main = Path('frontend/genealogy-web/src/main.tsx')
          text = main.read_text()
          marker = "import 'antd/dist/reset.css';\n"
          if "import './auth-commercial.css';" not in text:
              text = text.replace(marker, marker + "import './auth-commercial.css';\n", 1)
          main.write_text(text)

          app = Path('frontend/genealogy-web/src/app/App.tsx')
          text = app.read_text()
          text = text.replace(
              "import { ConfigProvider, Layout, Menu, Space, Typography, theme } from 'antd';",
              "import { ConfigProvider, Layout, Menu, Space, Spin, Typography, theme } from 'antd';"
          )
          text = text.replace(
              "  const [isAuthenticated, setIsAuthenticated] = useState(() => Boolean(apiClient.getToken()));",
              "  const [authStatus, setAuthStatus] = useState<'checking' | 'authenticated' | 'anonymous'>('checking');"
          )
          text = text.replace(
              "  function onLoginChanged() {\n    setIsAuthenticated(Boolean(apiClient.getToken()));\n  }",
              "  function onLoginChanged() {\n    setAuthStatus('authenticated');\n  }"
          )
          text = text.replace(
              "      setIsAuthenticated(false);",
              "      setAuthStatus('anonymous');"
          )
          unhandled = "  useEffect(() => {\n    const onUnhandled = (event: PromiseRejectionEvent) => {"
          bootstrap = """  useEffect(() => {
            let active = true;
            apiClient.get('/auth/me')
              .then(() => { if (active) setAuthStatus('authenticated'); })
              .catch(() => { if (active) setAuthStatus('anonymous'); });
            const onUnauthorized = () => {
              apiClient.clearToken();
              setAuthStatus('anonymous');
            };
            window.addEventListener('genealogy:unauthorized', onUnauthorized);
            return () => {
              active = false;
              window.removeEventListener('genealogy:unauthorized', onUnauthorized);
            };
          }, []);

          useEffect(() => {
            const onUnhandled = (event: PromiseRejectionEvent) => {"""
          if unhandled not in text:
              raise SystemExit('App.tsx bootstrap marker missing')
          text = text.replace(unhandled, bootstrap, 1)
          old_block = """  if (!isAuthenticated) {
            return (
              <>
                <AuthPage notify={notify} onChanged={onLoginChanged} standalone />
                <ToastStack items={toasts} onClose={closeToast} />
              </>
            );
          }
          """
          new_block = """  if (authStatus === 'checking') {
            return (
              <div className=\"commercial-auth-shell\" aria-label=\"正在检查登录状态\">
                <Space direction=\"vertical\" align=\"center\" size={16}>
                  <Spin size=\"large\" />
                  <Typography.Text type=\"secondary\">正在安全验证登录状态…</Typography.Text>
                </Space>
              </div>
            );
          }

          if (authStatus === 'anonymous') {
            return (
              <>
                <AuthPage notify={notify} onChanged={onLoginChanged} standalone />
                <ToastStack items={toasts} onClose={closeToast} />
              </>
            );
          }
          """
          if old_block not in text:
              raise SystemExit('App.tsx unauthenticated block missing')
          app.write_text(text.replace(old_block, new_block, 1))

          client = Path('frontend/genealogy-web/src/shared/api/client.ts')
          text = client.read_text()
          text = text.replace(
              "  private token: string;\n\n  constructor() {\n    this.baseUrl = localStorage.getItem('genealogy.apiBase') || '/api/v1';\n    this.token = localStorage.getItem('genealogy.token') || '';\n  }",
              """  private token: string;
            private csrfToken: string;

            constructor() {
              this.baseUrl = localStorage.getItem('genealogy.apiBase') || '/api/v1';
              // Compatibility window: consume a historical Bearer token once, then remove
              // it from persistent browser storage. New sessions use secure cookies.
              this.token = localStorage.getItem('genealogy.token') || '';
              localStorage.removeItem('genealogy.token');
              this.csrfToken = this.readCookie('GENEALOGY_CSRF');
            }"""
          )
          text = text.replace(
              """  setToken(token: string) {
                this.token = token || '';
                localStorage.setItem('genealogy.token', this.token);
                this.clearPendingGetRequests();
              }

              clearToken() {
                this.setToken('');
              }""",
              """  setToken(token: string) {
                this.token = token || '';
                localStorage.removeItem('genealogy.token');
                this.clearPendingGetRequests();
              }

              setCsrfToken(token: string) {
                this.csrfToken = token || this.readCookie('GENEALOGY_CSRF');
              }

              clearToken() {
                this.token = '';
                this.csrfToken = '';
                localStorage.removeItem('genealogy.token');
                this.clearPendingGetRequests();
              }"""
          )
          text = text.replace(
              "const res = await fetch(this.resolve(path), { headers: this.authHeaders() });",
              "const res = await fetch(this.resolve(path), { headers: this.authHeaders(), credentials: 'include' });"
          )
          text = text.replace(
              """    const auth = this.authHeaders();
                Object.entries(auth).forEach(([key, value]) => headers.set(key, value));
                const res = await fetch(this.resolve(path), { ...init, headers });""",
              """    const auth = this.authHeaders();
                Object.entries(auth).forEach(([key, value]) => headers.set(key, value));
                const method = String(init.method || 'GET').toUpperCase();
                const csrfToken = this.csrfToken || this.readCookie('GENEALOGY_CSRF');
                if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method) && csrfToken) {
                  headers.set('X-CSRF-Token', csrfToken);
                }
                const res = await fetch(this.resolve(path), { ...init, headers, credentials: 'include' });"""
          )
          text = text.replace(
              """    if (!res.ok || explicitFailure || implicitFailure) {
                  throw new ApiRequestError(""",
              """    if (!res.ok || explicitFailure || implicitFailure) {
                  if (res.status === 401 && !path.endsWith('/auth/login')) {
                    window.dispatchEvent(new Event('genealogy:unauthorized'));
                  }
                  throw new ApiRequestError("""
          )
          text = text.replace(
              """  private authHeaders(): Record<string, string> {
                return this.token ? { Authorization: `Bearer ${this.token}` } : {};
              }
            }""",
              """  private authHeaders(): Record<string, string> {
                return this.token ? { Authorization: `Bearer ${this.token}` } : {};
              }

              private readCookie(name: string) {
                if (typeof document === 'undefined') return '';
                const prefix = `${encodeURIComponent(name)}=`;
                return document.cookie
                  .split(';')
                  .map(item => item.trim())
                  .find(item => item.startsWith(prefix))
                  ?.slice(prefix.length) || '';
              }
            }"""
          )
          if 'setCsrfToken' not in text or "credentials: 'include'" not in text:
              raise SystemExit('client.ts secure session patch incomplete')
          client.write_text(text)

          package_path = Path('frontend/genealogy-web/package.json')
          package = json.loads(package_path.read_text())
          package['scripts']['test:auth'] = 'node --test src/features/auth/authPageModel.test.js'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Install and verify frontend
        working-directory: frontend/genealogy-web
        run: |
          npm install --no-audit --no-fund
          npm run test:auth
          npm run typecheck
          npm run api:check
          npm run build
      - name: Remove one-shot workflow and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-133-s01.yml
          git add frontend/genealogy-web
          git commit -m "feat(auth): deliver commercial login experience"
          git push origin HEAD:agent/issue-133-auth-commercialization
