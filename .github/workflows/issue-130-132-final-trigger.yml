name: Issue 130-132 Final Trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Commit final validation checkpoint and remove trigger
        shell: bash
        run: |
          printf '\n## 最终检查点\n\n- 最新 HEAD 已进入默认 CI、迁移治理和浏览器 E2E 准出。\n' >> tasks/issue-132-execution.md
          rm .github/workflows/issue-130-132-final-trigger.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add tasks/issue-132-execution.md .github/workflows/issue-130-132-final-trigger.yml
          git commit -m 'chore(auth): trigger final readiness gates'
          git push
