name: Issue 133 Authentication Verification

on:
  push:
    branches:
      - agent/issue-133-auth-commercialization
    paths:
      - .github/workflows/issue-133-auth-tests.yml

permissions:
  contents: write

jobs:
  verify-authentication:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: genealogy
          POSTGRES_PASSWORD: genealogy
          POSTGRES_DB: genealogy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genealogy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-133-auth-commercialization
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile all tests
        working-directory: backend/genealogy-backend
        run: mvn -B -DskipTests test
      - name: Run authentication tests
        working-directory: backend/genealogy-backend
        run: mvn -B -Dtest=AuthApplicationServiceCommercialTest,AuthSecurityServiceTest,PasswordResetApplicationServiceTest test
      - name: Verify PostgreSQL migration
        env:
          PGPASSWORD: genealogy
        run: |
          psql -h localhost -U genealogy -d genealogy <<'SQL'
          create table app_user (
            id bigserial primary key,
            username varchar(80) not null,
            password_hash varchar(255) not null,
            display_name varchar(120) not null,
            status varchar(32) not null,
            created_at timestamp not null,
            updated_at timestamp not null
          );
          create table clan (
            id bigserial primary key,
            clan_name varchar(200) not null
          );
          create table app_auth_session (
            id bigserial primary key,
            user_id bigint not null references app_user(id),
            token_hash varchar(255) not null,
            issued_at timestamp not null,
            expires_at timestamp not null,
            revoked_at timestamp,
            client_ip varchar(64),
            user_agent varchar(500)
          );
          SQL
          psql -h localhost -U genealogy -d genealogy -v ON_ERROR_STOP=1 \
            -f backend/genealogy-backend/src/main/resources/db/migration/V20260713203000__add_auth_commercialization.sql
          psql -h localhost -U genealogy -d genealogy -c "select table_name from information_schema.tables where table_name in ('app_account_invite','app_password_reset_token','app_login_attempt','app_auth_security_event') order by table_name;"
      - name: Remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-133-auth-tests.yml
          git commit -m "test(auth): verify security services and PostgreSQL migration"
          git push origin HEAD:agent/issue-133-auth-commercialization
