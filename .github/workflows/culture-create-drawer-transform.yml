name: Culture Create Drawer Transform

on:
  push:
    branches:
      - agent/issue-293-culture-item-editor
    paths:
      - .github/workflows/culture-create-drawer-transform.yml

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-293-culture-item-editor
          fetch-depth: 0
      - name: Convert create editors to drawers
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('frontend/genealogy-web/src/features/culture')

          item = root / 'CultureItemStandardTab.tsx'
          text = item.read_text()
          text = text.replace(
              "  if (editor) {\n    return <>{messageContext}<CultureItemEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;\n  }",
              "  if (editor?.mode === 'edit') {\n    return <>{messageContext}<CultureItemEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;\n  }"
          )
          marker = "      <CultureGovernanceModal target={governanceTarget}"
          drawer = """      {editor?.mode === 'create' ? (\n        <Drawer open width={720} title=\"新增文化资料\" className=\"culture-create-drawer\" onClose={closeEditor} destroyOnHidden>\n          <CultureItemEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} />\n        </Drawer>\n      ) : null}\n"""
          if marker not in text:
              raise SystemExit('item governance marker missing')
          text = text.replace(marker, drawer + marker, 1)
          item.write_text(text)

          migration = root / 'MigrationEventStandardTab.tsx'
          text = migration.read_text()
          text = text.replace(
              "  function closeEditor() { editorDirtyRef.current = false; editorRef.current = null; setEditor(null); writeLocation(search, selectedId, 'replace', null); }",
              "  function closeEditor() { if (!confirmCultureEditorLeave(editorDirtyRef.current)) return; editorDirtyRef.current = false; editorRef.current = null; setEditor(null); writeLocation(search, selectedId, 'replace', null); }"
          )
          text = text.replace(
              "  if (editor) return <>{messageContext}<MigrationEventEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;",
              "  if (editor?.mode === 'edit') return <>{messageContext}<MigrationEventEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;"
          )
          marker = "    <CultureGovernanceModal target={governanceTarget}"
          drawer = """    {editor?.mode === 'create' ? <Drawer open width={720} title=\"新增迁徙事件\" className=\"culture-create-drawer\" onClose={closeEditor} destroyOnHidden><MigrationEventEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></Drawer> : null}\n"""
          if marker not in text:
              raise SystemExit('migration governance marker missing')
          text = text.replace(marker, drawer + marker, 1)
          migration.write_text(text)

          site = root / 'CultureSiteStandardTab.tsx'
          text = site.read_text()
          text = text.replace(
              "  function closeEditor() { editorDirtyRef.current = false; editorRef.current = null; setEditor(null); writeLocation(search, selectedId, 'replace', null); }",
              "  function closeEditor() { if (!confirmCultureEditorLeave(editorDirtyRef.current)) return; editorDirtyRef.current = false; editorRef.current = null; setEditor(null); writeLocation(search, selectedId, 'replace', null); }"
          )
          text = text.replace(
              "  if (editor) return <>{messageContext}<CultureSiteEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;",
              "  if (editor?.mode === 'edit') return <>{messageContext}<CultureSiteEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></>;"
          )
          marker = "    <CultureGovernanceModal target={governanceTarget}"
          drawer = """    {editor?.mode === 'create' ? <Drawer open width={720} title=\"新增文化场所\" className=\"culture-create-drawer\" onClose={closeEditor} destroyOnHidden><CultureSiteEditorPage clanId={clanId} editor={editor} branches={branches} onCancel={closeEditor} onSaved={editorSaved} onDirtyChange={handleEditorDirtyChange} /></Drawer> : null}\n"""
          if marker not in text:
              raise SystemExit('site governance marker missing')
          text = text.replace(marker, drawer + marker, 1)
          site.write_text(text)

          css = root / 'culture.css'
          text = css.read_text()
          anchor = ".culture-editor-actions { position: sticky;"
          if anchor not in text:
              raise SystemExit('css anchor missing')
          text += "\n.culture-create-drawer .culture-editor-page { padding-bottom: 0; }\n.culture-create-drawer .culture-editor-actions { margin-inline: -24px; margin-bottom: -24px; border-radius: 0; border-inline: 0; }\n"
          css.write_text(text)

          Path('.github/workflows/culture-create-drawer-transform.yml').unlink()
          PY
      - name: Commit transformed sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(culture): open create flows in drawers"
          git push origin HEAD:agent/issue-293-culture-item-editor
