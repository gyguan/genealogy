name: Apply Issue 638

on:
  push:
    branches:
      - agent/issue-638-audit-filter-interaction
    paths:
      - .github/workflows/apply-issue-638.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-638-audit-filter-interaction
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update audit filter interaction
        run: |
          python3 - <<'PY'
          from pathlib import Path

          page = Path('frontend/genealogy-web/src/features/logs/LogPage.tsx')
          text = page.read_text()
          text = text.replace("import { DownOutlined, UpOutlined } from '@ant-design/icons';\n", "")
          text = text.replace(
              "  Alert, Button, Card, DatePicker, Empty, Form, Input, Result, Select, Space, Table, Tabs, Tag, Typography\n",
              "  Alert, Button, Card, Collapse, DatePicker, Empty, Form, Input, Result, Select, Space, Table, Tabs, Tag, Typography\n"
          )
          old_button = """      <Button type=\"link\" className=\"tracking-more-button\" icon={isExpanded ? <UpOutlined /> : <DownOutlined />} iconPosition=\"end\" onClick={() => setExpanded(previous => ({ ...previous, [activeTab]: !isExpanded }))}>\n        {isExpanded ? '收起' : '更多筛选'}\n      </Button>"""
          new_button = """      <Button type=\"link\" className=\"tracking-more-button\" aria-expanded={isExpanded} onClick={() => setExpanded(previous => ({ ...previous, [activeTab]: !isExpanded }))}>\n        {isExpanded ? '收起筛选' : '更多筛选'}\n      </Button>"""
          if old_button not in text:
              raise SystemExit('more button block not found')
          text = text.replace(old_button, new_button)

          replacements = {
              "{expanded.object ? <Form.Item label=\"所属支派\"><Input value={workspace.branchId ? '当前工作区支派' : '本人可见支派范围'} disabled /></Form.Item> : null}": """<Collapse className=\"tracking-advanced-collapse\" bordered={false} activeKey={expanded.object ? ['advanced'] : []} items={[{ key: 'advanced', label: null, showArrow: false, styles: { header: { display: 'none' }, body: { padding: 0 } }, children: <div className=\"tracking-query-grid tracking-query-grid--advanced\"><Form.Item label=\"所属支派\"><Input value={workspace.branchId ? '当前工作区支派' : '本人可见支派范围'} disabled /></Form.Item></div> }]} />""",
              "{expanded.audit ? <><Form.Item label=\"执行结果\"><TrackingMultiSelect ariaLabel=\"执行结果\" value={auditFilters.resultStatus} options={AUDIT_RESULT_OPTIONS} placeholder=\"全部结果\" onChange={value => setAuditFilters(previous => ({ ...previous, resultStatus: value }))} /></Form.Item><Form.Item label=\"业务关键词\"><Input value={auditFilters.keyword} placeholder=\"业务名称、摘要或动作说明\" allowClear maxLength={100} onChange={event => setAuditFilters(previous => ({ ...previous, keyword: event.target.value }))} onPressEnter={() => void loadAudit({ ...auditFilters, pageNo: 1 }, '')} /></Form.Item></> : null}": """<Collapse className=\"tracking-advanced-collapse\" bordered={false} activeKey={expanded.audit ? ['advanced'] : []} items={[{ key: 'advanced', label: null, showArrow: false, styles: { header: { display: 'none' }, body: { padding: 0 } }, children: <div className=\"tracking-query-grid tracking-query-grid--advanced\"><Form.Item label=\"执行结果\"><TrackingMultiSelect ariaLabel=\"执行结果\" value={auditFilters.resultStatus} options={AUDIT_RESULT_OPTIONS} placeholder=\"全部结果\" onChange={value => setAuditFilters(previous => ({ ...previous, resultStatus: value }))} /></Form.Item><Form.Item label=\"业务关键词\"><Input value={auditFilters.keyword} placeholder=\"业务名称、摘要或动作说明\" allowClear maxLength={100} onChange={event => setAuditFilters(previous => ({ ...previous, keyword: event.target.value }))} onPressEnter={() => void loadAudit({ ...auditFilters, pageNo: 1 }, '')} /></Form.Item></div> }]} />""",
              "{expanded.risk ? <><Form.Item label=\"操作者\"><TrackingMultiSelect ariaLabel=\"风险操作者\" value={riskFilters.actorId} options={riskActorOptions} placeholder=\"全部操作者\" onChange={value => setRiskFilters(previous => ({ ...previous, actorId: value }))} /></Form.Item><Form.Item label=\"所属支派\"><TrackingMultiSelect ariaLabel=\"风险所属支派\" value={riskFilters.branchId} options={branchOptions} placeholder=\"本人可见支派范围\" onChange={value => setRiskFilters(previous => ({ ...previous, branchId: value }))} /></Form.Item></> : null}": """<Collapse className=\"tracking-advanced-collapse\" bordered={false} activeKey={expanded.risk ? ['advanced'] : []} items={[{ key: 'advanced', label: null, showArrow: false, styles: { header: { display: 'none' }, body: { padding: 0 } }, children: <div className=\"tracking-query-grid tracking-query-grid--advanced\"><Form.Item label=\"操作者\"><TrackingMultiSelect ariaLabel=\"风险操作者\" value={riskFilters.actorId} options={riskActorOptions} placeholder=\"全部操作者\" onChange={value => setRiskFilters(previous => ({ ...previous, actorId: value }))} /></Form.Item><Form.Item label=\"所属支派\"><TrackingMultiSelect ariaLabel=\"风险所属支派\" value={riskFilters.branchId} options={branchOptions} placeholder=\"本人可见支派范围\" onChange={value => setRiskFilters(previous => ({ ...previous, branchId: value }))} /></Form.Item></div> }]} />"""
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit('advanced filter block not found')
              text = text.replace(old, new)
          page.write_text(text)

          css = Path('frontend/genealogy-web/src/features/logs/tracking-page.css')
          styles = css.read_text()
          addition = """

.tracking-advanced-collapse {
  grid-column: 1 / -1;
  background: transparent;
}

.tracking-advanced-collapse > .ant-collapse-item {
  border-bottom: 0;
}

.tracking-advanced-collapse .ant-motion-collapse,
.tracking-advanced-collapse .ant-motion-collapse-legacy {
  transition-duration: 360ms !important;
}

.tracking-query-grid--advanced {
  padding-top: 12px;
}
"""
          if '.tracking-advanced-collapse {' not in styles:
              styles += addition
          css.write_text(styles)
          PY
          rm .github/workflows/apply-issue-638.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/logs/LogPage.tsx frontend/genealogy-web/src/features/logs/tracking-page.css .github/workflows/apply-issue-638.yml
          git commit -m "fix(audit): align more filter interaction"
          git push origin HEAD:agent/issue-638-audit-filter-interaction
