name: Wizard input typecheck diagnostic

on:
  push:
    branches: ["agent/fix-wizard-input-typing"]
    paths:
      - "frontend/genealogy-web/src/shared/ui/Form.tsx"
      - ".github/workflows/wizard-input-typecheck-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-wizard-input-typing
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Capture typecheck
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npm run typecheck > ../../../wizard-input-typecheck.log 2>&1
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wizard-input-typecheck.log
          git commit -m "chore(frontend): capture wizard input typecheck" || exit 0
          git push origin HEAD:agent/fix-wizard-input-typing
