name: Issue 133 S01 Verify

on:
  push:
    branches:
      - agent/issue-133-auth-commercialization
    paths:
      - .github/workflows/issue-133-s01-verify.yml

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-133-auth-commercialization
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify frontend
        working-directory: frontend/genealogy-web
        run: |
          npm install --no-audit --no-fund
          npm run test:auth
          npm run typecheck
          npm run api:check
          npm run build
      - name: Scan production login sources and build
        run: |
          ! grep -R -E "Admin@123456|Demo@123456|Viewer@123456|Mvp1@123456" frontend/genealogy-web/src frontend/genealogy-web/dist
          ! grep -R -E "demo_admin|demo_editor|demo_viewer" frontend/genealogy-web/src/features/auth frontend/genealogy-web/dist
          ! grep -R "localStorage.setItem('genealogy.token'" frontend/genealogy-web/src frontend/genealogy-web/dist
      - name: Remove verification workflow and commit generated lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-133-s01-verify.yml
          git add frontend/genealogy-web/package-lock.json frontend/genealogy-web/src/shared/api/generated/api-contract.ts
          git commit -m "test(auth): verify commercial login experience"
          git push origin HEAD:agent/issue-133-auth-commercialization
