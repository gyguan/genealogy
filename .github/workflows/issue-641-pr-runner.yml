name: Issue 641 PR Runner

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/issue-641-copy-cleanup.yml"
      - ".github/workflows/issue-641-pr-runner.yml"

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.head_ref == 'agent/issue-641-prompt-copy-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Skip completed run
        id: guard
        shell: bash
        run: |
          if [[ -f frontend/genealogy-web/src/shared/ui/promptCopyCleanup.test.mjs ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Extract and apply focused cleanup
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/issue-641-copy-cleanup.yml').read_text(encoding='utf-8')
          start = workflow.index("          python3 <<'PY'\n") + len("          python3 <<'PY'\n")
          end = workflow.index("\n          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          script = script.replace(
              "person_archive = file_by_name('PersonArchivePage.tsx')",
              "person_archive = next(path for path in src.rglob('*.tsx') if 'person-archive-query-card' in path.read_text(encoding='utf-8'))"
          )
          script = script.replace(
              "source_page = file_by_name('SourceLibraryPage.tsx')",
              "source_page = next(path for path in src.rglob('*.tsx') if 'source-library-result-card' in path.read_text(encoding='utf-8'))"
          )
          script = script.replace(
              "import { join } from 'node:path';",
              "import { join } from 'node:path';\\n          import { fileURLToPath } from 'node:url';"
          )
          script = script.replace(
              "const root = new URL('../../', import.meta.url);",
              "const root = fileURLToPath(new URL('../../', import.meta.url));"
          )
          script = script.replace("files(root.pathname)", "files(root)")
          Path('/tmp/issue-641-cleanup.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/issue-641-cleanup.py 2>&1 | tee /tmp/issue-641-runner.log
      - name: Upload cleanup diagnostics
        if: failure() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-641-cleanup-diagnostics
          path: |
            /tmp/issue-641-runner.log
            /tmp/issue-641-test.log
          if-no-files-found: warn
          retention-days: 3
      - name: Install frontend dependencies
        if: steps.guard.outputs.skip != 'true'
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Run focused regression test
        if: steps.guard.outputs.skip != 'true'
        working-directory: frontend/genealogy-web
        shell: bash
        run: set -o pipefail; npm run test:person-edit 2>&1 | tee /tmp/issue-641-test.log
      - name: Typecheck frontend
        if: steps.guard.outputs.skip != 'true'
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build frontend
        if: steps.guard.outputs.skip != 'true'
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit cleanup
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web
          git commit -m "refactor(ui): remove duplicated page prompts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
