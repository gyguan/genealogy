name: Issue 170 Full Validation

on:
  push:
    branches: ["agent/issue-170-migration-timeline"]
    paths: [".github/workflows/issue-170-validate.yml"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-170-migration-timeline
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run backend tests
        id: backend
        continue-on-error: true
        working-directory: backend/genealogy-backend
        run: mvn test
      - name: Install frontend dependencies
        id: install
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Run API contract
        id: api
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Run TypeScript
        id: typecheck
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Run tracking tests
        id: tracking
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run test:logs
      - name: Run production build
        id: build
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Install Chromium
        id: chromium
        continue-on-error: true
        working-directory: frontend/genealogy-web
        run: npx playwright install --with-deps chromium
      - name: Start frontend
        if: steps.install.outcome == 'success'
        working-directory: frontend/genealogy-web
        run: nohup npm run dev >/tmp/issue170-vite.log 2>&1 &
      - name: Wait for frontend
        id: server
        continue-on-error: true
        run: |
          for i in $(seq 1 40); do
            curl -fsS http://127.0.0.1:5179 >/dev/null && exit 0
            sleep 2
          done
          tail -n 120 /tmp/issue170-vite.log || true
          exit 1
      - name: Run migration browser test
        id: migration
        continue-on-error: true
        if: steps.server.outcome == 'success' && steps.chromium.outcome == 'success'
        working-directory: frontend/genealogy-web
        env:
          CI: "true"
        run: npm run test:migration
      - name: Persist validation report
        shell: bash
        env:
          BACKEND: ${{ steps.backend.outcome }}
          INSTALL: ${{ steps.install.outcome }}
          API: ${{ steps.api.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TRACKING: ${{ steps.tracking.outcome }}
          BUILD: ${{ steps.build.outcome }}
          CHROMIUM: ${{ steps.chromium.outcome }}
          SERVER: ${{ steps.server.outcome }}
          MIGRATION: ${{ steps.migration.outcome }}
        run: |
          cat > tasks/issue-170-validation.md <<EOF
          # Issue #170 全链路验证

          - 验证 Head：$(git rev-parse HEAD)
          - 后端 Maven 测试：$BACKEND
          - 前端依赖安装：$INSTALL
          - API Contract：$API
          - TypeScript：$TYPECHECK
          - Tracking 深链测试：$TRACKING
          - 生产构建：$BUILD
          - Chromium 安装：$CHROMIUM
          - Vite 启动：$SERVER
          - 迁徙时间轴 Playwright：${MIGRATION:-skipped}

          数据库迁移治理已由 PR 标准门禁 run 29381945843 验证通过。
          EOF
          rm -f .github/workflows/issue-170-validate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(issue-170): record full validation result"
          git push origin HEAD:agent/issue-170-migration-timeline
