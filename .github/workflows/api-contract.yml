name: API Contract

on:
  pull_request:
    paths:
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'
      - '.github/workflows/api-contract.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'
      - '.github/workflows/api-contract.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api-contract:
    name: API Contract Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Check generated API contract
        run: bash scripts/api/check-api-contract.sh

      - name: Upload generated API contract
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-api-contract
          path: frontend/genealogy-web/src/shared/api/generated/api-contract.ts
          retention-days: 3
