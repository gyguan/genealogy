name: API Contract

on:
  pull_request:
    paths:
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'
      - '.github/workflows/api-contract.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'
      - '.github/workflows/api-contract.yml'

jobs:
  api-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Check generated API contract
        run: bash scripts/api/check-api-contract.sh 2>&1 | tee /tmp/api-contract-check.log

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck 2>&1 | tee /tmp/api-typecheck.log

      - name: Upload contract diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue-166-api-contract-diagnostics
          path: |
            /tmp/api-contract-check.log
            /tmp/api-typecheck.log
          if-no-files-found: ignore
