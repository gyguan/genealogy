name: API Contract

on:
  pull_request:
    paths:
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'
  push:
    branches:
      - main
      - master
      - agent/issue-106-source-import
    paths:
      - '.github/workflows/api-contract.yml'
      - 'docs/api/openapi*.json'
      - 'scripts/api/**'
      - 'frontend/genealogy-web/src/shared/api/**'
      - 'frontend/genealogy-web/package.json'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/controller/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/**/dto/**'

permissions:
  contents: write

jobs:
  api-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install

      - name: Generate API contract
        run: |
          node scripts/api/generate-frontend-client.mjs
          node scripts/api/check-tracking-contract.mjs

      - name: Commit generated contract
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/issue-106-source-import'
        run: |
          if ! git diff --quiet -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts frontend/genealogy-web/src/shared/api/generated/tracking-types.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add frontend/genealogy-web/src/shared/api/generated/api-contract.ts frontend/genealogy-web/src/shared/api/generated/tracking-types.ts
            git commit -m "chore(imports): update generated api contract for source import"
            git push
          fi

      - name: Check generated API contract
        if: github.event_name != 'push' || github.ref != 'refs/heads/agent/issue-106-source-import'
        run: git diff --exit-code -- frontend/genealogy-web/src/shared/api/generated/api-contract.ts frontend/genealogy-web/src/shared/api/generated/tracking-types.ts

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
