name: Issue 170 Diagnose

on:
  push:
    branches: ["agent/issue-170-migration-timeline"]
    paths: [".github/workflows/issue-170-diagnose.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-170-migration-timeline
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Capture Maven diagnostics
        shell: bash
        run: |
          set +e
          cd backend/genealogy-backend
          mvn test > /tmp/issue170-mvn.log 2>&1
          status=$?
          cd ../..
          {
            echo "exit_status=$status"
            echo "--- compiler/test errors ---"
            grep -nE "\[ERROR\]|COMPILATION ERROR|Tests run:|Failures:|Errors:" /tmp/issue170-mvn.log | tail -n 300
            echo "--- tail ---"
            tail -n 240 /tmp/issue170-mvn.log
          } > tasks/issue-170-mvn-diagnostic.txt
          rm -f .github/workflows/issue-170-diagnose.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(issue-170): capture backend diagnostic"
          git push origin HEAD:agent/issue-170-migration-timeline
