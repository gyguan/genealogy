name: Issue 677 Finalize Result Controls

on:
  push:
    branches:
      - agent/issue-677-query-result-double-card
    paths:
      - .github/workflows/issue-677-finalize.yml

permissions:
  contents: write

jobs:
  finalize-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-677-query-result-double-card
          fetch-depth: 1

      - name: Move culture sorting into business result cards
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str):
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise RuntimeError(f'{path}: expected exactly one match, got {text.count(old)}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'frontend/genealogy-web/src/features/culture/CultureItemStandardTab.tsx',
              '''        extra={(\n          <Space className="culture-result-actions">\n            <Select aria-label="文化资料排序" className="culture-result-sort" value={search.sort} options={sortOptions} onChange={changeSort} />\n            <Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'item', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button>\n          </Space>\n        )}\n      >\n        <BusinessResultCard title="文化资料" total={page.totalElements}>''',
              '''        extra={<Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'item', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button>}\n      >\n        <BusinessResultCard title="文化资料" total={page.totalElements} extra={<Select aria-label="文化资料排序" className="culture-result-sort" value={search.sort} options={sortOptions} onChange={changeSort} />}>'''
          )
          replace_once(
              'frontend/genealogy-web/src/features/culture/MigrationEventStandardTab.tsx',
              '''    <Card className="culture-result-card query-result-outer-card" title="查询结果" extra={<Space className="culture-result-actions"><Select aria-label="迁徙脉络排序" className="culture-result-sort" value={search.sort} options={migrationSortOptions} onChange={changeSort} /><Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'migration', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button></Space>}>\n      <BusinessResultCard title="迁徙脉络" total={total}>''',
              '''    <Card className="culture-result-card query-result-outer-card" title="查询结果" extra={<Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'migration', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button>}>\n      <BusinessResultCard title="迁徙脉络" total={total} extra={<Select aria-label="迁徙脉络排序" className="culture-result-sort" value={search.sort} options={migrationSortOptions} onChange={changeSort} />}>'''
          )
          replace_once(
              'frontend/genealogy-web/src/features/culture/CultureSiteStandardTab.tsx',
              '''    <Card className="culture-result-card query-result-outer-card" title="查询结果" extra={<Space className="culture-result-actions"><Select aria-label="文化场所排序" className="culture-result-sort" value={search.sort} options={siteSortOptions} onChange={changeSort} /><Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'site', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button></Space>}>\n      <BusinessResultCard title="文化场所" total={total}>''',
              '''    <Card className="culture-result-card query-result-outer-card" title="查询结果" extra={<Button type="primary" disabled={!clanId} onClick={() => openEditor({ target: 'site', mode: 'create' })}>{culturePrimaryAction(activeTab)}</Button>}>\n      <BusinessResultCard title="文化场所" total={total} extra={<Select aria-label="文化场所排序" className="culture-result-sort" value={search.sort} options={siteSortOptions} onChange={changeSort} />}>'''
          )
          PY

      - name: Verify result control hierarchy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          cases = [
              ('CultureItemStandardTab.tsx', '文化资料排序'),
              ('MigrationEventStandardTab.tsx', '迁徙脉络排序'),
              ('CultureSiteStandardTab.tsx', '文化场所排序'),
          ]
          root = Path('frontend/genealogy-web/src/features/culture')
          for filename, aria in cases:
              source = (root / filename).read_text(encoding='utf-8')
              outer_start = source.index('query-result-outer-card')
              inner_start = source.index('<BusinessResultCard', outer_start)
              outer = source[outer_start:inner_start]
              inner_head = source[inner_start:source.index('>', inner_start) + 1]
              assert 'type="primary"' in outer, f'{filename}: create action must stay in outer header'
              assert aria not in outer, f'{filename}: sorting must not stay in outer header'
              assert aria in inner_head, f'{filename}: sorting must be in inner business card header'
          PY

      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install --silent --no-audit --no-fund

      - name: Run result card regression tests
        working-directory: frontend/genealogy-web
        run: node --test src/shared/ui/QueryResultCards.test.mjs

      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build

      - name: Commit final hierarchy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/culture/CultureItemStandardTab.tsx frontend/genealogy-web/src/features/culture/MigrationEventStandardTab.tsx frontend/genealogy-web/src/features/culture/CultureSiteStandardTab.tsx
          git diff --cached --quiet && exit 0
          git commit -m "fix: keep culture sorting inside business result cards"
          git push origin HEAD:agent/issue-677-query-result-double-card
