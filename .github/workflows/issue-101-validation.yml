name: Issue 101 Member Permission Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  review-fix:
    name: Apply final actor-visible scope review
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Restrict aggregated grants to actor-visible scopes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          policy_path = Path('backend/genealogy-backend/src/main/java/com/genealogy/member/domain/MemberGrantPolicyService.java')
          policy = policy_path.read_text()
          if 'return actorScope.coversGrantScope(targetScopeType, targetScopeId);' not in policy:
              start = policy.find('        if (!BRANCH_ADMIN_GRANTABLE_ROLES.contains(targetRoleCode)')
              end = policy.find('    public boolean canManageMembership(', start)
              if start < 0 or end < 0:
                  raise SystemExit('canManageGrant markers not found')
              policy = policy[:start] + '''        if (!BRANCH_ADMIN_GRANTABLE_ROLES.contains(targetRoleCode)) {
            return false;
        }
        return actorScope.coversGrantScope(targetScopeType, targetScopeId);
    }

''' + policy[end:]
          if 'public boolean coversGrantScope' not in policy:
              marker = '        public List<Long> queryVisibleBranchIds() {'
              position = policy.find(marker)
              if position < 0:
                  raise SystemExit('ActorScope marker not found')
              policy = policy[:position] + '''        public boolean coversGrantScope(MemberRoleScopeType scopeType, Long scopeId) {
            if (fullClanAccess()) {
                return true;
            }
            if (scopeId == null) {
                return false;
            }
            if (scopeType == MemberRoleScopeType.branch) {
                return visibleBranchIds.contains(scopeId);
            }
            if (scopeType == MemberRoleScopeType.branch_subtree) {
                return visibleSubtreeIds.contains(scopeId);
            }
            return false;
        }

''' + policy[position:]
          policy_path.write_text(policy)

          service_path = Path('backend/genealogy-backend/src/main/java/com/genealogy/member/application/MemberPermissionApplicationService.java')
          service = service_path.read_text()
          if 'actorScope.coversGrantScope(grant.getScopeType(), grant.getScopeId())' not in service:
              pattern = re.compile(
                  r'(List<MemberGrantResponse> memberGrants = membershipGrants\.stream\(\)\s*\n)(\s*\.sorted\(Comparator\.comparing\(MemberRoleEntity::getId\)\))'
              )
              service, count = pattern.subn(
                  r'\1                    .filter(grant -> actorScope.coversGrantScope(grant.getScopeType(), grant.getScopeId()))\n\2',
                  service,
                  count=1
              )
              if count != 1:
                  raise SystemExit('aggregate stream marker not found')
          service_path.write_text(service)
          PY
      - name: Commit review correction
        run: |
          if git diff --quiet; then
            echo 'Review correction already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/member/domain/MemberGrantPolicyService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/member/application/MemberPermissionApplicationService.java
          git commit -m 'security(member): hide grants outside actor scope'
          git push origin HEAD:${{ github.head_ref }}

  backend:
    name: Backend compile and security tests
    needs: review-fix
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_repository_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy_repository_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_INTEGRATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -DskipTests package
      - name: Run focused member permission tests
        id: focused-tests
        continue-on-error: true
        working-directory: backend/genealogy-backend
        run: mvn -q "-Dtest=MemberGrantPolicyServiceTest,MemberPermissionApplicationServiceTest,ClanMembershipRepositoryQueryContractTest,ClanMembershipRepositoryPostgresTest,MemberManagementControllerContractTest,RbacAuthorizationApplicationServiceTest" test
      - name: Upload focused test diagnostics
        if: steps.focused-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: issue-101-surefire-${{ github.run_number }}
          path: backend/genealogy-backend/target/surefire-reports
          if-no-files-found: error
      - name: Fail on focused test errors
        if: steps.focused-tests.outcome == 'failure'
        run: exit 1

  postgres:
    name: PostgreSQL migration, scope and index validation
    needs: review-fix
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Create minimal permission schema
        run: |
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE clan_membership (
            id BIGSERIAL PRIMARY KEY,
            clan_id BIGINT NOT NULL,
            user_id BIGINT NOT NULL,
            member_status VARCHAR(32) NOT NULL
          );
          CREATE TABLE app_role (
            id BIGINT PRIMARY KEY,
            role_code VARCHAR(64) NOT NULL
          );
          CREATE TABLE member_role (
            id BIGSERIAL PRIMARY KEY,
            membership_id BIGINT NOT NULL,
            role_id BIGINT NOT NULL,
            scope_type VARCHAR(32) NOT NULL,
            scope_id BIGINT NOT NULL,
            status VARCHAR(32) NOT NULL
          );
          CREATE TABLE branch (
            id BIGINT PRIMARY KEY,
            clan_id BIGINT NOT NULL,
            parent_id BIGINT
          );
          INSERT INTO app_role(id, role_code) VALUES
            (1, 'branch_admin'), (2, 'viewer');
          INSERT INTO branch(id, clan_id, parent_id) VALUES
            (10, 1, NULL), (11, 1, 10), (12, 1, 11), (20, 1, NULL), (30, 2, NULL);
          INSERT INTO clan_membership(clan_id, user_id, member_status)
          SELECT 1, n, CASE WHEN n % 4 = 0 THEN 'disabled' ELSE 'active' END
          FROM generate_series(1, 2000) AS n;
          INSERT INTO member_role(membership_id, role_id, scope_type, scope_id, status)
          VALUES
            (1, 1, 'branch', 10, 'active'),
            (2, 2, 'branch', 20, 'active');
          SQL
      - name: Apply Issue 101 migration
        run: psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 -f backend/genealogy-backend/src/main/resources/db/migration/V2026071301__member_permission_scope_and_indexes.sql
      - name: Verify migration, recursive scope and indexes
        run: |
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "SELECT scope_type FROM member_role WHERE id=1")" = "branch_subtree"
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "SELECT scope_type FROM member_role WHERE id=2")" = "branch"
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "SELECT count(*) FROM member_role_scope_migration_2026071301")" = "1"
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "WITH RECURSIVE t AS (SELECT id,parent_id,clan_id FROM branch WHERE clan_id=1 AND id IN (10) UNION SELECT c.id,c.parent_id,c.clan_id FROM branch c JOIN t p ON c.parent_id=p.id WHERE c.clan_id=1) SELECT string_agg(id::text, ',' ORDER BY id) FROM t")" = "10,11,12"
          for index_name in \
            idx_clan_membership_clan_status_id \
            idx_clan_membership_clan_user \
            idx_member_role_membership_status \
            idx_member_role_role_status \
            idx_member_role_scope_status \
            idx_branch_clan_parent; do
            psql -h localhost -U postgres -d genealogy_test -Atc "SELECT indexname FROM pg_indexes WHERE indexname='${index_name}'" | grep -qx "${index_name}"
          done
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          SET enable_seqscan = off;
          EXPLAIN SELECT id FROM clan_membership
          WHERE clan_id = 1 AND member_status = 'active'
          ORDER BY id LIMIT 20;
          SQL

  frontend:
    name: API contract and member frontend
    needs: review-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Check generated API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Focused member TypeScript check
        working-directory: frontend/genealogy-web
        run: >-
          npx tsc --noEmit --ignoreConfig
          --target ES2022 --module ESNext --moduleResolution Bundler
          --jsx react-jsx --allowSyntheticDefaultImports --esModuleInterop
          --skipLibCheck
          src/features/members/memberPermissionApi.ts
          src/features/members/MemberPage.tsx
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
