name: Issue 101 Member Permission Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend compile and security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -DskipTests package
      - name: Run focused member permission tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -Dtest=MemberGrantPolicyServiceTest,
          MemberPermissionApplicationServiceTest,
          ClanMembershipRepositoryQueryContractTest,
          MemberManagementControllerContractTest,
          RbacAuthorizationApplicationServiceTest test

  postgres:
    name: PostgreSQL migration, scope and index validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Create minimal permission schema
        run: |
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE clan_membership (
            id BIGSERIAL PRIMARY KEY,
            clan_id BIGINT NOT NULL,
            user_id BIGINT NOT NULL,
            member_status VARCHAR(32) NOT NULL
          );
          CREATE TABLE member_role (
            id BIGSERIAL PRIMARY KEY,
            membership_id BIGINT NOT NULL,
            role_id BIGINT NOT NULL,
            scope_type VARCHAR(32) NOT NULL,
            scope_id BIGINT NOT NULL,
            status VARCHAR(32) NOT NULL
          );
          CREATE TABLE branch (
            id BIGINT PRIMARY KEY,
            clan_id BIGINT NOT NULL,
            parent_id BIGINT
          );
          INSERT INTO branch(id, clan_id, parent_id) VALUES
            (10, 1, NULL), (11, 1, 10), (12, 1, 11), (20, 1, NULL), (30, 2, NULL);
          INSERT INTO clan_membership(clan_id, user_id, member_status)
          SELECT 1, n, CASE WHEN n % 4 = 0 THEN 'disabled' ELSE 'active' END
          FROM generate_series(1, 2000) AS n;
          INSERT INTO member_role(membership_id, role_id, scope_type, scope_id, status)
          VALUES (1, 1, 'branch', 10, 'active');
          SQL
      - name: Apply Issue 101 migration
        run: psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 -f backend/genealogy-backend/src/main/resources/db/migration/V2026071301__member_permission_scope_and_indexes.sql
      - name: Verify migration, recursive scope and indexes
        run: |
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "SELECT scope_type FROM member_role WHERE id=1")" = "branch_subtree"
          test "$(psql -h localhost -U postgres -d genealogy_test -Atc "WITH RECURSIVE t AS (SELECT id,parent_id,clan_id FROM branch WHERE clan_id=1 AND id IN (10) UNION SELECT c.id,c.parent_id,c.clan_id FROM branch c JOIN t p ON c.parent_id=p.id WHERE c.clan_id=1) SELECT string_agg(id::text, ',' ORDER BY id) FROM t")" = "10,11,12"
          for index_name in \
            idx_clan_membership_clan_status_id \
            idx_clan_membership_clan_user \
            idx_member_role_membership_status \
            idx_member_role_role_status \
            idx_member_role_scope_status \
            idx_branch_clan_parent; do
            psql -h localhost -U postgres -d genealogy_test -Atc "SELECT indexname FROM pg_indexes WHERE indexname='${index_name}'" | grep -qx "${index_name}"
          done
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          SET enable_seqscan = off;
          EXPLAIN SELECT id FROM clan_membership
          WHERE clan_id = 1 AND member_status = 'active'
          ORDER BY id LIMIT 20;
          SQL

  frontend:
    name: API contract and member frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Check generated API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Focused member TypeScript check
        working-directory: frontend/genealogy-web
        run: >-
          npx tsc --noEmit --ignoreConfig
          --target ES2022 --module ESNext --moduleResolution Bundler
          --jsx react-jsx --allowSyntheticDefaultImports --esModuleInterop
          --skipLibCheck
          src/features/members/memberPermissionApi.ts
          src/features/members/MemberPage.tsx
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
