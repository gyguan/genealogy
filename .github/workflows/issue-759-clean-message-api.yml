name: Issue 759 clean Message API dependencies

on:
  push:
    branches:
      - agent/issue-759-migrate-all-antd-message

permissions:
  contents: write

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-759-migrate-all-antd-message
      - name: Remove stale messageApi dependencies
        run: |
          sed -i 's/, messageApi]/]/g' frontend/genealogy-web/src/features/culture/CultureItemStandardTab.tsx
          sed -i 's/, messageApi]/]/g' frontend/genealogy-web/src/features/culture/CultureSiteMaintenanceTab.tsx
          sed -i 's/, messageApi]/]/g' frontend/genealogy-web/src/features/culture/CultureSiteStandardTab.tsx
          sed -i 's/, messageApi]/]/g' frontend/genealogy-web/src/features/culture/MigrationEventMaintenanceTab.tsx
          sed -i 's/, messageApi]/]/g' frontend/genealogy-web/src/features/culture/MigrationEventStandardTab.tsx
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/genealogy-web/src/features/culture
          git commit -m "fix: remove stale Message API dependencies"
          git push origin HEAD:agent/issue-759-migrate-all-antd-message
