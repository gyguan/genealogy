name: Confirm Action Migration

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/genealogy-web/**"
      - ".github/workflows/confirm-action-migration.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-confirm-actions:
    name: Migrate and verify confirm actions
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/issue-778-unify-confirm-actions'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'agent/issue-778-unify-confirm-actions' }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package.json
      - name: Run confirm action migration
        working-directory: frontend/genealogy-web
        run: node scripts/migrate-confirm-actions.mjs
      - name: Install dependencies
        working-directory: frontend/genealogy-web
        run: npm install
      - name: Verify feedback audit and contract
        working-directory: frontend/genealogy-web
        run: |
          node scripts/audit-ui-feedback.mjs --baseline=feedback-audit-baseline.json
          npm run test:feedback
      - name: Typecheck frontend
        working-directory: frontend/genealogy-web
        run: npm run typecheck
      - name: Build production frontend
        working-directory: frontend/genealogy-web
        run: npm run build
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/genealogy-web
          git commit -m "refactor: unify confirmation actions"
          git push origin HEAD:agent/issue-778-unify-confirm-actions
