name: Member Permission Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/auth/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/branch/**'
      - 'backend/genealogy-backend/src/main/java/com/genealogy/member/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/auth/**'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/member/**'
      - 'frontend/genealogy-web/src/features/members/**'
      - 'frontend/genealogy-web/src/shared/api/generated/api-contract.ts'
      - 'docs/api/openapi.member-permission.json'
      - '.github/workflows/member-permission-validation.yml'

permissions:
  contents: read

jobs:
  backend:
    name: Backend compile and focused tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -DskipTests package
      - name: Run member permission tests
        working-directory: backend/genealogy-backend
        run: >-
          mvn -Dtest=RbacAuthorizationApplicationServiceTest,MemberGrantPolicyServiceTest,MemberPermissionApplicationServiceTest test

  subtree-sql:
    name: PostgreSQL branch subtree semantics
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - name: Verify descendant and sibling boundaries
        run: |
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE branch (
            id BIGINT PRIMARY KEY,
            clan_id BIGINT NOT NULL,
            parent_id BIGINT NULL
          );
          INSERT INTO branch(id, clan_id, parent_id) VALUES
            (1, 10, NULL),
            (2, 10, 1),
            (3, 10, 2),
            (4, 10, 1),
            (5, 20, NULL);

          DO $$
          DECLARE descendant_match BOOLEAN;
          DECLARE sibling_match BOOLEAN;
          DECLARE other_clan_match BOOLEAN;
          BEGIN
            WITH RECURSIVE branch_tree AS (
              SELECT id, parent_id, clan_id
              FROM branch
              WHERE id = 1 AND clan_id = 10
              UNION ALL
              SELECT child.id, child.parent_id, child.clan_id
              FROM branch child
              JOIN branch_tree parent ON child.parent_id = parent.id
              WHERE child.clan_id = 10
            )
            SELECT EXISTS (SELECT 1 FROM branch_tree WHERE id = 3)
            INTO descendant_match;

            WITH RECURSIVE branch_tree AS (
              SELECT id, parent_id, clan_id
              FROM branch
              WHERE id = 2 AND clan_id = 10
              UNION ALL
              SELECT child.id, child.parent_id, child.clan_id
              FROM branch child
              JOIN branch_tree parent ON child.parent_id = parent.id
              WHERE child.clan_id = 10
            )
            SELECT EXISTS (SELECT 1 FROM branch_tree WHERE id = 4)
            INTO sibling_match;

            WITH RECURSIVE branch_tree AS (
              SELECT id, parent_id, clan_id
              FROM branch
              WHERE id = 1 AND clan_id = 10
              UNION ALL
              SELECT child.id, child.parent_id, child.clan_id
              FROM branch child
              JOIN branch_tree parent ON child.parent_id = parent.id
              WHERE child.clan_id = 10
            )
            SELECT EXISTS (SELECT 1 FROM branch_tree WHERE id = 5)
            INTO other_clan_match;

            IF NOT descendant_match OR sibling_match OR other_clan_match THEN
              RAISE EXCEPTION 'branch subtree boundary validation failed';
            END IF;
          END $$;
          SQL

  frontend:
    name: API contract and member frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend/genealogy-web
        run: npm install --no-audit --no-fund
      - name: Check generated API contract
        working-directory: frontend/genealogy-web
        run: npm run api:check
      - name: Focused member TypeScript check
        id: focused_typecheck
        working-directory: frontend/genealogy-web
        shell: bash
        run: |
          set +e
          npx tsc --ignoreConfig --noEmit --target ES2020 --module ESNext --moduleResolution Node \
            --jsx react-jsx --esModuleInterop --allowSyntheticDefaultImports --skipLibCheck \
            src/features/members/MemberPage.tsx src/features/members/memberPermissionApi.ts \
            > member-typecheck.log 2>&1
          status=$?
          cat member-typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: member-typecheck-diagnostics
          path: frontend/genealogy-web/member-typecheck.log
          if-no-files-found: error
      - name: Fail on focused typecheck errors
        if: steps.focused_typecheck.outputs.status != '0'
        run: exit 1
      - name: Build frontend
        working-directory: frontend/genealogy-web
        run: npm run build
