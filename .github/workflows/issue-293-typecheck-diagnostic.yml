name: Issue 293 Typecheck Diagnostic

on:
  push:
    branches:
      - agent/issue-293-culture-item-editor
    paths:
      - .github/workflows/issue-293-typecheck-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-293-culture-item-editor
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/genealogy-web/package-lock.json
      - run: npm ci
        working-directory: frontend/genealogy-web
      - name: Capture typecheck
        run: |
          set +e
          npm run typecheck > ../../../tasks/issue-293-typecheck.log 2>&1
          status=$?
          echo "exit=$status" >> ../../../tasks/issue-293-typecheck.log
          rm .github/workflows/issue-293-typecheck-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: record issue 293 typecheck diagnostics"
          git push origin HEAD:agent/issue-293-culture-item-editor
          exit 0
