name: Issue 103 Clean Replay

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/workflows/issue-103-replay.yml'

permissions:
  contents: write

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout clean branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Replay Issue 103 business delta
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin agent/issue-103-relationship-import:refs/remotes/origin/agent/issue-103-relationship-import --force

          git checkout origin/agent/issue-103-relationship-import -- \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobReviewApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/ImportJobRowApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportFilePolicyService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportJobRowApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportTemplateApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/application/RelationshipImportTemplateDefinition.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/controller/ImportController.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/domain/RelationshipImportTypeDefinition.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/dto/RelationshipImportPreviewResponse.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/dto/RelationshipImportPreviewRowResponse.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/dto/RelationshipImportRowRetryRequest.java \
            backend/genealogy-backend/src/main/java/com/genealogy/imports/entity/ImportJobRowEntity.java \
            backend/genealogy-backend/src/main/java/com/genealogy/person/repository/PersonRepository.java \
            backend/genealogy-backend/src/main/java/com/genealogy/relationship/application/RelationshipApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/review/application/ApprovalApplicationService.java \
            backend/genealogy-backend/src/main/java/com/genealogy/review/application/RevisionApplyService.java \
            backend/genealogy-backend/src/main/resources/db/migration/V20260713200000__add_import_row_generic_draft_target.sql \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/ImportJobReviewApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/ImportJobRowApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/RelationshipImportApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/RelationshipImportFilePolicyServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/RelationshipImportJobReviewApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/RelationshipImportJobRowApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/imports/application/RelationshipImportTemplateApplicationServiceTest.java \
            backend/genealogy-backend/src/test/java/com/genealogy/review/application/RevisionApplyRelationshipImportJobTest.java \
            docs/api/openapi.relationship-import.json \
            frontend/genealogy-web/src/features/imports/ImportJobManagementPanel.tsx \
            frontend/genealogy-web/src/features/imports/ImportPage.tsx \
            frontend/genealogy-web/src/features/imports/RelationshipImportWorkspace.tsx \
            frontend/genealogy-web/src/features/imports/import-type-registry.ts \
            tasks/issue-103-execution.md \
            tasks/issue-103-review.md

          node scripts/api/generate-frontend-client.mjs
          rm -f .github/workflows/issue-103-replay.yml
          git add -A
          git commit -m 'feat(imports): replay relationship import on latest main'
          git push origin HEAD:${{ github.head_ref }}
