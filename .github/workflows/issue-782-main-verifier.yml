name: Issue 782 Main Verifier

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/issue-782-build-patch.yml"
      - ".github/issue-782-trigger.txt"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Materialize patch from branch workflow
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/issue-782-build-patch.yml').read_text()
          block = source.split('      - name: Apply source binding review patch', 1)[1]
          block = block.split('      - name: Run targeted backend tests', 1)[0]
          script = block.split('        run: |', 1)[1]
          lines = []
          for line in script.splitlines():
              lines.append(line[10:] if line.startswith('          ') else line)
          exec(compile('\n'.join(lines), '<issue-782-patch>', 'exec'))
      - name: Run targeted backend tests
        working-directory: backend/genealogy-backend
        run: mvn -q -Dtest=RevisionApplyServiceSourceBindingTest,RevisionApplyServiceGenerationSchemeTest test
      - name: Commit verified files to feature branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/genealogy-backend/src/main/java/com/genealogy/review/application/RevisionApplyService.java \
            backend/genealogy-backend/src/test/java/com/genealogy/review/application/RevisionApplyServiceSourceBindingTest.java
          git commit -m "fix(review): apply source binding revisions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
