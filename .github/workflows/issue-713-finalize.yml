name: Issue 713 final validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-713-finalize.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-713-align-person-edit-fields
          fetch-depth: 0
      - name: Apply changes
        run: |
          python scripts/issue-713-apply.py
          git diff --check
      - name: Frontend checks
        working-directory: frontend/genealogy-web
        run: |
          npm install
          npm run typecheck
          npm run test:person-edit
          npm run build
      - name: Commit validated changes
        shell: bash
        run: |
          rm -f .github/workflows/issue-713-apply.yml
          rm -f .github/workflows/issue-713-diagnostic.yml
          rm -f .github/workflows/issue-713-finalize.yml
          rm -f scripts/issue-713-apply.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: align person edit generation and education fields'
          git push origin HEAD:agent/issue-713-align-person-edit-fields
