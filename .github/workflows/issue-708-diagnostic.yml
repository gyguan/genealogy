name: Issue 708 implementation validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-708-diagnostic.yml

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-708-approved-dependencies
          fetch-depth: 0
      - name: Apply approved dependency guards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('frontend/genealogy-web/src/features/sources/sourceLibraryService.ts')
          source_text = source.read_text(encoding='utf-8')
          source_text, count = re.subn(
              r'export type BranchOption = \{\s*id\?: number;\s*branchName\?: string;\s*branchPath\?: string;\s*\};',
              'export type BranchOption = {\n    id?: number;\n    branchName?: string;\n    branchPath?: string;\n  };',
              source_text,
              count=1
          )
          if count != 1:
              raise SystemExit('unable to normalize BranchOption declaration')
          source_text, count = re.subn(
              r'export async function listBranches\(clanId: string\) \{\s*return toRows<BranchOption>\(await apiClient\.get\(`/clans/\$\{clanId\}/branches`\)\);\s*\}',
              'export async function listBranches(clanId: string) {\n    return toRows<BranchOption>(await apiClient.get(`/clans/${clanId}/branches`));\n  }',
              source_text,
              count=1
          )
          if count != 1:
              raise SystemExit('unable to normalize listBranches function')
          source.write_text(source_text, encoding='utf-8')

          person_edit = Path('frontend/genealogy-web/src/features/persons/PersonEditPage.tsx')
          person_text = person_edit.read_text(encoding='utf-8')
          person_text, count = re.subn(
              r"function isOfficialGenerationScheme\(scheme: any\) \{\s*const status = String\(scheme\.dataStatus \|\| scheme\.status \|\| scheme\.verificationStatus \|\| ''\)\.toLowerCase\(\);\s*return \['official', 'active', 'approved'\]\.includes\(status\);\s*\}",
              "function isOfficialGenerationScheme(scheme: any) {\n    const status = String(scheme.dataStatus || scheme.status || scheme.verificationStatus || '').toLowerCase();\n    return ['official', 'active', 'approved'].includes(status);\n  }",
              person_text,
              count=1
          )
          if count != 1:
              raise SystemExit('unable to normalize person edit helper')
          person_edit.write_text(person_text, encoding='utf-8')

          workflow = Path('.github/workflows/issue-708-implementation.yml').read_text(encoding='utf-8')
          start = "          cat > /tmp/patch_issue708.py <<'PY'\n"
          end = "\n          PY\n          python /tmp/patch_issue708.py"
          body = workflow.split(start, 1)[1].split(end, 1)[0]
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines())
          Path('/tmp/patch_issue708.py').write_text(body + '\n', encoding='utf-8')
          PY
          python /tmp/patch_issue708.py
          git diff --check
      - name: Backend tests
        working-directory: backend/genealogy-backend
        run: mvn -q test
      - name: Frontend checks
        working-directory: frontend/genealogy-web
        run: |
          npm ci
          npm run typecheck
          npm run test:wizard
          npm run test:wizard-dependencies
          npm run test:source-stage
          npm run test:person-edit
          npm run test:imports
          npm run test:culture-shell
          npm run build
      - name: Commit validated implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          task = Path('tasks/issue-708-execution.md')
          text = task.read_text(encoding='utf-8')
          for item in [
              '建立后端统一依赖审核策略',
              '接入支派、字辈、人物、关系、来源绑定写接口',
              '接入宗族文化与导入场景',
              '收紧前端依赖对象候选过滤',
              '增加自动化测试',
              '通过前后端 CI'
          ]:
              text = text.replace(f'- [ ] {item}', f'- [x] {item}')
          task.write_text(text, encoding='utf-8')
          for name in [
              '.github/workflows/issue-708-implementation.yml',
              '.github/workflows/issue-708-diagnostic.yml',
              '.github/workflows/issue-708-executor.yml'
          ]:
              path = Path(name)
              if path.exists():
                  path.unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: require approved dependency objects'
          git push origin HEAD:agent/issue-708-approved-dependencies
