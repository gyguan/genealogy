name: Member List Nullable Keyword Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/genealogy-backend/src/main/java/com/genealogy/member/repository/ClanMembershipRepository.java'
      - 'backend/genealogy-backend/src/test/java/com/genealogy/member/repository/ClanMembershipRepositoryQueryContractTest.java'
      - '.github/workflows/member-list-null-keyword-validation.yml'

permissions:
  contents: read

jobs:
  backend:
    name: Backend compile and query contract test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compile backend
        working-directory: backend/genealogy-backend
        run: mvn -DskipTests package
      - name: Run query contract test
        working-directory: backend/genealogy-backend
        run: mvn -Dtest=ClanMembershipRepositoryQueryContractTest test

  postgres:
    name: PostgreSQL nullable bytea cast smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genealogy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - name: Verify nullable bytea can be explicitly cast for LIKE
        run: |
          psql -h localhost -U postgres -d genealogy_test -v ON_ERROR_STOP=1 <<'SQL'
          PREPARE member_keyword(bytea) AS
            SELECT lower('Alice') LIKE concat('%', cast($1 as varchar), '%');
          EXECUTE member_keyword(NULL);
          DEALLOCATE member_keyword;
          SQL
